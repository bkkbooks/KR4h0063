body:
  text: 三國志文類巻三十四對問魏郭嘉討袁本初對字奉孝為司空軍祭酒太祖謂嘉曰本初擁冀州之衆青并從之地廣兵强而數為不遜吾欲討之力不敵如何嘉對曰劉項之不敵公所知也漢祖為智勝項羽雖彊終為所禽嘉竊料之紹有十敗公有十勝雖兵彊無能為也紹繁禮多儀公體任自然此道勝一也紹以逆動公奉順以率天下此義勝二也漢末政失於寛紹以寛濟寛故不懾公糾之以猛而上下知制此治勝三也紹外寛内忌用人而疑之所任唯親戚子弟公外易簡而内機明用人無疑唯才所宜不間遠近此度勝四也紹多謀少決失在後事公䇿得輒行應變無窮此謀勝五也紹因累世之資高議揖讓以收名譽士之好言飾外者多歸之公以至心待人推誠而行不為虛美以儉率下與有功者無所吝士之忠正遠見而有實者皆願為用此德勝六也紹見人飢寒恤念之形於顔色其所不見慮或不及也所謂婦人之仁耳公於目前小事時有所忽至於大事與四海接恩之所加皆過其望雖所不見慮之所周無不濟也此仁勝七也紹大臣爭權讒言惑亂公御下以道浸潤不行此明勝八也紹是非不可知公所是進之以禮所不是正之以法此文勝九也紹好為虛勢不知兵要公以少克衆用兵如神軍人恃之敵人畏之此武勝十也太祖笑曰如卿所言孤何德以堪之也嘉又曰紹方北擊公孫瓚可因其遠征東取吕布不先取布若紹為寇布為之援此深害也太祖曰然劉曄伐陳䇿對曄字子揚時廬江界有山賊陳䇿衆數萬臨險守而先時遣偏將致誅莫能禽克太祖問羣下可伐與否咸足云山峻髙而谿谷深隘守易攻難又無之不為損得之不足為益䇿等小豎因亂赴險遂相依為彊耳非有爵命威信相服也往者偏將資輕而中國未夷故䇿敢據險以守今天下略定後服先誅夫畏死趨賞愚智所同故廣武君為韓信畫䇿謂其威名足以先聲後實而服鄰國也豈況明公之德東征西怨先開賞募大兵臨之令宣之日軍門啓而虜自潰矣太祖笑曰卿言近之遂遣猛將在前大將在後至則克䇿如曄所度又對無故求降時孫權遣使求降帝以問曄曄對曰權無故求降必内有急權前襲殺關羽取荆州四郡備怒必大興師伐之外有彊寇衆心不安又恐中國乘其釁而伐之故委地求降一以却中國之兵二則假中國之援以彊其衆而疑敵人權善用兵見䇿知變其計必出於此今天下三分中國十有其八吳蜀各保一州阻山依水有急相救此小國之利也今還自相攻天亡之也宜大興師徑渡江襲其内蜀攻其外我襲其内吳之亡不出旬月矣吳亡則蜀孤若割吳半蜀固不能久存況蜀得其外我得其内乎帝曰人稱臣降而伐之疑天下欲來者心必以為懼其一不可孤何不且受吳降而襲蜀之後乎對曰蜀遠吳近又聞中國伐之便還軍不能止也今備巳怒故興兵擊吳聞我伐吳知吳必亡必喜而進與我爭割吳地必不改計抑怒救吳必然之勢也帝不聽遂受吳降即拜權為吳王曄又進曰不可先帝征伐天下兼其八威震海内陛下受禪即真德合天地聲暨四遠此實然之勢非卑臣頌言也權雖有雄才故漢驃騎將軍南昌侯耳官輕勢卑士民有畏中國心不可彊迫與成所謀也不得巳受其降可進其將軍號封十萬户侯不可即以為王也夫王位去天子一階耳其禮秩服御相亂也彼直為侯江南士民未有君臣之義也我信其偽降就封殖之崇其位號定其君臣是為虎傅翼也權既受王位却蜀兵之後外盡禮事中國使其國内皆聞之内為無禮以怒陛下陛下赫然發怒興兵討之乃徐告其民曰我委身事中國不愛珍貨重寶隨時貢獻不敢失臣禮也無故伐我必欲殘我國家俘我民人子女以為僮𨽻僕妾吳民無縁不信其言也信其言而感怒上下同心戰加十倍矣又不從遂即拜權為吳王權將陸遜大敗劉備殺其兵八萬餘人備僅以身免權外禮愈卑而内行不順果如曄言孫資討蜀對時諸葛亮出在南鄭議者以為可因大發兵討之帝意亦然以問資資對曰昔武皇帝征南鄭取張魯陽平之役危而後濟又自往拔出夏侯淵軍數言南鄭直為天獄中斜谷道為五百里石穴耳言其深險喜出淵軍之辭也又武皇帝聖於用兵察蜀賊栖於山巖視吳虜竄於江湖皆撓而避之不責將士之力不爭一朝之忿誠所謂見勝而戰知難而退也今若進軍就南鄭討亮道旣險阻計用精兵又轉運鎮守南方四州遏禦水賊凡用十五六萬人必當復更有所發興天下騷動費力廣大此誠陛下所宜深慮夫守戰之力力役參倍但以今日見兵分命大將據諸要險威足以震懾彊寇鎮靜疆埸將士虎睡百姓無事數年之間中國日盛吳蜀二虜必自罷弊帝由是止伐吳對時吳人彭綺又舉義江南議者以為因此伐之必有所克帝問資資曰鄱陽宗人前後數有舉義者衆弱謀淺旋輒乖散昔文皇帝嘗密論賊形勢言洞浦殺萬人得船千萬數日間船人復會江陵被圍歴月權裁以千數百兵住東門而其土地無崩解者是有法禁上下相奉持之明驗也以此推綺懼未能為權腹心大疾也綺果尋敗亡又對明帝萬年後計資别傳曰帝詔資曰吾年稍長又厯觀書傳中皆歎息無所不念圖萬年後計莫過使親人廣據職勢兵任又重今射聲校尉缺久欲得親人誰可用者資曰陛下思深慮遠誠非愚臣所及書傳所載皆聖聽所究向使漢高不知平勃能安劉氏孝武不識金霍付屬以事殆不可言文皇帝始召曹真還時親詔臣以重慮及至晏駕陛下即阼猶有曹休内外之望賴遭日月御勒不傾使各守分職纎介不間以此推之親臣貴戚雖當據勢握兵宜使輕重素定若諸侯典兵力均衡平寵齊愛等則不相為服不相為服則意有異同今五營所領見兵常不過數百選授校尉如其輩類為有儔匹至於重大之任能有所維綱者宜以聖恩簡擇如平勃金霍劉章等一二人漸殊其威重使相鎮固於事為善帝曰然如卿言當為吾遠慮所圖今日可參平勃侔金藿雙劉章者其誰哉資曰臣聞知人則哲惟帝難之唐虞之聖凡所進用明試以功陳平初事漢祖絳灌等謗平有受金盗嫂之罪周勃以吹簫引彊始事高祖亦未知名也高祖察其行跡然後知可付以大事霍光給事中二十餘年小心謹慎乃見親信日磾夷狄以至孝質直特見擢用左右尚曰妄得一胡兒而重貴之平勃雖安漢嗣其終勃被反名平劣自免於吕須之讒上官桀桑𢎞羊與霍光爭權㡬成禍亂此誠知人之不易為臣之難也又所簡擇當得陛下所親當得陛下所信誠非愚臣之所能識别杜畿録寡婦對畿在郡被書録寡婦是時他郡或有巳自相配嫁依書皆録奪啼哭道路畿但取寡者故所送少及趙儼代畿而所送多文帝問畿前君所送何少今何多也畿對曰臣前所録皆亡者妻今儼送生人婦也帝及左右顧而失色鄭泰對董卓字公業少有才畧多謀計何進輔政徴用名士以泰為尚書侍郎加奉車都尉進將誅黄門召董卓為助泰諫不能用進尋見害卓果專權廢帝關東義兵起卓㑹議大發兵羣寮咸憚卓莫敢忤㫖其彊益將難制乃曰夫治在德不在兵也卓不悅曰如此兵無益耶衆人莫不變容為泰震慄泰乃詭辭而對曰非以無益以山東不足加兵也今山東議欲起兵州郡相連人衆相動非不能也然中國自光武以来無雞鳴狗吠之驚百姓忘戰日久仲尼有言不教民戰是謂棄之雖衆不能為害一也明公自出西州少為國將閑習軍事數踐戰場名稱當世以此威名民懷懾服二也袁本初公卿子弟生處京師體長婦人張孟卓東平長者坐不窺堂孔公緒能清談高論噓枯吹生無軍師之才負霜露之勤臨鋒履刃決敵雌雄皆非明公敵三也察山東之士力能跨馬控弦勇等孟賁捷齊慶忌信有聊城之守䇿有良平之謀可任以偏師責以成功未聞有其人者四也就有其人王爵不相加婦姑位不定各恃衆怙力將人人棊跱以觀成敗不肯同心共膽牽徒旅進五也關西諸郡北接上黨太原馮翊扶風安定自頃以来數與胡戰婦女載㦸挾矛弦弓負矢況其悍夫以此當山東忘戰之民譬驅羣羊向虎狼其勝可必六也且天下之拳勇今見在者不過并凉匈奴屠各湟中義從八種西羌皆百姓素所畏服而明公權以為爪牙壯夫震悚況小醜乎七也又明公之將帥皆中表腹心同旅日久自三原狹口以来恩信醇著忠誠可遠任智謀可特使以此當山東解合之虛誕實不相若八也夫戰有三亡以亂攻治者亡以邪攻正者亡以逆攻順者亡今明公秉國政平討夷凶患忠義克立以三德待於三亡奉辭伐罪誰人敢禦九也東州有鄭康成學該古今儒生之所以集北海邴根矩清高直亮羣士之楷式彼諸將若詢其計畫案典校之彊弱燕趙齊梁非不盛終見滅於秦吳楚七國非不衆而不敢踰滎陽況今德政之赫赫股肱之邦良欲造亂以徼不義者必不相然讚成其凶謀十也若十事少有可采無事徴兵以驚天下使患役之民相聚為非棄德恃衆以輕威重卓乃悦三國志文類巻三十四
