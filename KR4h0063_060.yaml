body:
  text: 三國志文類卷六十傳魏張夫人傳鍾㑹字士季夫人㑹母也夫人張氏字昌蒲太原兹氏人太傅定陵成侯之命婦也世長吏二千石夫人少喪父母克成侯家修身正行非禮不動為上下所稱述貴妾孫氏攝嫡專家心害其賢數讒毁無所不至孫氏辨博有智巧言足以飾非文過然竟不能傷也及妊娠愈更疾妬乃置藥食中夫人中食覺而吐之瞑眩者數日或曰何不向公言之答曰嫡庶相害破家危國古今以為鑒誡假如公信我衆誰能明其事彼以心度我謂我必言固將先我事由彼發顧不快邪遂稱疾不見孫氏果謂成侯曰妾欲其得男故飲以得男之藥反謂毒之成侯曰得男藥佳事暗於食中與人非人情也遂訊侍者俱服孫氏由是得罪出成侯問夫人何能不言夫人言其故成侯大驚益以此賢之黃初六年生㑹恩寵愈隆成侯既出孫氏更納正嫡賈氏成侯命婦傳鍾㑹時遭所生母喪為其母傳曰夫人性矜嚴明於教訓㑹雖童稚勤見規誨年四歲授孝經七歲誦論語八歲誦詩十歲誦尚書十一誦易十二誦春秋左氏傳國語十三誦周禮禮記十四誦成侯易記十五使入太學問四方奇文異訓謂㑹曰學猥則倦倦則意怠吾懼汝之意怠故以漸訓汝今可以獨學矣雅好書籍涉歷衆書特好易老子每讀易孔子說鳴鶴在陰勞謙君子籍用白茅不出戶庭之義每使㑹反覆讀之曰易三百餘爻仲尼特說此者以謙恭慎密樞機之發行已至要榮身所由故也順斯術已往足為君子矣正始八年㑹為尚書郎夫人執㑹乎而誨之曰汝弱冠見叙人情不能不自足則損在其中矣勉思其戒是時大將軍曹爽專朝政日縱酒沈醉㑹兄侍中育宴還言其事夫人曰樂則樂矣然難久也居上不驕制節謹度然後乃無危溢之患今奢僭若此非長守富貴之道嘉平元年車駕朝高平陵㑹為中書郎從行相國宣文侯始舉兵衆人恐懼而夫人自若中書令劉表侍郎衛瓘夏侯和等家皆怪問夫人一子在危難之中何能無憂答曰大將軍奢僣無度吾常疑其不安大傅義不危國必為大將軍舉耳吾兒在帝側何憂聞且出兵無他重器其勢必不久戰果如其言一時稱明㑹歷機密十餘年頗豫政謀夫人謂曰昔范氏少子為趙簡子設伐邾之計事從民恱可謂功矣然其母以為乘僞作詐末業鄙事必不能久其識本深逺非近人所言吾常樂其為人汝居心正吾知免矣但當修所志以輔益時化不忝先人耳常言人誰能皆體自然但力行不倦抑亦其次雖接鄙賤必以言信取與之間分畫分明或問此無乃小乎答曰君子之行皆積小以致高大若以小善為無益而弗為此乃小人之事耳希通慕大者吾所不好㑹自幼少衣不過青紺親營家事自知恭儉然見得思義臨財必讓㑹前後賜錢帛數百萬計悉送供公家之用一無所取年五十有九甘露二年二月暴疾薨比葬天子有手詔命大將軍高都侯厚加賵贈喪事無巨細一皆供給議者以為公侯有夫人有世婦有妻有妾所謂外命婦也依春秋成風定姒之義宜崇典禮不得總稱妾名於是稱成侯命婦殯葬之禮有取於古制禮也王弼傳弼字輔嗣何劭為其傳曰弼幼而察惠年十餘好老氏通辨能言父業為尚書郎時裴徽為吏部郎弼未弱冠往造焉徽一見而異之問弼曰夫無者誠萬物之所資也然聖人莫肯致言而老子申之無己者何弼曰聖人體無無又不可以訓故不說也老子是有者也故恆言無所不足尋亦為傅嘏所知于時何晏為吏部尚書甚奇弼歎之曰仲尼稱後生可畏若斯人者可與言天人之際乎正始中黃門侍郎纍缺晏既用賈充裴秀朱整又議用弼時丁謐與晏爭衡致高邑王黎於曹爽爽用黎於是以弼補臺郎初除覲爽請間爽為屏左右而弼與論道移時無所他及爽以此蚩之時爽專朝政黨與共相進用弼通雋不治名高尋黎無幾時病亡爽用王忱代黎弼遂不得在門下晏為之歎恨弼在臺既淺事功亦雅非所長益不留意焉淮南人劉陶善論從橫為當時所推每與弼語常屈弼弼天才卓出當其所得莫能奪也性和理樂游宴解音律善投壺其論道賦㑹文辭不如何晏自然有所拔得多晏也頗以所長笑人故時為士君子所疾弼與鍾㑹善㑹論議以校練為家然每服弼之高致何晏以為聖人無喜怒哀樂其論甚精鍾㑹等述之弼與不同以為聖人拔於人者神明也同於人者五情也神明茂故能體中和以通無五情同故不能無哀樂以應物然則聖人之情應物而無纍於物者也今以其無纍便謂不復應物失之多矣弼注易潁川人荀融難弼大衍義弼答其意白書以戲之曰夫明足以尋極幽微而不能去自然之性顔子之量孔父之所預在然遇之不能無樂喪之不能無哀又常狹斯人以為未能以情從理者也而今乃知自然之不可革足下之量雖已定乎胸懷之內然而隔踰旬朔何其相思之多乎故知尼父之於顔子可以無大過矣弼注老子為之指略致有理統著道略論注易往往有高麗言太原王濟好談病老莊常云見弼易注所悟者多然弼為人淺而不識物情初與王黎荀融善黎奪其黃門郎於是恨黎與融亦不終正始十年曹爽廢以公事免其秋遇厲疾亡時年二十四無子絶嗣弼之卒也晉景王聞之嗟歎者纍日其為高識所惜如此三國志文類卷六十
