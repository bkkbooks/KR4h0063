body:
  text: 三國志文類卷二十四書疏吳陸凱陳移都武昌疏時徙都武昌揚土百姓泝流供給以為患苦又政事多繆黎元窮匱凱上此疏臣聞有道之君以樂樂民無道之君以樂樂身樂民者其樂彌長樂身者不久而亡夫民者國之根也誠宜重其食愛其命民安則君安民樂則君樂自頃年以來君威傷於桀紂君明暗於姦雄君惠閉於羣孽無災而民命盡無為而國財空辜無罪賞無功使君有謬誤之愆天為作妖而諸公卿媚上以求愛困民以求饒導君於不義敗政於淫俗臣竊為痛心今鄰國交好四邊無事當務息役養士實其廪庫以待天時而更傾動天心搔擾萬姓使民不安大小吁嗟此非保國養民之術也臣聞吉凶在天猶影之在形響之在聲也形動則影動形止則影止此分數乃有所繫非在口之所進退也昔秦所以亡天下者但坐賞輕而罰重政刑錯亂民力盡於奢侈目眩於美色志濁於財寶邪臣在位賢哲隱藏百姓業業天下苦之是以遂有覆巢破卵之憂漢所以彊者躬行誠信聽諫納賢惠及負薪躬請岩穴廣采博察以成其謀此往事之明證也近者漢之衰末三家鼎立曹失紀綱晉有其政又益州危險兵多精彊閉户固守可保萬世而劉氏與奪乖錯賞罰失所君恣意於奢侈民力竭於不急是以為晉所伐君臣見虜此目前之明驗也臣暗於大理文不及義智慧淺劣無復冀望竊為陛下惜天下耳臣謹奏耳目所見聞百姓所為煩苛刑政所為錯亂願陛下息大功損百役務寬蕩忽苛政又武昌土地實危險而塉確非王都安國養民之處船泊則沈漂陵居則峻危且童謡言寧飲建業水不食武昌魚寧還建業死不止武昌居臣聞翼星為變熒惑作妖童謡之言生於天心乃以安居而比死足明天意知民所苦也臣聞國無三年之儲謂之非國而今無一年之蓄此臣下之責也而諸公卿位處人上祿延子孫曾無致命之節匡救之術苟進小利於君以求容媚荼毒百姓不為君計也自從孫𢎞造義兵以來耕種既廢所在無復輸入而分一家父子異役廪食日張蓄積日耗民有離散之怨國有露根之漸而莫之恤也民力困窮鬻賣兒子調賦相仍日以疲極所在長吏不加隱括加有監官既不愛民務行威勢所在搔擾更為煩苛民苦二端財力再耗此為無益而有損也願陛下一息此輩矜哀孤弱以鎮撫百姓之心此猶魚鱉得免毒螫之淵鳥獸得離網羅之綱四方之民繈負而至矣如此民可得保先王之國存焉臣聞五音令人耳不聰五色令人目不明此無益於政有損於事也自昔先帝時後宫列女及諸織絡數不滿百未有蓄積貨賄有餘先帝崩後幼景在位更改奢侈不蹈先迹伏聞織絡及諸徒坐乃有千數計其所長不足為國財然坐食宫廪嵗嵗相承此為無益願陛下料出賦嫁給與無妻者如此上應天心下合地意天下幸甚臣聞殷湯取士於商賈齊桓取士於車轅周武取士於負薪大漢取士於奴僕明王聖主取士以賢不拘卑賤故其功德洋溢名流竹素非求顏色而取好服捷口容悅者也臣伏見當今內寵之臣位非其人任非其量不能輔國匡世羣黨相扶害忠隱賢願陛下簡文武之臣各勤其官州牧督將藩鎮方外公卿尚書務修仁化上助陛下下拯黎民各盡其忠拾遺萬一則康哉之歌作刑錯之理清願陛下留神思臣愚言又疏孫皓遣親近趙欽口詔報凱前表曰孤動必遵先帝有何不平君所諫非也又建業宫不利故避之而西宫室宇摧朽須謀移都何以不可徙乎凱上此疏臣竊見陛下執政以來隂陽不調五星失晷職司不忠姦黨相扶是陛下不遵先帝之所致夫王者之興受之於天修之由德豈在宫乎而陛下不咨之公輔便盛意驅馳六軍流移悲懼逆犯天地天地以災童歌其謡縱令陛下一身得安百姓愁勞何以用治此不遵先帝一也臣聞有國以賢為本夏殺龍逢殷獲伊摯斯前世之明效今日之師表也中常侍王蕃黃中通理處朝忠謇斯社稷之重鎮大吳之龍逢也而陛下忿其苦辭惡其直對梟之殿堂尸骸暴棄邦內傷心有識悲悼咸以吳國夫差復存先帝親賢陛下反之是陛下不遵先帝二也臣聞宰相國之柱也不可不彊是故漢有蕭曹之佐先帝有顧步之相而萬彧瑣才凡庸之質昔從家隸超步紫闥於彧已豐於器已溢而陛下愛其細介不訪大趣榮以尊輔越尚舊臣使賢良憤惋智士赫咤是不遵先帝三也先帝愛民過於嬰孩民無妻者以妾妻之見單衣者以帛給之枯骨不收而取埋之而陛下反之是不遵先帝四也昔桀紂滅由妖婦幽厲亂在嬖妾先帝鑒之以為身戒左右不置淫邪之色後房無曠積之女今中宫萬數不備嬪嬙外多鰥夫女吟於中風雨逆度正由此起是不遵先帝五也先帝憂勞萬幾猶懼有失陛下臨阼以來遊戲後宫眩惑婦女乃令庶事多曠下吏容姦是不遵先帝六也先帝篤尚朴素服不純麗宫無髙臺物不雕飾國富民充姦盜不作而陛下徵調州郡竭民財力土被𤣥黃宫有朱紫是不遵先帝七也先帝外仗顧陸朱張內近胡綜薛綜是以庶績雍熙邦內清肅今者外非其任內非其人陳聲曹輔斗筲小吏先帝之所棄而陛下幸之是不遵先帝八也先帝每宴見羣臣抑損醇醲臣下終日無失慢之尤百寮庶尹並展所陳而陛下拘以視瞻之敬懼以不盡之酒夫酒以成禮過則敗德此無異商辛長夜之飲也是不遵先帝九也昔漢之桓靈親近宦竪大失民心今髙通詹廉羊度黃門小人而陛下賞以重爵權以戰兵若江渚有難烽燧互起則度等之武不能禦侮明也是不遵先帝十也今宫女曠積而黃門復走州郡條牒民女有錢則舍無錢則取怨呼道路母子死訣是不遵先帝十一也先帝在時亦養諸王太子若取乳母其夫復役賜以錢財給其資糧時遣歸來視其弱息今則不然夫婦生離夫故作役兒從後死家為空户是不遵先帝十二也先帝歎曰國以民為本民以食為天衣其次也三者孤存之於心今則不然農桑並廢是不遵先帝十三也先帝簡士不拘卑賤任之鄉閭效之於事舉者不虛受者不妄今則不然浮華者登朋黨者進是不遵先帝十四也先帝戰士不給他役使春惟知農秋惟收稻江渚有事責其死效今之戰士供給衆役廪賜不贍是不遵先帝十五也夫賞以勸功罰以禁邪賞罰不中則士民散失今江邊將士死不見哀勞不見賞是不遵先帝十六也今在所監司已為煩猥兼有內使擾亂於中一民十吏何以堪命昔景帝時交址反亂實由兹起是為遵景帝之闕不遵先帝十七也夫校事吏民之讐也先帝末年雖有吕一錢欽尋皆誅夷以謝百姓今復張立校曹縱吏言事是不遵先帝十八也先帝時居官者咸久於其位然後考績黜陟今州郡職司或蒞政無幾便徵召遷轉迎新送舊紛紜道路傷財害民於是為甚是不遵先帝十九也先帝每察竟解之奏常留心推按是以獄無寃囚死者吞聲今則違之是不遵先帝二十也若臣言可録藏之盟府如其虛妄治臣之罪願陛下留意隱蕃歸吳上書臣聞紂為無道微子先出髙祖寬明陳平先入臣年二十二委棄封域歸命有道賴䝉天靈得自全致臣至止有日而主者同之降人未見精別使臣微言妙㫖不得上達於邑三歎曷惟其已謹詣闕拜章乞䝉引見權即召入蕃謝問答及陳時務甚有辭觀賀卲上政事日弊疏字興伯㑹稽山隂人也孫休即位從中郎為散騎中常侍出為吳郡太守孫皓時入為左典軍遷中書令領太子太傅皓凶暴驕矜政事日弊邵上疏諫曰古之聖王所以潛處重闈之內而知萬里之情垂拱衽席之上明照八極之際者任賢之功也陛下方以至德淑姿統承王業宜率身履道恭奉神器旌賢表善以康庶政自頃年以來朝列紛錯真僞相貿上下空任文武曠位外無山嶽之鎮內無拾遺之臣佞諛之徒附翼天飛干弄朝威盜竊榮利而忠良排墜信臣被害是以正士摧方而庸臣苟媚先意承㫖各希時趣人執反理之評士吐詭道之論遂使清流變濁忠臣結舌陛下處九天之上隱百重之室言出風靡令行景從親洽寵媚之臣日聞順應之辭將謂此輩實賢而天下已平也臣心所不安敢不以聞臣聞興國之君樂聞其過荒亂之主樂聞其譽聞其過者過日消而福臻聞其譽者譽日損而禍至是以古之人君揖讓以進賢虛已以求過譬天位於乘奔以虎尾為警戒至於陛下嚴刑法以禁直辭黜善士以逆諫臣眩曜毁譽之實沈淪近習之言昔髙宗思佐夢寐得賢而陛下求之如忘忽之如遺故常侍王蕃忠恪在公才任輔弼以醉酒之間加之大戮近鴻臚葛奚先帝舊臣偶有逆忤昏醉之言耳三爵之後禮所不諱陛下猥發雷霆謂之輕慢飲之醇酒中毒隕命自是之後海內悼心朝臣失圖仕者以退為幸居者以出為福誠非所以保光洪祚熙隆道化也又何定本趨走小人僕隸之下身無錙銖之行能無鷹犬之用而陛下愛其佞媚假其威柄使定恃寵放恣自擅威福口正國論手弄天機上虧日月之明下塞君子之路夫小人求入必進姦利定間妄興事役發江邊戍兵以驅麋鹿結罝山陵芟夷林莽殫其九野之獸聚於重圍之內上無益時之分下有損耗之費而兵士罷於運送人力竭於驅逐老弱饑凍大小怨歎臣竊觀天變自比年以來隂陽錯謬四時逆節日食地震中夏隕霜參之典籍皆隂氣陵陽小人弄勢之所致也臣常覽書傳驗諸行事災祥之應所為寒栗昔髙宗修已以銷鼎雉之異宋景崇德以退熒惑之變願陛下上懼皇天譴告之誚下追二君攘災之道逺覽前代任賢之功近寤今日謬授之失清澄朝位旌叙俊乂放退邪佞抑奪姦勢如是之輩一勿復用廣延淹滯容受直辭祗承乾指敬奉先業則大化光敷天人望塞也傳曰國之興也視民如赤子其亡也以民為草芥陛下昔韜神光潛德東夏以聖哲茂姿龍飛應天四海延頸八方拭目以成康之化必隆於旦夕也自登位以來法禁轉苛賦調益繁中宫內豎分布州郡橫興事役競造姦利百姓罹杼軸之困黎民罷無已之求老幼饑寒家户菜色而所在長吏迫畏罪負嚴法峻刑苦民求辦是以人力不堪家户離散呼嗟之聲感傷和氣又江邊戍兵逺當以拓土廣境近當以守界備難宜時擾育以待有事而徵發賦調煙至雲集衣不全短褐食不贍朝夕出當鋒鏑之難入抱無聊之戚是以父子相棄叛者成行願陛下寬賦除煩振恤窮乏省諸不急蕩禁約法則海內樂業大化普洽夫民者國之本食者民之命也今國無一年之儲家無經月之蓄而後宫之中坐食者萬餘人內有離曠之怨外有損耗之費使庫廪空於無用士民饑於糟糠又北敵注目伺國盛衰陛下不恃已之威德而怙敵之不來忽四海之困窮而輕虜之不為難誠非長策廟勝之要也昔大皇帝勤身苦體創基南夏割據江山拓土萬里雖承天贊實由人力也餘慶遺祚至於陛下陛下宜勉崇德器以光前烈愛民養士保全先軌何可忽顯祖之功勤輕難得之大業忘天下之不振替興衰之巨變哉臣聞否泰無常吉凶由人長江之限不可久恃苟我不守一葦可航也昔秦建皇帝之號據殽函之阻德化不修法政苛酷毒流生民忠臣杜口是以一夫大呼社稷傾覆近劉氏據三關之險守重山之固可謂金城石室萬世之業任授失賢一朝喪沒君臣係頸共為羈僕此當世之明鑒目前之炯戒也願陛下逺考前事近鑒世變豐基彊本割情從道則成康之治興而聖祖之祚隆矣書奏皓深恨之三國志文類卷二十四
