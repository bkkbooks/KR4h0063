body:
  text: 三國志文類卷五十九雜文蜀卻正釋譏卻正字令先仕魏為中書令史遷郎至令性淡於榮利而尤耽意文章自在內職與宦人黃皓比屋周旋經三十年皓從微至貴操弄威權正既不為皓所愛亦不為皓所憎是以官不過六百石而免於憂患依則先儒假文見意號曰釋譏其文繼於崔駰達㫖其辭曰或有譏余者曰聞之前記夫事與時並名與功偕然則名之與事前哲之急務也是故創制作範匪時不立流稱垂名匪功不記名必須功而乃顯事亦俟時以行止身沒名滅君子所恥是以達人研道探賾索微觀天運之符表考人事之盛衰辨者馳說智者應機謀夫演略武士奮威雲合霧集風激電飛量時揆宜用取世資小屈大申存公忽私雖尺枉而尋直終揚光以發輝也今三方鼎跱九有未乂悠悠四海嬰丁禍敗嗟道義之沈塞愍生民之顛沛此誠聖賢拯救之秋烈士樹功之㑹也吾子以高朗之才圭璋之質兼覽博窺留心道術無逺不致無幽不悉挺身取命幹兹奧祕躊躇紫闥喉舌是執九考不移有入無出究古今之真僞計時務之得失雖時獻一䇿偶進一言釋彼官責慰此素飱固未能輸竭忠欵盡瀝胸肝排方入直惠被黎元俾吾徒草鄙並有聞焉也盍亦綏衡緩轡回軌易塗輿安駕肆思馬斯徂審厲揭以投濟要夷庚之赫憮播秋蘭以芳世副吾徒之彼圖不亦盛與余聞而歎曰嗚呼有若云乎耶夫人心不同實若其面子雖光麗既美且艷管窺筐舉守厥所見未可以言八紘之形埒信萬事之精練也或人率爾仰而揚衡曰是何言與是何言與余應之曰虞帝以面從為戒孔聖以恱已為尤若子之言良我所思將為吾子論而釋之昔在鴻荒曚昧肇初三皇應籙五帝承符爰暨夏商前典攸書姬衰道缺霸者翼扶嬴氏慘虐吞嚼八區於是從橫雲起徂詐如星奇邪蜂動智故萌生或飾真以讐僞或挾邪以干榮或詭道以要上或鬻技以自矜背正崇邪棄直就佞忠無定分義無常經故鞅法窮而慝作斯義敗而姦成吕門大而宗滅韓辨立而身刑夫何故哉利回其心寵耀其目赫赫龍章鑠鑠車服偷幸苟得如反如仄滔邪荒迷恣睢自極和鸞未調而身在轅側庭寧未踐而棟折榱覆天收其精地縮其澤人弔其躬鬼芟其額初升高岡終隕幽壑朝含榮潤夕為枯魄是以賢人君子深圖逺慮畏彼咎戾超然高舉寧曵尾於塗中穢濁世之休譽彼豈輕主慢民而忽於時務哉蓋易著行止之戒詩有靖恭之歎乃神之聽之而道使之然也自我大漢應天順民政治之隆皓若陽春俯憲坤典仰式乾文播皇澤以熙世揚茂化之醲醇君臣履度各守厥貞上垂詢納之宏下有匡救之責士無虛華之寵民有一行之迹粲乎亹亹尚此忠益然而道有隆窳物有興廢有聲有寂有光有翳朱陽否於素秋𤣥陰抑於孟春羲和逝而望舒係運氣匿而耀靈陳沖質不永桓靈墜敗英雄雲布豪傑蓋世家挾殊議人懷異計故從橫者欻披其胸徂詐者暫吐其舌也今天網已綴德樹西鄰丕顯祖之宏規縻好爵於士人興五教以訓俗豐九德以濟民肅明祀以礿祭幾皇道以輔真雖跱者未一僞者未分聖人埀戒蓋均無貧故君臣協美於朝黎庶欣戴於野動若重規靜若疊矩濟濟偉彥元凱之倫也有過必知顔子之仁也侃侃庶政冉季之治也鷹揚鷙騰伊望之事也總羣俊之上略含薛氏之三計敷張陳之祕䇿故力征以勤世援華英而不遑豈暇修枯籜於榛穢哉然吾不才在朝纍紀託身所天心焉是恃樂滄海之廣深歎嵩嶽之高時聞仲尼之贊商感鄉校之益己彼平仲之和羮亦進可而替否故朦冒瞽說時有攸獻譬遒人之有采於市閭遊童之吟詠乎疆畔庶以增廣福祥輸力規諫若其合也則以暗協明進應靈符如其違也自我常分退守已愚進退任數不矯不誣循性樂天夫何恨諸此其所以既入不出有而若無者也狹屈氏之常醒濁漁父之必醉溷栁季之卑辱褊夷叔之高懟合不以得違不以失得不充詘失不慘悸不樂前以顧軒不就後以慮輊不粥譽以干澤不辭欲以忌絀何責之釋何飱之恤何方之排何直之入九考不移固其所執也方今朝士山積髦俊成羣猶鱗介之潛乎巨海毛羽之集乎鄧林游禽逝不為之鮮浮魴臻不為之殷且陽靈幽於唐葉陰精應於商時陽盱請而洪災息桑林禱而甘澤滋行止有道啓塞有期我師遺訓不怨不尤委命恭已我又何辭辭窮路單將反初節綜墳典之流芳尋孔氏之遺藝綴微辭以存道憲先軌而投制韙叔肸之優游美踈氏之遐逝收止足以言歸泛浩然以容裔欣環堵以恬娛免咎悔於斯世顧兹心之未泰懼末塗之泥滯仍求激而增憤肆中懷以告誓昔九方考精於至貴秦牙沈思於殊形薛燭察寶以飛譽瓠梁託弦以流聲齊𨽻拊髀以濟文楚客潛冦以保荆雍門援琴而挾說韓哀秉轡而馳名盧敖翺翔乎𤣥闕若士竦身於雲清余實不能齊技於數子故乃靜然守已而自寧李興立碣表閭文晉永興中鎮南將軍劉𢎞至隆中觀亮故宅立碣表閣命太傅掾犍為李興為文曰天子命我于沔之陽聽鼓鞞而永思庶先哲之遺光登隆山以逺望軾諸葛之故鄉蓋神物應機大器無方通人靡滯大德不常故谷風發而騶虞嘯雲雷升而潛鱗驤摯解褐於三聘尼得招而褰裳管豹變於受命貢感激以回莊異徐生之摘實釋卧龍於深藏偉劉氏之傾蓋嘉吾子之周行夫有知己之主則有竭命之良固所以三分我九鼎跨帶我邉荒抗衡我北面馳騁我魏疆者也英哉吾子獨含天靈豈神之祇豈人之精何思之深何德之清異世通夢恨不同生推子八陳不在孫吳木牛之奇則非般模神弩之功一何微妙千井齊甃又何祕要昔在顛夭有名無迹孰若吾子良籌妙畫臧文既沒以言見稱又未若子言行並徴夷吾反坫樂毅不終奚比於爾明哲守沖臨終受寄讓過許由負扆蒞事民言不流刑中於鄭教美于魯蜀民知恥河渭安堵匪皋則伊寧彼管晏豈徒聖宣慷慨屢歎昔爾之隱卜惟此宅仁智所處能無規廓日居月諸時隕其夕誰能不殁貴有遺格惟子之勳移風來世詠歌餘典懦夫將厲遐哉邈矣厥規卓矣凡若吾子難可究已疇昔之乖萬里殊塗今我來思覿爾故墟漢高歸魂於豐沛太公五世而反周想魍魎以髣佛冀影響之有餘魂而有靈豈其識諸吳華核草文孫皓以核年老敕令草表核不敢又敕作草文停立待之核為文曰咨核小臣草芥凡庸遭眷值聖受恩特隆越從朽壤蟬蛻朝中熙光紫闥青璅是憑毖挹清露沐浴凱風效無絲釐負闕山崇滋潤含垢恩貸纍重穢質被榮局命得融欲報罔極委之皇穹聖恩雨注哀棄其尤猥命草對潤被下愚不敢違勑懼速罪誅冒承詔命魂逝形留三國志文類卷五十九
