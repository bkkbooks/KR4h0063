body:
  text: 三國志文類巻九表奏魏太祖乞封荀彧表太祖録彧前後功表封為萬嵗亭侯臣聞慮為功首謀為賞本野績不越廟堂戰多不踰國勲是故曲阜之錫不後營丘蕭何之土先於平陽珍策重計古今所尚侍中尚書令彧積德累行少長無悔遭世紛擾懐忠念治臣自始舉義兵周游征伐與彧戮力同心左右王畧發言授策無施不效彧之功業臣由以濟用披浮雲顯光日月陛下幸許彧左右機近忠恪祗順如履薄氷研精極銳以撫庶事天下之定彧之功也宜享髙爵以彰元勲彧固辭無野戰之勞不通太祖表太祖又與彧書太祖又書與君共事已來立朝廷君之相為匡弼君之相為舉人君之相為建計君之相為密謀亦已多矣夫功未必皆野戰也願君勿讓彧乃受乞增荀彧户邑表昔袁紹侵入郊甸戰於官渡時兵少糧盡圖欲還許書與彧議彧不聴臣建宜住之便恢進討之規更起臣心易其愚慮遂摧大逆覆取其衆此彧覩勝敗之機略不世出也及紹破敗臣糧亦盡以為河北未易圖也欲南討劉表彧復止臣陳其得失臣用反斾遂吞凶族克平四州向使臣退於官渡紹必鼓行而前有傾覆之形無克捷之勢後若南征委棄兖豫利既難要將失本據彧之二策以亡為存以禍致福謀殊功異臣所不及也是以先帝貴指蹤之功薄搏獲之賞古人尚帷幄之規下攻拔之捷前所賞録未副彧巍巍之勲乞重平議增其户邑彧深辭讓太祖又報之報荀彧書君之策謀非但所表二事前後謙沖欲慕魯連先生乎此聖人達節者所不貴也昔介子推有言竊人之財猶謂之盜况君密謀安衆光顯於孤者以百數乎以二事相還而復辭之何取謙亮之多耶夏侯獻請令鬷𢎞使公孫淵表公孫淵昔年敢違王命廢絶計貢者實挾兩端既恃阻險又怙孫權故敢跋扈恣雎海外宿舒親見賊權軍衆府庫知其弱少不足慿恃是以決計斬賊之使又髙句麗濊貊與淵為仇並為冦鈔今外失吳援内有胡冦心知國家能從陸道勢不得不懐惶懼之心因斯之時宜遣使示以禍福奉車都尉鬷𢎞武皇帝時始奉使命開通道路文皇帝即位欲通使命遣𢎞將妻子還歸鄉里賜其車牛絹百匹𢎞以受恩歸死國朝無有還意乞留妻子身奉使命公孫康遂稱臣妾以𢎞奉使稱意賜爵闗内侯𢎞性果烈乃心於國夙夜拳拳念自竭效冠族子孫少好學問博通書記多所闗涉口論速捷辯而不俗附依典誥若出胸臆加仕本郡常在人右彼方士人素所敬服若當遣使以為可使𢎞行𢎞乃自舊土習其國俗為説利害辯足以動其意明足以見其事才足以行之辭足以見信若其計從雖酈生之降齊王陸賈之説尉佗亦無以逺過也欲進逺路不宜釋騏驥將已篤疾不宜廢扁鵲願察愚言也華歆薦鄭小同表臣聞勵俗宣化莫先於表善班禄叙爵莫美於顯能是以楚人思子文之治復命其𦙍漢室嘉江公之德用顯其世伏見故漢大司農北海鄭𤣥當時之學名冠華夏為世儒宗文皇帝旌録先賢拜𤣥適孫小同以為郎中長假在家小同年踰三十少有令質學綜六經行著鄉邑海岱之人莫不嘉其自然美其器量迹其所履有質直不渝之性然而恪恭靜黙色養其親不治可見之美不競人間之名斯誠清時所宜式叙前後明詔所斟酌而求也臣老病委頓無益視聴謹具以聞何曽請置軍副表時詔太尉司馬宣王帥衆討遼東曽上表臣聞先王制法必於全慎故建官授任則置假輔陳師命將則立監貳宣命遣使則設介副臨敵交刃則參御右蓋以盡謀思之功防安危之變也是以在險當難則權足相濟隕缺不預則手足相代其為固防至深至逺及至漢氏亦循舊章韓信伐趙張耳為貳馬援討越劉隆副車前世之迹著在篇志今懿奉辭誅罪步騎數萬道路迴阻四千餘里雖假天威有征無戰冦或潛遁消散日月命無常期人非金石逺慮詳備誠宜有副今北邊諸將及懿所督皆為寮屬名位不殊素無定分卒有變急不相鎮攝存不忘亡聖達所戒宜選大臣名將威重宿著者盛其禮秩遣詣懿軍進同謀略退有副佐雖有萬一不虞之災軍主有儲則無患矣陳羣上追封皇太后父母奏時文帝欲追封太后父母羣奏曰陛下以聖德應運受命創業革制當永為後式案典籍之文無婦人分土命爵之制在禮典婦因夫爵秦違古法漢氏因之非先王之令典也帝曰此議是也其勿施行以作著詔下藏之臺閣永為後式三公請諡文昭甄后奏蓋孝敬之道篤乎其親乃四海所以承化天地所以明察是謂生則致其養殁則光其靈誦述以盡其美宣揚以顯其名者也今陛下以聖懿之德紹承洪業至孝烝烝通於神明遭離殷憂每勞謙讓先帝遷神山陵大禮既備至於先后未有顯諡伏惟先后恭讓著於幽微至行顯於不言化流邦國德侔二南故能膺神靈嘉祥為大魏世妃雖夙年登遐萬載之後永播融烈后妃之功莫得而尚也案諡法聖聞周達曰昭德明有功曰昭昭者光明之至盛久而不昧者也宜上尊諡曰文昭皇后又請立廟奏自古周人始祖后稷又特立廟以祀姜嫄今文昭皇后之於萬嗣聖德至化豈有量哉夫以皇家世祀之尊而克讓久恭固推盛位神靈遷化而無寢廟以承享禮非所以報顯德昭孝敬也稽之古制宜依周禮先妣别立寢廟並奏可之三國志文類巻九
