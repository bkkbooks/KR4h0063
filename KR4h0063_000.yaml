body:
  text: 三國志文類總集類提要臣等謹案三國志文類六十巻不著撰人名氏今流傳有宋刋本宋史藝文志載此書注云集者不知名則當時已無可考也案栁宗元河東集有栁宗直西漢文類序其文皆採之漢書是編惟採三國志之文盖沿其例凡分二十三門曰詔書曰教令曰表奏曰書疏曰諫諍曰戒責曰薦稱曰勸說曰對問曰議曰論曰書曰牋曰評曰檄曰盟曰序曰祝文曰祭文曰誄曰詩賦曰雜文曰傳所採上涉漢末而下及晉初則以魏志載曹操事皆在建安中而裴松之註所采多晉人書也惟其中勸説對問二門皆當時口語本非詞翰取盈巻帙於義未安又陳夀所評亦猶馬班之贊摘出别立篇名亦乖體例以其宋人舊本姑存之以備考証焉乾隆四十四年正月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:ca8c9670066eca3b5a7dd59b5cdc9bf5cd28af6d45b98499917e4353f7dcc89d
