body:
  text: 三國志文類巻五十四檄魏明帝露布天下并班告益州劉備背恩自竄巴蜀諸葛亮棄父母之國阿殘賊之黨神人被毒惡積身滅亮外慕立孤之名而内貪專擅之實劉升之兄弟守空城而已亮又侮易益土虐用其民是以利狼岩渠高定青羌莫不瓦解為亮仇敵而亮反裘負薪裏盡毛殫刖趾適屨刻肌傷骨反更稱說自以為能行兵於井底㳺步於牛蹄自朕即位三邉無事猶哀憐天下數遭兵革且欲養四海之耆老長後生之孤幼先移風於禮樂次講武於農隙而置亮畫外未以為虞而亮懷李熊愚勇之志不思荆邯度德之戒驅略利民盜利祁山王師方振膽破氣奪馬謖高祥望旗奔敗虎臣逐北蹈尸涉血亮也小子震驚朕師猛銳踊躍咸思長驅朕惟率土莫非王臣師之所處荆棘生焉不欲使千室之邑忠信貞良與夫淫昏之黨同受塗炭故先開示以昭國誠勉思變化無滯亂邦巴蜀將吏士民諸為亮所刼迫公卿已下皆聽束手袁紹檄州郡文蓋聞明主圖危以制變忠臣慮難以立權曩者彊秦弱主趙高執柄專制朝命威福由己終有望夷之禍汙辱至今及臻吕后禄産專政擅斷萬機決事省禁下陵上替海内寒心於是絳侯朱虛興威奮怒誅夷逆亂尊立太宗故能道化興隆光明顯融此則大臣立權之明表也司空曹操祖父騰故中常侍與左悺徐璜並作妖孽饕餮放横傷化虐民父嵩乞匄攜養因贓假位輿金輦璧輸貨權門竊盜鼎司傾覆重器操贅閹遺醜本無令德僄狡鋒俠好亂樂禍幕府昔統鷹揚掃夷凶逆續遇董卓侵官暴國於是提劒揮戈發命東夏方収羅英雄棄瑕録用故遂與操參咨策略謂其鷹犬之才爪牙可任至乃愚佻短慮輕進易退傷夷折衂數䘮師徒幕府輒復分兵命鋭修完補輯表行東郡太守兖州刺史被以虎文授以偏師奬䠞威柄冀獲秦師一克之報而操遂乗資跋扈肆行酷裂割剥元元殘賢害善故九江太守邉譲英才俊逸天下知名以直言正色論不阿諂身被梟縣之戮妻孥受灰滅之咎自是士林憤痛民怨彌重一夫奮臂舉州同聲故躬破於徐方地奪於吕布彷徨東裔蹈據無所幕府唯强幹弱枝之義且不登叛人之黨故復援旌擐甲席巻赴征金鼔響震布衆破沮拯其死亡之患復其方伯之任是則幕府無德於兖土之民而有大造於操也後㑹鑾駕東反羣虜亂政時冀州方有北鄙之警匪遑離局故使從事中郎徐勛就發遣操使繕修郊廟翼衛幼主而便放志專行脅遷省禁卑侮王宫敗法亂紀坐召三臺專制朝政爵賞由心刑戮在口所愛光五宗所惡滅三族羣談者䝉顯誅腹議者䝉隱戮道路以目百寮鉗口尚書記朝㑹公卿充員品而已故太尉楊彪歴典三司享國極位操因睚眥被以非罪榜楚并兼五毒具至觸情放慝不顧憲章又議郎趙彦忠諫直言議有可納故聖朝含聽改容加錫操欲迷奪時權杜絶言路擅收立殺不俟報聞又梁孝王先帝母弟墳陵尊顯松栢桑梓猶宜恭肅而操率將校吏士親臨發掘破棺裸屍略取金寶至令聖朝流涕士民傷懷又署發丘中郎將摸金校尉所過墮突無骸不露身處三公之官而行桀虜之態殄國虐民毒流人鬼加其細政苛慘科防互設繒繳充蹊坑穽塞路舉手掛網羅動足蹈機陷是以兖豫有無聊之民帝都有吁嗟之怨歴觀古今書籍所載貪殘虐烈無道之臣於操為甚幕府方詰外姦未及整訓加意含覆冀可彌縫而操豺狼野心潛苞禍謀乃欲撓折棟梁孤弱漢室除滅中正專為梟雄徃歲伐鼓北征討公孫瓚强禦桀逆拒圍一年操因其未破隂交書命欲托助王師以相掩襲故引兵造河方舟北濟㑹其行人發露瓚亦梟夷故使鋒芒挫縮厥圖不果屯據敖倉阻河為固乃欲以螳蜋之斧禦隆車之隧幕府奉漢威靈折衝宇宙長㦸百萬胡騎千羣奮中黄育獲之才騁良弓勁弩之勢并州越太行青州涉濟漯太軍汎黄河以角其前荆州下宛葉而掎其後雷震虎步並集虜庭若舉炎火以􅌊飛蓬覆滄海而沃熛炭有何不消滅者哉當今漢道陵遲網紀弛絶操以精兵七百圍守宫闕外稱陪衛内肆拘執懼其簒逆之禍因斯而作乃忠臣肝腦塗地之秋烈士立功之㑹也可不朂哉右陳琳辭蜀陳震移吳關候文孫權稱尊號陳震為衛尉賀權踐阼震入吳界移關候曰東之與西驛使徃來冠蓋相望申盟初好日新其事東尊應保聖祚告燎受符剖判土宇天下響應各有所歸於此時也以同心討賊則何冦不滅哉西朝君臣引領欣賴震以不才得充下使奉聘叙好踐界踊躍入則如歸獻子適魯犯其山諱春秋譏之望必啟告使行人睦焉即日張旍誥衆各自約誓順流漂疾國典異制懼或有違幸必斟誨示其所宜吕凱答雍闓檄吕凱永昌不韋人也仕郡為五官掾功曹時雍闓降呉為水昌太守永昌在益州郡之西道路壅塞與蜀隔絶而郡太守改易凱與府丞蜀郡王伉帥厲吏民閉境拒闓闓移檄永昌稱説云云凱答檄曰天降䘮亂奸雄乘釁天下切齒萬國悲悼臣妾大小莫不思竭筋力肝腦塗地以除國難伏惟將軍世受漢恩以為當躬聚黨衆率先啟行上以報國家下不負先人書功竹帛遺名千載何期臣僕呉越背本就末乎昔舜勤民事隕于蒼梧書籍嘉之流聲無窮崩于江浦何足可悲文武受命成王乃平先帝龍興海内望風宰臣聰睿自天降康而將軍不覩盛衰之紀成敗之符譬如野火在原蹈履河冰火滅氷泮將何所依附曩者將軍先君雍侯造怨而封竇融知興歸志世祖皆流名後葉世歌其美今諸葛丞相英才挺出深覩未萌受遺託孤翊贊季興與衆無忌録功忘瑕將軍若能翻然改圖易跡更步古人不難追鄙土何足宰哉蓋聞楚國不恭齊桓是責夫差僭號晉人不長况臣於非主誰肯歸之耶竊惟古義臣無越境之交是以前後有來無徃重承告示發憤忘食故略陳所懐惟將軍察焉呉盟文權踐位權乃三分天下豫青徐幽屬呉兖冀并涼屬蜀其司州之土以函谷闗為界造為盟曰天降䘮亂皇綱失叙逆臣承釁刼奪國柄始於董卓終於曹操窮凶極惡以覆四海至令九州幅裂普天無統民神痛怨靡所戾止及操子丕桀逆遺醜荐作姦回偷取天位而叡么麽尋丕凶蹟阻兵盜土未伏厥誅昔共工亂象而高辛行師三苗干度而虞舜征焉今日滅叡禽其徒黨非漢與呉將復誰在夫討惡翦暴必聲其罪宜先分裂奪其土地使士民之心各知所歸是以春秋晉侯伐衛先分其田以畀宋人斯其義也且古建大事必先盟誓故周禮有司盟之官尚書有告誓之文漢之與呉雖信由中然分土裂境宜有盟約諸葛丞相德威逺著翼戴本國典戎在外信感陰陽誠動天地重復結盟廣誠約誓使東西士民咸共聞知故立壇殺牲昭告神明再敮加書副之天府天高聽下靈威棐諶司慎司盟羣臣羣祀莫不臨之自今日漢呉既盟之後戮力一心同討魏賊救危䘏患分災共慶好惡齊之無或攜貳若有害漢則呉伐之若有害呉則漢伐之各守分土無相侵犯傳之後葉克終若始凡百之約皆如載書信言不豔實居于好有渝此盟創禍先亂違貳不協慆慢天命明神上帝是討是督山川百神是糾是殛俾墜其師無克祚國于爾大神其明鑒之胡綜偽作降文三條孫權下都建業詳綜並為侍中進封卿侯兼左右領軍時魏都督河北振威將軍呉質頗見猜疑綜乃偽為質作降文三條其一曰天綱弛絶四海分崩羣生憔悴士人播越兵冦所加邑無居民風塵煙火徃徃而處自三代以來大亂之極未有若今時者也臣質志薄處時無方繫於土壤不能飜飛遂為曹氏執事戎役逺處河朔天衢隔絶雖望風慕義思託大命媿無因縁得展其志每徃來者竊聽風化伏知陛下齊德乾坤同明日月神武之姿受之自然敷演皇極流化萬里自江以南户受覆燾英雄俊傑上達之士莫不心歌腹詠樂在歸附者也今年六月末奉聞吉日龍興踐阼恢宏大繇整理天綱將使遺民覩見定主昔武王伐殷殷民倒戈高祖誅項四面楚歌方之今日未足以喻臣質不勝昊天至願謹遣所親同郡黄定恭行奉表及託降叛間闗求達其欲所陳載列于左其二昔伊尹去夏入商陳平委楚歸漢書功竹帛遺名後世世主不謂之背誕者以為知天命也臣昔為曹氏所見交接外託君臣内如骨肉恩義綢繆有合無離遂受偏方之任摠河北之軍當此之時志望高大永與曹氏同死俱生惟恐功之不建事之不成耳及曹氏之亡後嗣繼立幼沖統政讒言彌興同儕者以勢相害異趣者得間其言而臣受性簡略素不下人視彼數子意實迫之此亦臣之過也遂為邪議所見搆㑹招致猜疑誣臣欲叛雖識真者保明其心世亂讒勝餘嫌猶在常懼一旦横受無辜憂心孔疚如履冰炭昔樂毅為燕昭王立功於齊惠王即位疑奪其任遂去燕之趙休烈不虧彼豈欲二三其德蓋畏功名不建而懼禍之將及也昔遣魏郡周光以賈販為名託叛南詣宣達宻計時以倉卒未敢便有章表使光口傳而已以為天下大歸可見天意所在非呉復誰此方之民思為臣妾延頸舉踵惟恐兵來之遲耳若使聖恩少加信納當以河北承望王師擬心赤實天日是鑒而光去經年不聞咳唾未審此意竟得達不瞻望長歎日月以㡬魯望高子何足以喻又臣今日見待稍薄蒼蠅之聲緜緜不絶必受此禍遲速事耳臣私度陛下未垂明慰者必以臣質貫穿仁義之道不行若此之事謂光所傳多虚少實或謂此中有他消息不知臣質搆讒見疑恐受大害也且臣質若有罪之日自當奔赴鼎鑊束身待罪此蓋人臣之宜也今日無罪横見譖毁將有商鞅白起之禍尋惟事勢去亦宜也死而弗義不去何為樂毅之出呉起之走君子傷其不遇未有非之者也願陛下推古况今不疑怪於臣質也又念人臣獲罪當如伍員奉已自效不當徼幸因事為利然今與古厥勢不同南北悠逺江湖隔絶自不舉事何得濟免是以忘志士之節而思立功之義也且臣質又以曹氏之嗣非天命所在政弱刑亂柄奪於臣諸將專威於外各自為政莫或同心士卒衰耗帑藏空虛綱紀毁廢上下並昏想前後數得降叛具聞此問兼弱攻昧宜應天時此實陛下進取之秋是以區區敢獻其計今若内兵淮泗據有下邳荆揚二州聞聲響應臣從河北席巻而南形勢一連根牙永固關西之兵繫於所衛青徐二州不敢徹守許洛餘兵衆不滿萬誰能來東與陛下爭者此誠千載一㑹之期可不深思而熟計乎及臣所在既自多馬加諸羌胡常以三四月中美草時驅馬來出隱度今者可得三千餘匹陛下出軍當投此時多將騎士來就馬耳此皆先定所一二知凡兩軍不能相究虛實今此間實羸易可克定陛下舉動應者必多上定洪業使普天一統下令臣質建非常之功此乃天也若不見納此亦天也願陛下思之不復多陳其三昔許子逺舎袁就曹規畫計校應見納受遂破袁軍以定曹業向使曹氏不信子逺懷疑猶豫不決於心則今天下袁氏有也願陛下思之間聞界上將閻浮趙楫欲歸大化唱和不速以取破亡今臣欵欵逺授其命若復懷疑不時舉動令臣孤絶受此厚禍即恐天下雄夫烈士欲立功者不敢復託命陛下矣願陛下思之皇天后土實聞其言三國志文類巻五十四
