body:
  text: 三國志文類卷二十六諫諍魏沮授諫止袁紹南征師出歷年百姓疲弊倉庾無積賦役方殷此國之深憂也宜先遣使獻捷天子務農逸民若不得通乃表曹氏隔我王路然後進屯黎陽漸營河南並作舟船繕治器械分遣精騎鈔其邊鄙令彼不得安我取其逸三年之中事可坐定也審配郭圖曰兵書之法十圍五攻敵則能戰今以明公之神武跨河朔之彊衆以伐曹氏譬若覆手今不時取後難圖也授曰蓋救亂誅暴謂之義兵恃衆憑彊謂之驕兵兵義無敵驕者先滅曹氏迎天子安宫許都今舉師南向於義則違且廟勝之策不在彊弱曹氏法令既行士卒精練非公孫瓚坐受圍者也今棄萬安之術而興無名之兵竊為公懼之圖等曰武王伐紂不曰不義况兵加曹氏而云無名且公帥武臣竭力將士憤怒人思自騁而不及時早定大業慮之失也夫天與弗取反受其咎此越之所以霸吳之所以亡也監軍之計計在持牢而非見時知機之變也紹從之圖等因是譖授監統內外威震三軍若其浸盛何以制之夫臣與主不同者昌主與臣同者亡此黃石之所忌也且御衆於外不宜知內紹疑焉乃分監軍為三都督使授及郭圖淳于瓊各典一軍遂合而南張邈諌袁術稱尊號袁術議稱尊號邈謂術曰漢據火德絶而復揚德澤風流誕生明公公居軸處中入則享於上席出則為衆目之所屬華霍不能增其髙淵泉不能同其量可謂巍巍蕩蕩無與為二何為捨此而欲稱制恐福不盈眥禍將溢世莊周之稱郊犧牛養飼經年衣以文繡宰執鸞刀以入廟門當此之時求為孤犢不可得也袁渙諫太祖訓民以義夫兵者凶器也不得已而用之鼓之以道德征之以仁義兼撫其民而除其害夫然故可與之死而可與之生自大亂以來十數年矣民之欲安甚於倒懸然而暴亂未息者何也意者政失其道歟渙聞明君善於救世故世亂則齊之以義時僞則鎮之以朴世異事變治國不同不可不察也夫制度損益此古今之不必同者也若夫兼愛天下而反之於正雖以武平而濟之以德誠百王不易之道也公明哲超世古之所以得其民者公既勤之矣今之所以失其民者公既戒之矣海內賴公得免於危亡之禍然而民未知義其惟公所以訓之則天下幸甚太祖深納焉蔣濟諫明帝攻遼東太和六年明帝遣平州刺史田豫乘海渡幽州刺史王雄陸道并攻遼東蔣濟諫曰凡非相吞之國不侵叛之臣不宜輕伐伐之而不制是驅使為賊故曰虎狼當路不治狐狸先除大害小害自已今海表之地纍世委質嵗選計考不乏職貢議者先之正使一舉便克得其民不足益國得其財不足為富儻不如意是為結怨失信也帝不聽豫行竟無成而還陳琳諫何進誅閹官易稱即鹿無虞諺有掩目捕雀夫微物尚不可欺以得志况國之大事其可以詐立乎今將軍總皇威握兵要龍驤虎步髙下在心以此行事無異於鼓洪爐以燎毛髮但當速發雷霆行權立斷違經合道天人順之而反釋其利器更徵於他大兵合聚彊者為雄所謂倒持干戈授人以柄必不成功秖為亂階進不納其言竟以取禍辛毗諫文帝徙冀州士家帝欲徙冀州士家十萬户實河南時連蝗民饑郡國以為不可而帝意甚盛毗與朝臣俱求見帝知其欲諫作色以見之皆莫言陛下欲徙士家其計安出帝曰卿謂我徙之非邪毗曰誠以為非也帝曰吾不與卿共議也毗曰陛下不以臣不肖置之左右厠之謀議之官安得不與臣謀邪臣所言非私也乃社稷之慮也安得怒臣帝不答起入內毗隨而引其裾帝遂奮衣不還良久乃出曰佐治卿持我何太急邪毗曰今徙既失民心又無以食也帝遂徙其半又諫伐吳帝欲大興軍征吳毗諫曰吳楚之民險而難禦道隆後服道汙先叛自古患之非徒今也陛下祚有海內夫不賔者其能久乎昔尉他稱帝子陽僭號歷年未幾或臣或誅何則違逆之道不久全而大德無所不服也方今天下新定土廣民稀夫廟算而後出軍猶臨事而懼况今廟算有闕而欲用之臣誠未見其利也先帝屢起鋭師臨江而旋今六軍不增於故而復循之此未易也今日之計莫若修范蠡之養民法管仲之寄政則充國之屯田明仲尼之懷逺十年之中彊壯未老童齓勝戰兆民知義將士思奮然後用之則役不再舉矣帝曰如卿意更當以虜遺子孫邪毗對曰昔周文王以紂遺武王惟知時也苟時未可容得已乎帝竟伐吳至江而還又諫明帝平北芒帝又欲平北芒令於其上作臺觀則見孟津毗諌曰天地之性高高下下今而反之既非其理加以損費人功民不堪役且若九河盈溢洪水為害而丘陵皆夷將何以禦之帝乃止高堂隆諫明帝饗㑹明帝初踐阼羣臣或以為宜饗㑹隆曰唐虞有遏密之哀高宗有不言之思是以至德雍熙光於四海以謂不宜為㑹帝敬納之三國志文類卷二十六
