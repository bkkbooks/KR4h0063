body:
  text: 三國志文類卷二詔書魏文帝鵜鶘集靈芝池詔鵜鶘鳥集靈芝池詔曰此詩人所謂汚澤也曹詩刺恭公逺君子而近小人今豈有賢智之士處於下位乎否則斯鳥何為而至其博舉天下俊德茂才獨行君子以答曹人之刺議輕刑詔近之不綏何逺之懷今事多而民少上下相弊以文法百姓無所措其手足昔泰山之哭者以為苛政甚於猛虎吾備儒者之風服聖人之遺教豈可以目玩其辭行違其戒者哉廣議輕刑以惠百姓戒非祀之祭等詔先王制禮所以昭孝事祖大則郊社其次宗廟三辰五行名山大川非此族也不在祀典叔世衰亂崇信巫史至乃宫殿之內户牖之間無不沃酹甚矣其惑也自今其敢設非祀之祭巫祝之言皆以執左道論著於令典喻華歆詔歆稱病乞退讓位於管寧帝不許臨當大會乃遣散騎常侍繆襲奉詔喻指曰朕新蒞庶事一日萬幾懼聽斷之不明賴有德之臣左右朕躬而君屢以疾辭位夫量主擇君不居其朝委榮棄祿不究其位古人固有之矣顧以為周公伊尹則不然潔身徇節常人為之不望之於君君其力疾就會以惠豫一人將立席几筵命百官總己以須君到朕然後御坐又詔襲須歆必起乃還歆不得已乃起封張遼李典詔帝追念遼典在合肥之功詔曰合肥之役遼典以步卒八百破賊十萬自古用兵未之有也使賊至今奪氣可謂國之爪牙其分遼典各百戶賜一子爵關內侯封朱靈詔帝即位封靈鄃侯增其户邑詔曰將軍佐命先帝典兵歷年威過方召功踰絳灌圖籍所美何以加焉朕受天命帝有四海元功之將社稷之臣皆朕所以同福共慶傳之無窮者也今封鄃侯富貴不歸故鄉如夜行衣繡若平常所志願勿難言靈謝曰髙唐宿所願於是更封高唐侯追封鄧公策武帝子沖年十三亡追贈諡曰鄧哀侯又加號為公惟黃初二年八月丙午皇帝曰咨爾鄧哀侯沖昔皇天鍾美於爾躬俾聰哲之才成於弱年當永享顯祚克成厥終如何不祿早世夭昏朕承天序享有四海並建親親以藩王室惟爾不逮斯榮且葬禮未備追悼之深愴然攸傷今遷葬于高陵使使持節兼謁者僕射郎中陳承追賜號曰鄧公祠以太牢魂而有靈休兹寵榮嗚呼哀哉賜龎德諡策德討關羽為羽所殺太祖悲之文帝即王位乃遣使就德墓賜諡策曰昔先軫喪元王蠋絶脰隕身徇節前代美之惟侯戎昭果毅蹈難成名聲溢當時義髙在昔寡人愍焉諡曰壯侯賜張既子爵詔昔荀桓子立勳翟土晉侯賞以千室之邑馮異輸力漢朝光武封其二子故涼州刺史張既能容民畜衆使羣羌歸土可謂國之良臣不幸薨隕朕甚愍之其賜小子翁歸爵關內侯蔣濟難追還詔濟為東中郎將入為散騎常侍時有詔詔征南將軍夏侯尚曰卿腹心重將特當任使恩施足死惠愛可懷作威作福殺人活人尚以示濟濟既至帝問曰卿所聞見天下風教何如濟對曰未有他善但見亡國之語耳帝忿然作色而問其故濟具以答因曰夫作威作福書之明誡天子無戲言古人所慎惟陛下除之於是帝意解遣追取前詔明帝改正朔詔初文皇帝即位以受禪於漢因循漢正朔弗改帝在東宫著論以為五帝三王雖同氣共祖禮不相襲正朔自宜改變以明受命之運及即位優遊者久之史官復著言宜改乃詔三公特進九卿中郎將大夫博士議郎千石六百石博議議者或不同帝據古典有詔夫太極運三辰五星於上元氣轉三統五行於下登降周旋終則又始故仲尼作春秋於三微之月每月稱正以明三正迭相為首今推三統之次魏得地統當以建丑之月為正月考之羣藝厥義章矣祀圜丘詔帝營洛陽南委粟山為圜丘有詔蓋帝王受命莫不恭承天地以章神明尊祀世統以昭功德故先代之典既著則禘郊祖宗之制備也昔漢氏之初承秦滅學之後采托殘缺以備郊祀自甘泉后土雍宫五畤神祗兆位多不見經是以制度無常一彼一此四百餘年廢無禘祀古代之所更立者遂有闕焉曹氏繫世出自有虞氏今祀圓丘以始祖帝舜配號圜丘曰皇皇帝天方丘所祭曰皇皇后地以舜妃伊氏配天郊所祭曰皇天之神以太祖武皇帝配地郊所祭曰皇地之祗以武皇后配宗祀皇考髙祖文皇帝於明堂以配上帝追尊髙帝髙后畢降此詔時追尊髙祖大長秋曰髙皇帝夫人吳氏曰髙皇后有此詔禮皇后無嗣擇建支子以繼大宗則當纂正統而奉公義何得復顧私親哉漢宣繼昭帝後加悼考以皇號哀帝以外藩援立而董宏等稱引亡秦或誤時朝既尊恭皇立廟京都又寵藩妾使比長信敘昭穆於前殿並四位於東宫僭差無度人神弗佑而非罪師丹忠正之諌用致丁傅焚如之禍自是之後相踵行之昔魯文逆祀罪由夏父宋國非度譏在華元其令公卿有司深以前世行事為戒後嗣萬一有由諸侯入奉大統則當明為人後之義敢為佞邪導諛時君妄建非正之號以干正統謂考為皇稱妣為后則股肱大臣誅之無赦其書之金策藏之宗廟著於令典封諸侯王詔古之帝王封建諸侯所以藩屏王室也詩不云乎懷德維寧宗子維城秦漢繼周或強或弱俱失厥中大魏創業諸王開國隨時之宜未有定制非所以永為後法也其改封諸侯王皆以郡為國功臣配饗詔祀夏侯惇曹仁程昱昔先王之禮於功臣存則顯其爵祿沒則祭于大蒸故漢氏功臣祠於廟廷大魏元功之臣功勳優著終始休明者其皆依禮祀之於是以惇等配饗之三國志文類卷二
