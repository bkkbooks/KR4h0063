body:
  text: 三國志文類卷四十二論吳吳主與諸葛瑾論魏帝近得伯言表陸遜字伯言以為曹丕已死毒亂之民當望旌瓦解而更靜然聞皆選用忠良寬刑罰布恩惠薄賦省役以悅民心其惠更深於操時孤以為不然操之所行其惟殺伐小為過差及離間人骨肉以為酷耳至於將御自古少有比之於操萬不及也今睿之不如丕猶丕不如操也其所以務崇小惠必以其父新死自度衰微恐困苦之民一朝崩沮故彊屈曲以求民心欲以自安住耳寧是興隆之漸邪聞任陳長文曹子丹輩或文人諸生或宗室戚臣寧能御雄才虎將以制天下乎夫威柄不専則其事乖錯如昔張耳陳餘非不敦睦至於乘勢自還相賊乃事理使然也又長文之徒昔所以能守善者以操笮其頭畏操威嚴故竭心盡意不敢為非耳逮丕繼厯年已長大承操之後以恩情加之用能感義今睿幼弱隨人東西此曹等輩必當因其弄巧行態阿黨比周各助所附如此之日姦讒並起更相陷懟轉成嫌二一爾已往羣下爭利主幼不御其為敗也焉得久乎所以知其然者自古至今安有四五人把持刑柄而不離刺轉相蹄齧者也强當凌弱弱當求援此亂亡之道也子瑜卿但側耳聽之伯言常長於計校恐此一事小短也吳主與陸遜論周瑜魯肅吕䝉瑜字公瑾肅字子敬蒙字子明公瑾雄烈膽略兼人遂破孟德開拓荆州邈焉難繼君今繼之公瑾昔要子敬來東致達於孤孤與宴語便及大略帝王之業此一快也後孟德因獲劉琮之勢張言方率數十萬衆水步俱下孤普請諸將咨問所宜無適先對至子布文表俱言先宜遣使修檄迎之子敬即駁言不可勸孤急呼公瑾付任以衆逆而擊之此二快也且其決計策意出張蘇逺矣後雖勸吾借𤣥德地是其一短不足以損其二長也周公不求備於一人故孤忘其短而貴其長常以比方鄧禹也又子明少時孤謂不辭劇易果敢有膽而已及身長大學問開益籌略竒至可以次於公瑾但言議英發不及之耳圖取關羽勝於子敬子敬答孤書云帝王之起皆有驅除羽不足忌此子敬內不能辦外為大言耳孤亦恕之不苟責也然其作軍屯營不失令行禁止部界無廢負路無拾遺其法亦美矣吳主論魯肅吕範肅字子敬範字子衡權移都建業大㑹將相文武特謂嚴畯曰孤昔歎魯子敬比鄧禹吕子衡方吳漢聞卿諸人未平此論今定云何畯退席曰臣未解㫖趣謂肅範受饒褒歎過實權曰昔鄧仲華初見光武光武時受更始使撫河北行大司馬事耳未有帝王志也禹勸之以復漢業是禹開初議之端矣子敬英爽有殊略孤始與一語便及大計與禹相似故比之吕子衡忠篤亮直性雖如奢然以憂公為先不足為損避袁術自歸於兄兄作大將别領部曲故憂兄事乞為都督辦護修整範之恪勤與吳漢相類故方之皆有㫖趣非孤私之也畯乃服諸葛恪出軍論中散大夫蔣延或以固爭扶出恪乃著論諭衆意曰夫天無二日土無二王王者不務兼并天下而欲垂祚後世古今未之有也昔戰國之時諸侯自恃兵彊地廣互有救援謂此足以傳世人莫能危恣情從懷憚於勞苦使秦漸得自大遂以并之此既然矣近者劉景升在荆州有衆十萬財榖如山不及曹操尚微與之力競坐觀其彊大吞滅諸袁北方都定之後操率三十萬衆來向荆州當時雖有智者不能復為畫計於是景升兒子交臂請降遂為囚虜凡敵國欲相吞即仇讐欲相除也有讐而長之禍不在已則在後人不可不為逺慮也昔伍子胥曰越十年生聚十年教訓二十年之外吳其為沼乎夫差自恃强大聞此邈然是以誅子胥而無備越之心至於臨敗悔之豈有及乎越小於吳尚為吳禍况其强大者邪昔秦但得關西耳尚以并吞六國今賊皆得秦趙韓魏燕齊九州之地地悉戎馬之鄉士林之藪今以魏比古之秦土地數倍以吳與蜀比古六國不能半之然今所以能敵之但以操時兵衆於今適盡而後生者未悉長大正是賊衰少未盛之時加司馬懿先誅王凌續自隕斃其子幼弱而専彼大任雖有智計之士未得施用當今伐之是其厄㑹聖人急於趨時誠謂今日若順衆人之情懷偷安之計以為長江之險可以傳世不論魏之終始而以今日遂輕其後此吾所以長歎息者也自本以來務在産育今者賊民嵗月繁滋但以尚小未可得用耳若復十數年後其衆必倍於今而國家徑兵之地皆已空盡唯有此見衆可以定事若不早用之端坐使老復十數年略當損半而見子弟數不足言若賊衆一倍而我兵損半雖復使伊管圖之未可如何今不達逺慮者必以此言為迂夫禍難未至而豫憂慮此固衆人之所迂也及於難至然後頓顙雖有智者又不能圖此乃古今所病非獨一時昔吳始以伍員為迂故難至而不可救劉景升不能慮十年之後故無以詒其子孫今恪無具臣之才而受大吳蕭霍之任智與衆同思不經逺若不及今日為國斥境俯仰年老而讐敵更强欲刎頸謝責寧有補邪今聞衆人或以百姓尚貧欲務閒息此不知慮其大危而愛其小勤者也昔漢祖幸已自有三秦之地何不閉關守險以自娛樂空出攻楚身被瘡痍介胄生蟣蝨將士厭困苦豈甘鋒刃而忘安寧哉慮於長久不得兩存耳每覽荆邯之說公孫述以進取之圖近見家叔父表陳與賊爭競之計未嘗不喟然歎息也夙夜反側所慮如此故聊疏愚言以達二三君子之末若一朝隕沒志畫不立貴令來世知我所憂可思於後衆皆以恪此論欲必為之辭然莫敢復難韋曜博奕論好學能文為尚書郎遷太子中庶子時蔡頴亦在東宫性好博奕太子以為無益命曜論之辭曰蓋聞君子恥當年而功不立疾沒世而名不稱故曰學如不及猶恐失之是以古之志士悼年齒之流邁而懼名稱之不立也故勉精勵操晨興夜寐不遑寧息經之以嵗月纍之以日力若寧越之勤董生之篤漸漬德義之淵棲遲道藝之域且以西伯之聖姫公之才猶有日昃待旦之勞故能隆興周道垂名億載况在臣庶而可以已乎厯觀古今立功名之士皆有纍積殊異之迹勞身苦體契濶勤思平居不墮其業窮困不易其素是以卜式立志於耕牧而黃霸受道於囹圄終有榮顯之福以成不朽之名故山甫勤於夙夜而吳漢不離於公門豈有游墮哉今世之人多不務經術好玩博奕廢事棄業忘寢與食窮日盡明繼以脂燭當其臨局交爭雌雄未決専精鋭意心勞體倦人事曠而不修賔旅闕而不接雖有太牢之饌韶夏之樂不暇存也至或賭及衣物徙棊易行亷恥之意弛而忿戾之色發然其所志不出一枰之上所務不過方罫之間勝敵無封爵之賞獲地無兼土之實技非六藝用非經國立身者不階其術徴選者不由其道求之於戰陳則非孫吳之倫也考之於道藝則非孔氏之門也以變詐為務則非忠信之事也以劫殺為名則非仁者之意也而空妨日廢業終無補益是何異設木而擊之置石而投之哉且君子之居室也勤身以致養其在朝也竭命以納忠臨事且猶旰食而何博奕之足耽夫然故孝友之行立貞純之名彰也方今大吳受命海內未平聖朝乾乾務在得人勇略之士則受熊虎之任儒雅之徒則處龍鳳之署百行兼苞文武並騖博選良才旌簡髦士設程試之科垂金爵之賞誠千載之嘉㑹百世之良遇也當世之士宜勉思至道愛功惜力以佐明時使名書史籍勳在盟府乃君子之上務當今之先急也夫一木之枰孰與方國之封枯棊三百孰與萬人之將衮龍之服金石之樂足以兼棊局而貿博奕矣假令世士移博奕之力而用之於詩書是有顔閔之志也用之於智計是有良平之思也用之於資貨是有猗頓之富也用之於射御是有將帥之備也如此則功名立而鄙賤逺矣三國志文類卷四十二
