body:
  text: 三國志文類卷十五書疏魏王肅諫征蜀疏字子雍時大司馬曹真征蜀肅上疏前志有之千里饋糧士有飢色樵蘇後爨師不宿飽此謂平塗之行軍者也又况於深入阻險鑿路而前則其為勞必相百也今又加之以霖雨山坂峻滑衆逼而不展糧縣而難繼實行軍者之大忌也聞曹真發已踰月而行裁半谷治道功夫戰士悉作是賊偏得以逸而待勞乃兵家之所憚也言之前代則武王伐紂出關而復還論之近事則武文征權臨江而不濟豈非所謂順天知時通於權變者哉兆民知聖上以水雨艱劇之故休而息之後日有釁乘而用之則所謂悅以犯難民忘其死者矣於是遂罷王肅陳政本疏除無事之位損不急之祿止浮食之費拜從容之官使官必有職職任其事事必受祿祿代其耕乃往古之常式當今之所宜也官寡而祿厚則公家之費鮮進仕之志勸進仕之志勸各展才力莫相倚仗敷奏以言明試以功能之與否簡在帝心是以唐虞之設官分職申命公卿各以其事然後惟龍為納言猶今尚書也以出內帝命而已夏殷不可得而詳甘誓曰六事之人明六卿亦典事者也周官則備矣五日視朝公卿大夫並進而司士辨其位焉其記曰坐而論道謂之王公作而行之謂之士大夫及漢之初擬前代公卿皆親以事升朝故高祖躬追反走之周昌武帝遙可奉奏之汲黯宣帝使公卿五日一朝成帝始置尚書五人自是陵遲朝禮遂闕可復五日視朝之儀使公卿尚書各以事進廢禮復興光宣聖緒誠所謂名美而實厚者也王肅諫修營宫室疏大魏承百王之極生民無幾干戈未戢誠宜息民而惠之以安靜遐邇之時也夫務畜積而息疲民在於省徭役而勤稼穡今宫室未就功業未訖運漕調發轉相供奉是以丁夫疲於力作農者離其南畝種穀者寡食穀者衆舊穀既沒新穀莫繼斯則有國之大患而非備豫之長䇿也今見作者三四萬人九龍可以安聖體其內足以列六宫顯陽之殿又向將畢惟泰極已前功夫尚大方向盛寒疾疢或作誠願陛下發德音下明詔深愍役夫之疲勞厚矜兆民之不贍取常食廩之士非急要者之用選其丁壯擇留萬人使一期而更之咸知息代有曰則莫不悅以即事勞而不怨矣計一嵗有三百六十萬夫亦不為少當一嵗成者聽且三年分遣其餘使皆即農無窮之計也倉有溢粟民有餘力以此興功何功不立以此行化何化不成夫信之於民國家大寶也仲尼曰自古皆有死民非信不立夫區區之晉國微微之重耳欲用其民先示以信是故原雖將降顧信而歸用能一戰而霸于今見稱前車駕當幸洛陽發民為營有司命以營成而罷既成而又利其功力不以時遣有司徒營其目前之利不顧經國之體臣愚以為自今已後倘復使民宜明其令使必如期若有事以次寧復更發無或失信凡陛下臨時之所行刑皆有罪之吏宜死之人也然衆庶不知謂為倉卒故願陛下下之於吏而暴其罪鈞其死也無使汙于宫掖而為逺近所疑且人命至重難生易殺氣絶而不續者也是以聖賢重之孟軻稱殺一無辜以取天下仁者不為也漢時有犯蹕驚乘輿馬者廷尉張釋之奏使罰金文帝怪其輕而釋之曰方其時上使誅之則已今下廷尉廷尉天下之平也一傾之天下用法皆為輕重民安所措其手足臣以為大失其義非忠臣所宜陳也廷尉者天子之吏也猶不可以失平而天子之身反可以惑謬乎斯重於為已而輕於為君不忠之甚也周公曰天子無戲言言則史書之工誦之士稱之言猶不戲而况行之乎故釋之之言不可不察周公之戒不可不法也又陳諸鳥獸無用之物而有芻穀人徒之費皆可蠲除程曉言校事放橫疏時校事放橫曉上疏周禮云設官分職以為民極春秋傳曰天有十日人有十等愚不得臨賢賤不得臨貴於是並建聖哲樹之風聲明試以功九載考績各修厥業思不出位故欒書欲拯晉侯其子不聽死人橫於街路邴吉不問上不責非職之功下不務分外之賞吏無兼統之勢民無二事之役斯誠為國要道治亂所由也逺覽典志近觀秦漢雖官名改易職司不同至於崇上抑下顯明分例其致一也初無校事之官干與庶政者也昔武皇帝大業草創衆官未備而軍旅勤苦民心不安乃有小罪不可不察故置校事取其一切耳然檢御有方不至縱恣也此霸世之權冝非帝王之正典其後漸蒙見任復為疾病轉相因仍莫正其本遂令上察宫廟下攝衆司官無局業職無分限隨意任情唯心所適法造於筆端不依科詔獄成於門下不顧覆訊其選官屬以謹慎為粗疏以􅢽詷為賢能其治事以刻暴為公嚴以循理為怯弱外則託天威以為聲勢內則聚群姦以為腹心大臣恥與分勢含忍而不言小人畏其鋒鋩鬱結而無告至使尹模公於目下肆其姦慝罪惡之著行路皆知纎惡之過積年不聞既非周禮設官之意又非春秋十等之義今外有公卿將校總統諸署內有侍中尚書綜理萬機司𨽻校尉督察京輦御史中丞董攝宫殿皆高選賢才以充其職申明科詔以督其違若此諸賢猶不足任校事小吏益不可信若此諸賢各思盡忠校事區區亦復無益若更高選國士以為校事則是中丞司𨽻重增一官耳若如舊選尹模之姦今復發矣進退推算無所用之昔桑𢎞羊為漢求利卜式以為獨烹𢎞羊天乃可雨若使政治得失必感天地臣恐水旱之災未必非校事之由也曹恭公逺君子近小人國風託以為刺衛獻公舍大臣與小臣謀定薑謂之有罪縱令校事有益於國以禮義言之尚傷大臣之心况姦回暴露而復不罷是衮闕不補迷而不返也於是遂罷校事官董昭攻江陵疏時大將軍夏侯尚等攻江陵未拔時江水淺狹尚欲乘船將步騎入渚中安屯作浮橋南北往來議者多以為城必可拔昭上疏武皇帝智勇過人而用兵畏敵不敢輕之若此也夫兵好進惡退常然之數平地無險猶尚艱難就當深入還道宜利兵有進退不可如意今屯渚中至深也浮橋而濟至危也一道而行至狹也三者兵家所忌而今行之賊頻攻橋誤有漏失渚中精鋭非魏之有將轉化為吳矣臣私戚之忘寢與食而議者怡然不以為憂豈不惑哉如江水向長一旦暴增何以防禦就不破賊尚當自完奈何乘危不以為懼事將危矣惟陛下察之帝悟昭言即詔尚等促出賊兩頭並前官兵一道引去不時得泄將軍石建高遷僅得自免軍出旬日江水暴長帝曰君論此事何其審也正使張陳當之何以復加董昭陳末流之弊疏凡有天下者莫不貴尚敦朴忠信之士深疾虛偽不真之人者以其毁教亂治敗俗傷化也近魏諷則伏誅建安之末曹偉則斬戮黃初之始伏惟前後聖詔深疾浮偽欲以破散邪黨常用切齒而執法之吏皆畏其權勢莫能糾擲毁壞風俗侵欲滋甚竊見當今年少不復以學問為本專更以交遊為業國士不以孝悌清修為首乃以趨勢遊利為先合黨連羣互相褒歎以毁訾為罰戮用黨譽為爵賞附已者則歎之盈言不附者則為作瑕釁至乃相謂今世何憂不度邪但求人道不勤羅之不博耳又何患其不知已矣但當吞之以藥而柔調耳又聞或有使奴客名作在職家人冒之出入往來禁奧交通書疏有所探問凡此諸事皆法之所不取刑之所不赦雖諷偉之罪無以加也蔣濟言中書疏為中護軍時中書監令號為專任濟上此疏大臣太重者國危左右太親者身蔽古之至戒也往者大臣秉事外內扇動陛下卓然自覽萬機莫不祗肅夫大臣非不忠也然威權在下則衆心慢上勢之常也陛下既以察之於大臣願無忘於左右左右忠正逺慮未必賢於大臣至於便辟取合或能工之今外所言輒云中書雖使恭慎不敢外交但有此名猶惑世俗况實握事要日在目前儻因疲倦之間有所割制衆臣見其能推移於事即亦因時而向之一有此端因當內設自完以此衆語私招所交為之內援若此臧否毁譽必有所興功負賞罰必有所易直道而上者或壅曲附左右者反達因微而入緣形而出意所狎信不復猜覺此宜聖智所當早聞外以經意則形際自見或恐朝臣畏言不合而受左右之怨莫適以聞臣竊亮陛下潛神默思公聽並觀若事有未盡於理而物有未周於用將改曲易調逺與黃唐角功近昭武文之迹豈近習而已哉然人君猶不可悉天下事以適已明當有所付三官任一臣非周公旦之忠又非管夷吾之公則有弄機敗官之弊當今柱石之士雖少至於行稱一州智效一官忠信竭命各奉其職可並驅䇿不使聖明之朝有專吏之名也詔曰夫骨鯁之臣人主之所仗也濟才兼文武服勤盡節每軍國大事輒有奏議忠誠奮發吾甚壯之就遷為護軍將軍加散騎常侍蔣濟言征役怨曠疏景初中外勤征役內務宫室怨曠者多而年榖飢儉濟上此疏陛下方當恢崇前緒光濟遺業誠未得高枕而治也今雖有十二州至於民數不過漢時一大郡二賊未誅宿兵邊陲且耕且戰怨曠積年宗廟宫室百事莫創農桑者少衣食者多今其所急唯當息耗百姓不至甚弊弊攰之民倘有水旱百萬之衆不為國用凡使民必須農隙不奪其時夫欲大興功之君先料其民力而燠休之勾踐養胎以待用昭王恤病以雪仇故能以弱燕服強齊羸越滅徑吳今二敵不攻不滅不事即侵當身不除百世之責也以陛下聖明神武之略舍其緩者專心討賊臣以為無難矣又歡娛之耽害於精爽神太用則竭形太勞則弊願大簡賢妙足以充百斯男者其冗散未齒且悉分出務在清靜詔曰微護軍吾弗聞斯言也蔣濟言日蝕疏是時曹爽專政丁謐鄧揚等輕改法度會有日蝕變詔羣臣問其得失濟上疏昔大舜佐治戒在比周周公輔政慎於其朋齊侯問災晏嬰對以布惠魯君問異臧孫答以緩役應天塞變乃實人事今二賊未滅將士暴露已數十年男女怨曠百姓貧苦夫為國法度惟命世大才乃能張其綱維以垂于後豈中下之吏所宜改易哉終無益於治適足傷民望宜使文武之臣各守其職率以清平則和氣祥瑞可感而致也蔣濟辭食邑疏時隨太傅司馬宣王屯洛水浮橋誅曹爽等進封都鄉侯邑七百户濟上疏曰臣忝寵上司而爽敢包藏禍心此臣之無任也太傅奮獨斷之䇿陛下明其忠節罪人伏誅社稷之福也夫封寵慶賞必加有功今論謀則臣不先知語戰則非臣所率而上失其制下受其弊臣備宰司民所具贍誠恐冒賞之漸自此而興推讓之風由此而廢固辭不許孫盛曰蔣濟之辭邑可謂不負心矣語曰不為利回不為義疚蔣濟其有焉三國志文類卷十五
