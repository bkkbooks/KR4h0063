body:
  text: 三國志文類卷四十三書魏文帝與王朗書帝在東宫時疫癘大起時人凋傷意深感歎與素所敬者大理王朗書生有七尺之形死有一棺之土唯立德揚名可以不朽其次莫如著篇籍疫癘數起士人凋落余獨何人能全其夀故論撰所著典論詩賦蓋百餘篇集諸儒於肅城門內講論大義侃侃無倦常嘉漢文帝之為君寬仁𤣥默務欲以德化民有聖賢之風時文學諸儒或以為孝文雖賢其於聰明通達國體不如賈誼帝由是著太宗論曰昔有苗不賔重華舞以干戚尉他稱帝孝文撫以恩德吳王不朝錫之几杖以撫其意而天下賴安乃𢎞三章之教愷悌之化欲使曩時纍息之民得闊步髙談無危懼之心豈賈誼之才敏籌畫國政特賢臣之器管晏之姿豈若孝文大人之量哉三年之中以孫權不服復頒太宗論於天下明示不願征伐也他日又從容言曰顧我亦有所不取於漢文帝者三殺薄昭幸鄧通慎夫人衣不曵地集上書囊為帳帷以為漢文儉而無法舅后之家但當養育以恩而不當假借以權既觸罪法又不得不害矣其欲秉持中道以為帝王儀表者如此文帝與孟達書達率部曲四千餘家歸魏文帝時初即王位既知達聞其來甚悅令貴臣有識察者往觀之還曰將帥之才也或曰卿相之器也王益欽逹遂與達書曰近日有命未足達㫖何者昔伊摯背商而歸周百里去虞而入秦樂毅感鴟夷以蟬蛻王遵識逆順以去就皆審廢興之符效知成敗之必然故丹青畫其形容良史載其功勳聞卿姿度純茂器量優絶當騁能明時收名傳記今日翻然濯鱗清流甚相嘉樂虛心西望依依若舊下筆屬辭歡心從之昔虞卿入趙每見取相陳平就漢一覲參乘孤今於卿情過於往故致所御馬物以昭忠愛又曰今者海內清定萬里一統三垂無風塵之警中夏無狗吠之虞以是弛罔閉禁與世無疑保官空虛初無資任卿來相就當明孤意慎勿令家人繽紛道路以親駭疏也若卿欲來相見且當先安部曲有所保固然後徐徐輕騎來東太祖與王修書王修字叔治為司金中郎將陳黃白異議因奏記曰修聞枳棘之林無梁柱之質涓流之水無洪波之勢是以在職七年忠讜不昭於時功業不見於事欣於所受俯慙不報未嘗不長夜起坐中飯釋餐何者力少任重不堪而懼也謹貢所議如左太祖甚然之乃與修書曰君澡身浴德流聲本州忠能成績為世美談名實相副過人甚逺孤以心知君至深至熟非徒耳目而已也察觀先賢之論多以鹽鐡之利足贍軍國之用昔孤初立司金之官念非屈君餘無可者故與君教曰昔遏父陶正民賴其器用及子媯滿建侯於陳近桑𢎞羊位至三公此君元龜之兆先告者也是孤用君之本言也或恐衆人未曉此意自是以來在朝之士每得一顯選常舉君為首及聞袁軍師衆賢之議以為不宜越君然孤執心將有所底以軍師之職閒於司金至於建功重於軍師孤之精誠足以達君君之察孤足以不疑但恐傍人淺見以蠡測海為蛇畫足將言前後百選輒不用之而使此君沈滯冶官張甲李乙尚猶先之此主人意待不優之效也耶孤懼有此空聲冒實淫蛙亂耳假有斯事亦庶鍾期不失聽也若其無也過備何害昔宣帝察少府蕭望之才任宰相故復出之令為馮翊從正卿往似於左遷上使侍中宣意曰君守平原日淺故復試君三輔非有所間也孤揆先主中宗之意誠備此事既君崇勳業以副孤意公叔文子與臣俱升獨何人哉袁紹與公孫瓚書紹遣將攻瓚連年不能拔與瓚書曰孤與足下既有前盟舊要申之以討亂之誓愛過夷叔分著丹青謂為旅力同仇足踵齊晉故解印釋紱以北帶南分割膏腴以奉執事此非孤赤情之明驗邪豈寤足下棄烈士之髙義尋禍亡之險蹤輟而改慮以好易怨盜遣士馬犯暴豫州始聞甲卒在南親臨戰陳懼于飛矢迸流狂刃橫集以重足下之禍徒增孤子之咎釁也故為薦書懇惻冀可改悔而足下超然自逸矜其威詐謂天罔可吞豪傑可滅果令貴弟殞於鋒刃之端斯言猶在於耳而足下曾不尋討禍源克心罪已苟欲逞其無疆之怒不顧逆順之津匿怨害民騁於余躬遂躍馬控弦處我疆土毒遍生民辜延白骨孤辭不獲已以登界橋之役是時足下兵氣霆震駿馬電發僕師徒肇合機械不嚴强弱殊科衆寡異論假天之助小戰大克遂陵躡奔背因壘館榖此非天威棐諶福豐有禮之符表乎足下志猶未厭乃復糾合餘燼率我蛑賊以焚爇勃海孤又不獲寧用及龍河之師羸兵前誘大軍未濟而足下膽破衆散不鼓而敗兵衆擾亂君臣並奔此又足下之為非孤之咎也自此以後禍釁彌深孤之師旅不勝其忿遂至積尸為京頭顱滿野愍彼無辜未嘗不慨然失涕也後比得足下書辭意婉約有改往修來之言僕既欣於舊好克復且愍兆民之不寧每輒引師南駕以順簡書弗盈一時而北邊羽檄之文末嘗不至孤是用痛心疾首靡所錯情夫處三軍之帥當列將之任宜令怒如嚴霜喜如時雨臧否善惡坦然可觀而足下二三其德强弱異謀急則曲躬緩則放逸行無定端言無質要為壯士者固若此乎既乃殘殺老弱幽土憤怨衆叛親離孑然無黨又烏丸濊貊皆與足下同州僕與之殊俗各奮迅激怒爭為鋒鋭又東西鮮卑舉踵來附此非孤德所能招乃足下驅而致之也夫當荒危之世處干戈之險內違同盟之誓外失戎狄之心兵興州壤禍發蕭墻將以定霸不亦難乎前以西山陸梁出兵平討㑹麴義餘殘畏誅逃命故遂住大軍分兵撲蕩此兵孤之前行乃界橋搴旗拔壘先登制敵者也始聞足下鐫金紆紫命以元帥謂當因茲奮發以報孟明之恥是故戰夫引領竦望旌斾怪遂含光匿影寂爾無聞卒臻屠滅相為惜之夫有平天下之怒希長世之功權御師徒帶養戎馬叛者無討服者不收威懷並喪何以立名今舊京克復天罔云補罪人斯亡忠幹翼化華夏儼然望於穆之作將戢干戈放散牛馬足下獨何守區區之土保軍內之廣甘惡名以速朽亡令德之久長壯而籌之非良策也宜釋憾除嫌敦我舊好若斯言之玷皇天是聞瓚不答袁紹與袁術書時議者以靈帝失道使天下叛亂少帝幼弱為賊臣所立又不識母氏所出幽州牧劉虞宿有德望紹等欲立之以安當時使人報術術觀漢室衰陵隂懷異志故外託公議以拒紹紹復與書曰前與韓文節共建永世之道欲海內見再興之主今西名有幼君無血脉之屬公卿以下皆媚事卓安可復信但當使兵往屯關要皆自蹙死於西東立聖君太平可冀如何有疑又室家見戮不念子胥可復北面乎違天不祥願詳思之術又答書聖主聰睿有周成之質賊卓因危亂之際威服百僚此乃漢家小厄之㑹亂尚未厭復欲興之乃云今主無血脉之屬豈不誣乎先人以來奕世相承忠義為先太傅公仁慈惻隱雖知賊卓必為禍害以信狥義不忍去也門户滅絶死亡流漫幸䝉逺近來相赴助不因此時上討國賊下刷家恥而圖於此非所聞也又曰室家見戮可復北面此卓所為豈國家哉君命天也天不可讐况非君命乎慺慺赤心志在滅卓不識其他三國志文類卷四十三
