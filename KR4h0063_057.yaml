body:
  text: 三國志文類卷五十七誄魏曹植作文帝誄嗚呼哀哉于時天震地駭崩山隕霜陽精薄景五緯錯行百姓吁嗟萬國悲悼若喪考妣恩過慕唐劈踊郊野仰想穹蒼僉曰何辜早世隕喪嗚呼哀哉悲夫大行忽焉光滅永棄萬國雲往雨絶承問荒忽惛懵哽咽袖鋒抽刃欲自僵斃追慕三良甘心同穴感恨南風惟以鬱滯終於偕沒指景自誓考諸先記尋之哲言生若浮寄惟德可論朝聞夕逝孔志所存皇雖一沒天祿永延何以述德表之素旃何以詠功宣之管絃乃作誄曰皓皓太素兩儀始分中和産物肇有人倫爰暨三皇實秉道真降逮五帝繼以懿純三代製作踵武立勳季嗣不維網漏于秦崩樂滅學儒坑禮焚二世而殱漢氏乃因弗求古訓嬴政是遵王綱帝典閴爾無聞朱光幽昧道究運遷乾坤回厯簡聖授賢乃眷大行屬以黎元龍飛唘祚合契上元五行定紀改號革年明明赫赫受命于天仁風偃物德以禮宣祥惟聖質嶷在幼妍庶幾六典學不過庭潛心無罔亢志青冥才秀藻朗如玉之瑩聽察無響瞻覩未形其剛如金其貞如瓊如冰之潔如砥之平爵功無私戮違無輕心鏡萬機攬照下情思良股肱嘉昔伊吕搜揚側陋舉湯代禹拔才巖穴取士蓬戶唯德是縈弗拘禰祖宅士之表道義是圖弗營厥險六合是虞齊契共遵下以純民恢拓規矩克紹前人科條品制褒貶以因乘殷之輅行夏之辰金根黃屋翠葆龍鱗紼冕崇麗衡紞惟新尊肅禮容矚之若神方牧妙舉欽於恤民虎將荷節鎮彼四鄰朱旗所𠞰九壤被震疇克不若孰敢不臣縣旌海表萬里無塵虜備凶徹鳥殪江岷摧若涸魚乾臘矯鱗肅慎納貢越裳效珍條支絶域侍子內賓德儕先皇功侔太古上靈降瑞黃初俶祜河龍洛龜陵波游下平鈞應繩神鸞翔舞數莢階除系風扇暑皓獸素禽飛走郊野神鐘寶鼎形自舊土雲英甘露瀐塗被宇靈芝冒沼朱菙蔭渚回回凱風祁祁甘雨稼穡豐登我稷我黍家佩惠君户䝉慈父圖致太和洽德全義將登介山先皇作儷鐫石紀勳兼録衆瑞方隆封禪歸功天地賔禮百靈勳命視規望祭四嶽燎封奉柴肅于南郊宗祀上帝三牲既供夏禘秋嘗元侯佐祭獻璧奉璋鸞輿幽藹龍旌太常爰迄太廟鐘鼓鍠鍠頌德詠功八佾鏘鏘皇祖既饗烈考來享神具醉止降兹福祥天地震蕩大行康之三辰暗昧大行光之皇紘絶維大行綱之神器莫統大行當之禮樂廢弛大行張之仁義陸沈大行揚之潛龍隱鳳大行翔之疏狄遐康大行匡之在位七載元功仍舉將永太和絶迹三五宜作物師長為神主壽終金石等算東父如何奄忽摧身后土俾我煢煢靡瞻靡顧嗟嗟皇穹胡寧忍務嗚呼哀哉明監吉凶體達存亡深埀典制申之嗣皇聖上䖍奉是順是將乃創𤣥宇基為首陽擬迹榖林追堯纂唐合山同陵不樹不疆塗車芻靈珠玉靡藏百神警侍來賓幽堂耕禽田獸望魂之翔於是俟大隧之致功兮練元辰之淑禎潛華體於梓宫兮馮正殿以居靈顧皇嗣之號咷兮存臨者之悲聲悼晏駕之既修兮感容車之速征浮飛魂於輕霄兮就黃墟以滅形背三光之昭晰兮歸𤣥宅之冥冥嗟一往之不及兮痛閟闥之長扄咨逺臣之眇眇兮成凶諱以怛驚心孤絶而靡告兮紛流涕而交頸思恩榮以橫奔兮閡闕塞之嶢峥顧衰絰以輕舉兮迫關防之我嬰欲高飛而遙憩兮憚天網之逺經遙投骨於山足兮報恩養於下庭慨拊心而自悼兮懼施重而命輕嗟微軀之是效兮甘九死而忘生幾司命之役籍兮先黃髮而隕零天蓋高而察卑兮冀神明之我聽獨鬱伊而莫訴兮追顧景而憐形奏斯文以寫思兮結翰墨以敷誠嗚呼哀哉三國志文類卷五十七
