body:
  text: 三國志文類卷五十五序魏文帝自敘初平之元董卓殺主鴆后蕩覆王室是時四海既困中平之政兼惡卓之凶逆家家思亂人人自危山東牧守咸以春秋之義衛人討州吁于濮言人人皆得討賊於是大興義兵名豪大俠富室強族飄揚雲會萬里相赴兖豫之師戰於滎陽河內之甲軍於孟津卓遂遷大駕西都長安而山東大者連郡國中者嬰城邑小者聚阡陌以還相吞滅會黃巾盛於海岱山寇暴於并冀乘勝轉攻席卷而南鄉邑望煙而奔城郭覩塵而潰百姓死亡暴骨如莽時余年五歲上以世方擾亂教余學射六歲而知射又教余騎馬八歲而能騎射矣以時之多故每征余常從建安初上南征荆州至宛張繡降旬日而反亡兄孝廉子修從兄安民遇害時余年十歲乘馬得脫夫文武之道各隨時而用生於中平之季長於戎旅之間是以少好弓馬于今不衰逐禽輒十里馳射常百步日多體健心每不厭建安十年始定冀州濊貊貢良弓燕代獻名馬時歲之暮春勾芒司節和風扇物弓燥手柔草淺獸肥與族兄子丹獵於鄴西終日手獲麞鹿九雉兔三十後軍南征次曲蠡尚書令荀彧奉使犒軍見余談論之末彧言聞君善左右射此實難能余言執事未覩夫項發口縱俯馬蹄而仰月支也彧喜笑曰乃爾余曰埒有常徑的有常所雖每發輒中非至妙也若馳平原赴豐草要狡獸截輕禽使弓不虛彎所中必洞斯則妙矣時軍祭酒張京在坐顧彧拊手曰善余又學擊劒閲師多矣四方之法各異唯京師為善桓靈之間有虎賁王越善斯術稱於京師河南史阿言昔與越逰具得其法余從阿學之精熟嘗與平虜將軍劉勳奮威將軍鄧展等共飲宿聞展善有手臂曉五兵又稱其能空手入白刃余與論劒良久謂言將軍法非也余顧嘗好之又得善術因求與余對時酒酣耳熱方食芋蔗便以為杖下殿數交三中其臂左右大笑展意不平求更為之余言吾法急屬難相中面故齊臂耳展言願復一交余知其欲突以取交中也因偽深進展果尋前余却腳鄛正截其顙坐中驚視余還坐笑曰昔陽慶使淳于意去其故方更授以祕術今余亦願鄧將軍捐棄故伎更受要道也一坐盡歡夫事不可自謂己長余少曉持復自謂無對俗名雙戟為坐鐵室鑲楯為蔽木户後從陳國袁敏學以單攻復每為若神對家不知所出先曰若逢敏於狹路直決耳余於他戲弄之事少所喜唯彈碁略盡其巧少為之賦昔京師先工有馬合鄉侯東方安世張公子常恨不得與彼數子者對上雅好詩書文籍雖在軍旅手不釋卷每每定省從容常言人少好學則思專長則善忘長大而能勤學者唯吾與袁伯業耳余是以少誦詩論及長而備歷五經四部史漢諸子百家之言靡不畢覽博物志曰帝善彈棊能用手巾角時有一書生又能低頭以所冠著葛巾角撇棊少帝自敘始生禎祥昔帝王之生或有禎祥蓋所以彰顯神異也惟豫小子支胤末流謬為靈祗之所相祐也豈敢自比於前哲聊記録以示後世焉其辭曰惟正始三年九月辛未朔二十五日乙未直成豫生于時也天氣清明日月暉光爰有黃氣煙煴於堂照曜室宅其色煌煌相而論之曰未者為土魏之行也厥日直成應嘉名也煙煴之氣神之精也無災無害蒙神靈也齊王不弔顛覆厥度羣公受豫紹繼皇祚以眇眇之身質性頑固未能涉道而遵大路臨深履冰涕泗憂懼古人有云懼則不亡伊豫小子曷敢怠荒庶不忝辱永奉蒸嘗衛恆撰四體書勢序自秦用篆書焚燒先典而古文絶矣漢武帝時魯恭王壞孔子宅得尚書春秋論語孝經時人已不復知有古文謂之科斗書漢世祕藏希得見之魏初傳古文者出於邯鄲淳敬侯寫淳尚書後以示淳而淳不别至正始中立三字石經轉失淳法因科斗之名遂效其法太康元年汲縣民盜發魏襄王冡得䇿書十餘萬言案敬侯所書猶有髣佛敬侯謂覬也其序篆書曰秦時李斯號為工篆諸山及銅人銘皆斯書也漢建初中扶風曹喜少異於斯而亦稱善邯鄲淳師焉略究其妙韋誕師淳而不及也太和中誕為武都太守以能書留補侍中魏氏寶器銘題皆誕書云漢末又有蔡雍采斯喜之法為古今雜形然精密簡理不如淳也其序録𨽻書已略見武紀又曰師宜官為大字邯鄲淳為小字梁鵠謂淳得次仲法然鵠之用筆盡其勢矣其序草書曰漢興而有草書不知作者姓名至章帝時齊相杜度號善作篇復有崔瑗崔實亦皆稱工杜氏結字甚安而書體微瘦崔氏甚得筆勢而結字小疏𢎞農張伯英者因而轉精其巧凡家之衣帛必書而後練之臨池學書池水盡黑下筆必為楷則號匆匆不暇草寸紙不見遺至今世人尤寶之韋仲將謂之草聖伯英弟文舒者次伯英又有薑孟潁梁孔達田彥和及韋仲將之徒皆伯英弟子有名於世然殊不及文舒也祝文魏祀橋玄文曹公軍至浚儀治睢陽渠追使以太牢祀橋玄文曰故太尉橋公誕敷明德泛愛博容國念明訓士思令謨靈幽體翳邈哉晞矣吾以幼年逮升堂室特以頑鄙之姿為大君子所納增榮益觀皆由奬助猶仲尼稱不如顔淵李生之厚歎賈復士死知已懷此無忘又承從容約誓之言殂逝之後路有經由不以斗酒隻雞過相沃酹車過三步腹痛勿怪雖臨時戲笑之言非至親之篤好胡肯為此辭乎匪謂靈忿能詒已疾懷舊惟顧念之悽愴奉命東征屯次鄉里北望貴土乃心陵墓裁致薄奠公其尚饗蜀即位告天文惟建安二十六年四月丙午皇帝備敢用玄牡昭告皇天上帝后土神祗漢有天下歷數無疆曩者王莽篡盜光武皇帝震怒致誅社稷復存今曹操阻兵安忍戮殺主后滔天泯夏罔顧天顯操于丕載其凶逆竊居神器羣臣將士以為社稷隳廢備宜修之嗣武二祖龔行天罰備惟否德懼忝帝位詢于庶民外及蠻夷君長僉曰天命不可以不答祖業不可以久替四海不可以無主率土式望在備一人備畏天明命又懼漢邦將湮于地謹擇元日與百寮登壇受皇帝璽綬修燔瘞告類于天神惟神嚮祚于漢家永綏四海吳即位告天文皇帝臣權敢用玄牡昭告于皇皇后帝漢享國二十有四世歷年四百三十有四行氣數終祿祚運盡普天弛絶率土分崩孽臣曹丕遂奪神器丕子睿繼世作慝淫名亂制權生於東南遭值期運承乾秉戎志在平世奉辭行罰舉足為民羣臣將相州郡百城執事之人咸以為天意已去於漢漢氏已絶祀於天皇帝位虛郊祀無主休徴嘉瑞前後雜沓歷數在躬不得不受權畏天命不敢不從謹擇元日登壇燎祭即皇帝位惟爾有神饗之左右有吳永終天祿三國志文類卷五十五
