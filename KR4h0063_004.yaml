body:
  text: 三國志文類卷四詔書魏明帝封聊城王茂詔茂性傲很少無寵于太祖及文帝世又獨不王太和元年茂封聊城公其年為王詔曰昔象之為虐至甚而大舜猶侯之有鼻近漢氏淮南阜陵皆為亂臣逆子而猶或及身而復國或至子而錫土有虞建之於上古漢文明章行之乎前代斯皆敦敘親親之厚義也聊城公茂少不間禮教長不務善道先帝以為古之立諸侯也皆命賢者故姬姓有未必侯者是以獨不王茂太皇太后數以為言如聞茂頃來少知悔昔之非欲修善將來君子與其進不保其往也今封茂為聊城王以慰太皇太后下流之念恐無能傳業詔景初中帝以髙堂隆蘇林秦靜等並老恐無能傳業者乃詔曰昔先聖既沒而其遺言餘教著於六藝六藝之文禮又為急弗可斯須離者也末俗背本所由來久故閔子譏原伯之不學荀卿醜秦世之坑儒儒學既廢則風化曷由興哉方今宿生巨儒並各年髙教訓之道孰為其繼昔伏生將老漢文帝嗣以鼂錯榖梁寡疇宣帝承以十郎其私科郎吏髙才解經義者三十人從光祿勳隆散騎常侍林博士靜分受四經三禮主者具為設課試之法赦遼東詔帝即位拜公孫淵揚烈將軍遼東太守淵遣使南通孫權往來賂遺國家知淵兩端而恐遼東吏民為淵所誤故公文下遼東因赦之曰告遼東玄菟將校吏民逆賊孫權遭遇亂階因其先人劫略州郡遂成羣凶自擅江表含垢藏疾冀其可化故割地王權使南面稱孤位以上將禮以九命權親義手北面稽顙假人臣之寵受人臣之榮未有如權者也狼子野心告令難移卒歸反覆背恩叛主滔天逆神乃敢僭號恃江湖之險阻王誅未加比年已來復逺遣船越渡大海多持貨物誑誘邊民邊民無知與之交關長吏以下莫肯禁止至使周賀浮舟百艘沈滯津岸貿遷有無既不疑拒齎以名馬又使宿舒隨賀通好十室之邑猶有忠信陷君於惡春秋所書也今遼東玄菟奉事國朝紆青拖紫以千百為數戴纚垂纓咸佩印綬曾無匡正納善之言龜玉毁於匱虎兕出於柙是誰之過歟國朝為子大夫羞之昔狐突有言父教子二何以事君策名委質二乃辟也今乃阿順邪謀脅從姦惑豈獨父兄之教不詳子弟之舉習非而已哉若苖穢害田隨風烈火芝艾俱焚安能自别乎且又此事固然易見不及鑒古成敗書傳所載也江南海北有萬里之限遼東君臣無怵惕之患利則利所不利貴則義所不貴此為厭安樂之居求危亡之禍賤忠貞之節重背叛之名蠻貊之長猶知愛禮以此事人亦難為顔且又宿舒無罪擠使入吳奉不義之使始與家訣涕泣而行及至賀死之日覆衆成山舒雖脫死魂魄離身何所逼迫乃至於此今忠臣烈將咸忿遼東反覆攜二皆欲乘桴浮海出於肆意朕為天下父母加念天下新定既不欲勞動干戈逺涉大川費役如彼又悼邊陲遺餘黎民迷誤如此故遣郎中衛慎邵瑁等且先奉詔示意若股肱忠良能效節立信以輔時君反邪就正以建大功福莫大焉儻恐自嫌已為惡逆所見染汙不敢倡言永懷伊戚其諸與賊使交通皆赦除之與之更始齊王芳賜孫資詔時大將軍曹爽専事多變易舊章資歎曰吾纍世蒙寵加以預聞屬託今縱不能匡弼時事何以坐受素餐之祿邪遂固稱疾乃賜詔曰君掌機密三十餘年經營庶事勳著前朝暨朕統位動賴良謀是以曩者增崇寵章同之三事外帥羣官內望讜言屬以年耆疾篤上還印綬前後鄭重辭旨懇切天地以大順成德君子以善恕成仁重以職事違奪君志今聽所執賜錢百萬使兼光祿勳少府親策詔君養疾於第君其勉進醫藥頥神和氣以永無疆之祚置舍人官騎加以日秩肴酒之膳焉髙貴鄉公即位詔昔三祖神武聖德應天受祚齊王嗣位肆行非度顛覆厥德皇太后深惟社稷之重延納宰輔之謀用替厥位集大命于余一人以眇眇之身託於王公之上夙夜祇畏懼不能嗣守祖宗之大訓恢中興之𢎞業戰戰兢兢如臨於谷今羣公卿士股肱之輔四方征鎮宣力之佐皆積德纍功忠勤帝室庶憑先祖先父有德之臣左右小子用保乂皇家俾朕蒙暗垂拱而治蓋聞人君之道德厚侔天地潤澤施四海先之以慈愛示之以好惡然後教化行於上兆民聽于下朕雖不德昧於大道思與宇內共臻兹路書不云乎安民則惠黎民懷之大赦改元減乘輿服御後宫用度及罷尚方御府百工技巧靡麗無益之物改武丘名詔大將軍司馬文王陷夀春城斬諸葛誕詔曰古者克敵收其尸以為京觀所以懲昏逆而章武功也漢孝武元鼎中改桐鄉為聞喜新鄉為獲嘉以著南越之亡大將軍親總六戎營據丘頭內夷羣凶外殄冦虜功濟兆民聲振四海克敵之地宜有令名其改丘頭為武丘明以武平亂使後世不忘亦京觀二邑之義也立三老五更詔夫養老興教三代所以樹風化垂不朽也必有三老五更以崇至敬乞言納誨著在惇史然後六合承流下觀而化宜妙簡德行以充其選關內侯王祥履仁秉義雅志淳固關內侯鄭小同溫恭孝友師禮不忒其以祥為三老小同為五更車駕親率羣司躬行古禮焉復入賈逵祠詔甘露二年車駕東征屯項復入逵祠下詔曰逵沒有遺愛歷世見祀追聞風烈朕甚嘉之昔先帝東征亦幸於此親發德音褒揚逵美徘徊之心益用慨然夫禮賢之義或掃其墳墓或循其門閭所以崇敬也其掃除祠堂有穿漏者補治之賜楚王彪璽書嘉平元年兖州刺史令狐愚與太尉王凌謀迎彪都許昌語在凌傳乃遣傅及侍御史就國案驗收治諸相連及者廷尉請懲彪治罪於是依漢燕王旦故事使兼廷尉大鴻臚持節賜彪璽書切責之使自圖焉璽書曰夫先王行賞不遺仇讐用戮不違親戚至公之義也故周公流涕而決二叔之罪孝武傷懷而斷昭平之獄古今常典也惟王國之至親作藩於外不能祇奉王度表率宗室而謀於姦邪乃與太尉王凌兖州刺史令狐愚搆通逆謀圖危社稷有悖忒之心無忠孝之意宗廟有靈王其何面目以見先帝朕甚痛王自陷罪辜既得王情深用憮然有司奏王當就大理朕惟公族甸師之義不忍肆王市朝故遣使者賜書王自作孽匪由於他燕刺之事宜足以觀王其自圖之彪乃自殺三國志文類卷四
