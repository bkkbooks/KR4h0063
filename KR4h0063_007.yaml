body:
  text: 三國志文類巻七教令魏太祖諭掾屬各言其失令夫治世御衆建立輔弼誡在面從詩稱聴用我謀庶無大悔斯實君臣懇懇之求也吾充重任每懼失中頻年以來不聞嘉謀豈吾開延不勤之咎耶自今已後諸掾屬治中别駕常以月旦各言其失吾將覽焉分租令昔趙奢竇嬰之為將也受賜千金一朝散之故能成大功永世流聲吾讀其文未甞不慕其為人也與諸將士大夫共從戎事幸賴賢人不愛其謀羣士不遺其力是以夷險平亂而吾得竊大賞戸邑三萬追思竇嬰散金之義今分所受租與諸將掾屬及故戍於陳蔡者庶以疇答衆勞不擅大惠也宜差死事之孤以租榖及之若年殷用足租奉畢入將大與衆人悉共饗之辭邑土令孤始舉孝亷年少自以本非巖穴知名之士恐為海内人之所見凡愚欲為一郡守好作政教以建立名譽使世士明知之故在濟南始除殘去穢平心選舉違迕諸常侍以為彊豪所忿恐致家禍故以病還去官之後年紀尚少顧視同歲中年有五十未名為老内自圖之從此却去二十年待天下清乃與同歲中始舉者等耳故以四時歸鄉里於譙東五十里築精舍欲秋夏讀書冬春射獵求底下之地也欲以泥水自蔽絶賓客徃來之望然不能得如意後徴為都尉遷典軍校尉意遂更欲為國家討賊立功欲望封侯作征西將軍然後題墓道言漢故征西將軍曹侯之墓此其志也而遭值董卓之難興舉義兵是時合兵能多得耳然常自捐不欲多之所以然者兵多意盛與彊敵爭儻更為禍始故汴水之戰數千後還到揚州更募亦復不過三千人此其本志有限也後領兖州破降黄巾三十萬衆又袁術僭號於九江下皆稱臣名門曰建號門衣被皆為天子之制兩婦預爭為皇后志計已定人有勸術使遂即帝位露布天下答言曹公尚在未可也後孤討禽其四將獲其人衆遂使術窮亡解沮發病而死及至袁紹據河北兵勢彊盛孤自度勢實不敵之但計投死為國以義滅身足垂於後幸而破紹梟其二子又劉表自以為宗室包藏奸心乍前乍却以觀世事據有當州孤復定之遂平天下身為宰相人臣之貴已極意望已過矣今孤言此若為自大欲人言盡故無諱耳設使國家無有孤不知當幾人稱帝幾人稱王或者人見孤彊盛又性不信天命之事恐私心相評言有不遜之志妄相忖度每用耿耿齊桓晉文所以垂稱至今日者以其兵勢廣大猶能奉事周室也論語云三分天下有其二以服事殷周之德可謂至德矣夫能以大事小也昔樂毅走趙趙王欲與之圖燕樂毅伏而垂泣對曰臣事昭王猶事大王臣若獲戾放在他國没世然後已不忍謀趙之徒𨽻况燕後嗣乎胡亥之殺䝉恬也恬曰自吾先人及至子孫積信於秦三世矣今臣將兵三十餘萬其勢足以背叛然自知必死而守義者不敢辱先人之教以忘先王也孤每讀此二人書未甞不愴然流涕也孤祖父以至孤身皆當親重之任可謂見信者矣以及子桓兄弟過於三世矣孤非徒對諸君説此也常以語妻妾皆令深知此意孤謂之言顧我萬年之後汝曹皆當出嫁欲令傳道我心使他人皆知之孤此言皆肝鬲之要也所以勤勤懇懇叙心腹者見周公有金縢之書以自明恐人不信之故然欲孤便爾委捐所典兵衆以還執事歸就武平侯國實不可也何者誠恐已離兵為人所禍也既為子孫計又已敗則國家傾危是以不得慕虚名而處實禍此所不得為也前朝恩封三子為侯固辭不受今更欲受之非欲復以為榮欲以為外援為萬安計孤聞介推之避晉封申胥之逃楚賞未甞不捨書而嘆有以自省也奉國威靈仗鉞征伐推弱以克彊處小而禽大意之所圖動無違事心之所慮何向不濟遂蕩平天下不辱主命可謂天助漢室非人力也然封兼四縣食户三萬何德堪之江湖未靜不可讓位至於邑土可得而辭今上還陽夏柘苦三縣户二萬但食武平萬戸且以分損謗議少減孤之責也祠廟令議者以祠廟上殿當解履吾受錫命帶劒不解履上殿今有事於廟而解履是尊先公而替王命敬父祖而簡君王故吾不敢解履上殿也又臨祭就洗以手擬水而不盥夫盥以潔為敬未聞擬向不盥之禮且祭神如神在故吾親受水而盥也又降神禮訖下階就幕而立須奏樂畢竟似若不愆烈祖遲祭不速訖也吾坐俟樂闋送神乃起也受胙納神以授侍中此為敬恭終不實也古者親執祭事故吾親納於神終抱而歸也仲尼曰雖違衆吾從下誠哉斯言也録王必令領長史王必是吾披荆棘時吏也忠能勤事心如鐵石國之良吏也蹉跌久未辟之捨騏驥而弗乘焉遑遑而更求哉故教辟之已署所宜便以領長史統事如故封田疇令太祖賜疇車馬榖帛皆散之宗族知舊從征荆州還太祖追念疇功殊美恨前聴疇之讓曰是成一人之志而虧王法大制也於是乃復以前爵封疇令曰蓨令田疇至節髙尚遭值州里戎夏交亂引身深山研精味道百姓從之以成都邑袁賊之盛命召不屈慷慨守志以徼真主及孤奉詔征定河北遂服幽都將定胡冦時加禮命疇即受署陳建攻胡蹊路所由率齊山民一時向化開塞導道供承使役路近而便令虜不意斬蹋頓於白狼遂長驅於栁城疇有力焉及軍入塞將圖其功表封亭侯食邑五百而疇懇惻前後辭賞出入三載歴年未賜此為成一人之髙甚違王典失之多矣宜從表封無久留吾過加棗祇子封爵令故陳留太守棗祇天性忠能始共舉義兵周旋征討後袁紹在冀州亦貪祇欲得之祇深附託於孤使領東阿令吕布之亂兖州皆叛惟范東阿完在由祇以兵據城之力也後大軍糧乏得東阿以繼祇之功也及破黄巾定許得賊資業當興立屯田時議者皆言當計牛輸榖佃科以定施行後祇白以為僦牛輸榖大收不增榖有水旱災除大不便反覆來説孤猶以為當如故大收不可復改易祇猶執之孤不知所從使與荀令君議之時故軍祭酒侯聲云科取官牛為官田計如祇議於官便於客不便聲懐此云云以疑令君祇猶自信據計畫還白執分田之術孤乃然之使為屯田都尉施設田業其時嵗則大收後因此大田豐足軍用摧滅羣逆克定天下以隆王室祇興其功不幸早没追贈以郡猶未副之今重思之祇宜受封稽留至今孤之過矣祇子處中宜加封爵以祀祇為不朽之事賜杜畿令昔蕭何定闗中冦恂平河内卿有其功間將授卿以納言之職顧念河東吾股肱郡充實之所足以制天下故且煩卿卧鎮之三國志文類巻七
