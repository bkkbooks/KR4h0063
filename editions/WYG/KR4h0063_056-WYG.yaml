body:
  text: 三國志文類巻五十六祭文魏文帝受禪祭天地嶽瀆文皇帝臣丕敢用𤣥牡昭告于皇皇后帝漢歴世二十有四踐年四百二十有六四海困窮三綱不立五緯錯行靈祥並見推術數者慮之古道咸以為天之歴數運終兹世凡諸嘉祥民神之意比昭有漢數終之極魏家受命之符漢主以神器宜授於臣憲章有虞致位于丕丕震畏天命雖休勿休羣公庶尹六事之人外及將士洎于蠻夷君長僉曰天命不可以辭拒神器不可以久曠羣臣不可以無主萬機不可以無統丕祗承皇象敢不欽承卜之守龜兆有大横筮之三易兆有革兆謹擇元日與羣寮登壇受帝璽綬告類于爾大神唯爾有神尚饗永吉兆民之望祚于有魏世享明帝追冊漢帝告祠文帝廟文明帝即位詔有司追諡山陽公為漢孝獻皇帝使太尉具以一太牢告祠文帝廟曰叡聞夫禮也者反本脩古不忘厥初是以先代之君尊尊親親咸有尚焉今山陽公寢疾棄國有司建言䘮紀之禮視諸侯王叡惟山陽公昔知天命永終於已深觀歴數允在聖躬傳祚禪位尊我民主斯乃陶唐懿德之事也皇初受終命公于國行漢正朔郊天祀祖禮樂制度率乃漢舊斯亦舜禹明堂之義也上考遂初皇極攸建允熈克讓莫朗于兹蓋子以繼志嗣訓為孝臣以配命欽述為忠故詩稱匪棘其猶聿追來孝書曰前人受命兹不忘大功叡敢不奉承徽典以昭皇考之神靈今追諡山陽公曰孝獻皇帝冊贈璽紱命司徒司空持節弔祭護䘮光禄大鴻臚為副將作大匠復土將軍營成陵墓及置百官羣吏車旗服章䘮塟禮儀一如漢氏故事䘮塟所供羣官之費皆仰大司農立其後嗣為山陽公以通三統永為魏賓於是贈冊曰嗚呼昔皇天降戾于漢俾逆臣董卓播厥凶虐焚滅京都却遷大駕于時六合雲擾姦雄熛起帝自西京徂唯求定臻兹洛邑疇咨聖賢聿改乘轅又遷許昌武皇帝是依歲在𤣥枵皇師肇征迄于鶉尾十有八載羣冦殱殄九域咸乂惟帝念功祚兹魏國大啟土宇爰及文皇帝齊聖廣淵仁聲旁流柔逺能邇殊俗尚義乾精承祚坤靈吐曜稽極玉衡允膺歴數度于軌儀克厭帝心乃仰欽七政俯察五典弗采四嶽之謀不俟師錫之舉幽贊神明承天禪位祚建朕躬統承洪業蓋聞昔帝堯元愷既舉凶族未流登舜百揆然後百揆時序内平外成授位明堂退終天禄故能冠德百王表功嵩嶽自徃迄今彌歴七代歲暨三千而大運來復庸命底績纂我民主作建皇極念重光紹咸池繼韶夏超羣后之遐蹤邈商周之慙德可謂高朗令終昭明洪烈之懿盛者矣非夫漢魏與天地合德與四時合信動和民神格于上下其孰能至於此乎朕惟孝獻享年不永欽若顧命考之典謨恭述皇考先靈遺意闡崇𢎞諡奉成聖美以章希世同符之隆以傳億載不朽之榮䰟而有靈嘉兹宏休嗚呼哀哉張昭等作陶謙哀辭謙死時年六十三張昭等為之作哀辭曰猗歟使君君侯將軍膺秉懿德允武允文體足剛直守以温仁令舒及盧遺愛于民牧幽暨徐甘棠是均憬憬夷貊賴侯以清蠢蠢妖冦匪侯不寧惟帝念績爵命以章既牧且侯啟土溧陽遂升上將受號安東將平世難社稷是崇降年不永奄忽殂薨䘮覆失恃民知困窮曾不旬日五郡潰崩哀我人斯將誰仰憑追思靡及仰呌皇穹嗚呼哀哉三國志文類巻五十六
