body:
  text: 三國志文類巻二十九薦稱魏後漢張超薦袁遺於朱雋遺有冠世之懿幹時之量其忠允亮直固天所縱若乃包羅載籍管綜百氏登高能賦覩物知名求之今日邈焉靡儔太祖稱荀攸孤與荀公達周遊二十餘年無毫毛可非者又曰荀公達真賢人也所謂溫良恭儉讓以得之孔子稱晏平仲善與人交久而敬之公達即其人也又稱二荀父子傅子曰或問近世大賢君子答曰荀令君之仁荀軍師之智斯可謂近世大賢君子矣荀令君仁以立徳明以舉賢行無諂黷謀能應機孟軻稱五百年而有王者興其間必有命世者其荀令君乎太祖稱荀令君之進善不進不休荀軍師之去惡不去不止也孔融薦禰衡書衡字正平建安初自荆州北游都恃才傲逸臧否過當見不如者不與語人皆以是憎之唯少府孔融高貴其才上書薦之曰淑質貞亮英才卓犖初涉藝文升堂覩奥目所一見輒誦於口耳所暫聞不忘於心性與道合思若有神𢎞羊心計安世黙識以衡准之誠不足怪先賢行狀稱毛玠先賢行狀曰玠雅亮公正在官清恪其典選舉拔貞實斥華偽進遜行抑阿黨諸宰官治民功績不著而私財豐足者皆免黜停廢久不選用於時四海翕然莫不勵行至乃長吏還者垢面羸衣常乘柴車軍吏入府朝服徒行人擬壺餐之潔家象濯纓之操貴者無穢欲之累賤者絶姦貨之求吏潔於上俗移乎下民到於今稱之傅子稱何曾荀顗以孝事親傅子稱曾及荀顗曰以文王之道事其親者其穎昌何侯乎荀侯乎古稱曾閔今曰荀何内盡其心以事其親外崇禮讓以接天下孝子百世之宗仁人天下之本也有能行仁孝之道者君子之儀表矣王象薦楊俊王象為散騎常侍薦俊曰伏見南陽太守楊俊秉純粹之茂質履忠肅之𢎞量體仁足以育物篤實足以動衆克長後進惠訓不倦外寛内直仁而有斷自初彈冠所歴垂化再守南陽恩徳流著殊鄰異黨襁負而至今境守清靜無所展其智能宜還本朝宣力輦轂熙帝之載謝子微稱許劭召陵謝子微高才逺識見劭年十八時乃歎息曰此則希世出衆之偉人也劭始發明樊子昭於鬻幘之肆出虞永賢於牧竪召李叔才鄉閭之間擢郭子瑜鞍馬之吏援楊孝祖舉和陽士兹六賢者皆當世之令懿也其餘中流之士或舉之淹滯或顯之乎童齒莫不賴劭顧歎之榮凡所拔育顯成令徳者不可殫記其探擿偽行抑損虚名則周之單襄無以尚也劭宗人許栩沈沒榮利致位司徒舉宗莫不匍匐栩門承風而驅官以賄成惟劭不過其門廣陵徐孟本來臨汝南聞劭高名請為功曹饕餮放流潔士盈朝袁紹公族好名為濮陽長棄官來還有副車從騎將入郡界紹乃歎曰吾之輿服豈可使許子將見之乎遂單車而歸辟公府掾拜鄢陵令方正徵皆不就避亂江南所歴之國必翔而後集終於豫章時年四十六孟達薦王雄安定太守孟達薦雄曰臣聞明君以來賢為業忠臣以進善為効故易稱拔茅連茹傳曰舉爾所知臣不自量竊慕其義臣昔以人乏謬充備部職時涿郡太守王雄為西部從事與臣同寮雄天性良固果而有謀歴試三縣政成人和及任近職奉宣威恩懐柔有術清慎持法臣往年出使經過雄郡自説特受陛下拔擢之恩常勵節精心思投命為效言辭激揚情趣欵惻臣雖愚闇不識真偽以謂雄才兼資文武忠烈之性踰越倫輩今涿郡領户三千孤寡之家參居其半北有守兵藩衞之固誠不足舒雄智力展其勤幹也臣受恩深厚無以報國不勝慺慺淺見之情謹冒陳聞詔曰昔蕭何薦韓信鄧禹進呉漢惟賢知賢也雄有膽智技能文武之姿吾宿知之今便以參散騎之選方使少在吾門下知指歸便大用之矣天下之士欲使皆先歴散騎然後出據州郡是吾本意也張既稱毋丘興表雍州刺史張既表曰河右遐逺喪亂彌久武威當諸郡路通喉轄之要加民夷雜處數有兵難領太守毋丘興到官内撫吏民外懷羌胡卒使柔附為官效用黄華張進初圖逆亂煽動左右興志氣忠烈臨難不顧為將校民夷陳説禍福言則涕泣於時男女萬口咸懷感激形毁髪亂誓心致命尋率精兵踧脅張掖濟拔領太守杜通西海太守張睦張掖番和驪靬二縣吏民及郡雜胡棄惡諸興興皆安恤使盡力田興每所歴盡竭心力誠國之良吏殿下即位留心萬機苟有毫毛之善必有賞録臣伏緣聖旨指陳其事趙孔曜薦管輅安平趙孔曜薦管輅於冀州刺史裴徽曰輅雅性寛大與世無忌仰觀天文則同妙甘公石申俯覽周易則齊思季主今明使君方垂神幽藪留精九臯輅宜蒙隂和之應得及羽儀之時徽於是辟為文學從事三國志文類巻二十九
