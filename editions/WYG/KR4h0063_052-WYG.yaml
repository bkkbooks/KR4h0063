body:
  text: 三國志文類巻五十二評蜀陳壽評先主評曰先主之宏毅寛厚知人待士蓋有高祖之風英雄之器焉及其舉國託孤於諸葛亮而心神無貳誠君臣之至公古今之盛軌也機權幹略不逮魏武是以基宇亦狹然折而不撓終不為下者抑揆彼之量必不容已非唯競利且以避害云爾又評後主評曰後主任賢相則為循理之君惑閹豎則為昏闇之后傳曰素絲無常唯所染之信矣哉禮國君繼體踰年改元而章武之三年則革稱建興考之古義體理為違又國不置史注記無官是以行事多遺災異靡書諸葛亮雖達於為政凡此之類猶有未周焉然經載十二而年名不易軍旅屢興而赦不妄下不亦卓乎自亮没後茲制漸虧優劣著矣又評諸葛亮評曰諸葛亮之為相國也撫百姓示儀軌約官職從權制開誠心布公道盡忠益時者雖讐必賞犯法怠慢者雖親必罰服罪輸情者雖重必釋游辭巧飾者雖輕必戮善無微而不賞惡無纎而不貶庶事精練物理其本循名責實虛偽不齒終於邦域之内咸畏而愛之刑政雖峻而無怨者以其用心平而勸戒明也可謂識治之良才管蕭之亞匹矣然連年動衆未能成功蓋應變將略非其所長歟又評闗張馬黄趙評曰闗羽張飛皆稱萬人之敵為世虎臣羽報效曹公飛義釋嚴顔並有國士之風然羽剛而自矜飛暴而無恩以短取敗理數之常也馬超阻戎負勇以覆其族惜哉能因窮致泰不猶愈乎黄忠趙雲彊摯壯猛並作爪牙其灌滕之徒歟又評龐統法正評曰龐統雅好人流經學思謀于時荆楚謂之高俊法正著見成敗有奇畫䇿算然不以德素稱也儗之魏臣統其荀彧之仲叔正其程郭之儔儷邪又評許靖糜竺孫乾簡雍伊籍秦宓評曰許靖夙有名譽既以篤厚為稱又以人物為意雖行事舉動未悉允當蒋濟以為大較廊廟器也糜竺孫乾簡雍伊籍皆雍容風議見禮於世秦宓始慕肥遯之高而無若愚之實然專對有餘文藻壯美可謂一時之才士矣又評董劉馬秦董吕評曰董和蹈羔羊之素劉巴履清尚之節馬良貞實稱為令士陳震忠恪老而益篤董允匡主義形於色皆蜀臣之良矣吕乂臨郡則埀稱處朝則被損亦黄薛之流亞矣陳壽評劉封彭羕廖立李嚴劉琰魏延楊儀評曰劉封處嫌疑之地而思防不足以自衛彭羕廖立以才拔進李嚴以幹局達魏延以勇略任楊儀以當官顯劉琰舊仕並咸貴重覽其舉措迹其規矩招禍取咎無不自已也又評霍峻王連向朗張裔楊洪費詩評曰霍峻孤城不傾王連固節不移向朗好學不倦張裔膚敏應機楊洪乃心忠公費詩率意而言皆有可紀焉以先主之廣濟諸葛之準繩詩吐直言猶用陵遲况庸后乎哉又評杜微周羣杜瓊許慈孟光來敏尹黙李譔譙周郤正評曰杜微脩身隱静不役當世庶㡬夷皓之㮣周羣占天有徴杜瓊沈黙愼宻諸生之純也許孟來李博涉多聞尹黙精於左氏雖不以德業為稱信皆一時之學士譙周辭理淵通為世碩儒有董楊之規郤正文辭粲爛有張蔡之風加其行止君子有取焉二子處晉事少在蜀亊多故著于篇又評黃權李恢吕凱馬忠王平張嶷評曰黄權宏雅思量李恢公亮志業吕凱守節不回馬忠擾而能毅王平忠勇而嚴整張嶷誠斷明果咸以所長顯名發迹遇其時也又評蔣琬費禕姜維評曰蔣琬方正有威重費禕寛濟而博愛咸承諸葛之成規因循而不革是以邉境無虞邦家和一然猶未盡治小之宜居静之理也姜維粗有文武志立功名而翫衆黷旅明斷不周終致隕斃老子有云治大國者猶烹小鮮况於區區蕞爾而可屢擾乎哉又評鄧芝張翼宗預楊戲評曰鄧芝堅貞簡亮臨官忘家張翼亢姜維之銳宗預禦孫權之嚴咸有可稱楊戲商略意在不羣然智度有短殆罹世難云楊戲贊季漢君臣皇宗遺植爰流八方别自中山靈精是鍾順期挺生傑起龍驤始于燕代伯豫君荆吳越憑頼望風請盟挾巴跨蜀庸漢以并乾坤復秩宗祀惟寧躡基履迹播德芳聲華夏思美西伯其音開慶來世厯載攸興右贊昭烈皇帝忠武英高獻策江濱攀吳連蜀權我世真受遺阿衡整武齊文敷陳德教理物移風賢愚競心僉忘其身誕静邦内四裔以綏屢臨敵庭實耀其威研精大國恨於未夷右贊諸葛丞相司徒清風是咨是臧識愛人倫孔音鏘鏘右贊許司徒關張﨣﨣出身匡世扶翼㩦上雄壯虎烈藩屏左右飜飛電發濟于艱難贊主洪業侔迹韓耿齊聲雙德交代無禮並致姦慝悼惟輕慮隕身匡國右贊關雲長張益德驃騎奮起連橫合從首事三秦保據河潼宗計於朝或異或同敵以乘釁家破軍亡乖道反德託鳳攀龍右贊馬孟起翼侯良謀料世興衰委質于主是訓是諮暫思經算覩事知機右贊法孝直軍師美至雅氣暐曄致命明主忠情發臆惟此義宗亡身報德右贊龐士元將軍敦壯摧鋒登難立功立事于時之幹右贊黃漢升孫盛降魏評春秋之義國君死社稷卿大夫死位况稱天子而可辱於人乎周謂萬乘之君偷生苟免亡禮希利要冀微榮惑矣且以事勢言之理有未盡何者禪雖庸主實無桀紂之酷戰雖屢北未有土崩之亂縱不能君臣固守背城借一自可退次東鄙以思後圖是時羅憲以重兵據白帝霍弋以彊卒鎮夜郎蜀土險狹山水峻隔絶巚激湍非步卒所涉若悉收舟檝保據江州徴兵南中乞師東國如此則姜廖五將自然雲從呉之三師承命電赴何投寄之無所而慮於必亡耶魏師之來褰國大舉欲追則舟檝靡資欲留則師老多虞且屈申有㑹情勢代起徐因思奮之民以攻驕惰之卒此越王所以敗闔閭田單所以摧騎劫者也何為怱怱遽自囚虜下堅壁於敵人致斫石之至恨哉葛生有云事之不濟則已耳安能復為之下壯哉忠武所言可以立懦夫之志矣觀古燕齊荆越之敗或國覆主滅或魚縣鳥竄終能建功立事康復社稷豈曰天助抑亦人謀也向使懷苟存之計納譙周之言何邦基之能搆令名之可獲哉禪既闇主周實駑臣方之申胥田單范蠡大夫種不亦逺乎三國志文類巻五十二
