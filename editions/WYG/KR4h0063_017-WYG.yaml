body:
  text: 三國志文類巻十七書疏魏雍丘王曹植朝京都疏植與諸侯並就國黄初二年監國謁者灌均希指奏植醉酒悖慢刧脅使者有司請治罪帝以太后故貶爵安郷侯其年改封鄄城侯三年立為鄄城王邑二千五百戸四年徙封雍丘王其年朝京都上疏曰臣自抱釁歸藩刻肌刻骨追思罪戾晝分而食夜分而寢誠以天網不可重離聖恩難可再恃竊感相䑕之篇無禮遄死之義形影相弔五情愧赧以罪棄生則違古賢夕改之勸忍活苟全則犯詩人胡顔之譏伏惟陛下徳象天地恩隆父母施暢春風澤如時雨是以不别荆棘者慶雲之惠也七子均養者尸鳩之仁也舍罪責功者明君之舉也矜愚愛能者慈父之恩也是以愚臣徘徊於恩澤而不能自棄者也前奉詔書臣等絶朝心離志絶自分黄耉無復執珪之望不圖聖詔猥垂齒召至止之日馳心輦轂僻處西館未奉闕廷踊躍之懐瞻望反仄謹拜表獻詩二篇其辭曰於穆顯考時惟武皇受命于天寜濟四方朱旗所拂九土披攘𤣥化滂流荒服來王超商越周與唐比蹤篤生我皇奕世載聰武則肅烈文則時雍受禪炎漢臨君萬邦萬邦既化率由舊則廣命懿親以藩王國帝曰爾侯君兹青土奄有海濱方周于魯車服有輝旗章有叙濟濟雋乂我弼我輔伊予小子恃寵驕盈舉挂時網動亂國經作藩作屏先軌是墮傲我皇使犯我朝儀國有典刑我削我絀將寘於理元兇是率明明天子時篤同類不忍我刑暴之朝肆違彼執憲哀予小子改封兖邑于河之濱股肱弗置有君無臣荒淫之闕誰弼予身㷀㷀僕夫子彼冀方嗟予小子乃罹斯殃赫赫天子恩不遺物冠我𤣥冕要我朱紱朱紱光大使我榮華剖符授玉王爵是加仰齒金璽俯執聖䇿皇恩過隆祗承怵惕咨我小子頑凶是嬰逝慚陵墓存愧闕廷匪敢慠徳寔恩是恃威靈改加足以沒齒昊天罔極性命不圖常懼顛沛抱罪黄壚願䝉矢石建旗東嶽庶立毫釐微功自贖危軀授命知足免戾甘赴江湘奮戈吳越天啟其衷得㑹京畿遲奉聖顔如渴如饑心之云慕愴矣其悲天髙聽卑皇肯照微又曰肅承明詔應㑹皇都星陳夙駕秣馬脂車命彼掌徒肅我征旅朝發鸞臺夕宿蘭渚芒芒原隰祁祁士女經彼公田樂我稷黍爰有樛木重隂匪息雖有餱糧饑不遑食望城不過面邑匪游僕夫警䇿平路是由𤣥駟藹藹揚鑣㵱沫流風翼衡輕雲承盖涉澗之濱縁山之隈遵彼河滸黄阪是階西濟關谷或降或升騑驂倦路再寢再興將朝聖皇匪敢晏寜弭節長騖指日遄征前驅舉燧後乘抗旌輪不輟運鸞無廢聲爰暨帝室税此西墉嘉詔未賜朝覲莫從仰瞻城閾俯惟闕廷長懐永慕憂心如酲帝嘉其辭義優詔答勉之又求自試疏六年帝東征還過雍丘幸植宫增户五百太和元年徙封浚儀二年復還雍丘植常自憤怨抱利器而無所施上疏求自試曰臣聞士之生世入則事父出則事君事父尚於榮親事君貴於興國故慈父不能愛無益之子仁君不能畜無用之臣夫論徳而授官者成功之君也量能而受爵者畢命之臣也故君無虛授臣無虛受虛授謂之謬舉虛受謂之尸禄詩之素餐所由作也昔二虢不辭兩國之任其徳厚也旦奭不讓燕魯之封其功大也今臣䝉國重恩三世于今矣正值陛下升平之際沐浴聖澤濳潤徳教可謂厚幸矣而竊位東藩爵在上列身被輕煖口厭百味目極華靡耳倦絲竹者爵重禄厚之所致也退念古之授爵禄者有異於此皆以功勤濟國輔主惠民今臣無徳可述無功可紀若此終年無益國朝將挂風人彼已之譏是以上慙𤣥冕俯愧朱紱方今天下一統九州晏如而顧西有違命之蜀東有不臣之吳使邊境未得脱甲謀士未得髙枕者誠欲混同宇内以致太和也故啟滅有扈而夏功昭成克商奄而周徳著今陛下以聖明統世將欲卒文武之功繼成康之隆簡賢授能以方叔召虎之臣鎮御四境為國爪牙者可謂當矣然而髙鳥未挂於輕繳淵魚未縣於鈎餌者恐釣射之術或未盡也昔耿弇不俟光武亟擊張步言不以賊遺於君父故車右伏劒於鳴轂雍門刎首於齊境若此二士豈惡生而尚死哉誠忿其慢主而陵君也夫君之寵臣欲以除患興利臣之事君必以殺身靖亂以功報主也昔賈誼弱冠求試屬國請繫單于之頸而制其命終軍以妙年使越欲得長纓纓其王羈致北闕此二臣豈好為誇主而燿世哉志或鬱結欲逞其才力輸能於明君也昔漢武為霍去病治第辭曰匃奴未滅臣無以家為固夫憂國忘家捐軀濟難忠臣之志也今臣居外非不厚也而寢不安席食不遑味者伏以二方未克為念伏見先武皇帝武臣宿將年耆即世者有聞矣雖賢不乏世宿將舊卒猶習戰陣竊不自量志在効命庶立毛髮之功以報所受之恩若使陛下出不世之詔効臣錐刀之用使得西屬大將軍當一校之隊若東屬大司馬統偏舟之任必乘危蹈險騁舟奮驪突刃觸鋒為士卒先雖未能禽權馘亮庶將虜其雄率殱其醜類必效須臾之捷以滅終身之愧使名挂史筆事列朝䇿雖身分蜀境首縣吳闕猶生之年也如微才弗試沒世無聞徒榮其軀而豐其體生無益於事死無損於數虛荷上位而忝重禄禽息鳥視終於白首此徒圏牢之養物非臣之所志也流聞東軍失備師徒小衂輟食棄餐奮袂攘袵撫劒東顧而心已馳於吳㑹矣臣昔從先武皇帝南極赤岸東臨滄海西望玉門北出𤣥塞伏見所以行軍用兵之勢可謂神妙矣故兵者不可豫言臨難而制變者也志欲自效於明時立功於聖世每覽史籍觀古忠臣義士出一朝之命以狥國家之難身雖屠裂而功銘著於鼎鐘名稱垂於竹帛未嘗不拊心而歎息也臣聞明主使臣不廢有罪故奔北敗軍之將用秦魯以成其功絶纓盜馬之臣赦楚趙以濟其難臣竊感先帝早崩威王棄世臣獨何人以堪長乆常恐先朝露填溝壑墳土未乾而身名並滅臣聞騏驥長鳴則伯樂照其能盧狗悲號則韓國知其才是以效之齊楚之路以逞千里之任試之狡兎之捷以騐搏噬之用今臣志狗馬之微功竊自惟度終無伯樂韓國之舉是以於邑而竊自痛者也夫臨博而企竦聞樂而竊抃者或有賞音而識道也昔毛遂趙之陪𨽻猶假錐囊之喻以寤主立功何況巍巍大魏多士之朝而無慷慨死難之臣乎夫自衒自媒者士女之醜行也干時求進者道家之明忌也而臣敢陳聞於陛下者誠與國分形同氣憂患共之者也冀以塵霧之微補益山海熒燭末光增輝日月是以敢冒其醜而獻其忠又求存問親戚疏太和三年徙封東阿五年復上疏求存問親戚因致其意曰臣聞天稱其髙者以無不覆地稱其廣者以無不載日月稱其明者以無不照江海稱其大者以無不容故孔子曰大哉堯之為君惟天為大惟堯則之夫天徳之於萬物可謂𢎞廣矣盖堯之為教先親後疎自近及逺其傳曰克明峻徳以親九族九族既睦平章百姓及周之文王亦崇厥化其詩曰刑于寡妻至于兄弟以御于家邦是以雍雍穆穆風人詠之昔周公弔管蔡之不咸廣封懿親以藩屏王室傳曰周之宗盟異姓為後誠骨肉之恩爽而不離親親之義實在敦固未有義而後其君仁而遺其親者也伏惟陛下資帝唐欽明之徳體文王翼翼之仁惠洽椒房恩昭九族羣后百寮番休逓上執政不廢於公朝下情得展於私室親理之路通慶弔之情展誠可謂恕已治人推惠施恩者矣至於臣者人道絶緒禁錮明時臣竊自傷也不敢乃望交氣類修人事叙人倫近且婚媾不通兄弟乖絶吉凶之問塞慶弔之禮廢恩紀之違甚於路人隔閡之異殊於胡越今臣以一切之制永無朝覲之望至於注心皇極結情紫闥神明知之矣然天實為之謂之何哉退惟諸王常有戚戚具爾之心願陛下沛然垂詔使諸國慶問四節得展以叙骨肉之歡恩全怡怡之篤義妃妾之家膏沐之遺嵗得再通齊義於貴宗等惠於百司如此則古人之所歎風雅之所詠復存於聖世矣臣伏自維省無錐刀之用及觀陛下之所拔授若以臣為異姓竊自料度不後於朝士矣若得辭逺遊戴武弁解朱組佩青紱駙馬奉車趣得一號安宅京室執鞭珥筆出從華盖入侍輦轂承荅聖問拾遺左右乃臣丹誠之至願不離於夢想者也逺慕鹿鳴君臣之宴中詠常棣匪他之誡下思伐木友生之義終懐蓼莪罔極之哀每四節之㑹塊然獨處左右惟僕𨽻所對惟妻子高談無所與陳發義無所與展未嘗不聞樂而拊心臨觴而嘆息也臣伏以為犬馬之誠不能動人譬人之誠不能動天崩城隕霜臣初信之以臣心况徒虛語耳若葵藿之傾葉太陽雖不為之囘光然向之者誠也竊自比葵藿若降天地之施垂三光之明者實在陛下臣聞文子曰不為福始不為禍先今之否隔友于同憂而臣獨倡言者竊不願於聖世使有不䝉施之物有不䝉施之物必有慘毒之懐故柏舟有天只之怨谷風有棄予之歎故伊尹恥其君不為堯舜孟子曰不以舜之所以事堯事其君者不敬其君者也臣之愚蔽固非虞伊至於欲使陛下崇光被時雍之美宣緝熙章明之徳者是臣慺慺之誠竊所獨守實懐鶴立企佇之心敢復陳聞者冀陛下倘發天聰而垂神聽也詔報曰盖教化所由各有隆弊非皆善始而惡終也事使之然故夫忠厚仁及草木則行葦之詩作恩澤衰薄不親九族則角弓之章刺今令諸國兄弟情禮簡怠妃妾之家膏沐疏畧朕縱不能敦而睦之王援古喻義備悉矣何言精誠不足以感通哉夫明貴賤崇親親禮賢良順少長國之紀綱本無禁錮諸國通問之詔也矯枉過正下吏懼譴以至於此耳已敕有司如王所訴又求審舉之義疏臣聞天地恊氣而萬物生君臣合徳而庶政成五帝之世非皆智三季之末非皆愚用與不用知與不知也既時有舉賢之名而無得賢之實必各援其類而進矣諺曰相門有相將門有將夫相者文徳昭者也將者武功烈者也文徳昭則可以匡國朝致雍熙稷契䕫龍是也武功烈則可以征不庭威四夷南仲方叔是矣昔伊尹之為媵臣至賤也吕尚之處屠釣至陋也及其見舉於湯武周文誠道合志同𤣥謨神通豈復假近習之薦因左右之介哉書曰有不世之君必能用不世之臣用不世之臣必能立不世之功殷周二王是矣若夫齷齪近步遵常守故安足為陛下言哉故隂陽不和三光不暢官曠無人庶政不整者三司之責也疆場騷動方隅内侵沒軍喪衆干戈不息者邊將之憂也豈可虛荷國寵而不稱其任哉故任益隆者負益重位益高者責益深書稱無曠庶官詩有職思其憂此其義也陛下體天貞之淑聖登神機以繼統冀聞康哉之謌偃武行文之美而數年以來水旱不時民困衣食師徒之發嵗嵗增調加東有覆敗之軍西有殪沒之將至使蚌蛤浮翔於淮泗鼲鼬讙譁於林木臣每念之未嘗不輟食而揮餐臨觴而搤腕矣昔漢文發代疑朝有變宋昌曰内有朱虛東牟之親外有齊楚淮南琅邪此則磐石之宗願王勿疑臣伏惟陛下逺覽姬文二虢之援中慮周成召畢之輔下存宋昌磐石之固昔騏驥之於吳阪可謂困矣及其伯樂相之孫郵御之形體不勞而坐取千里盖伯樂善御馬明君善御臣伯樂馳千里明君致太平誠任賢使能之明效也若朝司惟良萬機内理武將行師方難克弭陛下可得雍容都城何事勞動鑾駕暴露於邊境哉臣聞羊質虎皮見草則悦見豺則戰忘其皮之虎也今置將不良有似於此故語曰患為之者不知知之者不得為也昔樂毅奔趙心不忘燕㢘頗在楚思為趙將臣生乎亂長乎軍又數承教于武皇帝伏見行師用兵之要不必取孫吳而闇與之合竊揆之於心常願得一奉朝覲排金門蹈玉陛列有職之臣賜須叟之問使臣得一散所懐攄舒藴積死不恨矣被鴻臚所下發士息書期㑹甚急又聞豹尾已建戎軒騖駕陛下將復勞玉躬擾挂神思臣誠竦息不遑寜處願得䇿馬執鞭首當塵露撮風后之竒接孫吳之要追慕卜商起予左右効命先驅畢命輪轂雖無大益冀有小補然天高聽逺情不上通徒獨望青雲而拊心仰高天而歎息耳屈平曰國有驥而不知乘焉皇皇而更索昔管蔡放誅周召作弼叔魚陷刑叔向匡國三監之釁臣自當之二南之輔求必不逺華宗貴族藩王之中必有應斯舉者故傳曰無周公之親不得行周公之事惟陛下少留意焉近者漢氏廣建藩王豐則連城數十約則饗食祖祭而已未若姬周之樹國五等之品制也若扶蘇之諫始皇淳于越之難周青臣可謂知時變矣夫能使天下傾耳注目者當權者是矣故謀能移主威能懾下豪右執政不在親戚權之所在雖疏必重勢之所去雖親必輕盖取齊者田族非吕宗也分晉者趙魏非姬姓也惟陛下察之苟吉專其位凶離其患者異姓之臣也欲國之安祈家之貴存共其榮沒同其禍者公族之臣也今反公族疏而異姓親臣竊惑焉臣聞孟子曰君子窮則獨善其身達則兼善天下今臣與陛下踐氷履炭登山浮澗寒温燥濕高下共之豈得離陛下哉不勝憤懣拜表陳情若有不合乞且藏之書府不便滅棄臣死之後事或可思若有毫釐少挂聖意者乞出之朝堂使夫博古之士糾臣表之不合義者如是則臣願足矣帝輒優文荅報三國志文類巻十七
