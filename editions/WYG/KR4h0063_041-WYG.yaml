body:
  text: 三國志文類巻四十一論呉陸機辨亡論言呉之所以亡其上篇曰昔漢氏失御姦臣竊命禍基京畿毒徧宇内皇綱弛紊王室遂卑於是羣雄蜂駭義兵四合呉武烈皇帝慷慨下國電發荆南權畧紛紜忠勇伯世威稜則夷羿震蕩兵交則醜虜授馘遂掃清宗枋蒸禋皇祖於時雲興之將帶州颷起之師跨邑哮􅗏之羣風驅熊羆之族霧集雖兵以義合同盟戮力然皆包藏禍心阻兵怙亂或師無謀律喪威稔冦忠規武節未有若此其著者也武烈既沒長沙桓王逸才命世弱冠秀發招擥遺老與之述業神兵東驅奮寡犯衆攻無堅城之將戰無交鋒之虜誅叛柔服而江外底定飭法脩師而威徳翕赫賔禮名賢而張昭為之雄交御豪俊而周瑜為之傑彼二君子皆宏敏而多竒雅達而聰哲故同方者以類附等契者以氣集而江東葢多士矣将北伐諸華誅鉏干紀旋皇與於夷庚反帝座于紫闥挾天子以令諸侯清天歩而歸舊物戎車既次羣凶側目大業未就中世而隕用集我大皇帝以竒蹤襲於逸軌叡心發乎令圖從政咨於故實播憲稽乎遺風而加之以篤固申之以節儉疇咨俊茂好謀善㫁束帛旅於丘園旌命交於塗巷故豪彦尋聲而響臻志士希光而影騖異人輻湊猛士如林於是張昭為師傅周瑜陸公魯肅吕䝉之儔入為腹心出作股肱甘寕凌統程普賀齊朱桓朱然之徒奮其威韓當潘璋黄葢蒋欽周泰之屬宣其力風雅則諸葛瑾張承歩隲以聲名光國政事則顧雍潘濬吕範吕岱以器任幹職竒偉則虞翻陸績張温張惇以諷議舉政奉使則趙咨沈珩以敏達延譽術數則呉範趙達以禨祥協徳董襲陳武殺身以衛主駱統劉基彊諌以補過謀無遺算舉不失策故遂割據山川跨制荆呉而與天下爭衡矣魏氏嘗藉戰勝之威率百萬之師浮鄧塞之舟下漢隂之衆羽楫萬計龍躍順流鋭騎千旅虎歩原隰謀臣盈室武將連衡喟然有吞江滸之志一宇宙之氣而周瑜驅我偏師黜之赤壁喪旗亂轍僅而獲免收迹逺遁漢王亦憑帝王之號率巴漢之民乗危騁變結壘千里志報闗羽之敗圖收湘西之地而我陸公亦挫之西陵覆師敗績困而後濟絶命永安續以濡須之冦臨川摧鋭蓬籠之戰孑輪不反由是二邦之將喪氣挫鋒勢衂財匱而呉完然坐乗其弊故魏人請好漢氏乞盟遂躋天號鼎峙而立西屠庸蜀之郊北裂淮漢之涘東苞百越之地南括羣蠻之表於是講八代之禮蒐三王之樂告類上帝拱揖羣后虎臣毅卒循江而守長㦸勁鎩望颷而奮庶尹盡規於上四民展業于下化協殊裔風衍遐圻乃俾一介行人撫廵外域巨象逸駿擾於外閑明珠瑋寶輝於内府珍瑰重跡而至竒玩應響而赴輶軒騁於南荒衝輣息於朔野齊民免干戈之患戎馬無晨服之虞而帝業固矣大皇既沒幼主蒞朝姦回肆虐景皇聿興䖍脩遺憲政無大闕守文之良主也降及歸命之初典刑未滅故老猶存大司馬陸公以文武熈朝左丞相陸凱以謇諤盡規而施績范慎以威重顯丁奉鍾離斐以武毅稱孟宗丁固之徒為公卿樓𤣥賀劭之屬掌機事元首雖病股肱猶良爰及末葉羣公既喪然後黔首有瓦解之志皇家有土崩之釁厯命應化而微王師躡運而發卒散於陣民奔於邑城池無藩籬之固山川無溝阜之勢非有工輸雲梯之械智伯灌激之害楚子築室之圍燕人濟西之隊軍未浹辰而社稷夷矣雖忠臣孤憤烈士死節将奚救哉夫曹劉之将非一世之選向時之師無曩日之衆戰守之道抑有前符險阻之利俄然未改而成敗貿理古今詭趣何哉彼此之化殊授任之才異也下篇昔三方之王也魏人據中夏漢氏有岷益呉制荆揚而有交廣曹氏雖功濟諸華虐亦深矣其民怨矣劉公因險飾智功已薄矣其俗陋矣呉桓王基之以武太祖成之以徳聰明睿達懿度深逺矣其求賢如不及恤民如稚子接士盡盛徳之容親仁罄丹府之愛㧞吕蒙於戎行識潘濬於係虜推誠信士不恤人之我欺量能授器不患權之我逼執鞭鞠躬以重陸公之威悉委武衛以濟周瑜之師卑宫菲食以豐功臣之賞披懷虚已以納謨士之筭故魯肅一面而自託士燮䝉險而效命髙張公之徳而省㳺田之娯賢諸葛之言而割情欲之歡感陸公之規而除政刑之煩竒劉基之議而作三爵之誓屏氣跼蹐以伺子明之疾分滋損甘以育凌統之孤登壇慷慨歸魯肅之功削投惡言信子瑜之節是以忠臣競盡其謀志士咸得肆力洪規逺畧固不厭夫區區者也故百官苟合庶務未遑初都建業羣臣請備禮秩天子辭而不許曰天下其謂朕何宫室輿服葢慊如也爰及中葉天人之分既定百度之缺粗修雖醲化懿綱未齒乎上代抑其體國經民之具亦足以為政矣地方幾萬里帶甲将百萬其野沃其民練其財豐其器利東負滄海西阻險塞長江制其區宇峻山帶其封域國家之利未見有𢎞於茲者矣借使中才守之以道善人御之有術敦率遺憲勤民謹政循定策守常險則可以長世永年未有危亡之患或曰呉蜀唇齒之國蜀滅則呉亡理則然矣夫蜀葢藩援之與國而非呉人之存亡也何則其郊境之接重山積險陸無長轂之徑川阨流迅水有驚波之艱雖有鋭師百萬啓行不過千夫舳艫千里前驅不過百艦故劉氏之伐陸公喻之長虵其勢然也昔蜀之初亡朝臣異謀或欲積石以險其流或欲機械以御其變天子總羣議而諮之大司馬陸公陸公以四瀆天地之所以節宣其氣固無可遏之理而機械則彼我之所共彼若棄長技以就所屈即荆揚而爭舟檝之用是天贊我也将謹守峽口以待禽耳逮歩闡之亂慿保城以延彊冦重資幣以誘羣蠻于時大邦之衆雲翔電發縣旌江介築壘遵渚襟帶要害以止呉人之西而巴漢舟師㳂江東下陸公以偏師三萬北據東坑深溝髙壘案甲養威反虜踠跡待戮而不敢北闞生路彊冦敗績宵遁喪師太半分命鋭師五千西禦水軍東西同捷獻俘萬計信哉賢人之謀豈欺我哉自是烽燧罕警封域寡虞陸公沒而潛謀兆呉釁深而六師駭夫太康之役衆未盛乎曩日之師廣州之亂禍有愈乎向時之難而邦家顛覆宗廟為墟嗚呼人之云亡邦國殄悴不其然與易曰湯武革命順乎天𤣥曰亂不極則治不形言帝王之因天時也古人有言曰天時不如地利易曰王侯設險以守其國言為國之恃險也又曰地利不如人和在徳不在險言守險之由人也呉之興也參而由焉孫卿所謂合其參者也及其亡也恃險而已又孫卿所謂舍其參者也夫四州之氓非無衆也大江之南非乏俊也山川之險易守也勁利之器易用也先政之業易循也功不興而禍遘者何哉所以用之者失也故先王達經國之長規審存亡之至數恭已以安百姓敦惠以致人和寛沖以誘俊乂之謀慈和以結士民之愛是以其安也則黎元與之同慶及其危也則兆庶與之共患安與衆同慶則其危不可得也危與下共患則其難不足䘏也夫然故能保其社稷而固其土宇麥秀無悲殷之思黍離無愍周之感矣張昭名諱論時汝南主簿應劭議宜為舊君諱論者皆互有異同事在風俗通昭著論曰客有見大國之議士君子之論云起元建武已來舊君名諱五十六人以為後生不得協也取乎經論譬諸行事義髙辭麗甚可嘉羨愚意褊淺竊有疑焉葢乾坤剖分萬物定形肇有父子君臣之經故聖人順天之性制禮尚敬在三之義君實食之在喪之哀君親臨之厚莫重焉恩莫大焉誠臣子所尊仰萬夫所天恃焉得而同之哉然親親有衰尊尊有殺故禮服上不盡髙祖下不盡𤣥孫又傳記四世而緦麻服之窮也五世袒免降殺同姓也六世而親屬竭矣又曲禮有不逮事之義則不諱不諱者葢名之謂屬絶之義不拘於協况乃古君五十六哉邾子㑹盟季友來歸不稱其名咸書字者是時魯人嘉之也何解臣子為君父諱乎周穆王諱滿至定王時有王孫滿者其為大夫是臣協君也又厲王諱胡及荘王之子名胡其比衆多夫類事建議經有明據傳有徴案然後進攻退守萬無奔北垂示百世永無咎失今應劭雖上尊舊君之名而下無所㫁齊猶歸之疑云曲禮之篇疑事無質觀省上下闕義自證文辭可為倡而不法将來何觀言聲一放猶拾瀋也過辭在前悔其何追三國志文類巻四十一
