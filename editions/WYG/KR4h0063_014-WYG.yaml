body:
  text: 三國志文類巻十四書疏魏管寜辭爵書字幼安時以寜為太中大夫寜上書以疾辭不受臣聞傅説發夢以感殷宗吕尚啓兆以動周文以通神之才悟於聖主用能匡佐帝業克成大勲臣之器朽實非其人雖貪清時釋體蟬蜕内省頑病日薄西山唯陛下聽野人山藪之願使一老者得盡㣲命管寜荅禮遣疏臣海濵孤㣲罷農无伍禄運幸厚横䝉陛下纂承洪緒徳侔三皇化溢有唐乆荷渥澤積祀一紀不能仰荅陛下恩養之福沈委篤痾寢疾彌留逋違臣𨽻顛倒之節夙宵戰怖無地自厝臣元年十一月被公車司馬令所下州郡八月甲申詔書徵臣更賜安車衣被茵蓐以禮發遣光寵並臻優命屢至怔營悚息悼心失圖思自陳聞申展愚情而明詔抑割不令稍修章表是以欝滯迄于今日誠謂乾覆恩有紀極不意靈潤彌以隆赫奉今年二月被州郡所下三年十二月辛酉詔書重賜安車衣服别駕從事與郡功曹以禮發遣又特被璽書以臣為光禄勲躬秉勞謙引喻周秦損上益下受詔之日精魄飛散靡所投死臣重自省揆徳非園綺而䝉安車之榮功無竇融而䝉璽封之寵楶梲駑下荷棟梁之任垂沒之命獲九棘之位懼有朱愽鼔妖之眚又年疾日侵有加無損不任扶輿進路以塞元責望慕閶闔徘徊闕庭謹拜章陳情乞䝉哀省抑恩聽放無令骸骨填於衢路崔琰諫獵書字季珪傅文帝於鄴世子仍出獵變易服乘志在驅逐琰上書諌盖聞盤于游田書之所戒魯隠觀漁春秋譏之此周孔之格言二經之明義殷鑒夏后詩稱不逺子卯不樂禮以為忌此又近者之得失不可不深察也袁族富強公子寛放盤游滋侈義聲不聞哲人君子俄有色斯之志熊羆壯士墮於吞噬之用故所以擁徒百萬跨有河朔無所容足也今邦國殄瘁惠康未洽士女企踵所思者徳况公親御戎馬上下勞慘世子宜遵大路慎以行正思經國之高略内鑒近戒外揚逺節深惟儲副以身為寳而猥襲虞旅之賤服忽馳騖而陵險志雉兔之小娛忘社稷之為重斯誠有識所以惻心也唯世子燔翳捐褶以塞衆望不令老臣獲罪於天世子報曰昨奉嘉命惠示雅疏欲使燔翳捐褶翳巳壊矣褶亦去焉後有此比蒙福誨諸鮑勛諫獵疏字叔業文帝將出游獵勛停車上疏臣聞五帝三王靡不明本立教以孝治天下陛下仁聖惻隠有同古烈臣冀當繼蹤前代令萬世可則也如何在諒闇之中修馳騁之事乎臣冒死以聞唯陛下察焉帝手毁其表而竟行獵中道頓息問侍臣曰獵之為樂何如八音也侍中劉曄對曰獵勝於樂勛抗辭曰夫樂上通神明下和人理隆治致化萬邦咸乂故移風易俗莫善於樂况獵暴華盖於原野傷生育之至理櫛風沐雨不以時隙哉昔魯隠觀漁於棠春秋譏之雖陛下以為務愚臣所不願也因奏劉曄佞諛不忠阿順陛下過戲之言昔梁丘據取媚於遄臺曄之謂也請有司議罪以清皇朝帝怒作色罷還即出勛為右中郎將鍾繇復肉刑疏大魏受命繼蹤虞夏孝文革法不合古道先帝聖徳固天所縱墳典之業一以貫之是以繼世仍發明詔思復古刑為一代法連有軍事遂未施行陛下逺追二祖遺意借斬趾可以禁惡惜入死之無辜使明習律令與羣臣共議出本當右趾而入大辟者復行此刑書云皇帝清問下民鰥寡有辭于苗此言堯當除蚩尤有苗之刑先審問於下民之有辭者也若今蔽獄之時訊問三槐九棘羣吏萬民使如孝景之令其棄市欲斬右趾者許之其黥劓左趾宫刑者自如孝文易髠笞能有姦者率年二十至四五十雖斬其足猶任生育今天下人少於孝文之世下計所全嵗三千人張倉除肉刑所殺嵗以萬計臣欲復肉刑嵗生三千人子貢問能濟民可謂仁乎孔子曰何事於仁必也聖乎堯舜其猶病諸又曰仁逺乎哉我欲仁斯仁至矣若誠行之斯民永濟華歆征蜀疏太和中遣曹真從子午道伐蜀車駕東幸許昌歆上此疏兵亂以來過踰二紀大魏承天受命陛下以聖徳當成康之隆宜𢎞一代之治紹三王之迹雖有二賊負險延命苟聖化日躋逺人懐徳將襁負而至夫兵不得已而用之故戢而時動臣誠願陛下先留心於治道以征伐為後事且千里運糧非用兵之利越險深入無獨克之功如聞今年徵役頗失農桑之業為國者以民為基民以衣食為本使中國無飢寒之患百姓無離土之心則天下幸甚二賊之釁可坐而待也臣備位宰相老病日篤犬馬之命將盡恐不復奉望鑾盖不敢不竭臣子之懐惟陛下裁察帝報曰君深慮國計朕甚嘉之賊慿恃山川二祖勞於前世猶不克平朕豈敢自多謂必滅之哉諸將以為不一探取無由自弊是以觀兵以闚其釁若天時未至周武還師乃前事之鑒朕敬不忘所戒時秋大雨詔真引軍還王朗諫獵疏時帝頻出游獵或昏夜還宫朗上疏諫夫帝王之居外則飾周衛内則重禁門將行則設兵而後出幄稱警而後踐墀張弧而後登輿清道而後奉引遮列而後轉轂靜室而後息駕皆所以顯至尊務戒慎垂法教也近日車駕出臨捕虎日昃而行及昏而反違警蹕之常法非萬乘之至慎也帝報曰覽表雖魏絳稱虞箴以諷晉悼相如陳猛獸以戒漢武未足以喻方今二冦未殄將帥逺征故時入原野以習戎備至於夜還之戒已詔有司施行又諫東征疏時大興屯田欲舉軍東征朗上此疏諫昔南越守善嬰齊入侍遂為冡嗣還君其國康居驕黠情不副辭都護奏議以為宜遣侍子以黜無禮且吳濞之禍萌於子入隗囂之叛亦不顧子徃者聞權有遣子之言而未至今六軍戒嚴臣恐輿人未暢聖㫖當謂國家愠於登之逋留是以為之興師設師行而登乃至則為所動者至大所致者至細猶未足以為慶設其傲很殊無入志懼彼輿論之未暢者並懐伊邑臣愚以為宜敕别征諸將各明奉禁令以慎守所部外曜烈威内廣耕稼使泊然若山澹然若淵勢不可動計不可測是時帝以成軍遂行權子不至車駕臨江而還又言修營宫室疏明帝即位朗見百姓或有不足是時方營宫室朗遂上疏諫曰陛下即位已來恩詔屢布百姓萬民莫不欣欣臣頃奉使北行徃返道路聞衆徭役其可得蠲除省減者甚多願陛下重留日昃之聽以計制冦昔大禹將欲拯天下之大患故乃先卑其宫室儉其衣食用能盡有九州弼成五服句踐欲廣其禦兒之疆馘夫差於姑蘇故亦約其身以及家儉其家以施國用能囊括五湖席捲三江取威中國定霸華夏漢之文景亦欲恢𢎞祖業增崇洪緒故能割意於百金之臺昭儉於弋綈之服内減太官而不受貢獻外省徭賦而務農桑用能號稱昇平幾致刑錯孝武之所以能奮其軍勢拓其外境誠因祖考畜積素足故能遂成大功霍去病中才之將猶以匃奴未滅不治第宅明䘏逺者略近事外者簡内自漢之初及其中興皆於金革略寢之後然後鳯闕猥閌徳陽並起今當建始之前足用列朝㑹崇華之後足用序内官華林天淵足用展游宴若且先成閶闔之象魏使足用列逺人之朝貢者修城池使足用絶踰越成國險其餘一切且須豐年一以勤耕農為務習戎備為事則國無怨曠户口滋息民充兵彊而冦戎不賔緝熙不作未之有也又言屢失皇子疏時屢失皇子而後宫就館者少朗上疏曰昔周文十五而有武王遂享十子之祚以廣諸姬之𦙍武王既老而生成王成王是以鮮於兄弟此二王者各樹聖徳無以相過比其孫子之祚則不相如盖生育有早晚所産有衆寡也陛下既徳祚兼彼二聖春秋高於姬文育武之時矣而子發未舉於椒蘭之奥房藩王未繁於掖庭之衆室以成王為喻雖未為晚取譬伯邑則不為夙周禮六宫内官百二十人而諸經常説咸以十二為限至於秦漢之末或以千為數矣然雖彌猥而就時於吉館者或甚鮮明百斯男之本誠在於一意不但在於務廣也老臣慺慺願國家同祚於軒轅之五五而未及周文之二五用為伊邑且少小常苦被褥泰温泰温則不能便柔膚弱體是以難可防護而易用感慨若常令少小之緼袍不至於甚厚則必咸保金石之性而比夀於南山矣帝報曰夫忠至者辭篤愛重者言深君既勞思慮又手筆將順三復徳音欣然無量朕繼嗣未立以為君憂欽納至言思聞良規三國志文類巻十四
