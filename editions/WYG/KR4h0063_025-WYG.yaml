body:
  text: 三國志文類巻二十五書疏呉韋曜獄中上書孫皓於酒後使侍臣難折公卿以嘲弄侵克發擿私短以為歡時有愆過或誤犯皓諱輒見收縛至於誅戮曜以為外相毀傷内長尤恨使不濟濟非佳事也故但示難問經義言論而已皓以為不承用詔命意不忠藎遂積前後嫌忿收曜付獄是歲鳯皇二年也曜因獄吏上辭曰囚荷恩見哀無與為比曾無芒㲠有以上報孤辱恩寵自陷極罪念當灰滅長棄黄泉愚情慺慺竊有所懐貪令上聞囚昔見世間有古歴注其所紀載既多虛無在書籍者亦復錯謬囚尋按傳記考合異同采摭耳目所及以作洞紀起自庖犧至於秦漢凡為三巻當起黄武以來別作一巻事尚未成又見劉熙所作釋名信多佳者然物類衆多難得詳究故時有得失而爵位之亊又有非是愚以官爵今之所急不宜乖誤囚自忘至微又作官職訓及辯釋名各一巻欲表上之新冩始畢㑹以無狀幽囚待命泯沒之日恨不上聞謹以先死列狀乞上言秘府於外料取呈内以聞追懼淺蔽不合天聽抱怖雀息乞垂哀省曜冀以此求免而皓更怪其書之垢故又以詰曜曜對曰囚撰此書實欲表上懼有誤謬數數省讀不覺㸃汚被問寒戰形氣呐吃謹追辭叩頭五百下兩手自搏而華覈連上疏救曜華覈救韋曜疏曜運值千載特䝉哀識以其儒學得與史官貂蟬内侍承答大問聖朝仁篤慎終追逺迎神之際垂涕勅曜曜愚惑不達不能敷宣陛下大舜之美而拘繫史官使聖趣不敘至行不彰實曜愚蔽當死之罪然臣慺慺見曜少勤學雖老不倦探綜墳典溫故知新及意所經識古今行事外吏之中少過曜者昔李陵為漢將軍敗不還而降匈奴司馬遷不加疾惡為陵遊説漢武帝以遷有良史之才欲使畢成所撰忍不加誅書卒成立垂之無窮今曜在呉亦漢之史遷也伏見前後符瑞彰著神指天應繼出累見一統之期庶不復久事平之後當觀時設制三王不相因禮五帝不相沿樂質文殊塗損益異體宜得曜輩依準古義有所改立漢氏承秦則有叔孫通定一代之儀曜之才學亦漢通之次也又呉書雖已有頭角敘贊未述昔班固作漢書文辭典雅後劉珍劉毅等作漢記逺不及固叙傳尤劣今呉書當垂千載編次諸史後之才士論次善惡非得良才如曜者實不可使闕不朽之書如臣頑蔽誠非其人曜年已七十餘數無幾乞赦其一等之罪為終身徒使成書業永足傳示垂之百世謹通進表叩頭百下皓不許遂誅曜又乞赦樓𤣥疏樓𤣥從九卿持刀侍衞正身率衆奉法而行應對切直數忤皓意漸見責怒後人誣白𤣥與賀卲相逢駐共耳語大笑謗訕政事遂被詔詰責送付廣州東觀令華覈上疏曰臣竊以治國之體其猶治家主田野者皆宜良信又宜得一人總其條目為作維綱衆事乃理論語曰無為而治者其舜也與恭已正南面而已言所任得其人故優游而自逸也今海内未定天下多事事無大小皆當關聞動經御坐勞損聖慮陛下既垂意博古綜極藝文加勤心好道隨節致氣宜得閒靜以展神思呼翕清淳與天同極臣夙夜思惟諸吏之中任幹之事足委仗者無勝於樓𤣥𤣥清忠奉公冠冕當時衆服其操無與爭先夫清者則心平而意直忠者惟正道而履之𤣥之性終始可保乞陛下赦𤣥前愆使得自新擢之宰司責其後效使為官擇人隨才授任則舜之恭已近亦可得又上世俗滋侈疏時倉廪無儲世俗滋侈上此疏今冦虜充斥征伐未己居無積年之儲出無應敵之蓄此乃有國者所宜深憂也夫財穀所生當出於民趨時務農國之上急而都下諸官所掌別異各自下調不計民力輒與近期長吏畏罪晝夜催民委舎佃事遑赴㑹日定送到都或蘊積不用而徒使百姓消力失時到秋收月督其限入奪其播殖之時而責其今年之税如有逋懸則籍沒財物故家户貧困衣食不足宜暫息衆役專心農桑古人稱一夫不耕或受其饑一女不織或受其寒是以先王治國惟農是務軍興以來已向百載農人廢南畝之務女工停機杼之業推此揆之則蔬食而長饑薄衣而履氷者固不少矣臣聞主之所求於民者二民之所望於主者三二謂求其為已勞也求其為己死也三謂饑者能食之勞者能息之有功者能賞之民已致其二事而主失其三望者則怨心生而功不建今帑藏不實民勞役猥主之二求已備民之三望未報且饑者不待美饌而後飽寒者不俟狐貉而後溫為味者口之奇文繡者身之飾也今事多而役繁民貧而俗奢百工作無用之器婦人為綺麗之飾不勤麻枲並繡文黼黻轉相倣效恥獨無有兵民之家猶復逐俗内無儋石之儲而出有綾綺之服至於富賈商販之家重以金銀奢恣尤甚天下未平百姓不贍宜一生民之原豐穀帛之業而棄功於浮華之巧妨日於侈靡之事上無尊卑等級之差下有耗財費力之損今吏士之家少無子女多者三四少者一二通令户有一女十萬家則十萬人人織績一嵗一束則十萬束矣使四疆之内同心戮力數年之間布帛必積恣民五色惟所服用但禁綺繡無益之飾且美貌者不待華采以崇好艷姿者不待文綺以致愛五采之飾足以麗矣若極粉黛窮盛服未必無醜婦廢華采去文繡未必無美人也若實如論有之無益廢之無損者何愛而不暫禁以充府藏之急乎此救乏之上務富國之本業也使管晏復生無以易此漢之文景承平繼統天下已定四方無虞猶以雕文之傷農事錦繡之害女工開富國之利杜饑寒之本况今六合分乖豺狼充路兵不離疆甲不解帶而可以不廣生財之原充府庫之積哉三國志文類巻二十五
