body:
  text: 三國志文類巻四十五書魏臧洪答陳琳書紹興兵圍洪厯年不下紹令洪邑人陳琳作書與洪喻以禍福責以義洪答曰隔闊相思發於寤寐幸相去歩武之間耳而以趣舎異規不得相見其為愴恨可為心哉前日不遺比辱雅貺述叙禍福公私切至所以不即奉答者既學薄才鈍不足塞詰亦以君子擕負側室息肩主人家在東州僕為仇敵以是事人雖披中情墮肝膽猶身䟽有罪言甘見怪方首尾不救何能恤人且以子之才窮該典籍豈將闇於大道不逹余趣哉然猶復云云者僕以是知足下之言信不由衷將以救禍也必欲算計長短辨諮是非是非之論言滿天下陳之更不明不言無所損又言傷告絶之義非吾所忍行也是以捐棄紙筆一無所答亦冀遥忖其心知其計定不復渝變也重得來命援引古今紛紜六紙雖欲不言焉得已哉僕小人也本因行役冦竊大州恩深分厚寕樂今日自還接刃每登城勒兵望主人之旗鼓感故友之周旋撫弦搦矢不覺涕流之覆靣也何者自以輔佐主人無以為悔主人相接過絶等倫當受任之初自謂究竟大事共尊王室豈悟天子不悦本州見侵郡将遘牖里之厄陳留克創兵之謀謀計棲遲喪忠孝之名杖策㩦背虧交友之分揆此二者與其不得己喪忠孝之名與虧交友之道輕重殊塗親踈異畫故便收淚告絶若使主人少垂故人住者側席去者克己不汲汲於離友信刑戮以自輔則僕抗季札之志不為今日之戰矣何以效之昔張景明親登壇喢血奉辭奔走卒使韓牧讓印主人得地然後但以拜章朝主賜爵獲傳之故旋時之間不䝉觀過之貸而受夷滅之禍吕奉先討卓來奔請兵不獲告去何罪復見斫刺濵于死亡劉子璜奉使踰時辭不獲命畏威懷親以計求歸可謂有志忠孝無損伯道者也然輙僵斃麾下不䝉虧除僕雖不敏又素不能原始見終覩微知著竊度主人之心豈謂三子宜死罰當刑中哉實且欲一統山東爭兵討讐懼戰士狐疑無以沮勸故抑廢王命以崇承制慕義者蒙榮待放者被戮此乃主人之利非游士之願也故僕鑒戒前人困窮死戰僕雖下愚亦嘗聞君子之言矣此實非吾心也乃主人招焉凡吾所以背棄國民用命此城者正以君子之違不適敵國故也是以獲罪於主人見攻踰時而足下更引此義以為吾規無乃辭同趨異非君子所謂休戚者哉吾聞之也義不背親忠不違君故東宗本州以為親援中扶郡將以安社稷一舉二得以徼忠孝何以為非而足下欲使吾輕本破家均君主人主人之於我也年為吾兄分為篤友道乖告去以安君親可謂順矣若子之言則包胥宜致命於伍員不當號哭於秦庭矣苟區區於攘患不知言乖乎道理矣足下或者見城圍不解救兵未至感婚姻之義惟平生之好以屈節而苟生勝守義而傾覆也昔晏嬰不降志於白刃南史不屈筆以求生故身著圖像名垂後世况僕㨿金城之固驅士民之力散三年之畜以為一年之資匡困補之以悦天下何圖築室反耕哉但懼秋風揚塵伯珪馬首南向張揚飛燕膂力作難北鄙將告倒懸之急股肱奏乞歸之誠耳主人當鑒我曹軰反旌退師治兵鄴垣何宜久辱盛怒暴威於吾城下哉足下譏吾恃黑山以為救獨不念黄巾之合從邪如飛燕之屬悉以受王命矣昔髙祖取彭越於鉅野光武創基兆於緑林卒能龍飛中興以成帝業苟可輔主興化夫何嫌哉况僕親奉承璽書與之從事行矣孔璋足下徼利於境外臧洪授命於君親吾子託身於盟主臧洪策名於長安子謂余身死而名滅僕亦笑子生死而無聞焉悲哉本同而末離努力努力夫復何言紹見洪書知無降意增兵急攻城城陷被執太子與鍾繇書繇為相國以五熟釜鼎範因太子鑄之釜成太子與繇書又親為之銘昔有黄三鼎周之九寶咸以一體使調一味豈若斯釜五味時芳葢鼎之烹餁以饗上帝以養聖賢昭徳祈福莫斯之美故非大人莫之能造故非斯器莫宜盛徳今之嘉釜有愈茲美夫周之尸臣宋之考父衛之孔悝晉之魏顆彼四臣者並以功徳勒名鍾鼎今執事寅亮大魏以隆聖化堂堂之徳於斯為盛誠太常之所宜銘彛器之所宜勒故作斯銘勒之釜口庶可贊揚洪美垂之不朽銘曰於赫有魏作漢藩輔厥相惟鍾實幹心膂靖恭夙夜匪遑安處百寮師師楷茲度矩又答鍾繇送玉玦書太祖征漢中太子在孟津聞繇有玉玦欲得之而難公言使臨菑侯轉因人説之繇即送之太子與繇書曰夫玉以比徳君子見美詩人晉之垂棘魯之璵璠宋之結緑楚之和璞價越萬金貴重都城有稱疇昔流聲將來是以垂棘出晉虞虢雙禽和璧入秦相如抗節竊見玉書稱美玉白若截肪黒譬純漆赤擬鷄冠黄侔蒸栗側聞斯語未覩厥状雖徳非君子義無詩人髙山景行私所慕仰然四寶邈焉以逺秦漢未聞有良匹是以求之曠年未遇厥真私願不果饑渴未副近見南陽宗惠叔稱君侯昔有美玦聞之驚喜笑與抃俱當自白書恐傳言未審是以令舎弟子建因荀仲茂轉言鄙㫖乃不忽遺厚見周稱鄴騎既到寶玦初至捧跪發匣爛然滿目猥以䝉鄙之姿得觀希世之寶不煩一介之使不損連城之價既有秦昭章臺之觀而無藺生詭奪之誑嘉貺益腆敢不欽承繇報書昔沗近任并得賜玦尚方耆老頗識舊物名其符采必得處所以為執事有珍此者是以鄙之用未奉貢幸而紆意實以悦懌在昔和氏殷勤忠篤而繇待命是懷愧恥孔融與王朗書朗被徵未至孔融與朗書曰世路隔塞情問㫁絶感懷增思前見章表知尋湯武罪已之迹自投東裔同鯀之罰覽省未周涕隕澘然主上寛仁貴徳宥過曹公輔政思賢並立策書屢下殷勤款至知櫂舟浮海息駕廣陵不意黄能突出羽淵也談笑有期勉行自愛董昭與袁春卿書字公仁為徐州牧袁紹遣将顔良攻東郡太祖徙昭為魏郡太守從討良良死後進圍鄴城袁紹同族春卿為魏郡太守在城中其父元長在揚州太祖遣人迎之昭遂與春卿書葢聞孝者不背親以要利仁者不忘君以狥私志士不探亂以徼幸智者不詭道以自危足下大君昔避内難南遊北越非䟽骨肉樂彼呉㑹智者深識獨或宜然曹公愍其守志清恪離羣寡儔故特遣使江東或迎或送今將至矣就令足下處偏平之地依徳義之主居有泰山之固身無喬松之偶以義言之猶宜背彼向此舎民趣父也且邾儀父始與隱公盟魯人嘉之而不書爵然則王所未命爵尊不成春秋之義也况足下今日之所託者乃危亂之國所受者乃矯誣之命乎苟不逞之與羣而厥父之不恤不可以言孝忘祖宗所居之本朝安非正之奸職難以言忠忠孝並替難以言智又足下昔日為曹公所禮辟夫戚族人而䟽所生内所寓而外王室懷邪禄而叛知己逺福祚而近危亡棄明義而收大恥不亦可惜耶若能翻然易節奉帝養父委身曹公忠孝不墜榮名彰矣宜深留計早決良圖太祖與荀彧書太祖與荀彧書追傷郭嘉曰郭奉孝年不滿四十相與周旋十一年阻險艱難皆共罹之又以其通達世事無所疑滯而欲以後事屬之何意卒爾失之悲痛傷心今表增其子滿千户然何益亡者追念之感深且奉孝乃知孤者也天下人相知者少又以此痛惜奈何奈何又書追惜奉孝不能去心其人見時事兵事過絶於人又人多畏病南方有疫常言吾往南方則不生還然與共論計云當先定荆此為不但見計之忠厚必欲立功分棄命定事人心乃爾何得使人忘之應璩與劉靖書入作納言出臨京任富民之術日引月長藩落髙峻絶穿窬之心五種别出逺水火之災農器必具無失時之闕蠶麥有苫備之用無雨濕之虞封符指期無流連之利鰥寡孤獨蒙廪賑之實加之以明擿幽微重之秉憲不撓有司供承王命百里垂拱仰辦雖昔趙張三王之治未足以方也曹植與楊脩書脩建安中舉孝亷除郎中丞相請署倉曹属主簿是時軍國多事脩總知内外事皆稱意自魏太子以下並爭與交好又是時臨菑侯植以才捷愛幸來意投脩數與脩書書曰數日不見思子為勞想同之也僕少好詞賦迄至于今二十有五年矣然今世作者可略而言也昔仲宣獨歩於漢南孔璋鷹揚於河朔偉長擅名於青土公幹振藻於海隅徳璉發迹於大魏足下髙視於上京當此之時人人自謂握靈蛇之珠家家自謂抱荆山之玉也吾王於是設天網以該之頓八紘以掩之今盡集茲國矣然此數子猶不能飛翰絶迹一舉千里也以孔璋之才不閑辭賦而多自謂與司馬長卿同風譬畫虎不成還為狗者也前為書嘲之反作論盛道僕贊其文夫鍾期不失聴于今稱之吾亦不敢妄歎者畏後之嗤余也世人著述不能無病僕常好人譏彈其文有不善者應時改定昔丁敬禮嘗作小文使僕潤飾之僕自以才不能過若人辭不為也敬禮云卿何所疑難乎文之佳麗吾自得之後世誰相知定吾文者耶吾嘗歎此達言以為美談昔尼父之文辭與人通流至於制春秋游夏之徒不能錯一字過此而言不病者吾未之見也葢有南威之容乃可以論於淑媛有龍淵之利乃可以議於割㫁劉季緒才不逮於作者而好詆呵文章掎摭利病昔田巴毁五帝罪三王呰五伯於稷下一旦而服千人魯連一説使終身杜口劉生之辯未若田氏今之仲連求之不難可無歎息乎人各有所好尚蘭􅉅蓀蕙之芳衆人之所好而海畔有逐臭之夫咸池六英之發衆人所樂而墨翟有非之之論豈可同哉今往僕少小所著詞賦一通相與夫街談巷説必有可采擊轅之歌有應風雅匹夫之思未易輕棄也辭賦小道固未足以揄揚大義彰示來世也昔揚子雲先朝執㦸之臣耳猶稱壮夫不為也吾雖薄徳位為藩侯猶庶幾戮力上國流惠下民建永世之業流金石之功豈徒以翰墨為勲績辭頌為君子哉若吾志不果吾道不行亦將採史官之實録辨時俗之得失定仁義之衷成一家之言雖未能藏之名山將以傳之同好此要之白首豈可以今日論乎其言之不怍恃惠子之知我也明早相迎書不盡懷脩答書不侍數日若彌年載豈獨愛顧之隆使係仰之情深邪損辱來命蔚矣其文誦讀反復雖諷雅頌不復過也若仲宣之擅江表陳氏之跨冀域徐劉之顯青豫應生之發魏國斯皆然矣至於脩者聴采風聲仰徳不暇目周章於省覽何惶駭於髙視哉伏惟君侯少長貴盛體旦發之質有聖善之教逺近觀者徒謂能宣昭懿徳光贊大業而已不謂復能兼覽傳記留思文章今乃含王超陳度越數子觀者駭視而拭目聴者傾首而聳耳非夫體通性達受之自然其誰能至於此乎又嘗親見執事握牘持筆有所造作若成誦在心借書於手曾不斯須少留思慮仲尼日月無得踰焉脩之仰望殆如此矣是以對鶡而辭作暑賦彌日而不獻見西施之容歸憎其貌者也伏想執事不知其然猥受顧賜教使刋定春秋之成莫能損益吕氏淮南字值千金然而弟子鉗口市人拱手者聖賢卓犖固所以殊絶凡庸也今之賦頌古詩之流不更孔公風雅無别耳脩家子雲老不曉事强著一書悔其少作若此仲山周旦之徒則皆有愆乎君侯忘聖賢之顯跡述鄙宗之過言竊以為未之思也若乃不忘經國之大美流千載之英聲銘功景鍾書名竹帛此自雅量素所畜也豈與文章相妨害哉輙受所惠竊備矇瞍誦謌而己敢忘惠施以忝莊氏季緒瑣瑣何足以云三國志文類巻四十五
