body:
  text: 三國志文類巻三十三對問魏高貴鄉公問諸儒經義帝幸太學問諸儒曰聖人幽贊神明仰觀俯察始作八卦後聖重之為六十四立爻以極數凡斯大義罔有不備而夏有連山殷有歸藏周曰周易易之書其故何也易博士淳于俊對曰庖犧因燧皇之圖而制八卦神農演之為六十四黄帝堯舜通其變三代隨時質文各由其事故易者變易也名曰連山似山出内氣連天地也歸藏者萬事莫不歸藏於其中也帝又曰若使包羲因燧皇而作易孔子何以不云燧人氏没包羲氏作乎俊不能答帝又問曰孔子作彖象鄭𤣥作注雖聖賢不同其所釋經義一也今彖象不與經文相連而注連之何也俊對曰鄭𤣥合彖象於經者欲使學者尋省易了也帝曰若鄭𤣥合之於學誠便則孔子曷為不合以了學者乎俊對曰孔子恐其與文王相亂是以不合此聖人以不合為謙帝曰若聖人以不合為謙則鄭𤣥何獨不謙耶俊對曰古義宏深聖問奥遠非臣所能詳盡帝又問曰繫辭云黄帝堯舜垂衣裳而天下治此包羲神農之世為無衣裳但聖人化天下何殊異爾耶俊對曰三皇之時人寡而禽獸衆故取其羽皮而天下用足及至黄帝人衆而禽獸寡是以作為衣裳以濟時變也帝又問乾為天而復為金為玉為老馬與細物並耶俊對曰聖人取象或遠或近近取諸物遠則天地講易畢復命講尚書帝問曰鄭𤣥云稽古同天言堯同於天也王肅云堯順考古道而行之二義不同何者為是博士庾峻對曰先儒所執各有乖異臣不足以定之然洪範稱三人占從二人之言賈馬及肅皆以為順考古道以洪範言之肅義為長帝曰仲尼言唯天為大唯堯則之堯之大美在乎則天順考古道非其至也今發篇開義以明聖德而舍其大更稱其細豈作者之意耶俊對曰臣奉遵師説未喻大義至於折中裁之聖思次及四岳舉鯀帝又問曰夫大人者與天地合其德與日月合其明思無不周明無不照今王肅云堯意不能明鯀是以試用如此聖人之明有所未盡耶峻對曰雖聖人之宏猶有所未盡故禹曰知人則哲唯帝難之然卒能改授聖賢緝熙庶績亦所以成聖也帝曰夫有始有卒其唯聖人若不能始何以為聖其言惟帝難之然卒能改授葢謂知人聖人所難非不盡之言也經曰知人則哲能官人若堯疑鯀試之九年官人失叙何得謂之聖哲峻對曰臣竊觀經傳聖人行事不能無失是以堯失之四凶周公失之二叔仲尼失之宰予帝曰堯之任鯀九載無成汨陳五行民用昏墊至於仲尼失之宰予言行之間輕重不同也至於周公管蔡之事亦尚書所載皆博士所當通也峻對曰此皆先賢所疑非臣寡見所能究論次及有鰥在下曰虞舜帝問曰當堯之時洪水為害四凶在朝宜速登賢聖濟斯民之時也舜年在旣立聖德光明而久不進用何也峻對曰堯咨嗟求賢欲遜巳位岳曰否德忝帝位堯復使岳揚舉仄陋然後薦舜薦舜之本實由於堯此葢聖人欲盡衆心也帝曰堯旣聞舜而不登用又時忠臣亦不進達乃使岳揚仄陋而後薦舉非急於用聖恤民之謂也峻對曰非臣愚見所能逮及於是復命講禮記帝問曰太上立德其次務施報為治何由而教化各異皆修何政而能致於立德施而不報乎博士馬照對曰太上立德謂三皇五帝之世以德化民其次報施謂三王之世以禮為治也帝曰二者致化薄厚不同將主有優劣耶時使之然乎照對曰誠由時有樸文故化有薄厚也蒯良蒯越對劉表劉表之初為荆州也江南宗賊盛袁術屯魯陽盡有南陽之衆吳人蘇代領長沙太守貝羽為華容長各阻兵作亂表初到單馬入宜城而延中廬人蒯良蒯越襄陽人蔡瑁與謀表曰宗賊甚盛而衆不附袁術因之禍今至矣吾欲徴兵恐不集其策安出良曰衆不附者仁不足也附而不治者義不足也苟仁義之道行百姓歸之如水之趨下何患所至之不從而問興兵與䇿乎表顧問越越曰治平者先仁義治亂者先權謀兵不在多在得人也袁術勇而無斷蘇代貝羽皆武人不足慮宗賊帥多貪暴為下所患越有所素養者使示之以利必以衆來君誅其無道撫而用之一州之人有樂存之心聞君聖德必襁負而至矣兵集衆附南據江陵北守襄陽荆州八郡可傳檄而定術等雖至無能為也表曰子柔之言雍季之論也異度之計舅犯之謀也遂使越遣人誘宗賊至者五十五人皆斬之襲取其衆荀彧討袁紹對袁紹與太祖書其辭悖慢太祖以示彧曰今將討不義而力不敵何如彧有此對古之成敗者誠有其才雖弱必强苟非其人雖强亦弱劉項之存亡足以觀矣今與公爭天下者唯袁紹爾紹貌外寛而内忌任人而疑其心公明達不拘唯才所宜此度勝也紹遲重少決失在後機公能斷大事應變無方此謀勝也紹御軍寛緩法令不立士卒雖衆其實難用公法令旣明賞罰必行士卒雖寡皆爭致死此武勝也紹慿世資從容飾智以收名譽故士之寡能好問者多歸之公以至仁待人推誠心不為虛美行巳謹儉而與有功者無所恡惜故天下忠正效實之士咸願為用此德勝也夫以四勝輔天子扶義征伐誰敢不從紹之强其何能為太祖悅賈詡定太子對時文帝為五官將而臨菑侯植才名方盛各有黨與有奪宗之議文帝使人問詡自固之術詡對曰願將軍恢崇德度躬素士之業朝夕孜孜不違子道如是而巳文帝從之深自砥礪太祖又嘗屏除左右詡嘿然不對太祖曰與卿言而不答何也詡曰適有所思故不即對耳太祖曰何思詡曰思袁本初劉景升父子也太祖大笑於是太子遂定又伐吳蜀對帝問詡曰吾欲伐不從命以一天下呉蜀何先詡對攻取者先兵權建本者尚德化陛下應期受禪撫臨率土若綏之以文德而俟其變則平之不難矣吳蜀雖蕞爾小國依岨山水劉備有雄才諸葛亮善治國孫權識虛實陸遜見兵勢據險守要汎舟江湖皆難卒謀也用兵之道先勝後戰量敵論將故舉無遺䇿臣竊料群臣無備權對雖以天威臨之未見萬全之勢也昔舜舞干戚而有苖服臣以為當今宜先文後武鍾繇獄詰辭時毛玠出見黥面反者其妻子没為官奴婢玠言曰使天不雨葢此也太祖遂大怒收玠付獄大理鍾繇詰玠自古聖帝明王罪及妻子書云左不共左右不共右予則孥戮女司宼之職男子入於罪𨽻女子入於舂槀漢律罪人妻子没為奴婢黥面漢法所行黥墨之刑存於古典今真奴婢祖先有罪雖厯百世猶有黥面供官一以寛良民之命二以宥并罪之辜此何以負於神明之意而當致旱案典謀急恒寒若豫恒燠若寛則亢陽所以為旱玠之吐言以為寛耶以為急也急當隂霖何以反旱成湯聖世野無生草周宣令王旱魃為虐亢旱以來積三十年歸咎黥面為相值不衛人伐邢師興而雨罪惡無徴何以應天玠譏謗之言流於下民不悦之聲上聞聖聽玠之吐言勢不獨語時見黥面凡為㡬人黥面奴婢所識知邪何縁得見對之嘆言時以語誰見答云何以何日月於何處所事巳發露不得隠欺具以狀對毛玠獄詰對臣聞蕭生縊死困於石顯賈子放外讒在絳灌白起賜劍於杜郵晁錯致誅於東市伍員絶命於吳都斯數子者或妬其前或害其後臣垂齠執簡累勤取官職在機近人事所竄屬臣以私無勢不絶語臣以寃無細不理人情滛利為法所禁法禁於利勢能害之青蠅横生為臣作謗謗臣之人勢不在他昔王叔陳生争正王廷宣子平理命舉其契是非有宜曲直有所春秋嘉焉是以書之臣不言此無有時人說臣此言必有徴要乞䝉宣子之辨而求王叔之對若臣以曲聞即刑之日方之安駟之贈賜劍之來比之重賞之惠謹以狀對王肅對明帝帝欲不諦帝嘗問肅曰漢桓時白馬令李雲上書言帝者諦也是帝欲不諦當何得不死肅對但為言失逆順之節原其本意皆欲盡心念存補國且帝者之威過於雷霆殺一匹夫無異螻蟻寛而宥之可以示容受切言廣德宇於天下故臣以為殺之未必為是也又對史遷隠切對帝問肅曰司馬遷以受刑之故内懷隠切著史紀非貶孝武令人切齒肅對司馬遷記事不虛美不隠惡劉向楊雄服其善叙事有良史之才謂之實録漢武帝聞其述史記取孝景及己本紀覽之於是大怒削而投之於今此兩紀有録無書後遭李陵事遂下遷蠶室此為隠切在孝武而不在於史遷也三國志文類巻三十三
