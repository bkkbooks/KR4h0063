body:
  text: 三國志文類巻三十薦稱魏陳羣薦管寧臣聞王者顯善以消惡故湯舉伊尹不仁者逺伏見徴士北海管寧行為世表學任人師清儉足以激濁貞正足以矯時前雖徵命禮未優備昔司空荀爽家拜光禄先儒鄭𤣥即授司農若加備禮庶必可致至延西序坐而論道必能昭明古今有益大化陶丘一等薦管寧正始二年太僕陶丘一永寧衛尉孟觀侍中孫邕中書侍郎王基薦寧曰臣聞龍鳳隱耀應徳而臻明哲潛遁俟時而動是以鸑鷟鳴岐周道隆興四皓為佐漢帝用康伏見太中大夫管寧應二儀之中和總九徳之純懿含章素質氷潔淵清𤣥虛澹泊與道逍遙娯心黄老游志六藝升堂入室究其閫奥韜古今於胸懷包道徳之機要中平之際黄巾陸梁華夏傾蕩王綱弛頓遂避時難乘桴越海羈旅遼東三十餘年在乾之姤匿景藏光嘉遁養浩韜韞儒墨潛化傍流暢於殊俗黄初四年高祖文皇帝疇諮羣公思求俊乂故司徒華歆舉寧應選公車特徵振翼遐裔翻然來翔行遇屯厄遭罹疾病即拜太中大夫烈祖明皇帝嘉美其徳登為光禄勲寧疾彌留未能進道今寧舊疾已瘳行年八十志無衰倦環琽篳門偃息窮巷飯鬻糊口并日而食吟詠詩書不改其樂困而能通遭難必濟經危蹈險不易其節金聲玉色久而彌彰揆其終始殆天所祚當贊大魏輔亮雍熙衮職有闕羣下屬望昔高宗刻象營求賢哲周文啟龜以卜良佐况寧前朝所表名徳已著而久棲遲未時引致非所以奉遵明訓繼成前志也陛下踐阼纂承洪緒聖敬日躋超越周成每發徳音動諮師傅若繼二祖招賢故典賔禮雋邁以廣緝熙濟濟之化侔於前代寧清高恬泊擬跡前軌徳行卓絶海内無偶歴觀前世玉帛所命申公枚乗周黨樊英之儔測其淵源覽其清濁未有厲俗獨行若寧者也誠宜束帛加璧備禮徵聘仍授几杖延登東序敷陳墳素坐而論道上正璇璣協和皇極下阜羣生彝倫攸敘必有可觀光益大化若寧固執匪石守志箕山追迹洪崖參蹤巢許斯亦聖朝同符唐虞優賢揚歴垂聲千載雖出處殊塗俯仰異體至於興治美俗其揆一也於是特具安車蒲輪束帛加璧聘焉桓範薦徐宣臣聞帝王用人度世授才爭奪之時以策略為先分定之後以忠義為首故晉文行舅犯之計而賞雍季之言高祖用陳平之智而託後於周勃也竊見尚書徐宣體忠厚之行秉直亮之性清雅持立不拘世俗確然難動有社稷之節歴位州郡所在稱職今僕射缺宣行掌後事腹心任重莫宜宣者帝遂以宣為左僕射盧欽稱徐邈徐公志高行潔才博氣猛其施之也高而不狷潔而不介博而守約猛而能寛聖人以清為難而徐公之所易也或問欽徐公當武帝之時人以為通自在涼州及還京師人以為介何也欽答曰往者毛孝先崔季珪等用事貴清素之士於時皆變易車服以求名高而徐公不改其常故人以為通比來天下奢靡轉相倣效而徐公雅尚自若不與俗同故前日之通乃今日之介也是世之人無常而徐公之有常也蜀秦宓奏記劉焉薦任定祖字子勅廣漢緜竹人少有才學州郡辟命稱疾不往奏記州牧劉焉薦儒士任定祖昔百里蹇叔以耆艾而定策甘羅子奇以童冠而立功故書美黄髪而易稱顔淵固知選士用能不拘長幼明矣乃者以來海内察舉率多英雋而遺舊齒衆論不齊異同相半此乃承平之翔步非亂世之急務也夫欲救危撫亂脩已以安人則宜卓犖超倫與時殊趣震驚鄰國駭動四方上當天心下合人意天人既和内省不疚雖遭凶亂何憂何懼昔楚葉公好龍神龍下之好偽徹天何況於真今處士任安仁義直道流名四逺如今見察則一州斯服昔湯舉伊尹不仁者逺何武貢二龔雙名竹帛故貪尋常之高而忽萬仞之嵩樂面前之飾而忘天下之譽斯誠往古之所重慎也甫欲鑿石索玉剖蚌求珠今乃隨和炳然有如皎日復何疑哉誠知晝不操燭日有餘光但愚情區區貪陳所見彭羕薦秦宓字永年廣漢人薦同郡秦子勅於太守許靖曰昔高宗夢傅説周文求吕尚爰及漢祖納食其於布衣此乃帝王之所以倡業垂統緝熙厥功也今明府稽古皇極允執神靈體公劉之徳行勿翦之惠清廟之作於是乎始褒貶之義於是乎興然而六翮未之備也伏見處士緜竹秦宓膺山甫之徳履雋生之直枕石潄流吟詠溫袍偃息於仁義之途恬淡於浩然之域高概節行守真不虧雖古人潛遁蔑以加旃若明府能招致此人必有忠讜落落之譽豐功厚利建跡之勲然後紀功於王府飛聲於來世不亦美哉桓溫薦譙秀秀性清淨不交於世知將大亂預絶人事從兄弟及諸親里不與相見州郡辟命及李雄盜蜀安車徵秀又雄叔父驤驤子夀辟命皆不應常衣鹿皮躬耕山藪永和三年安西將軍桓溫平蜀表薦秀曰臣聞大樸既虧則高尚之標顯道喪時昏則忠貞之義彰故有洗耳投淵以振𤣥邈之風亦有秉心矯迹以惇在三之節是以上代之君莫不崇重斯軌所以篤俗訓民靜一流競伏惟大晉應符御世運無常通時有屯蹇神州丘墟三方圮裂兔罝絶響於中林白駒無聞於空谷斯有識之所悼心大雅之所歎息者也陛下聖徳嗣興方恢天緒臣昔奉役有事西土鯨鯢既縣思宣大化訪諸故老搜揚潛逸庶武羅於羿浞之墟想王蠋於亡齊之境竊聞巴西譙秀植操貞固抱徳肥遁揚清渭波於時皇極遘道消之㑹羣黎蹈顛沛之艱中華有顧瞻之哀幽谷無遷喬之望凶命屢招姦威仍偪身寄虎吻危同朝露而能抗節玉立誓不降辱杜門絶迹不面偽庭進兒龔勝亡身之禍退無薛方詭對之譏雖園綺之棲商洛管寧之黙遼海方之於秀殆無以過於今西土以為美談夫旌徳禮賢化道之所先崇表殊節聖哲之上務方今六合未康豺狼當路遺黎偷薄義聲弗聞益宜振起道義之徒以敦流遁之弊若秀䝉蒲帛之徵足以鎮静頹風軌訓囂俗幽遐仰流九服知化矣吳周昭稱步隲等書穎川周昭著書稱步隲及嚴畯等曰古今賢士大夫所以失名喪身傾家害國者其由非一也然要其大歸總其常患四者而已急論議一也爭名勢二也重朋黨三也務欲速四也急論議則傷人爭名勢則敗友重朋黨則蔽主務欲速則失徳此四者不除未有能全也當世君子能不然者亦比有之豈獨古人乎然論其絶異未若顧豫章諸葛使君步丞相嚴衞尉張奮威之為美也論語言夫子循循然善誘人又曰成人之美不成人之惡豫章有之矣望之儼然即之也溫聽其言也厲使君體之矣恭而安威而不猛丞相履之矣學不求禄心無苟得衞尉奮威蹈之矣此五君者雖徳實有差輕重不同至於趨舎大檢不犯四者俱一揆也昔丁諝出於孤家吾粲由於牧豎豫章揚其善以並陸全之列是以人無幽滯而風俗厚焉使君丞相衞尉三君昔以布衣俱相友善諸論者因各叙其優劣初先衛尉次丞相而後有使君也其後並事明主經營世務出處之才有不同先後之名須反其初此世常人所決勤薄也至於三君分好卒無虧損豈非古人交哉又魯横江昔仗萬兵屯據陸口當世之美業也能與不能孰不願焉而横江既亡衞尉應其選自以才非將帥深辭固讓終於不就後徙九列遷典八座榮不足以自曜禄不足以自奉至於二君皆位為上將窮富極貴衛尉既無求欲二君又不稱薦各守所志保其名好孔子曰君子矜而不爭羣而不黨斯有風矣又奮威之名亦三君之次也當一方之戌受上將之任與使君丞相不異也然歴國事論功勞實有先後故爵位之榮殊焉而奮威將處此決能明其部分心無失道之欲事無充詘之求每升朝堂循禮而動辭氣謇謇罔不惟忠叔嗣雖親貴言憂其敗蔡文至雖疏賤談稱其賢女配太子受禮若弔慷慨之趣惟篤人物成敗得失皆如所慮可謂守道見機好古之士也若乃經國家當軍旅於馳騖之際立霸王之功此五者未為過人至於純粹履道求不苟得升降當世保全名行邈然絶俗實有所師故麤論其事以示後之君子三國志文類巻三十
