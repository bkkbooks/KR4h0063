body:
  text: 三國志文類巻二十書疏魏高堂隆言百役繁興疏青龍五年明帝愈增崇宫殿雕飾觀閣鑿太行之石英采穀城之文石起景陽山於芳林之園建昭陽殿於太極之北鑄作黄龍鳳皇竒偉之獸飾金鏞陵雲臺陵霄闕百役繁興作者萬數公卿以下至於學生莫不展力帝乃躬自掘土以率之而遼東不朝悼皇后崩天作淫雨冀州水出漂没民物隆上疏切諫曰盖天地之大徳曰生聖人之大寳曰位何以守位曰仁何以聚人曰財然則士民者乃國家之鎮也穀帛者乃士民之命也穀帛非造化不育非人力不成是以帝耕以勸農后桑以成服所以昭事上帝告䖍報施也昔在伊唐世值陽九厄運之㑹洪水滔天使鯀治之績用不成乃舉文命隨山刋木前後歴年二十二載災眚之任莫過於彼力役之興莫乆於此堯舜君臣南面而已禹敷九州庶士庸勲各有等差君子小人物有服章今無若時之急而使公卿大夫並與厮徒共供事役聞之四夷非嘉聲也垂之竹帛非令名也是以有國有家者近取諸身逺取諸物嫗煦養育故稱愷悌君子民之父母今上下勞役疾病凶荒耕稼者寡飢饉荐臻無以卒嵗宜加愍䘏以救其困臣觀在昔書籍所載天人之際未有不應也是以古先哲王畏上天之明命循隂陽之逆順兢兢業業惟恐有違然後治道用興徳與神符災異既發懼而修政未有不延期流祚者也爰及末葉闇君荒主不崇先王之令軌不納正士之直言以遂其情志恬忽變戒未有不尋踐禍難至於顛覆者也天道既著請以人道論之夫六情五性同在於人嗜欲㢘貞各居其一及其動也交爭于心欲彊質弱則縱濫不禁精誠不制則放溢無極夫情之所在非好則美而美好之集非人力不成非穀帛不立情苟無極則人不堪其勞物不充其求勞求並至將起禍亂故不割情無以相供仲尼云人無逺慮必有近憂由此觀之禮義之制非苟拘分將以逺害而興治也今吳蜀二賊非徒白地小虜聚邑之冦乃據險乘流跨有士衆僭號稱帝欲與中國爭衡今若有人來告權備並修徳政復履清儉輕省租賦不治玩好動咨耆賢事遵禮度陛下聞之豈不惕然惡其如此以為難卒討滅而為國憂乎若使告者曰彼二賊並為無道崇侈無度役其士民重其徵賦下不堪命吁嗟日甚陛下聞之豈不勃然忿其困我無辜之民而欲速加之誅其次豈不幸彼疲弊而取之不難乎苟如此則可易心而度事義之數亦不逺矣且秦始皇不築道徳之基而築阿房之宫不憂蕭牆之變而修長城之役當其君臣為此計也亦欲立萬世之業使子孫長有天下豈意一朝匹夫大呼而天下傾覆哉故臣以為使先代之君知其所行必將至於敗則弗為之矣是以亡國之主自謂不亡然後至於亡賢聖之君自謂將亡然後至於不亡昔漢文帝稱為賢主躬行儉約惠下養民而賈誼方之以為天下倒懸可為痛哭者一可為流涕者二可為長歎息者三况今天下彫弊民無儋石之儲國無終年之畜外有彊敵六軍暴邊内興土功州郡騷動若有冦警則臣懼版築之士不能投命虜庭矣又將吏奉禄稍見折減方之於昔五分居一諸受休者又絶廪賜不應輸者今皆出半此為官入兼多於舊其所出與參少於昔而度支經用更每不足牛肉小賦前後相繼反而推之凡此諸費必有所在且夫禄賜穀帛人主所以惠養吏民而為之司命者也若今有廢是奪其命矣既得之而又失之此生怨之府也周禮天府掌九伐之則以給九式之用入有其分出有其所不相干乘而用各足各足之後乃以式貢之餘供王玩好又上用財必考于司㑹今陛下所與共坐廊廟治天下者非三司九列則臺閣近臣皆腹心造膝宜在無諱若見豐省而不敢以告從命奔走惟恐不勝是則具臣非鯁輔也昔李斯教秦二世曰為人主而不恣睢命之曰天下桎梏二世用之秦國以覆斯亦滅族是以史遷議其不正諫而為世誡書奏帝覽焉謂中書監令曰觀隆此奏使朕懼哉又疾篤口占疏曾子有疾孟敬子問之曾子曰鳥之將死其鳴也哀人之將死其言也善臣寢疾病有增無損常懼奄忽忠欵不昭臣之丹誠豈惟曾子願陛下少垂省覽渙然改徃事之過謬浡然興來事之淵塞使神人嚮應殊方慕義四靈效珍玉衡曜精則三王可邁五帝可越非徒繼體守文而已也臣常疾世王莫不思紹堯舜湯武之治而蹈踵桀紂幽厲之跡莫不蚩笑季世惑亂亡國之主而不登踐虞夏殷周之軌悲夫以若所為求若所欲猶縁木求魚煎水作冰其不可得明矣尋觀三代之有天下也聖賢相承歴載數百尺土莫非其有一民莫非其臣萬國咸寜九有有截鹿臺之金巨橋之粟無所用之仍舊南面夫何為哉然癸辛之徒恃其膂力知足以拒諫才足以飾非諂諛是尚臺觀是崇淫樂是好倡優是説作靡靡之樂安濮上之音上天不蠲眷然囘顧宗國為墟不夷于𨽻紂縣白旗桀放鳴條天子之尊湯武有之豈伊異人皆明王之胄也且當六國之時天下殷熾秦既兼之不修聖道乃構阿房之宫築長城之守矜夸中國威服百蠻天下震竦道路以目自謂本枝百葉永垂洪暉豈寤二世而滅社稷崩圯哉近漢孝武乗文景之福外攘夷狄内興宫殿十餘年間天下囂然乃信越巫懟天遷怒起建章之宫千門萬戸卒至江充妖蠱之變至於宫室乖離父子相殘殃咎之毒禍流數世臣觀黄初之際天兆其戒異類之鳥育長燕巢口爪胷赤此魏室之大異也宜防鷹揚之臣於蕭牆之内可選諸王使君國典兵徃徃棊跱鎮撫皇畿翼亮帝室昔周之東遷晉鄭是依漢吕之亂實賴朱虚斯盖前代之明鑒夫皇天無親惟徳是輔民詠徳政則延期過歴下有怨歎掇録授能由此觀之天下之天下非獨陛下之天下也臣百疾所鍾氣力稍㣲輒自輿出歸還里舍若遂沉淪䰟而有知結草以報詔曰生㢘侔伯夷直過史魚執心堅白謇謇匪躬如何㣲疾未除退身里舍昔邴吉以隂徳疾除而延夀貢禹以守節疾篤而濟愈生其彊飯專精以自持棧潛上息役睦親疏字彦皇明帝時衆役並興戚屬疏斥潛上疏天生蒸民而樹之君所以覆燾羣生熙育兆庶故方制四海匪為天子裂土分疆匪為諸侯也始自三皇爰暨唐虞咸以博濟加于天下醇徳以洽黎元賴之三王既㣲降逮于漢治日益少喪亂𢎞多自時厥後亦罔克乂太祖濬哲神武芟除暴亂克復王綱以開帝業文帝受天明命廓恢皇基踐祚七載每事未遑陛下聖徳纂承洪緒宜崇晏晏與民休息而方隅匪寜征夫逺戍有事海外縣旌萬里六軍騷動水陸轉運百姓舍業日費千金大興殿舍功作萬計徂徠之松刋山窮谷怪石珷玞浮于河淮都圻之内盡為甸服當供藳秸銍粟之調而為苑囿擇禽之府盛林莽之穢豐鹿兔之藪傷害農功地繁茨棘災疫流行民物大潰上減和氣嘉禾不植臣聞文王作豐經始勿亟百姓子來不日而成靈沼靈囿與民共之今宫觀崇侈雕鏤極妙忘有虞之總期思殷辛之瓊室禁地千里舉足投網麗擬阿房役百乾谿臣恐民力彫盡下不堪命也昔秦據殽函以制六合自以徳髙三皇功兼五帝欲號諡至萬葉而二世顛覆願為黔首由枝榦既杌本實先拔也盖聖王之御世也克明峻徳庸勲親親俊乂在官則功業可隆親親顯用則安危同憂深根固本並為榦翼雖歴盛衰内外有輔昔成王幼沖未能涖政周吕召畢並在左右今既無衛侯康叔之監分陜所任又非旦奭東宫未建天下無副願陛下留心關塞永保無極則海内幸甚三國志文類巻二十
