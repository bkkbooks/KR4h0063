body:
  text: 三國志文類巻三十八議魏王朗復肉刑議王朗字景興時鍾繇上疏復肉刑朗議繇欲輕減大辟之條以增益則刑之數此即起偃為竪化屍為人矣然臣之愚猶有未合微異之意夫五刑之屬著在科律科律自有減死一等之法不死則為減施行已久不待逺假斧鑿於彼肉刑然後有罪次也前世仁者不忍肉刑之慘酷是以廢而不用不用已来厯年數百今復行之恐所減之文未彰於萬民之目而肉刑之問已宣於宼讎之耳非所以来遠人也今可按繇所欲輕之死罪使減死之髠則嫌其輕者可倍其居作之歲數内有以生易死不訾之恩外無以刖易􅎂駭耳之聲議者百餘人與朗同者多帝以吳蜀未平且寢華歆舉孝亷議字子魚時三府議舉孝亷本以德行不復限以試經歆以為喪亂以来六籍墮廢當務存立以崇王道夫制法者所以經盛衰今聽孝廉不以經試恐學業遂從此而廢若有秀異可特徴用患於無其人何患不得哉帝從其言程昱誅降者議太祖征馬起文帝留守使昱參軍事田銀蘇伯等反河間遣將軍賈信討之賊有千餘人請降議者皆以為宜如舊法昱議昱曰誅降者謂在擾攘之時天下雲起故圍而後降者不赦以示威天下開其利路使不至於圍也今天下略定且在邦域之中此必降之賊殺之無所威懼非前日誅降之意臣以為不可誅也縱誅之宜先啓聞衆議者曰軍事有專無請昱不答文帝起入特引見昱曰君有所不盡邪昱曰凡專命者謂有臨時之急呼吸之間者耳今此賊制在賈信之手無朝夕之變故老臣不願將軍行之也文帝曰君慮之善即白太祖太祖果不誅太祖還聞之甚悦謂昱曰君非徒明於軍計又善處人父子之間郭嘉圖劉備議劉備来奔以為豫州牧或謂太祖曰備有英雄志今不早圖後必為患太祖以問嘉嘉曰有是然公提劍起義兵為百姓除暴推誠仗信以招俊傑猶懼其未也今備有英雄名以窮歸已而害之是以害賢為名則智士將自疑囘心擇主公誰與定天下夫除一人之患以沮四海之望安危之機不可不察太祖笑曰君得之矣劉曄議號諡詔曰尊嚴祖考所以崇孝表行也追本敬始所以篤教流化也是以成湯文武實造商周詩書之義追尊稷契歌頌有娀姜嫄之事明盛德之源流受命所由興也自我魏室之承天序旣發迹於高皇太皇帝而功隆於武皇文皇帝至於高皇之父處士君潛修德讓行動神明斯乃乾坤所福饗光靈所從来也而精神幽遠號稱罔記非所謂崇孝重本也其令公卿已下㑹議號諡曄曰聖帝孝孫之欲褒崇先祖誠無量已然親疏之數遠近之降葢有禮紀所以割斷私情克成公法為萬世式也周王所以上祖后稷者以其佐唐有功名在祀典故也至於漢氏之初追諡之義不過其父上比周室則大魏發跡自高皇始下論漢氏則追諡之禮不及其祖此誠往代之成法當今之明義也陛下孝思中發誠無已已然君舉必書所以慎於禮制也以為追尊之義宜齊高皇而已尚書衛臻與曄議同事遂施行張遼議太祖教太祖旣征孫權還使遼與樂肥進李典等將七千餘人屯合太祖征張魯教與護軍薛悌署函邊曰賊至乃發俄而權率十萬衆圍合肥乃共發教㪍曰若孫權至者張李將軍出戰樂將軍守護軍勿得與戰諸將皆疑遼曰公遠征在外比救至彼破我必矣是以教指及其未合逆擊之折其盛勢以安衆心然後可守也成敗之機在此一戰諸君何疑李典亦與遼同於是遼夜募敢從之士得八百人椎牛饗將士明日大戰平旦遼被甲持㦸先登䧟陣殺數十人斬二將大呼自名衝壘入至權麾下權大驚衆不知所為走登高冢以長㦸自守遼叱權下戰權不敢動望見遼所將衆少乃聚圍遼數重遼左右麾圍直前急擊圍開遼將麾下數十人得出餘衆號呼曰將軍棄我乎遼復還突圍拔出餘衆權人馬皆披靡無敢當者自旦戰至日中吳人奪氣還修守備衆心乃安諸將咸服權守合肥十餘日城不可拔乃引退遼率諸軍追擊㡬復獲權太祖大壯遼拜征東將軍崔林考課議字徳儒散騎常侍劉邵作考課論制下百寮林議曰案周官考課其文備矣自康王以下遂以陵遲此即考課之法存乎其人也及漢之季其失豈在乎佐吏之職不密哉方今軍旅或猥或卒備之以科條申之以内外增減無常固難一矣且萬目不張舉其綱衆毛不整振其領皋陶仕虞伊尹臣殷不仁者遠五帝三王未必如一而各以治亂易曰易簡而天下之理得矣太祖隨宜設辟以遺来今不患不法古也以為今之制度不為疏濶惟在守一勿失而已若朝臣能任仲山甫之重式是百辟則孰敢不肅辛毗袁譚求和議字佐治太祖為司空辟毗毗不得應命及袁尚攻兄譚於平原譚使毗詣太祖求和太祖謂毗曰譚可信尚必可克不毗對曰明公無問信與詐也直當論其勢耳袁氏本兄弟相伐非謂他人能間其間乃謂天下可定於已也今一旦求救於明公此可知也顯甫見顯思困而不能取此力竭也兵革敗於外謀臣誅於内兄弟讒䦧國分為二連年戰伐而介冑生蟣蝨加以旱蝗飢饉並臻國無囷倉行無裹糧天災應於上人事困於下民無愚智皆知土崩瓦解此乃天亡尚之時也兵法稱有石城湯池帶甲百萬而無粟者不能守也今往攻鄴尚不還救即不能自守還救即譚踵其後以明公之威應困窮之敵繫疲弊之寇無異􅌺風之振秋葉矣天以袁尚與明公明公不取而伐荆州荆州豐樂國未有釁仲虺有言取亂侮亡方今二袁不務逺略而内相圖可謂亂矣居者無食行者無糧可謂亡矣朝不謀夕民命靡繼而不綏之欲待他年他年或登又自知亡而改修厥德失所以用兵之要矣今因其請救而撫之利莫大焉且四方之宼莫大於河北河北平則六軍盛而天下震太祖曰善乃許譚平楊阜四甚議詔大議政治不便於民者阜議以為政治在於任賢興國在於務農若舍賢而任所私此忘治之甚者也廣開宫館高為臺榭以妨民務此害農之甚者也百工不敦其器而競作竒巧以合上欲此傷本之甚者也孔子曰苛政甚於猛虎今守功文俗之吏為政不通治體苟好煩苛此亂民之甚者也當今之急宜去四甚並詔公卿郡國舉賢良方正敦樸之士而選用之此亦求賢之一端也王昶百官考課議詔使昶撰百官考課事昶以為唐虞雖有黜陟之文而考課之法不垂周制冡宰之職大計羣吏之治而誅賞又無校比之制由此言之聖主明於任賢略舉黜陟之體以委達官之長而摠其統紀故能否可得而知也其大指如此蜀諸葛亮正議時魏司徒華歆等各有書與亮陳天命人事欲使舉國稱藩亮遂不報書作正議曰昔在項羽起不由德雖處華夏秉帝者之勢卒就湯鑊為後永戒魏不審鑒今次之矣免身為幸戒在子孫而二三子各以耆艾之齒承偽指而進書有若崇竦稱莽之功亦將偪於元禍苟免者邪昔世祖之創迹舊基奮羸卒數千摧莽彊旅四十餘萬於昆陽之郊夫據道討滛不在衆寡及至孟德以其譎勝之力舉數十萬之師救張郃於陽平勢窮慮悔僅能自脫辱其鋒鋭之衆遂喪漢中之地深知神器不可妄獲旋還未至感毒而死子桓滛逸繼之以簒縱使二三子多逞蘇張詭靡之説奉進驩兠滔天之辭欲以誣毁唐帝諷解禹稷所謂徒喪文藻煩勞翰墨者矣夫大人君子之所不為也又軍誡曰萬人必死横行天下昔軒轅氏整卒數萬制四方定海内況以數十萬之衆據正道而臨有罪可得干擬者哉諸葛亮絶盟好議時孫權稱號其羣臣以並尊二帝来言議者咸以為交之無益名體弗順宜顯明正議絶其盟好亮曰權有僭逆之心久矣國家所以略其釁情者求犄角之援也今若加顯絶讎我必深便當移兵東戍與之角力須并其土乃議中原彼賢才尚多將相輯穆未可一朝定也頓兵相持坐而須老使北賊得計非䇿之上者昔孝文卑辭匃奴先帝優與吳盟皆應權通變𢎞思遠益非匹夫之為分者也今議者咸以權利在鼎足不能并力且志望已滿無上岸之情推此皆似是而非也何者其智力不侔故限江自保權之不能越江猶魏賊之不能渡漢非力有餘而利不取也若大軍致討彼上當分裂其地以為後規下當略民廣境示武於内非端坐者也若就其不動而睦於我我之北伐無東顧之憂河南之衆不得盡西此之為利亦已深矣權僭之罪未宜明也乃遣衛尉陳震慶權正號吳郊祀議羣臣以權未郊祀奏議曰頃者嘉瑞屢臻遠國慕義天意人事前後備集宜修郊祀以承天意權曰郊祀當於土中今非其所於何施此重奏曰普天之下莫非王土王者以天下為家昔周文武郊於酆鎬非必土中權曰武王伐紂即阼於鎬京而郊其所也文王未為天子立郊於酆見何經典復奏曰伏見漢書郊祀志匡衡奏從甘泉河東郊於酆權曰文王性謙讓處諸侯之位明未郊也經傳無明文匡衡俗儒臆說非典籍正義不可用也張紘都金陵議紘謂權曰秣陵楚武王所置名為金陵地勢崗阜連石頭訪問故老云昔秦始皇東巡會稽經此縣望氣者云金陵地形有王者都邑之氣故掘斷連崗改名秣陵今處所具存地有其氣天之所命宜為都邑權善其議未能從也後劉備之東宿於秣陵周觀地形亦勸權都之權曰智者意同遂都焉赦盗乘御馬議魯王霸二子基壹五鳯中封基為吳侯壹宛陵侯基侍孫亮在内太平二年盜乘御馬收付獄亮問侍中刁𤣥曰盜乘御馬罪云何𤣥對曰科應死然魯王早終惟陛下哀原之亮曰法者天下所共何得阿以親親故邪當思惟可以釋此者奈何以情相迫乎𤣥曰舊赦有大小或天下亦有千里五百里赦隨意所及亮曰解人不當爾邪乃赦宫中基以得免三國志文類巻三十八
