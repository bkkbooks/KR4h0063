body:
  text: 三國志文類巻十六書疏魏劉靖請選立慱士疏夫學者治亂之軌儀聖人之大敎也自黄初以來崇立大學二十餘年而寡有成者盖由愽士選輕諸生避役高門子弟恥非其倫故夫學者雖有其名而無其人雖設其教而無其功宜高遷愽士取行為人表經任人師者掌敎國子依遵古法使二千石以上子孫年從十五皆入大學明制絀陟榮辱之路其經明行修者則進之以崇徳荒敎廢業者則退之以懲惡舉善而敎不能則勸浮華交游不禁自息矣闡𢎞大化以綏未賔六合承風逺人來格此聖人之教致治之本也杜恕請刺史勿領兵疏時公卿以下大議損益恕以為古之刺史奉宣六條以清静為名威風著稱今可勿令領兵以專民事俄而鎮北將軍吕昭又領冀州恕乃上疏也帝王之道莫尚乎安民安民之術在於豐財豐財者務本而節用也方今二賊未滅戎車亟駕此自熊虎之士展力之秋也然搢紳之儒横加榮慕搤腕抗論以孫吳為首州郡牧守咸共忽恤民之術修將率之事農桑之民競干戈之業不可謂務本帑藏嵗虛而制度嵗廣民力嵗衰而賦役嵗興不可謂節用今大魏奄有十州之地而承喪亂之弊計其户口不如徃昔一州之民然而二方僭逆北虜未賔三邊遘難繞天畧市所以統一州之民經營九州之地其為艱難譬䇿羸馬以取道里豈可不加意愛惜其力哉以武皇帝之節儉府藏充實猶不能十州擁兵郡且二十也今荆揚青徐幽并雍涼縁邊諸州皆有兵矣其所恃内充府庫外制四夷者惟兖豫司冀而已臣前以州郡典兵則專心軍功不勤民事宜别置將守以盡治理之務而陛下復以冀州寵秩吕昭冀州戸口最多田多墾闢又有桑棗之饒國家徵求之府誠不當復任以兵事也若以北方當須鎮守自可專置大將以鎮安之計所置吏士之費與兼官無覺然昭於人才尚復易中朝苟乏人兼才者勢不獨多以此推之知國家以人擇官不為官擇人也官得其人則政平訟理政平故民富實訟理故囹圄虛空陛下踐祚天下斷獄百數十人嵗嵗增多至五百餘人矣民不益多法不益峻以此推之非政教陵遲牧守不穪之明效歟徃年牛死通率天下十能損二麥不半收秋種未下若二賊游䰟於疆場飛芻輓粟千里不及究此之術豈在強兵乎武士勁卒愈多愈多愈病耳夫天下猶人之體腹心充實四肢雖病終無大患今兖豫司冀亦天下之腹心也是以愚臣慺慺實願四州之牧守獨修務本之業以堪四支之重然孤論難持犯欲難成衆怨難積疑似難分故累載不為明主所察凡言此者類皆䟽賤䟽賤之言實未易聽若使善䇿必出於親貴親貴故不犯四難以求忠愛此古今之所當患也杜恕考内外衆官疏時大議考課之制以考内外衆官恕以為用不盡其人雖才且無益所存非所務所務非世要上疏曰書稱明試以功三考黜陟誠帝王之盛制使有能者當其官有功者受其禄譬猶烏獲之舉千鈞良樂之選驥足也雖歴六代而考績之法不著關七聖而課試之文不垂臣誠以為其法可粗依其詳難備舉故也語曰世有亂人而無亂法若使法可專任則唐虞可不須稷契之佐殷周無貴伊吕之輔矣今奏考功者陳周漢之法為綴京房之本㫖可謂明考課之要矣於以崇揖讓之風興濟濟之治臣以為未盡善也其欲使州郡考士必由四科皆有事効然後察舉試辟公府為親民長吏轉以功次補郡守者或就增秩賜爵此最考課之急務也臣以為便當顯其身用其言使具為課州郡之法法具施行立必信之賞施必行之罰至於公卿及内職大臣亦當俱以其職考課之也古之三公坐而論道内職大臣納言補闕無善不紀無過不舉且天下至大萬機至衆誠非一明所能徧照故君為元首臣作股肱明其一體相須而成也是以古人稱廊廟之材非一木之支帝王之業非一士之畧由是言之焉有大臣守職辦課可以致雍熙者哉且布衣之交猶有務信誓而蹈水火感知己而披肝膽徇聲名而立節義者况於束帶立朝致位卿相所務者非特匹夫之信所感者非徒知己之惠所徇者豈聲名而已乎諸䝉寵禄受重任者不徒欲舉明主於唐虞之上而已身亦欲厠稷契之列是以古人不患於念治之心不盡患於自任之不足此誠人主使之然也唐虞之君委任稷契䕫龍而責成功及其罪也殛鯀而放四凶今大臣親奉明詔給事目下其有夙夜在公恪勤特立當官不撓貴勢執平不阿所私危言危行以處朝廷者自明主所察也若尸禄以為高拱嘿以為智當官苟在於免負立朝不忘於容身潔行遜言以處朝廷者亦明主所察也誠使容身保位無放退之辜而盡節在公抱見疑之勢公義不修而私議成俗雖仲尼為謀猶不能盡一才又况於世俗之人乎今之學者師商韓而上法術競以儒家為迂濶不周世用此最風俗之流弊創業者之所慎也後考課竟不行杜恕上言事疏樂安㢘昭以才能㧞擢頗好言事恕上疏極諫曰伏見尚書郎㢘昭奏左丞曹璠以罰當關不依詔坐判問又云諸當坐者别奏尚書令陳矯自奏不敢辭罰亦不敢以處重為恭意至懇惻臣竊愍然為朝廷惜之夫聖人不擇世而興不易民而治然而生必有賢智之佐者盖進之以道帥之以禮故也古之帝王之所以能輔世長民者莫不逺得百姓之懽心近盡羣臣以智力誠使今朝任職之臣皆天下之選而不能盡其力不可謂能使人若非天下之選亦不可謂能官人陛下憂勞萬機或親燈火而庶事不康刑禁日弛豈非股肱不稱之明效歟原其所由非獨臣有不盡忠亦主有不能使百里奚愚於虞而智於秦豫讓苟容中行而著節智伯斯則古人之明騐矣今臣言一朝皆不忠是誣一朝也然其事類可推而得陛下感帑藏之不充實而軍事未息至乃斷四時之賦衣薄御府之私穀帥由聖意舉朝稱明與聞政事密勿大臣寜有懇懇憂此者乎騎都尉王才幸樂人孟思所為不法振動京都而其罪狀發於小吏公卿大臣初無一言自陛下踐祚以來司𨽻校尉御史中丞寜有舉綱維以督姦宄使朝廷肅然者邪若陛下以為今世無良才朝廷乏賢佐豈可追望稷契之遐蹤坐待來世之雋又乎今之所謂賢者盡有大官而厚禄矣然而奉上之節未立向公之心不一者委任之責不專而俗多忌諱故也臣以為忠臣不必親親臣不必忠何者以其居無嫌之地而事得自盡也今有疏者毁人不實其所毁而必曰私報所憎譽人不實其所譽而必曰私愛所親左右或因之以進憎愛之説非獨毁譽有之政事損益亦皆有嫌陛下當思所以闡廣朝臣之心篤厲有道之節使之自同古人望與竹帛耳反使如㢘昭者擾亂其間臣懼大臣遂將容身保位坐觀得失為來世戒也昔周公戒魯侯曰無使大臣怨乎不以不言賢愚明皆當世用也堯數舜之功稱去四㓙不言大小有罪則去也今者朝臣不自以為不能以陛下為不任也不自以為不知以陛下為不問也陛下何不遵周公之所以用大舜之所以去使侍中尚書坐則侍帷幄行則從華輦親對詔問所陳必達則羣臣之行能否皆可得而知忠能者進闇劣者退誰敢依違而不自盡以陛下之聖明親與羣臣論議政事使羣臣人得自盡人自以為親人思所以報賢愚能否在陛下之所用以此治事何事不辦以此建功何功不成每有軍事詔書常曰誰當憂此者邪吾當自憂耳近詔又曰憂公忘私者必不然但先公後私即自辦也伏讀明詔乃知聖思究盡下情然亦怪陛下不治其本而憂其末也人之能否實有本性雖臣亦以為朝臣不盡稱職也明主之用人也使能者不敢遺其力而不能者不得處非其任選舉非其人未必為有罪也舉朝共容非其人乃為怪耳陛下知其不盡力也而代之憂其職知其不能也而教之治其事豈徒主勞而臣逸哉雖聖賢並世終不能以此為治也陛下又患臺閣禁令之不密人事請屬之不絶聽伊尹作迎客出入之制選司徒更惡吏以守寺門威禁由之實未得為禁之本也昔漢安帝時少府竇嘉辟廷尉郭躬無罪之兄子猶見舉奏章劾紛紛近司𨽻校尉孔羨辟大將軍狂悖之弟而有司嘿爾望風希指甚於受屬選舉不以實人事之大者也嘉有親戚之寵躬非社稷重臣猶尚如此以今况古陛下自不督必行之罰以絶阿黨之原耳伊尹之制與惡吏守門非治世之具也使臣之言少䝉察納何患於姦不削滅而養若昭等乎夫糾擿姦宄忠事也然而世憎小人行之者以其不顧道理而苟求容進也若陛下不復考其終始必以違衆迕世為奉公宻行白人為盡節焉有通人大才而更不能為此耶誠顧道理而弗為耳使天下皆背道而趨利則人主之所最病者陛下將何樂焉胡不絶其萌乎夫先意承㫖以求容美率皆天下淺薄無行義者其意務在於適人主之心而已非欲治天下安百姓也陛下何不試變業而示之彼豈執其所守以違聖意哉夫人臣得人主之心安業也處尊顯之官榮事也食千鍾之禄厚實也人臣雖愚未有不樂此而喜干迕者也迫於道自彊耳誠以為陛下當憐而佑之少委任焉如何反録昭等傾側之意而忽若人者乎今者外有伺隙之冦内有貧曠之民陛下當大計天下之損益政事之得失誠不可以怠也三國志文類巻十六
