  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0063_WYG_044-1a, image: WYG1361/WYG1361-0705c.png}
body:
  text: 三國志文類巻四十四書魏袁術與陳珪書時沛相下邳陳珪故太尉球弟子也術與珪俱公族子孫少共交游書與珪曰昔秦失其政天下羣雄爭而取之兼智勇者卒受其歸今世事紛擾復有瓦解之勢矣誠英乂有為之時也與足下舊交豈肯左右之乎若集大事子實為吾心膂珪又答書昔㤗末世肆暴恣情虐流天下毒被生民下不堪命故遂土崩今雖季世未有亡秦苛暴之亂也曹將軍神武應期興復典刑將撥平凶慝清定海内信有徴矣以為足下當戮力同心匡翼漢室而隂謀不軌以身試禍豈不痛哉若迷而知反尚可以免吾被舊知故陳至情雖逆於耳肉骨之惠也欲吾營私阿附有犯死不能也袁術報吕布書布初入徐州書與𡊮術術報書曰昔董卓作亂破壞王室禍害術門户術舉兵闗東未能屠裂卓將軍誅卓送其頭首為術掃滅讐耻使術明目於當世死生不愧其功一也昔將金元休向兖州甫詣封部為曹操逆所拒破流離迸走幾至滅亡將軍破兖州術復明目於遐邇其功二也術生年已來不聞天下有劉備備乃舉兵與術對陣術憑將軍威靈得以破備其功三也將軍有三大功在術術雖不敏奉以生死將軍連年攻戰軍糧苦少今送米二十萬斛迎逢道路非直止此當駱驛復致若兵器戰具他所乏少大小唯命劉表遺袁譚書袁紹二子譚尚舉兵相攻表遺譚書天篤降害禍難殷流尊公殂殞四海悼心賢𦙍承統遐邇屬望咸欲展布旅力以投盟主雖亡之日猶存之願也何寤青蠅飛於干旍無極游於二壘使股肱分為二體背膂絶為異身昔三王五伯下及戰國父子相殘葢有之矣然或欲以成王業或欲以定覇功或欲以顯宗主或欲以固冡嗣未有棄親即異㧞其本根而能崇業濟功垂祚後世者也若齊襄復九世之讐士匄卒荀偃之事是故春秋美其義君子稱其信夫伯游之恨於齊未若文公之忿曹宣子之承業未若仁君之繼統也且君子之違難不適讐國豈可忘先君之怨棄至親之好為萬世之戒遺同盟之恥哉冀州不弟之慠既已然矣仁君當降志辱身以匡國為務雖見憎於夫人未若鄭荘之於姜氏兄弟之嫌未若重華之於傲象也然荘公有大隧之樂象受有鼻之封願棄捐前忿逺思舊義復為子母昆弟如初劉表遺袁尚書知變起辛郭禍結同生追閼伯實沈之蹤忘棠棣死喪之義親尋干戈僵尸流血聞之哽咽雖存若亡昔軒轅有涿鹿之戰周武有商奄之師皆所以剪除穢害而定王業非强弱之事爭喜怒之忿也故雖滅親不為尤誅兄不傷義今二君初承洪業纂繼前軌進有國家頹危之慮退有先公遺恨之負當唯義是務唯國是康何者金木水火以剛柔相濟然後克得其和能為民用今青州天性峭急迷於曲直仁君度數𢎞廣綽然有餘當以大包小以優容劣先除曹操以卒先公之恨事定之後乃議曲直之計不亦善乎若留神逺圖克已復禮當振斾長驅共奨王室若迷而不反違而無改則胡夷將有誚讓之言况我同盟復能戮力為君之役哉此韓盧東郭自困於前而遺田父之獲者也憤踊鶴望冀聞同和之聲若其泰也則袁族其與漢升降乎如其否也則同盟永無望矣譚尚盡不從審配獻袁譚書春秋之義國君死社稷忠臣死王命苟有圖危宗廟敗亂國家王綱典律親疎一也是以周公垂泣而蔽管蔡之獄季友歔欷而行鍼叔之鴆何則義重人輕事不得已也昔衛靈公廢蒯瞶而立輙蒯聵為不道入戚以簒衛師伐之春秋傳曰以石曼姑之義為可以拒之是以蒯瞶終獲叛逆之罪而曼姑永享忠臣之名父子猶然豈况兄弟乎昔先公廢絀將軍以續賢兄立我將軍以為適嗣上告祖靈下書譜諜先公謂將軍為兄子將軍謂先公為叔父海内逺近誰不備聞且先公即世之日我將軍斬衰居廬而將軍齋于堊室出入之分於斯益明是時凶臣逢紀妄畫蛇足曲辭諂媚交亂懿親將軍奮赫然之怒誅不旋時將軍亦奉命承㫖加以淫刑自是之後癰疽破潰而骨肉無絲髪之嫌自疑之臣皆保生全之福也故悉遣强胡簡命名將料整器械選擇戰士殫府庫之財竭食土之實其所以供奉將軍何求而不備君臣相率共衛旌麾戰為鴈行賦為幣主雖傾倉覆庫剪剥民物上下欣戴莫敢告勞何則推戀戀忠赤之情盡家家肝腦之計脣齒輔車不相為賜謂為將軍心合意同混齊一體必當并威偶勢禦冦寕家何圖凶險䜛慝之人造飾無端誘導奸利至令將軍翻然改圖忘孝友之人聴豺狼之謀誣先公廢立之言違近者在喪之位悖綱紀之理不顧逆順之節横易冀州之主欲當先公之繼遂放兵鈔撥屠城殺吏交尸盈原裸民滿野或有髠􅚎髪膚割截支體寃魂痛於幽𡨕創痍號於草棘又乃圖獲鄴城許賜秦胡財物婦女豫有分界或聞告令吏士云孤雖有老母輒使身體完具而已聞此言者莫不驚愕失氣悼心揮涕使太夫人憂哀憤懣於堂室我州君臣士友假寐悲歎無所措其手足念欲靜師拱黙以聴執事之圖則懼違春秋死命之節貽太夫人不測之患隕先公髙世之業且三軍慨憤人懷私怒我將軍辭不得已以及館陶之役是時外為禦難内實乞罪既不見赦而屠辱各二三其心臨戰叛戾我將軍進退無功首尾受敵引軍奔避不敢告辭亦謂將軍當少垂親親之仁貺以緩追之惠而乃尋踪躡軌無所逃命困獸必鬬以干嚴行而將軍師旅土崩瓦解此非人力乃天意也是後又望將軍改徃脩來克已復禮追還孔懷如初之愛而縱情肆怒趣破家門跂踵鶴立連結外讐散鋒放火播增毒螫烽烟相望渉血千里遺城厄民引領悲怨雖欲勿救惡得已哉故遂引軍東轅保正疆埸雖近郊壘未侵境域然望旌麾能不永歎配等備先公家臣奉廢立之命而圖等干國亂家禮有常刑故奮弊州之賦以除將軍之疾若乃天啓于心早行其誅則我將軍匍匐悲號於將軍股掌之上配等亦袒躬布體以待斧鉞之刑若必不悛有以國弊圖頭不縣軍不旋踵願將軍詳度事宜錫以環玦三國志文類巻四十四
