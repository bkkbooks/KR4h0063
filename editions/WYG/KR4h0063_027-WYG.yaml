body:
  text: 三國志文類巻二十七諌諍蜀楊顒諫諸葛亮躬親細務襄陽記曰楊顒字子昭入蜀為巴郡太守丞相諸葛亮主簿亮甞自校簿書顒直入諫曰為治有體上下不可相侵請為明公以作家譬之今有人使奴執耕稼婢典炊爨鷄主司晨犬主吠盜牛任重載馬涉逺路私業無曠所求皆足雍容高枕飲食而已忽一旦盡欲以身親其役不復付任勞其體力為此碎務形疲神困終無一成豈其智之不如奴婢鷄犬哉失為家主之法也是故古人稱坐而論道謂之王公作而行之謂之士大夫故邴吉不問横道死人而憂牛喘陳平不肯知錢穀之數云自有主者彼誠達於位分之體今明公為治乃躬自校簿書流汗竟日不亦勞乎呉張紘諫呉主突敵權以紘為長史從征合肥權率輕騎將往突敵紘諫曰夫兵者凶器戰者危事也今麾下恃盛壯之氣忽彊暴之虜三軍之衆莫不寒心雖斬將搴旗威震敵場此乃偏將之任非主將之宜也願抑賁育之勇懷霸王之計權納紘言而止又諫明年將復出軍紘又諫曰自古帝王受命之君雖有皇靈佐於上文徳播於下亦賴武功以昭其勲然而貴於時動然後為威耳今麾下值四百之厄有扶危之功宜且隱息師徒廣開播殖任賢使能務崇寛惠順天命以行誅可不勞而定也於是遂止不行薛綜諫征公孫淵時公孫淵降而復叛權盛怒欲自親征綜上疏諫曰夫帝王者萬國之元首天下之所繫命也是以居則重門擊柝以戒不虞行則清道案節以養威嚴葢所以存萬安之福鎮四海之心昔孔子疾時託乘桴浮海之語季由斯喜拒以無所取材漢元帝欲御樓船薛廣徳請刎頸以血染車何則水火之險至危非帝王所宜涉也諺曰千金之子坐不垂堂况萬乘之尊乎今遼東戎貊小國無城池之固備禦之術器械殊鈍紀綱無政往必禽克誠如明詔然其方土寒埆穀稼不殖民習鞍馬轉徙無常卒聞大軍之至自度不敵鳥驚獸駭長驅奔竄一人匹馬不可得見雖獲空地守之無益此不可一也加又洪荒滉瀁有成山之難海行無常風波難免倏忽之間人船異勢雖有堯舜之徳智無所施賁育之勇力不得設此不可二也加以鬱霧㝠其上鹹水蒸其下善生流腫轉相汚染凡行海者稀無斯患此不可三也天生神聖顯以符瑞當乗平喪亂康此民物嘉祥日集海内垂定逆虜凶虐滅亡在近中國一平遼東自斃但當拱手以待耳今乃違必然之圖尋至危之阻忽九州之固肆一朝之忿既非社稷之重計又開闢以來所未嘗有斯誠羣寮所以傾心側息食不甘味寢不安席者也惟陛下抑雷霆之威忍赫斯之怒遵乘橋之安逺履氷之險則臣子賴祉天下幸甚權遂不行又陸瑁諫字子璋臣聞聖王之御逺夷羈縻而已不常保有故古者制地謂之荒服言慌惚無常不可保也今淵一方小醜屏在海隅雖託人面與禽獸無異國家所為不愛貨寶逺以加之者非嘉其徳義也誠欲誘納愚弄以規其馬耳淵之驕黠恃逺負命此乃荒貊常態豈足深怪昔漢諸帝亦嘗鋭意以事外夷馳使散貨充滿西域雖時有恭從然其使人見害財貨并沒不可勝數今陛下不忍悁悁之忿欲越巨海身踐其土羣臣愚議竊謂不安何者北冦與國壤地連接苟有閒隙應機而至夫所以越海求馬曲意於淵者為赴目前之急除腹心之疾也而更棄本追末捐近治逺忿以改規激以動衆斯乃猾虜所願聞非大呉之至計也又兵家之術以功役相疲勞逸相待得失之間所覺輒多且沓渚去淵道里尚逺今到其岸兵勢三分使强者進取次當守船又次運糧行人雖多難得悉用加以單步負糧經逺深入賊地多馬邀截無常若淵狙詐與北未絶動衆之日脣齒相濟若實孑然無所憑賴其畏怖逺迸或難卒滅天誅稽於朔野山虜承間而起恐非萬安之長慮也又諌時上前疏孫權未許瑁重上此疏夫兵革者固前代所以除暴亂威四夷也然其役在姦雄已除天下無事從容廟堂之上以餘議議之耳至於中夏鼎沸九域槃牙之時率須深根固本愛力惜費務自休養以待隣敵之闕未有正於此時舎近治逺以疲軍旅者也昔尉佗叛逆僭號稱帝於時天下乂安百姓殷阜帶甲之數糧食之積可謂多矣然漢文猶以逺征不易重興師旅告喻而已今凶桀未殄疆埸猶警雖蚩尤鬼方之亂故當以緩急差之未宜以淵為先願陛下抑威住計暫寧六師潛神嘿規以為後圖天下幸甚權再覽嘉其辭理遂不行又陸遜諫淵背盟權欲往征遜上疏淵憑險恃固拘留大使名馬不獻實可讐忿蠻夷猾夏未染王化鳥竄荒裔拒逆王師至令陛下爰赫斯怒欲勞萬乘汎輕越海不慮其危而涉不測方今天下雲擾羣雄虎爭英豪踴躍張聲大視陛下以神武之姿誕膺期運破操烏林敗備西陵復取荆州斯二敵者當時雄桀皆摧其鋒聖化所綏萬里草偃方蕩平華夏總一大猷今不忍小忿而發雷霆之怒違垂堂之戒輕萬乘之重此臣之所惑也臣聞志行萬里者不中道而輟足圖四海者匪懷細以害大彊冦在境荒服未庭陛下乘桴逺征必致闚􅎿慼至而憂悔之無及若使大事時捷則淵不討而自服今乃逺惜遼東衆之與馬奈何獨欲捐江東萬安之本業而不惜乎乞息六師以威大虜早定中夏垂曜將來權用納焉華覈諫營新宫興工妨農寳鼎二年皓更營新宫制度𢎞廣飾以珠玉所費甚多是時盛夏興工農守並廢覈諫曰臣聞漢文之世九州晏然秦民喜去慘毒之苛政歸劉氏之寛仁省役約法與之更始分王子弟以藩漢室當此之時皆以為泰山之安無窮之基也至於賈誼獨以為可痛哭及流涕者三可為長歎息者六乃曰方今之勢何異抱火於積薪之下而寢其上火未及然而謂之安其後變亂皆如其言臣雖下愚不識大倫竊以曩時之事揆今之勢誼云復數年間諸王方剛漢之傅相稱疾罷歸欲以此為治雖堯舜不能安今大敵據九州之地有大半之衆習攻戰之餘術乘戎馬之舊勢欲與中國爭相吞之計其猶楚漢勢不兩立非徒漢之諸王淮南濟北而已誼之所欲痛哭比今為緩抱火卧薪之喻於今為急大皇帝覽前代之如彼察今世之如此故廣開農桑之業積不訾之儲恤民重役務養戰士是以大小感恩各思竭命期運未至早棄萬國自是之後彊臣專政上詭天時下違衆議忘安存之本邀一時之利數興軍旅傾竭府藏兵勞民困無時獲安今之存者乃創夷之遺衆哀苦之餘民耳遂使軍資空匱倉廪不實布帛之賜寒暑不周重以失業家户不贍而北積穀養民專心東向無復他警蜀為西藩土地險固加承先主統御之術謂其守御足以長久不圖一朝奄至傾覆脣亡齒寒古人所懼交州諸郡國之南土交阯九真二郡已沒日南孤危存亡難保合浦以北民皆揺動因連避役多有離叛而備戌減少威鎮轉輕常恐呼吸復有變故昔海虜窺窬東縣多得離民地習海行狃於往年鈔盜無日今胷背有嫌首尾多難乃國朝之厄㑹也誠宜住建立之役先備豫之計勉墾殖之業為飢乏之救惟恐農時將過東作向晚有事之日整嚴未辦若舎此急盡力工作卒有風塵不虞之變當委版築之役應烽燧之急驅怨苦之衆赴白刃之難此乃大敵所因為資也如但固守曠日持久則軍糧必乏不待接刃而戰士已困矣昔太戊之時桑榖生庭懼而修徳怪消殷興熒惑守心宋以為災景公下從瞽史之言而熒惑退舎景公延年夫脩徳於身而感異類言發於口而通神明臣以愚蔽誤忝近署不能翼宣仁澤以感靈祇仰慙俯愧無所投處退伏思惟熒惑桑穀之異天示二主至如他餘錙介之妖近是門庭小神所為驗之天地無有他變而徵祥符瑞前後屢臻明珠既覿白雀繼見萬億之祚實靈所挺以九域為宅天下為家不與編户之民轉徙一同也又今之宫室先帝所營卜土立基非為不祥又楊市土地與宫連接若大功畢竟輿駕遷往門行之神皆當轉移猶恐長久未必勝舊屢遷不可留則有嫌此乃愚臣所以夙夜為憂灼也臣省月令季夏之月不可以興土功不可以㑹諸侯不可以起兵動衆舉大事必有天殃今雖諸侯不㑹諸侯之軍與㑹無異六月戊己土行正王既不可犯加又農月時不可失昔魯隱公夏城中丘春秋書之垂為後戒今築宫為長世之洪基而犯天地之大禁襲春秋之所書廢敬授之上務臣以愚管竊所未安又恐所召離民或有不至討之則廢役興亊不討則日月滋慢若悉並到大衆聚㑹希無疾病且人心安則念善苦則怨叛江南精兵北土所難欲以十卒當東一人天下未定深可憂恤之如此宫成死叛五千則北軍之衆更增五萬若到萬人則倍益十萬疾者有死亡之損叛者傳不善之語此乃大敵所以歡喜也今當角力中原以定彊弱正於際㑹彼益我損加以勞困此乃雄夫智士所以深憂臣聞先王治國無三年之儲曰國非其國安寧之世戒備如此况敵彊大而忽農忘蓄今雖頗種殖間者大水沈沒其餘存者當須耘穫而長吏怖期上方諸郡身渉山林盡力伐材廢農棄務士民妻孥羸小墾殖又薄若有水旱則永無所獲州郡見米當待有事冗食之衆仰官供濟若上下空乏運漕不供而北敵犯疆使周召更生良平復出不能為陛下計明矣臣聞君明者臣忠主聖者臣直是以慺慺昧犯天威乞垂哀省書奏皓不納三國志文類巻二十七
