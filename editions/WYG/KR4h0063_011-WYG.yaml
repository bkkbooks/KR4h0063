body:
  text: 三國志文類巻十一表奏蜀羣臣上漢帝表先主有漢中之地羣臣馬超等上先主為漢中王表於漢帝曰昔唐堯至聖而四㐫在朝周成仁賢而四國作難高后稱制而諸吕竊命孝昭幼沖而上官逆謀皆馮世寵藉履國權窮㐫極亂社稷幾危非大舜周公朱虛愽陸則不能流放禽討安危定傾伏惟陛下誕姿聖徳統理萬邦而遭厄運不造之艱董卓首難蕩覆京畿曹操階禍竊執天衡皇后太子鴆殺見害剥亂天下殘毁民物乆令陛下䝉塵憂厄幽處虚邑人神無主遏絶王命厭昧皇極欲盜神器左將軍領司𨽻校尉豫荆益三州牧宜城亭侯備受朝爵秩念在輸力以殉國難覩其機兆赫然憤發與車騎將軍董承同謀誅操將安國家克寜舊都㑹承機事不密令操游䰟得遂長惡殘泯海内臣等每懼王室大有閻樂之禍小有安定之變夙夜惴惴戰慄累息昔在虞書敦序九族周監二代封建同姓詩著其義歴載長乆漢興之初割裂疆土尊王子弟是以卒折諸吕之難而成太宗之基臣等以備肺腑枝葉宗子藩翰心存國家念在弭亂自操破於漢中海内英雄望風蟻附而爵號不顯九錫未加非所以鎮衞社稷光昭萬世也奉辭在外禮命斷絶昔河西太守梁統等值漢中興限於山河位同權均不能相率咸推竇融以為元帥卒立效績摧破隗囂今社稷之難急於隴蜀操外吞天下内殘羣寮朝廷有蕭牆之危而禦侮未建可為寒心臣等輙依舊典封備漢中王拜大司馬董齊六軍糾合同盟掃滅凶逆以漢中巴蜀廣漢犍為為國所署置依漢初諸侯王故典夫權宜之制苟利社稷專之可也然後功成事立臣等退伏矯罪雖死無恨先主上漢帝表臣以具臣之才荷上將之任董督三軍奉辭于外不能掃除冦難靖匡王室乆使陛下聖教陵遲六合之内否而未泰惟憂反側疢如疾首曩者董卓造為亂階自是之後羣兇縱横殘剥海内賴陛下聖徳威靈人臣同應或忠義奮討或上天降罰暴逆並殪以漸冰消惟獨曹操乆未梟除侵擅國權恣心極亂臣昔與車騎將軍董承圖謀討操機事不密承見陷害臣播越失據忠義不果遂得使操窮凶極逆主后戮殺皇子鴆害雖糾合同盟念在奮力懦弱不武歴年未效常恐殞沒孤負國恩寤寐永歎夕惕若厲今臣羣寮以為在昔虞書敦叙九族庶明厲翼五帝損益此道不廢周監二代並建諸姬實賴晉鄭夾輔之福高祖龍興尊王子弟大啓九國卒斬諸吕以安太宗今操惡直醜正寔繁有徒包藏禍心簒盜已顯既宗室㣲弱帝族無位斟酌古式依假權宜上臣大司馬漢中王臣伏自三省受國厚恩荷任一方陳力未效所獲已過不宜復忝高位以重罪謗羣寮見逼迫臣以義臣退惟冦賊不梟國難未已宗廟傾危社稷將墜成臣憂責碎首之負若應權通變以寜靖聖朝雖赴水火所不得辭敢慮常宜以防後悔輙順衆議拜受印璽以崇國威仰惟爵號位高寵厚俯思報效憂深責重驚怖累息如臨于谷盡力輸誠奬厲六師率齊羣義應天順時撲討凶逆以寜社稷以報萬分謹拜章因驛上還所假左將軍宜城亭侯印綬陳夀進諸葛氏集表臣夀等言臣前在著作郎侍中領中書監濟北侯臣荀勗中書令關内侯臣和嶠奏使臣定故蜀丞相諸葛亮故事亮毗佐危國負阻不賔然猶存録其言恥善有遺誠是大晉光明至徳澤被無疆自古已來未之有倫也輙刪除複重隨類相從凡為二十四篇篇名如右亮少有逸羣之才英霸之器身長八尺容貌甚偉時人異焉遭漢末擾亂隨叔父𤣥避難荆州躬耕于野不求聞達時左將軍劉備以亮有殊量乃三顧亮於草廬之中亮深謂備雄姿傑出遂解帶冩誠厚相結納及魏武帝南征荆州劉琮舉州委質而備失勢衆寡無立錐之地亮時年二十七乃建竒䇿身使孫權求援吳㑹權既宿服仰備又覩亮竒雅甚敬重之即遣兵三萬人以助備備得用與武帝交戰大破其軍乘勝克捷江南悉平後備又西取益州益州既定以亮為軍師將軍備稱尊號拜亮為丞相録尚書事及備殂沒嗣子幼弱事無巨細亮皆專之於是外連東吳内平南越立法施度整理戎旅工械技巧物究其極科教嚴明賞罰必信無惡不懲無善不顯至於吏不容奸人懐自厲道不拾遺強不侵弱風化肅然也當此之時亮之素志進欲龍驤虎視包括四海退欲跨陵邊疆震蕩宇内又自以為無身之日則未有能蹈涉中原抗衡上國者是以用兵不戢屢耀其武然亮才於治戎為長竒謀為短理民之幹優於將畧而所與對敵或值人傑加衆寡不侔攻守異體故雖連年動衆未能有克昔蕭何薦韓信管仲舉王子城父皆忖已之長未能兼有故也亮之器能政理抑亦管蕭之亞匹也而時之名將無城父韓信故使功業陵遲大義不及邪盖天命有歸不可以智力爭也青龍二年春亮帥衆出武功分兵屯田為乆駐之基其秋病卒黎庶追思以為口實至今梁益之民咨述亮者言猶在耳雖甘棠之詠召公鄭人之歌子産無以逺譬也孟軻有云以逸道使民雖勞不怨以生道殺人雖死不忿信矣論者或怪亮文采不豔而過於丁寜周至臣愚以為咎繇大賢也周公聖人也考之尚書咎繇之謩略而雅周公之誥煩而悉何則咎繇與舜禹共譚周公與羣下矢誓故也亮所與言盡衆人凡士故其文指不得及逺也然其聲教遺言皆經事綜物公誠之心形于文墨足以知其人之意理而有補於當世伏惟陛下邁蹤古聖蕩然無忌故雖敵國誹謗之言咸肆其辭而無所革諱所以明大通之道也謹録寫上詣著作諸葛亮廢李平表李嚴後改名平亮出軍命平以中都䕶署府事亮軍祁山平催督運事夏秋之際值天霖雨運粮不繼平遣參軍狐忠喻㫖呼亮來還亮承以退軍平聞軍退乃陽驚説軍糧饒足何以便歸欲以解巳不辦之責顯亮不進之愆也又表後主説軍偽退欲以誘賊與戰亮具出前後手筆書疏本末平違錯章灼平辭窮情竭首謝罪負於是亮表平乃廢平為民自先帝崩後平所在治家尚為小惠安身求名無憂國之事臣當北出欲得平兵以鎮漢中平窮難縱横無有來意而求以五郡為巴州刺史去年臣欲西征欲令平主督漢中平説司馬懿等開府辟召臣知平鄙情欲因行之際偪臣取利也是以表平子豐督主江州隆崇其遇以取一時之務平至之日都委諸事羣臣上下皆怪臣待平之厚也正以大事未定漢室傾危伐平之短莫若褒之然謂平情在於榮利而已不意平心顛倒乃爾若事稽留將至禍敗是臣不敏言多增咎習隆乞立諸葛亮廟表亮初亡所在各求為立廟朝議以禮秩不聽百姓遂因時節私祭之於道陌上言事者或以為可聽立廟於成都者後主不從歩兵校尉習隆中書郎尚充等共上表曰臣聞周人懐召伯之徳甘棠為之不伐越王思范蠡之功鑄金以存其像自漢興已來小善小徳而圖形立廟者多矣况亮徳範遐邇勲盖季世興王室之不壊實斯人是賴而蒸嘗止於私門廟像闕而莫立使百姓巷祭戎夷野祀非所以存徳念功述追在昔者也今若盡順民心則瀆而無典建之京師又偪宗廟此聖懐所以為疑也臣愚以為冝因近其墓立之於沔陽使所親屬以時賜祭凡其臣故吏欲奉祠者皆限至廟斷其私祀以崇正禮於是始從之孟達辭先主表伏惟殿下將建伊吕之業追桓文之功大事草創假勢吳楚是以有為之士深覩歸趣臣委質已來愆戾山積臣猶自知况於君乎今王朝以興英俊鱗集臣内無輔佐之器外無將領之才列次功臣誠自愧也臣聞范蠡識㣲浮於五湖咎犯謝罪逡巡於河上夫際㑹之間請命乞身何則欲絜去就之分也况臣卑鄙無元功巨勲自繫於時竊慕前賢早思逺恥昔申生至孝見疑於親子胥至忠見誅於君蒙恬拓境而被大刑樂毅破齊而遭讒佞臣每讀其書未嘗不慷慨流涕而親當其事益以傷絶何者荆州覆敗大臣失節百無一還惟臣尋事自致房陵上庸而復乞身自放於外伏想殿下聖恩感悟愍臣之心悼臣之舉臣誠小人不能始終知而為之敢謂非罪臣毎聞交絶無惡聲去臣無怨辭臣過奉教於君子願君王勉之也三國志文類巻十一
