body:
  text: 三國志文類巻二十三書疏呉陸遜陳時事疏臣以為科法嚴峻下犯者多頃年以來將吏罹罪雖不慎可責然天下未一當圖進取小宜恩貸以安下情且時務日興良能為先自不姦穢入身難忍之過乞復顯用展其力效此乃聖王忘過計功以成王業昔漢髙舎陳平之愆用其竒畧終建勲祚功垂千載夫峻法嚴刑非帝王之隆業有罰無恕非懷逺之宏規也又上取珠崖疏孫權欲遣偏師取夷州及珠崖皆以諮遜遜上疏曰臣愚以為四海未定當須民力以濟時務今兵興歴年見衆損減陛下憂勞聖慮忘寢與食將逺規夷州以定大事臣反覆思維未見其利萬里襲取風波難測民易水土必致疾疫今驅見衆經涉不毛欲益更損欲利反害又珠崖絶險民猶禽獸得其民不足濟事無其兵不足虧衆今江東見衆自足圖事但當蓄力而後動耳昔桓王創基兵不一旅而開大業陛下承運拓定江表臣聞治亂討逆須兵為威農桑衣食民之本業而干戈未戢民有飢寒臣愚以為宜育養士民寛其賦税衆克在和義以勸勇則河渭可平九有一統矣權遂征夷州得不補失陸抗上政令多闕疏臣聞徳均則衆者勝寡力侔則安者制危葢六國所以兼併於彊秦西楚所以北面於漢髙也今敵跨制九服非徒闗右之地割據九州豈但鴻溝以西而已國家外無連國之援内非西楚之彊庶政陵遲黎民未乂而議者所恃徒以長川峻山限帶封域此乃守國之末事非智者之所先也臣每逺惟戰國存亡之符近覽劉氏傾覆之釁考之典籍驗之行事中夜撫枕臨餐忘食昔匈奴未滅去病辭館漢道未純賈生哀泣况臣王室之出世荷光寵身名否泰與國同慼死生契闊義無苟且夙夜憂怛念至情慘夫事君之義犯而弗欺人臣之節匪躬是殉謹陳時宜十七條如左十七條失本故不載又上閹官預政疏時何定弄權閹官預政抗上疏曰臣聞開國承家小人勿用靖譛庸回唐書攸戒是以雅人所以怨刺仲尼所以歎息也春秋已來爰及秦漢傾覆之釁未有不由斯者也小人不明理道所見既淺雖使竭情盡節猶不足任况具姦心素篤而憎愛易移哉苟患失之無所不至今委以聰明之任假以專制之威而冀雍熙之聲作肅清之化立不可得也方今見吏殊才雖少然或冠冕之胄少漸道教或清苦自立資能足用自可隨材授職抑黜羣小然後俗化可清庶政無穢也又乞宥薛瑩疏夫俊乂者國家之良寶社稷之貴資庶政所以倫序四門所以穆清也故大司農樓𤣥散騎中常侍王蕃少府李朂皆當世秀頴一時顯器既蒙初寵從容列位而並旋受誅殛或圯族替祀或投棄荒裔葢周禮有赦賢之辟春秋有宥善之義書曰與其殺不辜寧失不經而蕃等罪名未定大辟已加心經忠義身被極刑豈不痛哉且已死之刑固無所識至乃焚爍流漂棄之水濵懼非先王之正典或甫侯之所戒也是以百姓哀聳士民同慼蕃勗永已悔亦靡及誠望陛下赦召𤣥出而頃聞薛瑩卒見逮録瑩父綜納言先帝傅弼文皇及瑩承基内厲名行今之所坐罪在可宥臣懼有司未詳其事如復誅戮益失民望乞垂天恩原赦瑩罪哀矜庶獄清澄刑網則天下幸甚又上百姓疲弊疏時師旅仍動百姓疲弊抗上疏曰臣聞易貴隨時傳美觀釁故有夏多罪而殷湯用師紂作淫虐而周武授鉞苟無其時玉臺有憂傷之慮孟津有反斾之軍今不務富國彊兵力農蓄穀使文武之才效展其用百揆之署無曠厥職明黜陟以厲庶尹審刑賞以示勸沮訓諸司以徳而撫百姓以仁然後順天乘運席巻宇内而聴諸將狥名窮兵黷武動費萬計士卒彫瘁冦不為衰而我已大病矣今爭帝王之資而昧十百之利此人臣之姦便非國家之良策也昔齊魯三戰魯人再克而亡不旋踵何則大小之勢異也况今師所克獲不補所喪哉且阻兵無衆古之明鑒誠宜暫息進取小規以蓄士民之力觀釁伺隙庶無悔吝又疾病上疏抗拜大司馬荆州牧疾病上疏曰西陵建平國之蕃表既處下流受敵二境若敵汎舟順流舳艫千里星奔電邁俄然行至非可恃援他部以救倒懸也此乃社稷安危之機非徒封疆侵陵小害也臣父遜昔在西陲陳言以為西陵國之西門雖云易守亦復易失若有不守非但失一郡則荆州非呉有也如其有虞當傾國爭之臣往在西陵得渉遜迹前乞精兵三萬而至者循常未肯差赴自歩闡以後益更損耗今臣所統千里受敵四處外禦彊對内懷百蠻而上下見兵財有數萬羸弊日久難以待變臣愚以為諸王幼沖未統國事可且立傅相輔導賢姿無用兵馬以妨要務又黄門豎宦開立占募兵民怨役逋逃入占乞特詔簡閲一切料出以補疆場受敵常處使臣所部足滿八萬省息衆務信其賞罰雖韓白復生無所展巧若兵不增此制不改而欲克諧大亊此臣之所深慼也若臣死之後乞以西方為屬願陛下思覽臣言則臣死且不朽孫登臨終上疏臣以無狀嬰抱篤疾自省微劣懼卒隕斃臣不自惜念當委離供養埋胔后土長不復奉望宫省朝覲日月生無益於國死貽陛下重慼以此為哽結耳臣聞死生有命長短自天周晉顏回有上智之才而尚夭折况臣愚陋年過其夀生為國嗣沒享榮祚於臣已多亦何悲恨哉方今大事未定逋冦未討萬國喁喁係命陛下危者望安亂者仰治願陛下棄忘臣身割下流之恩脩黄老之術篤養神光加羞珍膳廣開神明之慮以定無窮之業則率土幸賴臣死無恨也皇子和仁孝聰哲徳行清茂宜早建置以繫民望諸葛恪才畧博達器任佐時張休顧譚謝景皆通敏有識斷入宜委腹心出可為爪牙范慎華融矯矯壯節有國士之風羊衜辯捷有專對之才刁𤣥優𢎞志履道真裴欽博記翰采足用蔣修虞翻志節分明凡此諸臣或宜廊廟或任將帥皆練時事明習法令守信固義有不可奪之志此皆陛下日月所照選置臣宫得與政事備知情素敢以陳聞臣重惟當今方外多虞師旅未休當厲六軍以圖進取軍以人為衆衆以財為寶竊聞郡縣頗有荒殘民物凋弊姦亂萌生是以法令繁滋刑辟重切臣聞為政聽民律令與時推移誠宜與將相大臣詳擇時宜博采衆議寛刑輕賦均息力役以順民望陸遜忠勤於時出身憂國謇謇在公有匪躬之節諸葛瑾步騭朱然全悰朱據吕岱吾粲闞澤嚴畯張承孫怡忠於為國通達治體可令陳上便宜蠲除苛煩愛養士馬撫循百姓五年之外十年之内逺者歸復近者盡力兵不血刃而大事可定也臣聞鳥之將死其鳴也哀人之將死其言也善故子囊臨終遺言戒時君子以為忠豈况臣登其能已乎願陛下留意聽采臣雖死之日猶生之年也羊衜上兩宫不和疏時孫和為太子孫霸為魯王寵愛崇特與和無殊頃之和霸不穆之聲聞於權耳權禁往來假以精學督軍使者羊衜上疏曰臣聞古之有天下者皆先顯别適庶封建子弟所以尊重祖宗為國藩表也二宫拜授海内稱宜斯乃大呉興隆之基頃聞二宫並絶賔客逺近悚然大小失望竊從下風聽采衆論咸謂二宫智達英茂自正名建號於今三年徳行内著美稱外昭西北二隅久所服聞謂陛下當副順遐邇所以歸徳勤命二宫賔延四逺使異國聞聲思為臣妾今既未垂意於此而發明詔省奪備衞抑絶賔客使四方禮敬不復得通雖實陛下敦尚古義欲令二宫專志於學不復顧慮觀聴小宜期於溫故博物而已然非臣下傾企喁喁之至願也或謂二宫不遵典式此臣所以寢息不寧就如所嫌猶宜補察密加斟酌不使逺近得容異言臣懼積疑成謗久將宣流而西北二隅去國不逺異同之語易以聞逹聞達之日聲論當興必將謂二宫有不順之愆不審陛下何以解之若無以解異國則亦無以釋境内境内守疑異國興謗非所以育巍巍鎮社稷也願陛下早發優詔使二宫周旋禮命如初則天清地宴萬國幸甚矣三國志文類巻二十三
