body:
  text: 三國志文類巻五十八詩賦魏王粲美西征詩魏公西征張魯侍中王粲作五言詩以美其事從軍有苦樂但問所從誰所從神且武安得久勞師相公征關右赫怒振天威一舉滅獯虜再舉服羌夷西收邉地賊忽若俯拾遺陳賞越山嶽酒肉踰川坻軍中多饒飫人馬皆溢肥徒行兼乘還空出有餘資拓土三千里徃反速如飛歌舞入鄴城所願獲無違文帝臨江觀兵詩文帝行幸廣陵故城臨江觀兵帝於馬上為詩觀兵臨江水水流何湯湯戈矛成山林𤣥甲曜日光猛將懷暴怒膽氣正從横誰云江水廣一葦可以航不戰屈敵虜戢兵稱賢良古公宅岐邑實始翦殷商孟獻營虎牢鄭人懼稽顙充國務耕殖先零自破亡興農淮泗間築室都徐方量宜運權略六軍咸恱康豈如東山詩悠悠多憂傷陳思王獻文帝詩二篇於穆顯考時惟武皇受命于天寧濟四方朱旗所拂九土披攘𤣥化滂流荒服來王超商越周與唐比蹤篤生我皇弈世再聦武則肅烈文則時雍受禪炎漢臨君萬邦萬邦既化率由舊則廣命懿親以蕃王國帝曰爾侯君兹青土奄有海濱方周于魯車服有輝旗章有叙濟濟雋乂我弼我輔伊予小子恃寵驕盈舉挂時網動亂國經作藩作屏先軌是墮傲我皇使犯我朝儀國有典刑我削我絀將寘于理元凶是率明明天子時篤同類不忍我刑暴之朝肆違彼執憲哀予小子改封兖邑于河之濱股肱弗置有君無臣荒淫之闕誰弼予身㷀㷀僕夫于彼冀方嗟予小子乃罹斯殃赫赫天子恩不遺物冠我𤣥冕要我朱紱朱紱光大使我榮華剖符授玉王爵是加仰齒金璽俯執聖䇿皇恩過隆祗承怵惕咨我小子頑凶是嬰逝慙陵墓存愧闕廷匪敢慠德實恩是恃威靈改加足以没齒昊天罔極性命不圖常懼顛沛抱罪黄壚願䝉矢石建旗東嶽庶立毫釐微功自贖危軀授命知足免戾甘赴江湘奮戈呉越天啟其𠂻得㑹京畿遲奉聖顔如渴如饑心之云慕愴矣其悲天高聽卑皇肯照微又曰肅承明詔應㑹皇都星陳夙駕秣馬脂車命彼掌徒肅我征旅朝發鸞臺夕宿蘭渚芒芒原隰祁祁士女經彼公田樂我稷黍爰有樛木重陰匪息雖有餱糧饑不遑食望城不過面邑匪㳺僕夫警䇿平路是由𤣥駟藹藹揚鑣􅞎沬流風翼衡輕雲承蓋涉澗之濱縁山之隈遵彼河滸黄阪是階西躋闗谷或降或升騑驂倦路再寢再興將朝聖皇匪敢晏寧弭節長騖指日遄征前驅舉燧後乘抗旌輪不輟運鸞無廢聲爰暨帝室税此西墉嘉詔未賜朝覲莫從仰瞻城閾俯惟闕廷長懐永慕憂心如酲又發憤告離詩是時待遇諸國法峻任城王暴薨諸王既懷友于之痛植及白馬王彪還國欲同路東歸叙隔閑之思而監國使者不聽植發憤告離而作詩曰謁帝承明廬逝將歸舊疆清晨發皇邑日夕過首陽伊洛曠且深欲濟川無梁汎舟越洪濤怨彼東路長回顧戀城闕引領情内傷大谷何寥廓山樹鬱蒼蒼霖雨泥我塗流潦浩從横中逵絶無軌改轍登高岡修阪造雲日我馬𤣥以黄𤣥黄猶能進我思鬱以紆鬱紆將何念親愛在離居本圖相與偕中更不克俱鴟梟鳴衡軛豺狼當路衢蒼蠅間白黑讒巧反親踈欲還絶無蹊擥轡止踟蹰踟蹰亦何留相思無終極秋風發微涼寒蟬鳴我側原野何蕭條白日忽西匿孤獸走索羣銜草不遑食歸鳥赴高林翩翩厲羽翼感物傷我懷撫心長歎息歎息亦何為天命與我違奈何念同生一徃形不歸孤䰟翔故域靈柩寄京師存者勿復過亡没身自衰人生處一世忽若朝露晞年在桑榆間影響不能追自顧非金石咄咤令心悲心悲動我神棄置莫復陳丈夫志四海萬里猶比鄰恩愛苟不虧在逺分日親何必同衾裯然後展殷勤倉卒骨肉情能不懷苦辛苦辛何慮思天命信可疑虛無求列仙松子久吾欺變故在斯須百年誰能持離别永無㑹執手將何時王其愛玉體俱享黄髪期收涕即長塗援筆從此辭又琴瑟調歌辭吁嗟此轉蓬居世何獨然長去本根逝夙夜無休閒東西經七陌南北越九阡卒遇回風起吹我入雲間自謂終天路忽焉下沈淵驚颷接我出故歸彼中田當南而更北謂東而反西宕宕當何依忽亡而復存飄飄周八澤連翩歴五山流轉無恒處誰知吾苦艱願為中林草秋隨野火燔糜滅豈不痛願與林葉連楚王世子嘉遺石崇詩文武應時用兼才在明哲嗟嗟我石生為國之俊傑入侍於皇闥出則登九列威檢肅青徐風發宣呉裔疇昔謬同位情至過魯衛分離踰十載思逺心增結願子鑒斯誠寒暑不踰契石崇答詩昔常接羽儀俱㳺青雲中敦道訓胄子儒化渙以融同聲無異響故使恩愛隆豈惟敦初好欵分在令終孔不陋九夷老氏適西戎逍遥滄海隅可以保王躬世事非所務周公不足夢𤣥寂令神王是以守至沖阮瑀造琴歌瑀善解音能鼓琴遂撫弦而歌因造歌曲曰奕奕天門開大魏應期運青蓋廵九州在東西人怨士為知已死女為恱者玩恩義苟敷暢他人焉能亂阮籍寄懷歌籍少時嘗遊蘇門山蘇門山有隱者莫知姓名有竹實數斛臼杵而已籍從之與談太古無為之道及論五帝三王之義蘇門生蕭然曾不經聽籍乃對之長嘯清韻響亮蘇門生逌爾而笑籍旣降蘇門生亦嘯若鸞鳳之音焉至是籍乃假蘇門先生之論以寄所懷其歌曰日没不周西月出丹淵中陽精蔽不見陰光代為雄亭亭在須臾厭厭將復隆富貴俯仰間貧賤何必終又歎曰天地解兮六合開星辰隕兮日月頹我騰而上將何懷嵇康自責詩北山中見隠者孫登康欲與之言登黙然不對踰時將去康曰先生竟無言乎登乃曰子才多識寡難乎免於今之世及遭吕安亊為詩自責欲寡其過謗議沸騰性不傷物頻致怨憎昔慙栁下今愧孫登内負宿心外赧良朋呉質思文帝詩文帝崩質思慕作詩曰愴愴懷殷憂殷憂不可居徙倚不能坐出入步踟蹰念䝉聖主恩榮爵與衆殊自謂永終身志氣甫當舒何意中見棄棄我歸黄壚㷀㷀靡所恃淚下如連珠隨没無所益身死名不書慷慨自僶俛庶㡬烈丈夫杜摯與母丘儉求藥詩摯與母丘儉鄉里相親故為詩與儉求仙人藥一丸欲以感切儉求助也其詩曰騏驥馬不試婆娑槽櫪間壯士志未伸坎軻多辛酸伊摯為媵臣吕望身操竿夷吾困商販寗戚對牛歎食其處監門淮陰饑不餐買臣老負薪妻畔呼不還釋之宦十年位不增故官才非八子倫而與齊其患無知不在此袁盎未有言彼此篤病久榮衛動不安聞有韓衆藥信來給一丸母丘儉答詩鳳鳥翔京邑哀鳴有所思才為聖世出德音何不怡八子未遭遇今者值明時胡康出壟畆楊偉無根基飛騰沖雲天奮迅協光熈駿驥骨法異伯樂觀知之但當養羽翮鴻舉必有期體無纎微疾安用問良醫聯翩輕栖集還為燕雀嗤韓衆藥雖良或更不能治悠悠千里情薄言答嘉詩信心感諸中中實不能辭陳思王植銅爵臺賦植字子建時鄴銅爵臺新成太祖悉將諸子登臺使各為賦植援筆立成賦曰從明后而嬉遊兮登層臺以娯情見太府之廣開兮觀聖德之所營建高門之嵯峨兮浮雙闕乎太清立中天之華觀兮連飛閣乎西城臨漳水之長流兮望園果之滋榮仰春風之和穆兮聽百鳥之悲鳴天雲垣其既立兮家願得而獲逞揚仁化於宇内兮盡肅恭於上京惟桓文之為盛兮豈足方乎聖明休矣美矣惠澤逺揚翼佐我皇家兮寧彼四方同天地之規量兮齊日月之暉光永貴尊而無極兮等年壽於東王云云太祖深異之呉薛瑩獻孫皓詩薛綜子瑩孫皓初為左執法遷選曹尚書及立太子又領少傅建衡三年皓追歎瑩父綜遺文且命瑩繼作瑩獻詩曰惟臣之先昔仕于漢弈世緜緜頗涉臺觀暨臣父綜遭時之難邜金失御邦家毁亂適兹樂土庶存孑遺天啟其心東南是歸厥初流𨽻困于蠻埀大皇開基恩德逺施特䝉招命拯擢泥汙釋放巾褐受職剖符作守合浦在海之隅遷入京輦遂升機樞枯瘁更榮絶統復紀自微而顯非願之始亦惟寵過心存足止重値文皇建號東官乃作少傅光華益隆明明聖嗣至德謙崇禮遇兼加惟渥惟豐哀哀先臣念竭其忠洪恩未報委世以終嗟臣蔑賤惟昆及弟幸生幸育託綜遺體過庭既訓頑蔽難啟堂構弗克志在耦耕豈悟聖朝仁澤流盈追録先臣愍其無成是濟是拔被以殊榮珝忝千里受命南征旌旗備物金革揚聲及臣斯陋實闇實微既顯前軌人物之機復傅東宫繼世荷輝才不逮先是忝是違乾德博好文雅是貴追悼亡臣冀存遺類如何愚𦙍曾無髣髴瞻彼舊寵顧此頑虛孰能忍媿臣實與居夙夜反側克心自論父子兄弟累世䝉恩死惟結草生誓殺身雖則灰隕無報萬分胡綜黄龍賦權稱尊號因瑞改元又作黄龍大牙常在中軍諸軍進退視其所向命綜作賦曰乾坤肇立三才是生狼弧埀象實惟兵精聖人觀法是效是營始作器械爰求厥成黄農創代拓定皇基上順天心下息民災高辛誅共舜征有苗啟有甘師湯有鳴條周之牧野漢之垓下靡不由兵克定厥緒明明大呉實天生德神武是經惟皇之極乃自在昔黄虞是祖越歴五代繼世在下應期受命發迹南土將恢大繇革我區夏乃律天時制為神軍取象太一五將三門疾則如電遲則如雲進止有度約而不煩四靈既布黄龍處中周制日月實曰太常桀然特立六軍所望仙人在上鑒觀四方神實使之為國休祥軍欲轉向黄龍先移金鼓不鳴寂然變施闇謨若神可謂秘奇在昔周室赤烏銜書今也大呉黄龍吐符合契河洛動與道俱天贊人和僉曰惟休三國志文類巻五十八
