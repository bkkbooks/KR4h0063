body:
  text: 三國志文類巻二十二書疏呉薜綜請交州擇人疏字敬文時吕岱從交州召出綜懼繼岱者非其人上此疏昔帝舜南巡卒於蒼梧秦置桂林南海象郡然則四國之内屬也有自來矣趙陀起番禺懷服百越之君珠官之南是也漢武帝誅吕嘉開九郡設交阯刺史以鎮監之山川長逺習俗不齊言語同異重譯乃通民如禽獸長幼無别椎結徒跣貫頭左袵長吏之設雖有若無自斯以來頗徙中國罪人雜居其間稍使學書粗知言語使譯往來觀見禮化及後錫光為交阯任延為九真太守乃教其耕犂使之冠履為設媒官始知聘娶建立學校導之經義由此已降四百餘年頗有似類自臣昔客始至之時珠崖除州縣嫁娶皆須八月引户人民集㑹之時男女自相可適乃為夫妻父母不能止交阯糜泠九真都龎二縣皆兄死弟妻其嫂世以此為俗長吏恣聴不能禁制日南郡男女倮體不以為羞由此言之可謂蟲豸有靦面目耳然而土廣人衆阻險毒害易以為亂難使從治縣官羈縻示令威服田户之租賦裁取供辦貴致逺珍名珠香藥象牙犀角瑇瑁珊瑚琉璃鸚鵡翡翠孔雀竒物充備寶玩不必仰其賦入以益中國也然在九甸之外長吏之選類不精覈漢時法寛多自放恣故數反違法珠崖之廢起於長吏覩其好髪髠取為髲及臣所見南海黄葢為日南太守下車以供設不豐撾殺主簿仍見驅逐九真太守儋萌為妻父周京作主人并請大吏酒酣作樂功曹番歆起舞屬京京不肯起歆猶迫彊萌忿杖歆亡於郡内歆弟苗帥衆攻府毒矢射萌萌至物故交阯太守士燮遣兵致討卒不能克又故刺史㑹稽朱符多以鄉人虞褒劉彦之徒分作長吏侵虐百姓彊賦於民黄魚一枚收稻一斛百姓怨叛山賊並出攻州突郡符走入海流離喪亡次得南陽張津與荆州牧劉表為隙兵弱敵彊嵗嵗興軍諸將厭患去留自在津小檢攝威武不足為所陵侮遂至殺沒後得零陵賴恭先輩仁謹不曉時事表又遣長沙呉巨為蒼梧太守巨武夫輕悍不為恭服所取相怨恨逐出恭求步騭是時津故將夷廖錢愽之徒尚多隲以次鉏治綱紀適定㑹仍召出吕岱既至有士民之變越軍南征平討之日改置長吏章明王綱威加萬里大小承風由此言之綏邊撫裔實有其人牧伯之任既宜清能荒流之表禍福尤甚今日交州雖名粗定尚有高涼宿賊其南海蒼梧鬱林珠官四郡界未綏依作冦盜專為亡叛逋逃之藪若岱不復南新刺史宜得精密檢攝八郡方畧智計能稍稍以漸能治高涼者假其威寵借之形勢責其成效庶幾可補復如但中人近守常法無奇數異術者則群惡日滋久逺成害故國之安危在於所任不可不察也竊懼朝廷忽輕其選故竭愚情以廣聖思華覈薦薛瑩修史疏時瑩徙廣州覈上疏薦之臣聞五帝三王皆立史官叙録功美垂之無窮漢時司馬遷班固咸命世大才所撰精妙與六經俱傳大呉受命建國南土大皇帝末年命大史令丁孚郎中項峻始撰呉書孚峻俱非史才其所撰作不足紀録至少帝時更差韋曜周昭薛瑩梁廣及臣五人訪求往事所共撰立備有本末昭廣先亡曜負恩蹈罪瑩出為將復以過徙其書遂委滯迄今未撰奏臣愚淺才劣適可為瑩等記注而已若使撰合必襲孚峻之迹懼墜大皇帝之元功損當時之盛美瑩涉學既博文章尤妙同寮之中瑩為冠首今者見吏雖多經學記述之才如瑩者少是以慺慺為國惜之實欲使卒垂成之功編於前史之末奏上之後退填溝壑無所復恨皓遂召瑩還為左國史周瑜上劉備治公安疏字公瑾時劉備以左將軍領荆州牧治公安瑜上此疏劉備以梟雄之姿而有關羽張飛熊虎之將必非久屈為人用者愚謂大計宜徙備置呉盛為築宫室多其美女玩好以娯其耳目分此二人各置一方使如瑜者得挾與攻戰大事可定也今猥割土地以資業之聚此三人俱在疆埸恐蛟龍得雲雨終非池中物也權以曹公在北方當廣擥英雄又恐備難卒制故不納諸葛瑾步騭上理周𦙍疏故將軍周瑜子𦙍昔䝉粉飾受封為將不能養之以福思立功效至縱情欲招速罪辟臣竊以瑜昔見寵任入作心膂出為爪牙銜命出征身當矢石盡節用命視死如歸故能摧曹操於烏林走曹仁於郢都揚國威徳華夏是震蠢爾蠻荆莫不賔服雖周之方叔漢之信布誠何以尚也夫折衝扞難之臣自古帝王莫不貴重故漢高帝封爵之誓曰使黄河如帶太山如礪國以永存爰及苗裔申以丹書重以盟誼藏於宗廟傳於無窮欲使忠臣之後世世相踵非徒子孫乃闗苗裔報徳明功勤勤懇懇如此之至欲以勸戒後人用命之臣死而無悔也况於瑜身沒而未久而其子𦙍降為匹夫益可悼傷竊惟陛下欽明稽古隆於興繼為𦙍歸訴乞匄餘罪還兵復爵使失旦之鷄復得一鳴抱罪之臣展其後効虞翻上呉主書昔孫權嘗與張昭論及神仙翻指昭曰彼皆死人而語神仙世豈有仙人也權積怒非一遂徙翻交州權即尊號翻因上此疏陛下膺明聖之徳體舜禹之孝歴運當期順天濟物奉承䇿命臣獨抃舞罪棄兩絶拜賀無階仰瞻宸極且喜且悲臣伏自刻省命輕雀鼠性輶毫釐罪惡莫大不容於誅昊天罔極全宥九載退當念戮頻受生活復偷視息臣年耳順思咎憂憤形容枯悴髪白齒落雖未能死自悼終沒不見宫闕百官之富不覩皇輿金軒之飾仰觀巍巍衆民之謡傍聽鐘鼔侃然之樂永隕海隅棄骸絶域不勝悲慕逸豫大慶悦以忘罪駱統上征役疫癘損民疏時徵役繁數重以疫癘民户損耗統上疏臣聞君國者以據疆土為彊富制威福為尊貴曜徳義為榮顯永世𦙍為豐祚然財須民生彊賴民力威恃民勢福由民殖徳俟民茂義以民行六者既備然後應天受祚保族宜邦書曰衆非后無能胥以寧后非衆無以辟四方推是言之則民以君安君以民濟不易之道也今彊敵未殄海内未乂三軍有無已之役江境有不釋之備徵賦調數由來積紀加以殃疫死䘮之災郡縣荒虚田疇蕪曠聴聞屬城民户浸寡又多殘老少有丁夫聞此之日心若焚燎思尋所由小民無知既有安土重遷之性且又前後出為兵者生則困苦無有溫飽死則委棄骸骨不反是以尤用戀本畏逺同之於死每有徵發羸謹居家重累者先見輸送小有財貨傾居行賂不顧窮盡輕剽者則迸入險阻黨就羣惡百姓虛竭嗷然愁擾愁擾則不營業不營業則致窮困致窮困則不樂生故口腹急則姦心動而攜叛多也又聞民間非居處小能自供生產兒子多不起養屯田貧兵亦多棄子天則生之而父母殺之既懼於逆和氣感動隂陽且惟殿下開基建國乃無窮之業也彊鄰大敵非造次所滅疆埸常守非期月之戍而兵民減耗後生不育非所以歴逺年致成功也夫國之有民猶水之有舟停則以安擾則以危愚而不可欺弱而不可勝是以聖王重焉禍福由之故與民消息觀時制政方今長吏親民之職惟以辦具為能取過目前之急少復以恩惠為治副稱殿下天覆之仁勤恤之徳者官民政俗日以彫弊漸以陵遲勢不可久夫治疾及其未篤除患貴其未深願殿下少以萬幾餘閒留神思省補復荒虚深圖逺計育殘餘之民阜人財之用參曜三光等崇天地臣統之大願足以死而不朽矣權感統言深加意焉陸遜上仕進未得所疏時荆州士人新還仕進未得所遜上疏曰昔漢高受命招延英異光武中興羣俊畢至苟可以熙隆道教者未必逺近今荆州始定人物未達臣愚慺慺乞普加覆載抽拔之恩令並獲自進然後四海延頸思歸大化權敬納其言又上擊劉備疏權令遜拒劉備備圍至夷陵遜上疏曰夷陵要害國之闗限雖為易得亦復易失失之非徒損一郡之地荆州可憂今日爭之當令必諧備干天常不守窟穴而敢自送臣雖不才憑奉威靈以順討逆破壊在近尋備前後行軍多敗少勝推此論之不足為戚臣初嫌之水陸俱進今反舎船就歩處處結營察其布置必無他變伏願至尊髙枕不以為念也三國志文類巻二十二
