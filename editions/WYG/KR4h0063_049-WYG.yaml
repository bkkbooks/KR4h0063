body:
  text: 三國志文類巻四十九牋魏劉廙謝劉表牋廙兄望之有名於世荆州牧劉表辟為從事其友二人皆以䜛毁為表所誅廙謂望之曰趙殺鳴犢仲尼廻輪今兄既不能法柳下惠和光同塵於内則宜模范蠡遷化於外坐而自絶於時殆不可也望之不從尋復見害廙奔揚州為牋表謝劉表曰考匊過䝉分遇榮授之顯未有管狐桓文之烈孤徳隕命精神不遂兄望之見禮在昔既無堂構昭前之績中規不密用墜禍辟斯乃神明弗佑天降之災悔吝之負哀號靡及廙之愚淺言行多違懼有浸潤三至之間考匊之愛已衰望之之責猶存必傷天慈既徃之分門户殪滅取笑明哲是用迸竄永渉川路即日到廬江尋陽昔鍾儀有南音之操椒舉有班荆之思雖逺猶邇敢忘前施蜀法正與劉璋牋正受性無術盟好違損懼左右不明本末必並歸咎䝉耻沒身辱及執事是以捐身於外不敢反命恐聖聴穢惡其聲故中間不有牋敬顧念夙遇瞻望悢悢然惟前後披露腹心自從始初以至於終實不藏情有所不盡但愚闇策薄精誠不感以至於此今國事已危禍害在速雖捐放於外言足憎尤猶貪極其所懷以盡餘忠明將軍本心正之所知也實為區區不欲失左將軍之意而卒至於是者左右不逹英雄從事之道謂可違信黷誓而以意氣相致日月相選趍求順耳悦目隨阿遂指不圖逺慮為國深計故也事變既成又不量强弱之勢以為左將軍縣逺之衆糧榖無儲欲得以多擊少曠日相持而從闗至此所厯輙破離宫别屯日自零落雒下雖萬兵皆壞陣之卒破軍之將若欲爭一旦之戰則兵将勢力實不相當各欲逺期計量者今此營守已固榖米已積而明將軍土地日削百姓日困敵對遂多所供逺曠愚意計之謂必先竭將不復以持久也空爾相守猶不相堪今張益徳數萬之衆已定巴東入犍為界分平資中徳陽三道並侵將何以禦之本為明將軍計者必謂此軍縣逺無糧饋運不及兵少無繼今荆州道通衆數十倍加孫車騎遣弟及李異甘寕等為其後繼若爭客主之勢以土地相勝者今此全有巴東廣漢犍為過半已定巴西一郡復非明將軍之有也計益州所仰惟蜀蜀亦破壞三分亡二吏民疲困思為亂者十户而八若敵逺則百姓不能堪役敵近則一旦易主矣廣漢諸縣是明比也又魚復與闗頭實為益州禍福之門今二門悉開堅城皆下諸軍並破兵将俱盡而敵家數道並進已入心腹坐守都雒存亡之勢昭然可見斯乃大畧其外較耳其餘屈曲難以辭極也以正下愚猶知此事不可復成况明将軍左右明智用謀之士豈當不見此數哉旦夕偷幸求容取媚不慮逺圖莫肯盡心獻良計耳若事窮勢廹將各索生求濟門户展轉反覆與今計異不為明將軍盡死難也而尊門猶當受其憂正雖獲不忠之謗然心自謂不負聖徳顧惟分義實竊痛心左将軍從本舉來舊心依依實無薄意愚以為可圖變化以保尊門呉張紘授子紘為孫權長史後還吳迎家道病卒臨困授子靖留牋曰自古有國有家者咸欲脩徳政以比隆盛世至於其治多不馨香非無忠臣賢佐闇於治體也由主不勝其情弗能用耳夫人情憚難而趨易好同而惡異與治道相反傳曰從善如登從惡如崩言善之難也人君承奕世之基據自然之勢操八柄之威甘易同之歡無假取於人而忠臣挾難進之術吐逆耳之言其不合也不亦宜乎雖則有釁巧辯縁間眩於小忠戀於恩愛賢愚雜錯長幼失序其所由來情亂之也故明君悟之求賢如饑渴受諌而不厭抑情損欲以義割恩上無偏謬之授下無希冀之望宜加三思含垢藏疾以成仁覆之大時年六十卒權省書流涕諸葛恪諫齊王奮牋時權薨太傅諸葛恪不欲諸王處江濵兵馬之地徙奮於豫章奮怒不從牋命又數越法度恪上帝王之尊與天同位是以家天下臣父兄四海之内皆為臣妾仇敵有善不得不舉親戚有惡不得不誅所以承天理物先國後身葢聖人立制百代不易之道也昔漢初興多王子弟至於太彊輙為不軌上則幾危社稷下則骨肉相殘其後懲戒以為大諱自光武以來諸王有制惟得自娯於宫内不得臨民干與政事其與交通皆有重禁遂以全安各保福祚此則前世得失之驗也近袁紹劉表各有國土土地非狹人衆非弱以適庶不分遂滅其宗祀此乃天下愚智所共嗟痛大行皇帝覽古戒今防芽遏萌慮於千載是以寢疾之日分遣諸王各早就國詔策殷勤科禁嚴峻其所戒勅無所不至誠欲上安宗廟下全諸王使百世相承無凶國害家之悔也大王宜上推太伯順父之志中念河間獻王東海王强恭敬之節下當存抑驕恣荒亂以為警戒而聞頃至武昌以來多違詔勅不拘制度擅廢諸將兵治䕶宫室又左右常從有罪過者當以表聞公付有司而擅私殺事不明白大司馬吕岱親受先帝詔勅轉導大王既不承用其言令懷憂怖華錡先帝近臣忠良正直其所陳導當納用之而聞怒錡有收縳之語又中書楊融親受詔勅所當恭肅云正自不聴禁當如我何聞此之日大小驚怪莫不寒心里語曰明鏡所以照形古事所以知今大王宜深以魯王為戒改易其行戰戰兢兢盡敬朝廷如此則無求不得若棄忘先帝法教懷輕慢之心臣下寕負大王不敢負先帝遺詔寕為大王所怨疾豈敢忘尊主之威而令詔勅不行於藩臣邪此古今正義大王所照知也夫福來有由禍生有漸漸生不憂將不可悔向使魯王早納忠直之言懷驚懼之慮享祚無窮豈有滅亡之禍哉夫良藥苦口惟疾者能甘之忠言逆耳惟達者能受之今者恪等慺慺欲為大王除危殆於萌芽廣福慶之基原是以不自知言至願䝉三思周瑜上呉王牋瑜疾困上權此牋曰瑜以凡才昔受討逆殊特之遇委以腹心遂荷榮任統御兵馬志執鞭弭自效戎行䂓定蜀國次取襄陽慿頼威靈謂若在握至以不謹道遇暴疾昨自醫療日加無損人生有死脩短命矣誠不足惜但恨微志未展不復奉教命耳方今曹公在北疆埸未靜劉備寄寓有似養虎天下之事尚未知終始此朝士旰食之秋至尊垂慮之日也魯肅忠烈臨事不苟可以代瑜人之將死其言也善儻或可採瑜死不朽矣周魴誘曹休牋其一字子魚被命密求山中舊族名帥為北敵所聞知者令譎挑魏大司馬揚州牧曹休魴答恐民帥小醜不足仗任事或漏泄不能致休乞遣親人齎牋七條以誘休魴以千載徼幸得備州民逺隔江川敬恪未顯瞻望雲景天寔為之精誠微薄名位不昭雖懷焦渇曷縁見明狐死首丘人情戀本而逼所制奉覿禮違每獨矯首西顧未嘗不寤寐勞歎展轉反側也今因隙穴之際得陳宿昔之志非神啓之豈能致此不勝翹企萬里託命謹遣親人董岑邵南等託叛奉牋時事變故列於别紙惟明公君侯垂日月之光照逺民之趣永令歸命者有所戴頼其二魴逺在邊隅江汜分絶恩澤教化未䝉撫及而於山谷之間遥陳所懷懼以大義未見信納夫物有感激計因變生古今同揆魴仕東典郡始願已獲銘心立報永矣無貳豈圖頃者中被横譴禍在漏刻危於投卵進有離合去就之宜退有誣罔枉死之咎雖志行輕微存沒一節顧非其所能不悵然敢縁古人因知所歸拳拳輸情陳露肝膈乞降春天之潤哀拯其急不復猜疑絶其委命事之宣泄受罪不測一則傷慈損計二則杜絶向化者心惟明使君逺覽前世矜而愍之留神所質速賜祕報魴當候望舉動事須響應其三魴所代故太守廣陵王靖往者亦以郡民為變以見譴責靖勤自陳釋而終不解因立密計欲北歸命不幸事露誅及嬰孩魴既目見靖事且觀東主一所非薄嫿不復厚雖或暫舎終見剪除今又令魴領郡者是欲責後效必殺魴之趣也雖尚視息憂惕焦灼未知軀命竟在何時人居世間猶白駒過隙而常抱危怖其可言乎惟當陳愚重自披盡懼以卑賤未能采納願明使君少垂詳察忖度其言今此郡民雖外名降首而故在山草看伺空隙欲復為亂為亂之日魴命訖矣東主頃者潛部分諸將圖欲北進吕範孫韶等入淮全琮朱桓趨合肥諸葛瑾歩隲朱然到襄陽陸議潘璋等討梅敷東主中營自掩石陽别遣從弟孫奐治安陸城修立邸閣輦貲運糧以為軍儲又命諸葛亮進指闗西江邊諸將無復在者才留三千所兵守武昌耳若明使君以萬兵從皖南首江渚魴便從此率厲吏民以為内應此方諸郡前後舉事垂成而敗者由無外援使其然耳若北軍臨境傳檄屬城思詠之民誰不企踵願明使君上觀天時下察人事中参蓍龜則足昭往言之不虚也其四所遣董岑邵南少長家門親之信之有如兒子是以特令齎牋託叛為辭目語心計不宣唇齒骨月至親無有知者又已勅之到州當言往降欲北叛來者得傳之也魴建此計任之於天若其濟也則有生全之福邂逅泄漏則受夷滅之禍常中夜仰天告誓星辰精誠之微豈能上感然事急孤窮惟天是訴耳遣使之日載生載死形存氣亡魄爽恍惚私恐使君未深保明岑南二人可留其一以為後信一齎教還教還故當言悔叛還者東主有常科悔叛還者皆自原罪如是彼此俱塞永無端原縣命西望涕筆俱下其五鄱陽之民實多愚勁師之赴役未即應人倡之為變聞聲響抃今雖降首盤節未解山栖草藏亂心猶存而今東主圖興大衆舉國悉出江邊空曠屯塢虚損惟有諸刺姦耳若因是際而騷動此民一旦可得便㑹然要恃外援表裏機牙不爾以往無所成也今使君若從皖道進住江上魴當從南對岸厯口為應若未徑到江岸可往百里上令此間民知北軍在彼即自善也此間民非苦饑寒而甘兵冦苦於征討樂得北屬但窮困舉事不時見應尋受其禍耳如使石陽及青徐諸軍首尾相銜牽綴往兵使不得速退者則善之善也魴生在江淮長於時事見其便利百舉百捷時不再來敢布腹心其六東主致恨前者不㧞石陽今此後舉大合新兵并使潘濬發夷民人數甚多聞豫設科條當以新羸兵置前好兵在後攻城之日云欲以羸兵填壍使即時破雖未能然是事大趣也私恐石陽城小不能久留往兵明使君速垂救濟誠宜疾密王靖之變其鑒不逺今魴歸命非復在天正在明使君耳若見救以往則功可必成如見救不時則與靖等同禍前彭綺時聞旌麾在逢龍此郡民大小歡喜並思立效若留一月日間事當大成恨去電速東得增衆專力討綺綺始敗耳願使君深察此言其七今舉大事自非爵號無以勸之乞請將軍侯印各五十紐郎將印百紐校尉都尉之印各二百紐得以假授諸魁帥奨勵其志并乞請幢麾數十以為表幟使山兵吏民目曕見之知去就之分已決承引所救畫定又彼此降叛日月有人闊狹之間輙得聞知今之大事事宜神密若省魴牋乞加隠祕伏知智度有常防慮必深魴懷憂震灼啓事蒸仍乞未罪怪三國志文類巻四十九
