body:
  text: 三國志文類巻二十八戒責魏李秉家誡字𤣥胄有雋才為時人所貴嘗答司馬文王問因以為家誡曰昔侍坐於先帝時有三長吏俱見臨辭出上曰為官長當清當慎當勤脩此三者何患不治乎並受詔既出上顧謂吾等曰相誡勅正當爾不侍坐衆賢莫不贊善上又問曰必不得已於斯三者何先或對曰清固為本次復問吾吾對曰清慎之道相須而成必不得已慎乃為大夫清者不必慎慎者必自清亦由仁者必有勇勇者不必有仁是以易稱括囊無咎藉用白茅皆慎之至也上曰卿言得之耳可舉近世能慎者誰乎諸人各未知所對吾乃舉故太尉荀景倩尚書董仲連僕射王公仲並可謂為慎上曰此諸人者溫恭朝夕執事有恪亦各其慎也然天下之至慎其惟阮嗣宗乎每與之言言及𤣥逺而未曾評論時事臧否人物真可謂至慎矣吾每思此言亦足以為明戒凡人行事年少立身不可不慎勿輕論人勿輕説事如此則悔吝何由而生患禍無從而至矣王昶戒子昶為兄子及子作名字皆依謙實以見其意故兄子黙字處靜沈字處道其子渾字𤣥沖深字道沖遂書戒之曰夫人為子之道莫大於寶身全行以顯父母此三者人知其善而或危身破家陷於滅亡之禍者何也由所祖習非其道也夫孝敬仁義百行之首行之而立身之本也孝敬則宗族安之仁義則鄉黨重之此行成於内名著於外者矣人若不篤於至行而背本逐末以陷浮華焉以成朋黨焉浮華則有虛偽之累朋黨則有彼此之患此二者之戒昭然著明而循覆車滋衆逐末彌甚皆由惑當時之譽昧目前之利故也夫富貴聲名人情所樂而君子或得而不處何也惡不由其道耳患人知進而不知退知欲而不知足故有困辱之累悔吝之咎語曰如不知足則失所欲故知足之足常足矣覽往事之成敗察將來之吉凶未有干名要利欲而不厭能保世持家永全福禄者也欲使汝曹立身行已遵儒者之教履道家之言故以𤣥黙沖虚為名欲使汝曹顧名思義不敢違越也古者盤杅有銘几杖有誡俯仰察焉用無過行况在已名可不戒之哉夫物速成則疾亡晚就則善終朝華之草夕而零落松栢之茂隆寒不衰是以大雅君子惡速成戒闕黨也若范匄對秦客而武子擊之折其委筓惡其掩人也國語曰范文子暮退於朝武子曰何其暮也對曰有秦客庾辭於朝大夫莫之能對也吾知其三焉武子怒曰大夫非不能也讓父兄也爾童子而三掩人於朝吾不在晉國亡無日也擊之以杖折其委筓夫人有善鮮不自伐有能寡不自矜伐則掩人矜則陵人掩人者人亦掩之陵人者人亦陵之故三郤為戮於晉王叔負罪於周不惟矜善自伐好爭之咎乎故君子不自稱非以讓人惡其葢人也夫能屈以為伸讓以為得弱以為彊鮮不遂矣夫毁譽愛惡之原而禍福之機也是以聖人慎之孔子曰吾之於人誰毁誰譽如有所譽必有所試又曰子貢方人賜也賢乎哉我則不暇以聖人之徳猶尚如此况庸庸之徒而輕毁譽哉昔伏波將軍馬援戒其兄子言聞人之惡當如聞父母之名耳可得而聞口不可得而言也斯戒至矣人或毁已當退而求之於身若已有可毁之行則彼言當矣若已無可毁之行則彼妄矣當則無怨於彼妄則無害於身又何反報焉且聞人毁已而忿者惡醜聲之加人也人報者滋甚不如黙而自脩已也諺曰救寒莫如重裘止謗莫如自脩斯言信矣若與是非之士凶險之人近猶不可况與對校乎其害深矣夫虛偽之人言不根道行不顧言其為浮淺較可識别而世人惑焉猶不檢之以言行也近濟隂魏諷山陽曹偉皆以傾邪敗沒熒惑當世挾持姦慝驅動後生雖刑於鈇鉞大為炯戒然所汙染固已衆矣可不慎與若夫山林之士夷叔之倫甘長飢於首陽安赴火於緜山雖可以激貪勵俗然聖人不可為吾亦不願也今汝先人世有冠冕惟仁義為名守慎為稱孝悌於閨門務學於師友吾與時人從事雖出處不同然各有所取穎川郭伯益好尚通達敏而有知其為人𢎞曠不足輕貴有餘得其人重之如山不得其人忽之如草吾以所知親之昵之不願兒子為之北海徐偉長不治名高不求苟得澹然自守惟道是務其有所是非則託古人以見其意當時無所褒貶吾敬之重之願兒子師之東平劉公幹博學有高才誠節有大意然性行不均少所拘忌得失足以相補吾愛之重之不願兒子慕之樂安任昭先淳粹履道内敏外恕推遜恭讓處不避洿怯而義勇在朝忘身吾友之善之願兒子遵之若引而伸之觸類而長之汝其庶幾舉一隅耳及其用財先九族其施舎務周急其出入存故老其論議貴無貶其進仕尚忠節其取人務道實其處世戒驕淫其貧賤慎無戚其進退念合宜其行事加九思如此而已吾復何憂哉王基戒司馬景王書司馬景王新統政基書戒之曰天下至廣萬機至猥誠不可不兢兢業業坐而待旦也夫志正則衆邪不生心靜則衆事不躁思慮審定則教令不煩親用忠良則逺近協服故知和逺在身定衆在心許允傅嘏袁侃崔贊皆一時正士有直質而無流心可與同政事者也景王納其言呉孫和戒博奕羣寮侍宴言及博奕和以為妨事費日而無益於用勞精損思而終無所成非所以進徳脩業積累功緒者也且志士愛日惜力君子慕其大者高山景行恥非其次夫以天地長久而人居其間有白駒過隙之喻年齒一暮榮華不再凡所患者在於人情所不能絶誠能絶無益之欲以奉徳義之塗棄不急之務以脩功業之基其於名行豈不善哉夫人情猶不能無嬉娯嬉娯之好亦在於飲宴琴書射御之間何必博奕然後為歡乃命侍坐者八人各著論以矯之於是中庶子韋曜退而論奏和以示賔客時蔡穎好奕直事在署者頗斆焉故以此諷之三國志文類巻二十八
