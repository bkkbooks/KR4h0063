body:
  text: 三國志文類巻五十一評魏陳壽評二公孫陶四張評曰公孫瓚保京坐待夷滅度殘暴而不節淵仍業以載㓙祗足覆其族也陶謙昏亂而憂死張楊授首於臣下皆擁據州郡曾匹夫之不若固無可論者也燕繡魯舎羣盜列功臣去危亡保宗祀則於彼為愈焉又評諸夏侯曹氏評曰夏侯曹氏世為婚姻故惇淵仁洪休尚真等並以親舊肺腑貴重於時左右勲業咸有効勞爽德薄位尊沈溺淫溢此固大易所著道家所忌也𤣥以規格局度世稱其名然與曹爽中外繾綣榮位如斯曽未聞匡弼其非授致良才舉兹以論焉能免之乎又評荀彧荀攸賈詡評曰荀彧清秀通雅有王佐之風然機鑒先識未能充其志也荀攸賈詡庶乎算無遺䇿經達權變其良平之亞與又評袁張涼國田王邴管評曰袁渙邴原張範躬履清蹈進退以道蓋是貢禹兩龔之匹涼茂國淵亦其次也張承名行亞範可謂能弟矣田疇抗節王脩忠貞足以矯俗管寧淵雅高尚確然不拔張臶胡昭闔門守靜不營當世故并録焉又評徐奕何䕫邢顒毛玠司馬芝崔琰鮑勛評曰徐奕何䕫邢顒貴尚峻厲為世名人毛玠清公素履司馬芝忠亮不傾庶乎不吐剛茹柔崔琰高格最優鮑勛秉正無虧而皆不免其身惜哉大雅貴既明且哲虞書尚直而能温自非兼才疇克備諸又評鍾繇華歆王朗評曰鍾繇開達理幹華歆清純德素王朗文博富贍誠皆一時之俊偉也魏氏初祚肈登三司盛矣夫王肅亮直多聞能析薪哉劉寔以為肅方於事上而好下佞已此一反也性嗜榮貴而不求苟合此二反也吝惜財物而治身不穢此三反也孫盛評華歆評曰盛聞慶賞威刑必宗於主權宜宥恕出自人君子路私饋仲尼毁其食器田氏盜施春秋著以為譏斯褒貶之成言已然之顯義也孥戮之家國刑所肅受賜之室乾施所加若在哀矜理無偏宥歆居股肱之任同元首之重則當公言皇朝以彰天澤而黙受嘉賜獨為君子既犯作福之嫌又違必去之義可謂匹夫之仁蹈道則未也又評合淝戰守評曰夫兵固詭道奇正相資若乃命將出征推轂委權或賴率然之形或憑犄角之勢羣帥不和則棄師之道也至於合淝之守縣弱無援專任勇者則好戰生患專任怯者則懼心難保且彼衆我寡必懷貪墮以致命之兵擊貪墮之卒其勢必勝勝而後守守則必固是以魏武推選方圓參以同異為之宻教節宣其用事至而應若合符契妙矣夫裴松之評蔣濟議郊祀評曰臣松之案蔣濟立郊議稱曹騰碑文云曹氏族出自邾魏書述曹氏𦙍緒亦如之魏武作家傳自云曹叔振鐸之後故陳思王作武帝誄曰於穆武王胄稷𦙍周此其不同者也及至景初明帝從高堂隆議謂魏為舜後後魏為禪晉文稱昔我皇祖有虞則其異彌甚尋濟難隆及與尚書繆襲徃反並有理據文多不載濟亦未能定氏族所出但謂魏非舜後而横祀非族降黜太祖不配正天皆為繆妄然于時竟莫能正濟又難鄭𤣥注祭法云有虞以上尚德禘郊祖宗配用有德自夏已下稍用其姓氏濟曰夫蚪龍神於獺獺自祭其先不祭蚪龍也騏驎白虎仁於豺豺自祭其先不祭騏虎也如𤣥之說有虞已上豺獺之不若邪臣以為祭法所云見疑學者久矣鄭𤣥不考正其違而就通其義濟豺獺之譬雖似俳諧然其義旨有可求焉陳壽評程昱郭嘉董昭劉曄蔣濟劉放孫資評曰程昱郭嘉董昭劉曄蔣濟才䇿謀畧世之奇士雖清治德業殊於荀攸而籌畫所料是其倫也劉放文翰孫資勤愼並管喉舌權聞當時雅亮非體是故譏諛之聲每過其實矣又評劉馥司馬朗梁習張既温恢賈逵評曰自漢季以來刺史總統諸郡賦政于外非若曩時司察之而已太祖創基迄終魏業此皆其流稱譽有名實者也咸精達事機威恩兼著故能肅齊萬里見述于後也又評任蘇杜鄭倉評曰任峻始興義兵以歸太祖闢土殖榖倉庾盈溢庸績致矣蘇則威以平亂既政事之良又矯矯剛直風烈足稱杜畿寛猛克濟惠以康民鄭渾倉慈恤理有方抑皆魏代之名守乎恕屢陳時政經綸治體蓋有可觀焉又評張樂于張徐評曰太祖建兹武功而時之良將五子為先于禁最號毅重然弗克其終張郃以巧變為稱樂進以驍果顯名而鑒其行事未副所聞或注記有遺漏未如張遼徐晃之備詳也又評二李臧文吕許典二龎閻評曰李典貴尚儒雅義忘私隙美矣李通臧霸文䀻吕䖍鎮衛州郡並著威惠許禇典韋折衝左右抑亦漢之樊噲也龐德授命叱敵有周苛之節龐淯不憚伏劒而誠感鄰國閻温向城大呼齊解路之烈焉又評任城陳思蕭王評曰任城武藝壯猛有將領之氣陳思文才富豔足以自通後葉然不能克讓逺防終致攜隙傳曰楚則失之矣而齊亦未為得也其此之謂歟又評魏氏王公評曰魏氏王公既徒有國土之名而無社稷之實又禁防壅隔同於囹圄位號靡定大小歲易骨肉之恩乖常棣之義廢為法之弊一至于此乎孫盛評魏氏封建評曰異哉魏氏之封建也不度先王之典不思藩屏之術違敦穆之風背維城之義漢初之封或權侔人主雖云不度時勢然也魏氏諸侯陋同匹夫雖懲七國矯枉過也且魏之代漢非積德之由風澤既㣲六合未一而彫剪枝幹委權異族勢同瘣木危若巢幕不祀忽諸非天䘮也五等之制萬世不易之典六代興亡曹冏論之詳矣陳壽評王粲衛覬劉廙劉劭傅嘏評曰昔文帝陳王以公子之尊博好文采同聲相應才士並出惟粲等六人最見名目而粲特處常伯之官興一代之制然其沖虛德宇未若徐幹之粹也衛覬亦以多識典故相時王之式劉劭該覽學籍文質周洽劉廙以清鑒著傅嘏用才達顯云又評桓階陳羣陳泰陳矯徐宣衛臻盧毓評曰桓階識覩成敗才周當世陳羣動仗名義有清流雅望泰宏濟簡至允克堂構矣魏世事統臺閣重内輕外故八座尚書即古六卿之任也陳徐衛盧久居斯位矯宣剛斷骨鯁臻毓規鑒清理咸不忝厥職云又評和洽常林楊俊杜襲趙儼裴潛評曰和洽清和幹理常林素業純固楊俊人倫行義杜襲温粹識統趙儼剛毅有度裴潛平恒貞幹皆一世之美士也至於能不繫心於三司以大夫告老美矣哉又評韓暨崔林高柔孫禮王觀評曰韓暨處以静居行化出以任軄流稱崔林簡樸知能高柔明於法理孫禮剛斷伉厲王觀清勁貞白咸克致公輔及暨年過八十起家就列柔保官二十年元老終位比之徐邈常林於兹為疚矣三國志文類巻五十一
