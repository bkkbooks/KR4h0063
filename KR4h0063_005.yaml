body:
  text: 三國志文類卷五詔書魏陳留王燕王不稱臣詔并有司奏古之王者或有所不臣王將宜依此義表不稱臣乎又當為報夫後大宗者降其私親况所繼者重耶若便同之臣妾亦情所未安其皆依禮典處當務盡其宜有司奏以為禮莫崇於尊祖制莫大於正典陛下稽德期運撫臨萬國紹太宗之重隆三祖之基伏惟燕王體尊戚屬正位藩服躬秉虔肅率蹈恭德以先萬國其於正典闡濟大順所不得制聖朝誠宜崇以非常之制奉以不臣之禮臣等平議以為燕王章表可聽如舊式中詔所施或存好問準之義類則宴覿之族也可少順聖敬加崇儀稱示不敢斥宜曰皇帝敬問大王侍御至於制書國之正典朝廷所以辨章公制宣昭軌儀於天下者也宜循法故曰制詔燕王凡詔命制書奏事上書諸稱燕王者可皆上平其非宗廟助祭之事皆不得稱王名奏事上書文書及吏民皆不得觸王諱以彰殊禮加於羣后上遵正典尊祖之制俯順聖敬蒸蒸之心二者不愆禮實宜之可普告施行督鄧艾禽薑維詔蜀蕞爾小國土狹民寡而薑維虐用其衆曾無廢志往嵗破敗之後猶復耕種沓中刻剝衆羌勞役無已民不堪命夫兼弱攻昧武文善經致人而不致於人兵家之上略蜀所恃賴惟維而已因其逺離巢窟用力為易今使征西將軍鄧艾督帥諸軍趨甘松沓中以羅取維雍州刺史諸葛緒督諸軍趨武都髙樓首尾踧討若禽維便當東西並進掃滅巴蜀也蜀先主封張飛策朕承天序嗣奉洪業除殘靖亂未燭厥理今冦虜作害民被荼毒思漢之士延頸鶴望朕用怛然坐不安席食不甘味整軍誥誓將行天罰以君忠毅侔蹤召虎名宣遐邇故特顯命髙墉進爵兼司于京其誕將天威柔服以德伐叛以刑稱朕意焉詩不云乎匪疚匪棘王國來極肇敏戎功用錫爾祉可不勉歟後主告諭伐魏詔朕聞天地之道福仁而禍淫善積者昌惡積者喪古今常數也是以湯武修德而王桀紂極暴而亡曩者漢祚中微網漏凶慝董卓造難震蕩京畿曹操階禍竊執天衡殘剝海內懷無君之心子丕孤豎敢尋亂階盜據神器更姓改物世濟其凶當此之時皇極幽昧天下無主則我帝命隕越於下昭烈皇帝體明睿之德光演文武應乾坤之運出身平難經營四方人鬼同謀百姓與能兆民欣戴奉順符讖建位易號丕承天序補弊興衰存復祖業誕膺皇綱不墜于地萬國未靖早世遐殂朕以幼沖繼統鴻基未習保傅之訓而嬰祖宗之重六合壅否社稷不建永維所以念在匡救光載前緒求有攸濟朕甚懼焉是以夙興夜寐不敢自逸每崇菲薄以益國用勸分務穡以阜民財授方任能以參其聽斷私降意以養將士欲奮劍長驅指討凶逆朱旗未舉而丕復隕喪斯所謂不然我薪而自焚也殘類餘醜久支天禍恣雎河洛阻兵未弭諸葛丞相𢎞毅忠壯忘身憂國先帝託以天下以朂朕躬今授之以旄鉞之重付之以專命之權統領步騎二十萬衆董督元戎龔行天罰除患寧亂克復舊都在此行也昔項籍總一強衆跨州兼土所務者大然卒敗垓下死於東城宗族如焚為笑千載皆不以義陵上虐下故也今賊效尤天人所怨奉時宜速庶慿炎精祖宗威靈相助之福所向必克吳王孫權同恤災患潛軍合謀掎角其後涼州諸國王各遣月支康居胡侯支富康植等二十餘人詣受節度大軍北出便欲率將兵馬奮戈先驅天命既集人事又至師貞勢并必無敵矣夫王者之兵有征無戰尊而且義莫敢抗也故鳴條之役軍不血刃牧野之師商人倒戈今旍麾首路其所經至亦不欲窮兵極武有能去邪從正簞食壺漿以迎王師者國有常典封寵大小各有品限及魏之宗族支葉中外有能規利害審逆順之數來詣降者皆原除之昔輔顆絶親於智氏而蒙全宗之福微子去殷項伯歸漢皆受茅土之慶此前世之明驗也若其迷沈不反將助亂人不式王命戮及妻孥罔有攸赦廣宣恩威貸其元帥弔其殘民他如詔書律令丞相其露布天下使稱朕意焉賜諸葛亮武鄉侯詔惟君體資文武明睿篤誠受遺託孤匡輔朕躬繼絶興微志存靖亂爰整六師無嵗不征神武赫然威震八荒將建殊功於季漢參伊周之巨勳如何不弔事臨垂克遘疾隕喪朕用傷悼肝心若裂夫崇德序功紀行命諡所以光昭將來刋載不朽今使使持節左中郎將杜瓊贈君丞相武鄉侯印綬諡君為忠武侯魂而有靈嘉兹寵榮嗚呼哀哉三國志文類卷五
