body:
  text: 三國志文類巻三十九論魏荀彧論治道時征役草創制度多所興復彧嘗言於太祖曰昔舜分命禹稷契皋陶以揆庶績教化征伐並時而用及高祖之初金革方殷猶舉民能善教訓者叔孫通習禮儀於戎旅之間世祖有投戈講藝息馬論道之事君子無終食之間違仁今公外定武功内興文學使干戈戢睦大道流行國難方弭六禮俱治此姬旦宰周之所以速平也旣立德立功而又兼立言誠仲尼述作之意顯制度於當時揚名於後世豈不盛哉若須武事畢而後制作以稽治化於事未敏宜集天下大才通儒考論六經刋定傳紀存古今之學除其煩重以一聖真並隆禮學漸敦教化則王道兩濟帝嘉納之袁紘論肉刑夫民心樂全而不能常全葢利用之物縣於外而嗜欲之情動於内於是有進取貪競之行希求放肆之事進取不已不能充其嗜欲則苟且徼倖之所生也希求無饜無以愜其欲則姦偽忿怒之所興也先王知其如此而欲救其弊或先德化以陶其心其心不化然後加以刑辟書曰百姓不親五品不遜汝作司徒而敬敷五教蠻夷猾夏宼賊姦宄汝作士五刑有服然則德刑之設參而用之者也三代相因其義詳焉周禮使墨者守門劓者守關宫者守内刖者守囿此肉刑之制可得而論者也荀卿亦云殺人者死傷人者刑百王之所同未有知其所由来者也夫殺人者死而相殺者不已是大辟可以懲未殺不能使天下無殺也傷人者刑而害物者不息是黥劓可以懼未刑不能使天下無刑也故將欲止之莫若先以德化夫罪過彰著然後入於刑辟是將殺人者不必死傷人者不必刑縱而弗化則陷於刑辟故刑之所制在於不可移之地禮教則不然明其善惡所以潛勸其情消之於未殺也示知恥辱所以内愧其心治之於未傷也故過微而不至於著罪薄而不及於刑終入罪辟者非教化之所得也故雖殘一物之生刑一人之體是除天下之害夫何傷哉率斯道也風化可以漸淳刑罰可以漸少其理然也苟不能化其心而專任刑罰民失義方動罹刑網求世休和焉可得哉周之成康豈按三千之文而致刑措之美乎葢德化漸漬致斯有由也漢初除酷刑之弊務寛厚之論公卿大夫相與恥言人過文帝登朝加以𤣥黙張武受賂賜金以愧其心吳王不朝崇禮以訓其失是以吏民樂業風流篤厚斷獄四百㡬致刑措豈非德刑兼用已然之效哉世之欲言刑罰之用不先德教之益失之遠矣今大辟之罪與古同制免死以下不過五歲旣釋鉗鏁復得齒於人倫是以民無恥惡數為姦盜故刑徒多而亂不治也苟教之所去罰當其罪一離刀鋸没身不齒隣里且猶恥之而況鄉黨乎而況朝廷乎如此則夙沙趙高之儔無施其惡矣古者察其言觀其行而善惡彰焉然則君子之去刑辟固已遠矣過誤不幸則八議之所宥也若夫卞和史遷之寃滛刑之所及也苟失其道或不免於大辟而況肉刑哉漢書斬右趾及殺人先自言告吏坐受賕守官物而即盜之皆棄市此班固所謂當生而令死者也今不忍割截之慘而安勦絶之悲此最治體之所先有國所宜改者也曹冏叙六代興亡論論曰昔夏殷周厯世數十而秦二世而亡何則三代之君與天下共其民故天下同其憂秦王獨制其民故傾危而莫救夫與民共其樂者人必憂其憂與民同其安者人必拯其危先王知獨治之不能久也故與人共治之知獨守之不能固也故與人共守之兼親疎而兩用參同異而並建是以輕重足以相鎮親疎足以相衛并兼路塞逆節不生及其衰也桓文帥禮包茅不貢齊師伐楚宋不戍周晉戮其宰王綱弛而復張諸侯傲而復肅二霸之後浸以陵遲吳楚慿江負固方城雖心希九鼎而畏迫宗姬姦情散於胸懷逆謀消於脣吻斯豈非信重親戚任用賢能枝葉碩荗本根賴之與自此之後轉相攻伐吳并於越晉分為三魯滅於楚鄭兼於韓曁於戰國諸姬微矣惟燕衛獨存然皆弱小西迫彊秦南畏齊楚憂懼滅亡匪遑相恤至於王赧降為庶人猶枝幹相持得居虛位海内無主四十餘年秦據勢勝之地騁譎詐之術征伐關東𧖟食九國至於始皇乃定天位曠日若彼用力若此豈非深固根蔕不拔之道乎易曰其亡其亡繫於苞桑周德其可謂當之矣秦觀周之弊以為小弱見奪於是發五等之爵立郡縣之官棄禮樂之教任苛刻之政子弟無尺寸之封功臣無立錐之地内無宗子以自毗輔外無諸侯以為藩衛仁心不加於親戚惠澤不流於枝葉譬猶芟刈股肱獨任胷腹浮舟江海捐棄楫櫂觀者為之寒心而始皇晏然自以為關中之固金城千里子孫帝王萬世之業也豈不悖哉是時淳于越諫曰臣聞殷周之王封子弟功臣千有餘城今陛下君有海内而子孫為匹夫卒有田常六卿之臣而無輔弼何以相救事不師古而能長久者非所聞也始皇聽李斯偏說而絀其義至於身死之日無所寄付委天下之重於凡夫之手託廢立之命於奸臣之口至令趙高之徒誅鉏宗室胡亥少習刻薄之教長遵凶父之業不能改制易法寵任兄弟而乃師謨申商諮謀趙高自幽深宫委政讒賊身殘望夷求為黔首豈可得哉遂乃郡國離心衆庶潰叛勝廣倡之於前劉項弊之於後向使始皇納淳于之策抑李斯之論割裂州國分王子弟封三代之後報功臣之勞土有常君民有定主枝葉相扶首尾為用雖使子孫有失道之行時人無湯武之賢奸謀未發而身已屠戮何區區之陳項而復得措其手足哉故漢祖奮三尺之劔驅烏集之衆五年之中遂成帝業自開闢以来其興立功勲未有若漢祖之易也夫伐深根者難為功摧枯朽者易為力理勢然也漢監秦之失封殖子弟及諸吕擅權圖危劉氏而天下所以不傾動百姓所以不易心者徒以諸侯彊大磐石膠固東牟朱虛受命於内齊代吳楚作衛於外故也向使高祖踵亡秦之法忽先王之制則天下已傳非劉氏有也然高祖封建地過古制大者跨州兼郡小者連城數十上下無别權侔京室故有吳楚七國之患賈誼曰諸侯彊盛長亂起奸夫欲天下之治安莫若衆建諸侯而少其力令海内之勢若身之使臂臂之使指則下無背叛之心上無誅伐之事文帝不從至於孝景猥用晁錯之計削黜諸侯親者怨恨疎者震恐吳楚倡謀五國從風兆發高帝釁鍾文景由寛之過制急之不漸故也所謂末大必折尾大難掉尾同於體猶或不從況乎非體之尾其可掉哉武帝從主父之䇿下推恩之令自是之後齊分為七趙分為六淮南三割梁代五分遂以陵遲子孫微弱衣食租稅不預政亊或以酎金免削或以無後國除至於成帝王氏擅朝劉向諫曰臣聞公族者國之枝葉枝葉落則本根無所庇䕃方今同姓疏逺母黨專政排擯宗室孤弱公族非所以保守社稷安固國嗣也其言深切多所稱引成帝雖悲傷歎息而不能用至於哀平異姓秉權假周公之事而為田常之亂高拱而竊天位一朝而臣四海漢宗室王侯解印釋紱貢奉社稷猶懼不得為臣妾或乃為之符命頌莽恩德豈不哀哉由斯言之非宗子獨忠孝於惠文之間而叛逆於哀平之際也徒權輕勢弱不能有定耳賴光武皇帝挺不世之姿禽王莽於已成紹漢嗣於旣絶斯豈非宗子之力也而曾不監秦之失䇿襲周之舊制踵亡國之法而徼倖無疆之期至於桓靈閹竪執衡朝無死難之臣外無同憂之國君孤立於上臣弄權於下本末不能相御身首不能相使由是天下鼎沸奸凶並爭宗廟焚為灰燼宫室變為榛藪居九州之地而身無所安處悲夫魏太祖武皇帝躬聖明之資兼神武之略恥王綱之廢絶愍漢室之傾覆龍飛譙沛鳯翔兖豫掃除凶逆翦滅鯨鯢迎帝西京定都潁邑德動天地義感人神漢氏奉天禪位大魏大魏之興於今二十有四年矣觀五代之存亡而不用其長䇿覩前車之傾覆而不改其轍跡子弟王空虛之地君有不使之民宗室竄於閭閻不聞邦國之政權均匹夫勢齊凡庶内無深根不拔之固外無磐石宗盟之助非所以安社稷為萬世之業也且今之州牧郡守古之方伯諸侯皆跨有千里之土兼軍武之任或比國數人或兄弟並據而宗室子弟曾無一人間厠其間與相維持非所以彊幹弱枝備萬一之虞也今之用賢或超為名都之主或為偏師之帥而宗室有文者必限小縣之宰有武者必置百人之上使夫廉高之士畢志於衡軛之内才能之人恥與非類為伍非所以勸進賢能褒異宗室之禮也夫泉竭則流涸根朽則葉枯枝繁者䕃根條落者本孤故語曰百足之蟲至死不僵以扶之者衆也此言雖小可以譬大且墉基不可倉卒而成威名不可一朝而立皆為之有漸建之有素譬之種樹久則深固其本根荗盛其枝葉若造次徙於山林之中植於宫闕之下雖壅之以黑墳暖之以春日猶不救於枯槁而何暇繁育哉夫樹猶親戚土猶士民建置不久則輕下慢上平居猶懼其離叛危急將若之何是以聖王安而不逸以慮危也存而設備以懼亡也故疾風卒至而無摧拔之憂天下有變而無傾危之患矣三國志文類巻三十九
