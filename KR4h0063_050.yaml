body:
  text: 三國志文類卷五十評魏陳夀評武帝評曰漢末天下大亂雄豪並起而袁紹虎視四州彊盛莫敵太祖運籌演謀鞭撻宇內攬申商之法術該韓白之竒策官方授材各因其器矯情任算不念舊惡終能總御皇機克成洪業者惟其明略最優也抑可謂非常之人超世之傑矣陳夀評文帝評曰文帝天資文藻下筆成章博文强識才藝兼該若加之曠大之度勵以公平之誠邁志存道克廣德心則古之賢主何逺之有哉陳夀評明帝評曰明帝沉毅斷識任心而行蓋有君人之至概焉于時百姓凋弊四海分崩不先聿修顯祖闡拓洪基而遽追秦皇漢武宫館是營格之逺猷其殆疾乎陳夀評三少帝評曰古者以天下為公唯賢是與後代世位立子以適若適嗣不繼則宜取旁親明德若漢之文宣者斯不易之常準也明帝既不能然情繫私愛撫養嬰孩傳以大器託付不專必參枝族終於曹爽誅夷齊王替位髙貴公才慧夙成好問尚辭蓋亦文帝之風流也然輕躁忿肆自陷大禍陳留王恭已南面宰輔統政仰遵前式揖讓而禪遂饗封大國作賔于晉比之山陽班寵有加焉孫盛評曹公哭袁紹墓時鄴定公臨祀紹墓哭之流涕慰勞紹妻還其家人寶物昔者先王之為誅賞也將以懲惡勸善永彰鑒戒紹因世艱危遂懷逆謀上議神器下干國紀薦社汚宅古之制也而乃盡哀於逆臣之家加恩於叨餮之室為政之道於斯躓矣夫匿怨友人前哲所耻脫驂舊館義無虛涕苟道乖好絶何哭之有昔漢髙失之於項氏魏武遵謬於此舉豈非百慮之一失也孫盛評文帝時軍次於譙大饗六軍及譙父老百姓於邑東及設伎樂百戲令曰先王皆樂其生禮不忘其本其復譙租稅於二年三老吏民上夀日夕而罷丙巾親祠譙陵昔者先王之以孝治天下也內節天性外施四海存盡其敬亡極其哀思慕諒暗寄政冡宰故曰三年之喪自天子達於庶人夫然故在三之義惇臣子之恩篤雍熙之化隆經國之道固聖人之所以通天地厚人倫顯至孝敦風俗斯萬世不易之典百王服膺之制也是故喪禮素冠鄶人著庶見之譏宰豫降朞仲尼發不仁之嘆子穨忘戚君子以為樂禍魯侯易服春秋知其不終豈不以墜至痛之誠心喪哀樂之大節者哉故雖三季之末七雄之弊猶未有廢縗斬於旬朔之間釋麻杖於反哭之日者也逮于漢文變易古制人道之紀一旦而廢縗素奪於至尊四海散其遏密義感闕於羣后大化墜於君親雖心存貶約慮在經綸至於樹德垂聲崇化變俗固已道薄於當年風頺於百代矣且武王載主而牧野不陳晉襄墨縗而三帥為俘應務濟功服其焉害魏王既追漢制替其大禮處莫重之哀而設饗宴之樂居貽厥之始而墜王化之基及至受禪顯納二女忘其至恤以誣先聖之興天心喪矣將何以終是以知王齡之不遐卜世之期促也孫盛評文帝斥后族時有詔曰夫婦人與政亂之本也自今以後羣臣不得奏事太后后族之家不得當輔佐之任又不得橫授茅土之爵以此詔傳後世若有背違天下共誅之夫經國營治必慿俊哲之輔賢達令德必居參亂之任故雖周室之盛有婦人與焉然則坤道承天南面罔二三從之禮謂之至順至於號令自天子出奏事專行非古義也昔在申吕實匡有周苟以天下為心惟德是仗則親疏之授至公一也何至后族而必斥逺之哉二漢之季世王道陵遲故令外戚馮寵職為亂階於此自時昏道喪運祚將移縱無王吕之難豈乏田趙之禍乎而後世觀其若此深懷酸毒之戒也至於魏文遂發一概之詔可謂有識之爽言非帝者之宏議孫盛評明帝聞之長老魏明帝天姿秀出立髮垂地口吃少言而沉毅好斷初諸公受遺輔導帝皆以方任處之政自已出而優禮大臣開容善直雖犯顔極諌無所摧戳其君人之量如此之偉也然不思建德垂風不固維城之基至使大權偏據社稷無衛悲夫孫盛評逆制廟號有司奏武皇帝撥亂反正為魏太祖樂用武始之舞文皇帝應天授命為魏高祖樂用成熙之舞帝制作興治為魏烈祖樂用章武之舞三祖之廟萬世不毁其餘四廟親盡迭毁如周后稷文武廟祧之制夫諡以表行廟以存容皆於既沒然後著焉所以原始要終以示百世也未有當年而逆制祖宗未終而豫自尊顯昔華樂以厚斂致饑周人以豫凶違禮魏之羣司於是乎失正裴松之評魏氏松之以為故魏氏配饗不及荀彧蓋以其末年異議又位非魏臣故也至於升程昱而遺郭嘉先鍾華而後荀攸則未詳厥趣也徐他謀逆而許禇心動忠誠之至逺同於日磾且潼關之危非禇不濟禇之功烈有過典韋今祀韋而不及禇又所未達也陳夀評董卓袁紹袁術劉表評曰董卓狼戾賊忍暴虐不仁自書契已來殆未之有也袁術奢淫放肆榮不終已自取之也袁紹劉表咸有威容器觀知名當世表跨蹈漢南紹鷹揚河朔然皆外寬內忌好謀無決有才而不能用聞善而不能納廢嫡立庶舍禮崇愛至于後嗣顛蹶社稷傾覆非不幸也昔項羽背范增之謀以喪其王業紹之殺田豐乃甚於羽逺矣孫盛評田豐沮授盛曰觀田豐沮授之謀雖良平何以過之故君貴審才臣尚量主君用忠良則霸王之業隆臣奉暗后則覆亡之禍至存亡榮辱常必由茲豐知紹將敗敗則已必死甘冒虎口以盡忠規烈士之於所事慮不存已夫諸侯之臣義有去就况豐與紹非純臣乎詩云逝將去汝適彼樂土言去亂邦就有道可也裴松之難陳氏評荀彧世之論者多譏彧協規魏氏以傾漢祚君臣易位實彧之由雖晚節立異無救運移功既違義識亦疚焉陳氏此評蓋亦同乎世識臣松之以為斯言之作誠未得其逺大者也彧豈不知魏武之志氣非衰漢之貞臣哉良以于時王道既微橫流已及雄豪虎視人懷異心不有撥亂之資仗順之略則漢室之亡忽諸黔首之類殄矣夫欲翼贊時英一匡屯運非斯人之與而誰與哉是故經綸急病若救身首用能動于嶮中至于大亨蒼生蒙舟航之接劉宗延二紀之祚豈非荀生之本圖仁恕之逺致乎及至霸業既隆翦漢迹著然後亡身殉節以申素情全大正於當年布誠心於百代可謂任重道逺志行義立謂之未充其殆誣歟裴松之難荀賈同傳臣松之以為列傳之體以事類相從張子房青雲之士誠非陳平之倫然漢之謀臣良平而已若不共列則餘無所附故前史合之蓋其宜也魏氏如詡之儔其比幸多詡不編程郭之篇而與二荀並列失其類矣且攸詡之為人其猶夜光之與蒸燭乎其照雖均質則異焉今荀賈之評共同一稱尤失區别之宜也陳夀評吕布張邈臧洪評曰吕布有虓虎之勇而無英竒之略輕狡反覆唯利是視自古及今未有若此不夷滅也昔漢光武謬於龎萌近魏太祖亦蔽於張邈知人則哲唯帝難之信矣陳登臧洪並有雄氣壯節登降年夙隕功業未遂洪以兵弱敵彊烈志不立惜哉三國志文類卷五十
