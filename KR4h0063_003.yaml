body:
  text: 三國志文類卷三詔書魏明帝寬獄詔有虞氏畫象而民弗犯周人刑錯而不用朕從百王之末追望上世之風邈乎何相去之逺法令滋章犯者彌多刑罰愈衆而姦不可止往者按大辟之條多所蠲除思濟生民之命此朕之至意也而郡國蔽獄一嵗之中尚過數百豈朕訓導不醇俾民輕罪將苛法猶存為之陷穽乎有司其議獄緩死務從寬簡及乞恩者或辭未出而獄已報斷非所以究理盡情也其令廷尉及天下獄官諸有死罪具獄以定非謀反及手殺人亟語其親治有乞恩者使與奏當文書俱上朕將思所以全之其布告天下使明朕意徴管寧詔太中大夫管寧耽懷道德服膺六藝清虛足以侔古亷白可以當世曩遭王道衰缺浮海遁居大魏受命則襁負而至斯蓋應龍潛升之道聖賢用舍之義而黃初以來徴命屢下每輒辭疾拒違不至豈朝廷之政與生殊趣將安樂山林往而不能反乎夫以姬公之聖而耉德不降則鳴鳥弗聞以秦穆之賢猶思詢乎黃髮况朕寡德曷能不願聞道于子大夫哉今以寧為光祿勳禮有大倫君臣之道不可廢也望必速至稱朕意焉令青州刺史禮遣管寧詔詔青州刺史曰寧抱道懷貞潛翳海隅比下徴書違命不至盤桓利居髙尚其事雖有素履幽人之貞而失考父兹恭之義使朕虛心引領歷年其何謂邪徒欲懷安必肆其志不惟古人亦有翻然改節以隆斯民乎日逝月除時方已過澡身浴德將以曷為仲尼有言吾非斯人之徒與而誰與哉其命别駕從事郡丞掾奉詔以禮發遣過賈逵祠詔青龍中帝東征乘輦入逵祠詔曰昨過項見賈逵碑像念之愴然古人有言患名之不立不患年之不長逵存有忠勳沒而見思可謂死而不朽者矣其布告天下以勸將來賜彭城王據詔先王建國隨時而制漢祖增秦所置郡至光武以天下損耗并省郡縣以今比之益不及焉其改封諸王皆為縣又賜璽書制詔彭城王有司奏王遣司馬董和齎珠玉來到京師中尚方多作禁物交通工官出入近署踰侈非度慢令違制繩王以法朕用憮然不寧於心王以懿親之重處藩輔之位典籍日陳於前勤誦不輟於側加雅素奉修恭肅敬慎務在蹈道孜孜不衰豈忘率意正身考終厥行哉若然小疵或謬於細人忽不覺悟以斯為失耳書云惟聖罔念作狂惟狂克念作聖古人垂誥乃至于此故君子思心無斯須逺道焉常慮所以纍德者而去之則德明矣開心所以為塞者而通之則心夷矣慎行所以為尤者而修之則行全矣三者王之所能備也今詔有司宥王削縣二千户以彰八柄與奪之法昔羲文作易著休復之誥仲尼論行既過能改王其改行茂昭斯義率意無怠賜恭王衮詔時黃龍見鄴西漳水衮上書贊頌詔賜黃金十斤詔曰昔唐叔歸禾東平獻頌斯皆骨月贊美以彰懿親王研精墳典耽味道真文雅炳焕朕甚嘉之王其克慎明德以終令聞又賜璽書制詔中山王有司奏王乃者來朝犯交通京師之禁朕惟親親之恩用寢吏議然法者所與天下共也不可得廢今削王縣二户七百五十夫克己復禮聖人稱仁朝過夕改君子與之王其識諸無二咎悔也賜趙王幹璽書青龍二年私通賓客為有司所奏賜幹璽書誡之易稱開國承家小人勿用詩著大車維塵之誡自太祖受命創業深覩治亂之源鑒存亡之機初封諸侯訓以恭慎之至言輔以天下之端士常稱馬援之遺誡重諸侯賓客交通之禁乃使與犯妖惡同夫豈以此薄骨肉哉徒欲使子弟無過失之愆士民無傷害之悔耳髙祖踐阼祇慎萬幾申著諸侯不朝之令朕感詩人棠棣之作嘉采菽之義亦緣詔文曰若有詔得詣京都故命諸王以朝聘之禮而楚中山並犯交通之禁趙宗戴捷咸伏其辜近東平王復使屬官毆夀張吏有司舉奏朕裁削縣令有司以曹纂王喬等因九族時節集㑹王家或非其時皆違禁防朕惟王幼少有恭順之素加受先帝顧命欲崇恩禮延乎後嗣况近在王之身乎且自非聖人孰能無過已詔有司宥王之失古人有言戒慎乎其所不覩恐懼乎其所弗聞莫見乎隱莫顯乎微故君子慎其獨焉叔父兹率先聖之典以纂乃先帝之遺命戰戰兢兢靖恭厥位稱朕意焉三國志文類卷三
