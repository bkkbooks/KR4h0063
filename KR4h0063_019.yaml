body:
  text: 三國志文類卷十九書疏魏孫禮辨平原地界疏字德達遷冀州牧太傅司馬宣王謂禮曰今清河平原爭界八年更二刺史靡能決之虞芮待文王而了宜善令分明禮曰訟者據墟墓為驗聽者以先老為正而老者不可加以檟楚又墟墓或遷就高敞或徙避仇讎如今所聞雖臯陶猶將為難若欲使必也無訟當以烈祖初封平原時圖決之何必推古問故以益辭訟昔成王以桐葉戲叔虞周公便以封之今圖藏在天府便可於坐上斷也豈待到州乎宣王曰是也當别下圖禮到案圖宜屬平原而曹爽信清河言下書云圖不可用當參異同禮上疏曰管仲霸者之佐其器又小猶能奪伯氏駢邑使沒齒無怨言臣受牧伯之任奉聖朝明圖驗地著之界界實以王翁河為限而鄃以馬丹侯為驗詐以鳴犢河為界假虛訟訴疑誤臺閣竊聞衆口鑠金浮石沈木三人成市虎慈母投其杼今二郡爭界八年一朝決之者緣有解書圖畫可得尋案擲校也平原在兩河向東上其間有爵隄爵隄在髙唐西南所爭地在髙唐西北相去二十餘里可謂長歎息流涕者也案解與圖奏而鄃不受詔此臣軟弱不勝其任臣亦何顔尸祿素餐輒束帶著履駕車待放爽見禮奏大怒劾禮怨望辛毗上百姓勞役疏帝方修殿舍百姓勞役上疏曰竊聞諸葛亮講武治兵而孫權市馬遼東量其意指似欲相左右備豫不虞古之善政而今者宫室大興加連年穀麥不收詩云民亦勞止迄可小康惠此中國以綏四方惟陛下為社稷計帝報曰二虜未滅而治宫室直諫者立名之時也夫王者之都當及民勞兼辦使後世無所復增是蕭何為漢規模之略也今卿為魏重臣亦宜解其大歸帝又欲平北芒令於其上作臺觀已具諫諍門楊阜諫治宫室弋獵疏字義山遷將作大匠時初治宫室發其美女以充後庭數出入弋獵秋大雨震電多殺鳥雀阜上疏臣聞明主在上羣下盡辭堯舜聖德求非索諫大禹勤功務卑宫室成湯遭旱歸咎責已周文刑于寡妻以御家邦漢文躬行節儉身衣弋綈此皆能昭令問貽厥孫謀者也伏惟陛下奉武皇帝開拓之大業守文皇帝克終之元緒誠宜思齊往古聖賢之善治總觀季世放蕩之惡政所謂善治者務儉約重民力也所謂惡政者從心恣欲觸情而發也惟陛下稽古世代之初所以明赫及季世所以衰弱至于泯滅近覽漢末之變足以動心誡懼矣曩使桓靈不廢髙祖之法文景之恭儉太祖雖有神武於何所施其能邪而陛下何由處斯尊哉今吳蜀未定軍旅在外願陛下動則三思慮而後行重慎出入以往鑒來言之若輕成敗甚重頃者天雨又多卒暴雷電非常至殺鳥雀天地神明以王者為子也政有不當則見災譴克己內訟聖人所記惟陛下慮患無形之外慎萌纎微之初法漢孝文出惠帝美人令得自嫁頃所調送少女逺聞不令宜為後圖諸所繕治務從約節書曰九族既睦協和萬國事思厥宜以從中道精心計謀省息費用吳蜀以定爾乃上安下樂九親熙熙如此以往祖考心歡堯舜其猶病諸今宜開大信於天下以安衆庶以示逺人又上伐蜀遇雨不進疏大司馬曹真伐蜀遇雨不進阜上疏昔文王有赤烏之符而猶日昃不暇食武王白魚入舟君臣變色而動得吉瑞猶尚憂懼况有災異而不戰竦者哉今吳蜀未平而天屢降變陛下宜深有以專精應答側席而坐思示逺以德綏邇以儉間者諸軍始進便有天雨之患稽閡山險已積日矣轉運之勞擔負之苦所費已多若有不繼必違本圖傳曰見可而進知難而退軍之善政也徒使六軍困於山谷之間進無所略退又不得非主兵之道也武王還師殷卒以亡知天期也今年凶民飢宜發明詔損膳減服技巧珍玩之物皆可罷之昔邵信臣為少府於無事之世而奏罷浮食今者軍用不足益宜節度帝即召諸軍還又上營洛陽宫殿疏帝新作許宫又營洛陽宫殿觀閣阜上疏堯尚茅茨而萬國安其居禹卑宫室而天下樂其業及至殷周或堂崇三尺度以九筵耳古之聖帝明王未有極宫室之髙麗以凋弊百姓之財力者也桀作璇室象廊紂為傾宫鹿臺以喪其社稷楚靈以築章華而身受其禍秦始皇作阿房而殃及其子天下叛之二世而滅夫不度萬民之力以從耳目之欲未有不亡者也陛下當以堯舜禹湯文武為法則夏桀殷紂楚靈秦皇為深誡髙髙在上實監后德慎守天位以承祖考巍巍大業猶恐失之不夙夜敬止允恭恤民而乃自暇自逸惟宫臺是侈是飾必有顛覆危亡之禍易曰豐其屋蔀其家窺其戶閴其無人王者以天下為家言豐屋之禍至於家無人也方今二虜合從謀危宗廟十萬之軍東西奔赴邊境無一日之娛農夫廢業民有飢色陛下不以是為憂而營作宫室無有已時使國亡而臣可以獨存臣又不言也君作元首臣為股肱存亡一體得失同之孝經曰天子有爭臣七人雖無道不失其天下臣雖駑怯敢忘爭臣之義言不至切不足以感寤陛下陛下不察臣言恐皇祖烈考之祚將墜於地使臣身死有補萬一則死之日猶生之年也謹叩棺沐浴伏俟重誅奏御天子感其忠言手筆詔答高堂隆諫治殿取鐘疏青龍中大治殿舍西取長安大鐘隆上疏曰昔周景王不儀刑文武之明德忽公旦之聖制既鑄大錢又作大鐘單穆公諫而弗聽泠州鳩對而弗從遂迷不反周德以衰良史記焉以為永鑒然今之小人好説秦漢之奢靡以蕩聖心求取亡國不度之器勞役費損以傷德政非所以興禮樂之和保神明之休也是日帝幸上方隆與卞蘭從帝以隆表授蘭使難隆曰興衰在政樂何為也化之不明豈鐘之罪隆曰夫禮樂者為治之大本也故簫韶九成鳯凰來儀雷鼓六變天神以降政是以平刑是以錯和之至也新聲發響商辛以隕大鐘既鑄周景以弊存亡之機恆由斯作安在廢興之不階也君舉必書古之道也作而不法何以示後聖王樂聞其闕故有針規之道忠臣願竭其節故有匪躬之義也帝稱善又言星孛大辰疏凡帝王徙都立邑皆先定天地社稷之位敬恭以奉之將營宫室則宗廟為先廄庫為次居室為後今圜丘方澤南北郊明堂社稷神位未定宗廟之制又未如禮而崇飾居室士民失業外人咸云宫人之用與興戎軍國之費所盡略齊民不堪命皆有怨怒書曰天聰明自我民聰明天明畏自我民明威輿人作頌則嚮以五福民怒吁嗟則威以六極言天之賞罰隨民言順民心也是以臨政務在安民為先然後稽古之化格于上下自古及今未嘗不然也夫采椽卑宫唐虞大禹之所以垂皇風也玉臺瓊室夏癸商辛之所以犯昊天也今之宫室實違禮度乃更建立九龍華飾過前天彗章灼始起於房心犯帝坐而干紫微此乃皇天之愛陛下是以發教戒之象始卒皆於尊位殷勤鄭重欲必覺寤陛下斯乃慈父懇切之訓宜崇孝子祗聳之禮以率先天下以昭示後昆不宜有忽以重天怒又言用法深重疏夫拓迹垂統必俟聖明輔世匡治必須良佐用能庶績其凝而品物康乂也夫移風易俗宣明道化使四表同風回首面內德教光熙九服慕義固非俗吏之所能也今有司務糾刑書不本大道是以刑用而不措俗弊而不敦宜崇禮樂班敘明堂修三雍大射養老營建郊廟尊儒士舉逸民表章制度改正朔易服色布愷悌尚儉素然後備禮封禪歸功天地使雅頌之聲盈于六合緝熙之化混于後嗣斯蓋至治之美事不朽之貴業也然九域之內可揖讓而治尚何憂哉不正其本而救其末譬猶棼絲非政理也可命羣公卿士通儒造具其事以為典式隆又以為改正朔易服色殊徽號異器械自古帝王所以神明其政變民耳目故三春稱王明三統也於是敷演舊章奏而改焉帝從其議三國志文類卷十九
