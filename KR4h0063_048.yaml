body:
  text: 三國志文類卷四十八書吳孫策責袁術書時袁術僭號策以書責而絶之蓋上天垂司過之星聖主建敢諌之鼓設非謬之備急針闕之言何哉凡有所長必有所短也去冬傳有大計無不悚懼旋知供備貢獻萬夫解惑頃聞建議復欲追遵前圖即事之期便有定月益使憮然想是流妄設其必爾民何望乎曩日之舉義兵也天下之士所以響應者董卓擅廢置害太后𢎞農王略蒸宫人發掘園陵暴逆至此故諸州郡雄豪聞聲慕義神武外振卓遂內殱元惡既斃幼主東顧俾保傅宣命欲令諸軍振旅於河北通謀黑山曹操放毒東徐劉表稱亂南荆公孫瓚炮烋北幽劉繇決力江滸劉備爭盟淮隅是以未獲承命櫜弓戢戈也今備繇既破操等飢餒謂當與天下合謀以誅醜類捨而不圖有自取之志非海內所望一也昔成湯伐桀稱有夏多罪武王伐紂曰殷有罪罰重哉此二王者雖有聖德宜當君世如使不遭其時亦無由興矣幼主非有惡於天下徒以春秋尚少脅於強臣若無過而奪之懼未合於湯武之事二也卓雖狂狡至廢主自興亦猶未也而天下聞其桀虐攘臂同心而疾之以中土希戰之兵當邊地徑悍之虜所以斯須遊魂也今四方之人皆玩敵而便戰鬬矣可得而勝者以彼亂而我治彼逆而我順也見當世之紛若欲大舉以臨之適足趣禍三也天下神器不可虛干必須天贊與人力也殷湯有白鳩之祥周武有赤烏之瑞漢髙有星聚之符世祖有神光之徴皆因民困瘁於桀紂之政毒苦於秦莾之役故能芟去無道致成其志今天下非患於幼主未見受命之應驗而欲一旦卒然登即尊號未之或有四也天子之貴四海之富誰不欲焉義不可勢不得耳陳勝項籍王莽公孫述之徒皆南面稱孤莫之能濟帝王之位不可橫冀五也幼主岐嶷若除其逼去其鯁必成中興之業夫致主於周成之盛自受旦奭之美此誠所望於尊明也縱使幼主有他改異猶望其推宗室之譜屬論近親之賢良以紹劉統以固漢宗皆所以書功金石圖形丹青流慶無窮垂聲管絃捨而不為為其難者想明明之素必所不忍六也五世為相權之重勢之盛天下莫得而比焉忠貞者必曰宜夙夜思維所以扶國家之躓頓念社稷之危殆以奉祖考之志以報漢室之恩其忽履道之節而強進取之欲者將曰天下之人非家吏則門生也孰不從我四方之敵非吾匹則吾役也誰能違我盍乘纍世之勢起而取之哉二者殊數不可不詳察七也所貴於聖哲者以其審於機宜慎於舉措若難圖之事難保之勢以激羣敵之氣以生衆人之心公義固不可私計又不利明哲不處八也世人多惑於圖緯而牽非類比合文字以悅所事苟以阿上惑衆終有後悔者自往迄今未嘗無之不可不深擇而熟思九也九者尊明所見之餘耳庶備起豫補所遺忘忠言逆耳幸留神聽孔融與曹公書盛憲字孝章器量雅偉時孫策平定吳會誅其英豪憲素有髙名策深忌之初憲與少府孔融善融憂其不免禍乃與曹公書嵗月不居時節如流五十之年忽焉已至公為始滿融又過二海內知識零落殆盡惟會稽盛孝章尚存其人困於孫氏妻孥湮沒單孑獨立孤危愁苦若使憂能傷人此子不得復永年矣春秋傳曰諸侯有相滅亡者桓公不能救則桓公耻之今孝章實丈夫之雄也天下談士依以揚聲而身不免於幽執命不期於旦夕是吾祖不當復論損益之友而朱穆所以絶交也公誠能馳一介之使加咫尺之書則孝章可致友道可𢎞也今之少年喜謗前輩或能譏平皮柄反孝章孝章要為有天下大名九牧之民所共稱歎燕君市駿馬之骨非欲以騁道里乃當以招絶足也惟公匡復漢室宗社將絶又能正之正之之術實須得賢珠玉無脛而自至者以人好之也况賢者之有足乎昭王築臺以尊郭隗隗雖小才而逢大遇竟能發明主之至心故樂毅自魏往劇辛自趙往鄒衍自齊往嚮使郭隗倒縣而王不解臨溺而王不拯則士亦將髙翔逺引莫有北首燕路者矣凡所稱引自公所知而有云者欲公崇篤斯義也因表不悉由是徴為騎都尉制命未至果為權所害太子與步隲書時權太子登駐武昌愛人好善與隲書曰夫賢人君子所以興隆大化佐理時務者也受性暗蔽不達道數雖實區區欲盡心於明德歸分於君子至於逺近士人先後之宜猶或緬焉未之能詳傳曰愛之能勿勞乎忠焉能勿誨乎斯其義也豈非所望於君子哉孔融遺張紘書權討江夏以東部少事命紘居守遙領所職融遺此書聞大軍西征足下留鎮不有居者誰守社稷深固折衝亦大勳也無乃李廣之氣倉髮益怒樂一當單于以盡餘憤乎南北並定世將無事孫叔投戈絳灌爼豆亦在今日但用離析無緣會面為愁歎耳道直途清相見豈復難哉陳琳答張紘書張紘見柟榴枕愛其文為作賦琳在北見之以示人曰此吾鄉里張子綱所作也後紘見陳琳作武庫賦應機論與琳書深歎美之琳答此書自僕在河北與天下隔此間率少於文章易為雄伯故使僕受此過差之談非其實也今景興在此足下與子布在彼所謂小巫見大巫神氣盡矣虞翻與客書翻少好學有髙氣年十二客有候其兄者不過翻翻追與書僕聞虎魄不取腐芥磁石不受曲針過而不存不亦宜乎客得書竒之由是見稱陸遜與關羽書時關羽鎮荆州權召遜拜偏將軍代吕蒙遜至陸口書與羽前承觀釁而動以律行師小舉大克一何巍巍敵國敗績利在同盟聞慶拊節想遂席捲共奬王綱近以不敏受任來東延慕光塵思稟良規又自于禁等見獲遐邇欣羡以為將軍之勳足以長世雖昔晉文城濮之師淮隂拔趙之略蔑以尚茲聞徐晃等步騎駐旌窺望麾葆操猾虜也忿不思難恐潛增衆以逞其心雖云師老猶有驍悍且戰捷之後常苦輕敵古人仗術軍勝彌警願將軍廣為方計以全獨克僕書生疏遲忝所不堪喜鄰威德樂自傾盡雖未合策猶可懷也儻明注仰有以察之張承與吕岱書時岱與陸遜並在武昌故督蒲圻頃之廖式作亂攻圍城邑零陵蒼捂欎林諸郡搔擾岱自表輒行星夜兼路攻討一年破之斬式郡縣悉平復還武昌年已八十然體素精勤躬親王事承與此書昔旦奭翼周二南作歌今則足下與陸子也忠勤相先勞謙相讓功以權成化與道合君子歎其德小人悅其美加以文書鞅掌賔客終日罷不捨事勞不言倦又知上馬輒自超乘不由跨躡如此足下過亷頗也何其事事快也周易有之禮言恭德言盛足下何有盡此美邪諸葛恪與陸遜書赤烏中魏司馬宣王謀欲攻恪權方發兵應之望氣者以為不利於是徙恪屯於柴桑與丞相陸遜書曰楊敬叔傳述清論以為方今人物凋盡守德業者不能復幾宜相左右更為輔車上熙國事下相珍惜又疾世俗好相謗毁使已成之器中有損纍將進之徒莫不歡笑聞此喟然誠獨擊節愚以為君子不求備於一人自孔氏門徒大數三千其見異者七十二人至于子張子路子貢等七十之徒亞聖之德然猶各有所短師辟由唁賜不受命豈况下此而無所闕且仲尼不以數子之不備而引以為友不以人所短棄其所長也加以當今取士宜寬於往古何者時務從橫而善人單少國家職司常苦不充苟令性不邪惡志在陳力便可奬就騁其所任若於小小宜適私行不足皆宜闊略不足縷責且士誠不可纎論苛克苛克則彼聖賢猶將不全况其出入者邪故曰以道望人則難以人望人則易賢愚可知自漢末以來中國士大夫如許子將輩所以更相謗訕或至為禍原其本起非為大讐惟坐克已不能盡如禮而責人專以正義夫已不如禮則人不服責人以正義則人不堪內不服其行外不堪其責則不得不相怨相怨一生則小人得容其間得容其間則三至之言浸潤之譖紛錯交至雖使至明至親者處之猶難以自定况已為隙且未能明者乎是故張陳至於血刃蕭朱不終其好本由於此而已夫不舍小過纎微相責久乃至於家户為怨一國無復全行之士也恪知遜以此嫌已故遂廣其理而贊其旨也三國志文類卷四十八
