body:
  text: 三國志文類卷四十六書魏太子與吳質二書時大將軍西征太子南在孟津小城與質書質字季重季重無恙途路雖局官守有限願言之懷良不可任足下所治僻左書問致簡益用增勞每念昔日南皮之游誠不可忘既妙思六經逍遙百氏彈棊間設終以博奕髙談娛心哀箏順耳馳騖北場旅食南館浮甘瓜於清泉沉朱李於寒水皎日既沒繼以朗月同乘並載以游後園輿輪徐動賔從無聲清風夜起悲笳微吟樂往哀來凄然傷懷余顧而言茲樂難常足下之徒咸以為然今果分别各在一方元瑜長逝化為異物每一念至何時可言方今蕤賔紀辰景風扇物天氣和暖衆果具繁時駕而游北遵河曲從者鳴笳以啓路文學託乘於後車節同時異物是人非我勞如何今遣騎到鄴故使枉道相過行矣自愛又書嵗月易得别來行復四年三年不見東山猶歎其逺况乃過之思何可支雖書疏往返未足解其勞結昔年疾疫親故多離其災徐陳應劉一時俱逝痛何可言邪昔日游處行則同輿止則接席何嘗須臾相失每至觴酌流行絲竹並奏酒酣耳熱仰而賦詩當此之時忽然不自知樂也謂百年已分長共相保何圖數年之間零落略盡言之傷心頃撰其遺文都為一集觀其姓名已為鬼録追思昔游猶在心目而此諸子化為糞壤可復道哉觀古今文人類不護細行鮮能以名節自立而偉長獨懷文抱質恬淡寡欲有箕山之志可謂彬彬君子矣著中論二十餘篇成一家之業辭義典雅足傳于後此子為不朽矣德璉常斐然有述作意才學足以著書美志不遂良可痛惜間厯觀諸子之文對之抆淚既痛逝者行自念也孔璋章表殊健微為繁富公幹有逸氣但未遒耳至其五言詩妙絶當時元瑜書記翩翩致足樂也仲宣獨自善於辭賦惜其體弱不足起其文至於所善古人無以逺過也昔伯牙絶絃於鍾期仲尼覆醢於子路愍知音之難遇傷門人之莫逮也諸子但未及古人夫自一時之雋也今之存者已不逮矣後生可畏來者難誣然吾與足下不及見也行年已長大所懷萬端時有所慮至乃通夕不寐何時復類昔日已成老翁但未白頭耳光武言年已三十在軍十年所更非一吾德雖未及年之與齊以犬羊之質服虎豹之文無衆星之明假日月之光動見瞻觀何時易耶恐永不復得為昔日游也少壯真當努力年一過往何可攀援古人思秉燭夜遊良有以也頃何以自娛頗復有所造述不東望於邑裁書叙心王彪與殷浩書太史上元日合朔談者或有疑應却㑹與不昔建元元年亦元日合朔庾車騎寫劉孔才所論以示八座于時朝議有謂孔才所論為不得禮議荀令從之是勝人之一失也何者禮云諸侯旅見天子入門不得終禮而廢者四太廟火日蝕后之喪雨霑服失容尋此四事之指自謂諸侯雖已入門而卒暴有之則不得終禮非為先存其事而徼幸史官推術錯謬故不豫廢朝禮也夫三辰有災莫大日蝕史官告譴而無懼容不修豫防之禮而廢消救之術方大饗華夷君臣相慶豈是將處天災罪己之謂且檢之事實合朔之儀至尊靜躬殿堂不聽政事冕服御坐門闥之制與元㑹禮異自不得兼行則當權其事宜合朔之禮不輕於元㑹元㑹有可却之準合朔無可廢之義謂應依建元故事却元㑹浩從之竟却㑹蔣濟遺衛臻書時衛臻與選舉濟與此書漢祖遇亡虜為上將周武拔漁父為太師布衣厮養可登王公何必守文試而後用答書臻答曰古人遺智慧而任度量須考績而加黜陟今子同牧野於成康喻斷蛇於文景好不經之舉開拔竒之津將使天下馳騁而起矣蜀諸葛亮答李嚴書嚴與亮書勸亮宜受九錫進爵稱王故答日吾與足下相知久矣可不復相解足下方誨以光國戒之以勿拘之道是以未得默已吾本東方下士誤用於先帝位極人臣祿賜百億今討賊未效知已未答而方寵齊晉坐自貴大非其義若滅魏斬睿帝還故居與諸子並升雖十命可受况于九邪諸葛亮與杜微書杜微字國輔梓潼涪人也少受學於廣漢任安劉璋辟為從事以疾去官及先主定蜀微常稱聾閉門不出建興二年丞相亮領益州牧選迎皆妙簡舊德而以秦宓為别駕五梁為功曹微為主簿微固辭輿而致之既至亮引見微微自陳謝亮以微不聞人語於座上與書曰服聞德行饑渴厯時清濁異流無緣咨覯王元泰李伯仁王文儀楊季休丁君幹李永南兄弟文仲寶等每嘆髙志未見如舊猥以空虛統領貴州德薄任重慘慘憂慮朝廷主公今年始十八天姿仁敏愛德下士天下之人思慕漢室欲與君因天順民輔此明主以隆季興之功著勳於竹帛也以謂賢愚不相為謀故自割絶守勞而己不圖自屈也微自乞老病求歸亮又書曹丕篡弒自立為帝是猶土龍芻狗之有名也欲與羣賢因其邪僞以正道滅之怪君未有相誨便欲求還於山野丕又大興勞役以向吳楚今因丕多務且以閉境勤農育養民物並治甲兵以待其挫然後伐之可使兵不戰民不勞而天下定也君但當以德輔時耳不責君軍事何為汲汲欲求去乎許靖與曹公書字文休時避難交州世路戎夷禍亂遂合駑怯偷生自竄蠻貊成闊十年吉凶禮廢昔在㑹稽得所貽書辭㫖欵密久要不忘迫於袁術方命圮族扇動羣逆津塗四塞雖縣心北風欲行靡由正禮師退術兵前進㑹稽傾覆景興失據三江五湖皆為虜庭臨時困厄無所控告便與袁沛鄧子孝等浮涉滄海南至交州經厯東甌閩越之國行經萬里不見漢地漂薄風波絶糧茹草饑殍薦臻死者大半既濟南海與領守兒孝德相見知足下忠義奮發整飭元戎西迎大駕巡省中嶽承此休問且悲且喜即與袁沛及徐元賢復共嚴裝欲北上荆州㑹蒼梧諸縣夷越蜂起州府傾覆道路阻絶元賢被害老弱並殺靖尋循渚岸五千餘里復遇疾癘伯母隕命并及羣從自謂妻子一時略盡復相扶持前到此郡計為兵害及病亡者十遺一二生民之艱辛苦之甚豈可具陳哉懼卒顛仆永為亡虜憂悴慘慘忘寢與食欲附奉朝貢使自獲濟通歸死闕庭而荆州水陸無津交部驛使斷絶欲上益州復有峻防故官長吏一不得入前令交址太守士威彥深相分託於益州兄弟又靖亦自與書辛苦懇惻而復寂寞未有報應雖仰瞻光靈延頸企踵何由假翼自致哉知聖主允明顯授足下專征之任凡諸逆節多所誅討想力競者一心順從者同規矣又張子雲昔在京師志匡王室今雖臨荒域不得參與本朝亦國家之藩鎮足下之外援也若荆楚平和王澤南至足下忽有聲命於子雲勤見保屬令得假途由荆州出不然當復相紹介於益州兄弟使相納受倘天假其年人緩其禍得歸死國家解逋逃之負泯軀九泉將復何恨若時有險易事有利鈍人命無常隕沒不達者則永銜罪責入於裔土矣昔營丘翼周仗鉞專征博陸佐漢虎賁警蹕今日足下扶危持傾為國柱石秉師望之任兼霍光之重五侯九伯制御在手自古及今人臣之尊未有及足下者也夫爵髙者憂深祿厚者責重足下據爵髙之任當責重之地言出於口即為賞罰意之所存便為禍福行之得道即社稷用寧行之失道則四方散亂國家安危在於足下百姓之命懸於執事自華及夷顒顒注望足下任此豈可不逺覽載籍廢興之由榮辱之機棄忘舊惡寬和羣司審量五材為官擇人苟得其人雖讐必舉苟非其人雖親不授以寧社稷以濟下民事立功成則繫音於管絃勒勳於金石願君勉之為國自重為民自愛王朝與許靖書文休足下消息平安甚善甚善豈意脫别三十餘年而無相見之緣乎詩人比一日之别於嵗月豈况悠悠厯纍紀之年者哉自與子别若沒而復浮若絶而復連者數矣而今而後居升平之京師攀附於飛龍之聖主儕輩略盡幸得老與足下並為遺種之叟而相去數千里加有邅蹇之隔時聞消息於風聲託舊情於思想眇眇異處與異世無以異也往者隨軍到荆州見鄧子孝桓元將粗聞足下動靜云夫子既在益州執職領郡德素規矩老而不墮是時侍宿武皇帝於江陵劉景升聽事之上共道足下於通夜拳拳饑渴誠無已也自天子在東宫及即位之後每㑹羣賢論天下髦雋之見在者豈獨人盡易為英士鮮易取最故乃猥以原壤之朽質感夫子之情聽每叙足下以為謀首豈其注意乃復過於前世書曰人惟求舊易稱同聲相應同氣相求劉將軍之與大魏兼而兩之總此二義前世邂逅以同為暌非武皇帝之㫖頃者蹉跌其泰而否亦非足下之意也深思書易之義利結分於宿好故遣降者送吳所獻致名馬貂罽得因無嫌道初開通展叙舊情以達聲問久闊情慉非夫筆墨所能寫陳亦想足下同其志念今者親生男女凡有幾人年並幾何僕連失一男一女今有二男大兒名肅年二十九生於㑹稽小兒才嵗餘臨書愴悢有懷緬然又書過聞受終於文祖之言於尚書又聞厯數在躬允執其中之文於論語豈自意得於老耄之齒正值天命受於聖主之㑹親見三讓之𢎞辭觀衆瑞之總集覩升堂穆穆之盛禮瞻燔燎焜曜之青烟于時忽自以為處唐虞之運際於紫微之天庭也徒慨不得擕子之手共列于世有二子之數以聽有唐欽哉之命也子雖在裔土想亦極目而回望側耳而遐聽延頸而鶴立也昔汝南陳公初拜不依故常讓上卿於李元禮以此推之吾宜退身以避子位也苟得避子以竊讓名然後緩帶委質游談於平勃之間與子共陳往時避地之艱辛樂酒酣宴髙談大噱亦足遺憂而忘老捉筆陳情隨以笑喜又書前夏有書而未達今重有書而并致前問皇帝既深悼劉將軍之早世又愍其孤之不易又惜使足下孔明等士人氣類之徒遂沉溺於羌夷異種之間永與華夏乖絶而無朝聘中國之期緣瞻睎故土桑梓之望也故復運慈念而勞仁心重下明詔以發德音申敕朗等使重為書與足下等以足下聰明揆殷勤之聖意亦足悟海岱之所常在知百川之所宜注矣昔伊尹去夏而就殷陳平違楚而歸漢猶曜德於阿衡著功於宰相若足下能弼人之遺孤定人之猶豫去非常之僞號事受命之大魏客主兼不世之榮名上下䝉不朽之常耀功與事並聲與勳著考績效足以超越伊吕矣既承詔直且服舊之情情不能已若不言足下之所能陳足下之所見則無以宣明詔命𢎞光大之恩叙宿昔夢想之思若天啓衆心子導蜀意誠此意有擕手之期若險路未夷子謀不從則懼聲問或否復面何由前後三書言每及斯希不切然有動於懷足下周游江湖以暨南海厯觀夷俗可謂遍矣想子之心結思華夏可謂深矣為身擇居猶願中土為主擇居安豈可以不繫意於京師而持疑於荒裔乎詳思愚言速示還報也三國志文類卷四十六
