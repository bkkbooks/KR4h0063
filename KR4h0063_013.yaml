body:
  text: 三國志文類巻十三書疏魏太祖謝九錫書臣䝉先帝厚恩致位郎署受性疲殆意望畢足非敢希望高位庶幾顯達㑹董卓作亂義當死難故敢奮身出命摧鋒率衆遂值千載之運奉役目下當二袁炎沸侵侮之際陛下與臣寒心同憂顧瞻京師進受猛敵常恐君臣俱陷虎口臣不自意能全首領賴祖宗靈佑醜類夷滅得使㣲臣竊名其間陛下加恩授以上相封爵寵禄豐大𢎞厚生平之願實不望也口與心計幸且待罪保持列侯遺付子孫自托聖世永無憂責不意陛下乃發盛意開國備錫以貺愚臣地比齊魯禮同藩王非臣無功所宜膺據歸情上聞不䝉聽許嚴詔切至誠使臣心俯仰偪迫伏自惟省列在大臣命制王室身非已有豈敢自私遂其愚意亦將黜退令就初服今奉疆土備數藩翰非敢逺期慮有後世至於父子相誓終身灰軀盡命報塞厚恩天威在顔悚懼受詔陶謙上太祖未可罷兵書時曹公父於泰山被殺歸咎於謙欲伐謙而畏其強乃表令州郡一時罷兵謙被詔乃上書臣聞懐逺柔服非徳不集克難平亂非兵不濟是以涿鹿坂泉三苖之野有五帝之師有扈鬼方商奄四國有王者之伐自古在昔未有不揚威以弭亂震武以止暴者也臣前初以黄巾亂治受䇿長驅匪遑啟處雖憲章勅戒奉宣威靈敬行天誅每伐輒克然妖冦類衆殊不畏死父兄殱殪子弟羣起治屯連兵至今為患若承命解甲弱國自虛釋武備以資亂損官威以益冦今日兵罷明日難必至上忝朝廷寵授之本下令羣凶日月滋蔓非所以彊榦弱枝遏惡止亂之務也臣雖愚蔽忠恕不昭抱恩念報所不忍行輒勒部曲申令警備出芟彊冦惟力是視入宣徳澤躬奉職事冀効㣲勞以贖罪負又曰華夏沸擾于今未弭包茅不入職貢多闕寤寐憂嘆無日敢寜誠思貢獻必至薦羞獲通然後銷鋒解甲臣之願也臣前調穀百萬斛已在水次輒勑兵衛送霍性諫南征疏魏王將出征度支中郎將新平霍性上疏諫臣聞文王與紂之事是時天下括囊無咎凡百君子莫肯用訊今大王體則乾坤廣開四聰使賢愚各建所規伏惟先王功無與比而今能言之類不稱為徳故聖人曰得百姓之歡心兵書曰戰危事也是以六國力戰彊秦承弊豳王不爭周道用興愚謂大王且當委重本朝而守其雌抗威虎卧功業可成而今剏基便復起兵兵者凶器必有凶擾擾則思亂亂出不意臣謂此危危於累卵昔夏啟隠神三年易有不逺而復論有不憚改誠願大王揆古察今深謀逺慮與三事大夫算其長短臣沐浴先王之遇又初改政復受重任雖知言觸龍鱗阿諛近福切感所誦危而不持傅幹言征孫權疏治天下之大具有二文與武也用武則先威用文則先徳威徳足以相濟而後王道備矣徃者天下大亂上下失序明公用武攘之十平其九今未承王命者吳與蜀也吳有長江之險蜀有崇山之阻難以威服易以徳懐愚以為可且按甲寢兵息軍養士分土定封論功行賞若此則内外之心固有功者勸而天下制定矣然後漸興學校以導其善性而長其義節公神武震於四海若修文以濟之則普天之下無思不服矣今舉十萬之衆頓之長江之濵若賊負固深藏則士馬不得逞其能竒變無所用其權則大威有屈而敵心未能服矣唯公明思虞舜舞干戚之義全威養徳以道制勝公不從軍遂無功張茂上録奪士女書茂以吳蜀數動諸將出征而帝盛興宫室留意於玩飾賜與無度帑藏空竭又録奪士女前已嫁為吏民妻者還以配士既聽以生口自贖又簡選其有姿色者内之掖庭乃上書諫臣伏見詔書諸士女嫁非士者一切録奪以配戰士斯誠權時之宜然非大化之善者也臣請論之陛下天之子也百姓吏民亦陛下之子也禮賜君子小人不同日所以殊貴賤也吏屬君子士為小人今奪彼與此無以異於奪兄之妻妻弟也於父母之恩偏矣又詔書聽得以生口年紀顔色與妻相當者自代故富者則傾家盡産貧者舉假貸貰貴買生口以贖其妻縣官以配士為名而實内之掖庭其醜惡者乃出與士得婦者未必有懽心而失妻者必有憂色或窮或愁皆不得志夫君有天下而不得萬姓之歡心者尠不危殆且軍師在外數千萬人一日之費非徒千金舉天下之賦以奉此役猶將不給况復有宫庭非員無録之女椒房母后之家賞賜横興内外交引其費半軍昔漢武帝好神仙信方士掘地為海封土為山賴是時天下為一莫敢與爭者耳自衰亂以來四五十載馬不捨鞍士不釋甲每一交戰血流丹野創痍號痛之聲于今未已猶彊冦在疆圖危魏室陛下不兢兢業業念崇節約思所以安天下者而乃奢靡是務中尚方純作玩弄之物炫燿後園建承露之盤斯誠快耳目之觀然亦足以騁冦讐之心矣惜乎舍堯舜之節儉而為漢武之侈事臣竊為陛下不取也願陛下沛然下詔萬機之事有無益而有損者悉除去之以所除無益之費厚賜將士父母妻子之飢寒者問民所疾而除其所惡實倉廪繕甲兵恪恭以臨天下如是吳賊面縛蜀虜輿櫬不待誅而自服太平之路可計日而待也陛下可無勞神思於海表軍師髙枕戰士備員今羣公皆結舌而臣所以不敢不獻瞽言者臣昔上要言散騎奏臣書以聽諫篇為善詔曰是也擢臣為太子舍人且臣作書譏為人臣不能諫諍今有可諫之事而臣不諫此為作書虛妄而不能言也臣年五十常恐至死無以報國是以投軀沒命冒昧以聞惟陛下裁察董尋上移露盤書明帝徏長安諸鐘簴駱駝銅人承露盤盤折銅人重不可致留于覇城大發銅鑄作銅人二號曰翁仲列坐於司馬門外又鑄黄龍鳳凰各二龍髙四丈鳳高三丈餘置内殿前起土山於芳林園西北陬使公卿羣寮皆負土成山樹竹雜木善草於其上捕山禽雜獸置其中初帝徙盤盤折聲聞數十里金狄或泣因留於霸城尋上書諫曰臣聞古之直士盡言於國不避死亡故周昌比高祖於桀紂劉輔譬趙后於人婢天生忠直雖白刃沸湯徃而不顧者誠為時主愛惜天下也建安以來野戰死亡或門殫户盡雖有存者遺孤老弱若今宫室狹小當廣大之猶宜隨時不妨農務况乃作無益之物黄龍鳯凰九龍承露盤土山淵池此皆聖明之所不興也其功參倍於殿舍三公九卿侍中尚書天下至徳皆知非道而不敢言者以陛下春秋方剛心畏雷霆今陛下既尊羣臣顯以冠冕被以文繡載以華輿所以異於小人而使穿方舉土面目垢黑沾體塗足衣冠了鳥毁國之光以崇無益甚非謂也孔子曰君使臣以禮臣事君以忠無忠無禮國何以立故夫君不君臣不臣上下不通心懐欝結使隂陽不和災害屢降凶惡之徒因間而起誰當為陛下盡言是者乎又誰當干萬乘以死為戲乎臣知言出必死而臣自比於牛之一毛生既無益死亦何損秉筆流涕心與世辭臣有八子臣死之後累陛下矣將奏沐浴既通帝曰董尋不畏死邪主者奏收尋有詔勿問後為貝丘令清省得民心劉禎荅文帝書文帝嘗賜禎廓落帶其後師死欲借取以為像因書嘲禎云夫物因人為貴故在賤者之手不御至尊之側今雖取之勿嫌其不反也禎荅書曰楨聞荆山之璞曜元后之寳隨侯之珠燭衆士之好南垠之金登窈窕之首鼲貂之尾綴侍從之幘此四寳者伏朽石之下潛汙泥之中而揚光千載之上發彩疇昔之外亦皆未能初自接於至尊也夫尊者所服卑者所修也貴者所御賤者所先也故夏屋初成而大匠先立其下嘉禾始熟而農夫先嘗其粒恨楨所帶無他妙飾若實殊異尚可納也劉廙荅文帝書文帝命廙通草書廙荅書曰初以尊卑有踰禮之常分也是以貪守區區之節不敢修草必如嚴命誠知勞謙之素不貴殊異若彼之高而惇白屋如斯之好苟使郭隗不輕於燕九九不忽於齊樂毅自至霸業以隆虧匹夫之節成巍巍之美雖愚不敏何敢以辭三國志文類巻十三
