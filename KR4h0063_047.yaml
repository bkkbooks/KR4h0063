body:
  text: 三國志文類卷四十七書蜀秦宓答王商書劉璋時宓同郡王商為治中從事與宓書曰貧賤困苦亦何時可以終身卞和衒玉以耀世宜一來與州尊相見宓答此書昔堯優許由非不𢎞也洗其兩耳楚聘莊周非不廣也執竿不顧易曰確乎其不可拔夫何衒之有且以國君之賢子為良輔不以是時建蕭張之策未足為智也僕得曝背乎隴畝之中誦顔氏之簞瓢詠原憲之蓬户時翺翔於林澤與沮溺之等儔聽玄猿之悲吟察鶴鳴於九臯安身為樂無憂為福處空虛之名居不靈之龜知我者希則我貴矣斯乃僕得志之秋也何困苦之戚焉又與王商書後商為嚴君平李𢎞立祠宓與書曰疾病伏匿甫知足下為嚴李立祠可謂厚黨勤類者也觀嚴文章冠冒天下由夷逸操山嶽不移使楊子不歎固自昭明如李仲元不遭法言令名必淪其無虎豹之文故也可謂攀龍附鳳者矣如揚子雲濳心著述有補於世泥蟠不滓行參聖師于今海內談詠厥辭邦有斯人以耀四逺怪子替茲不立祠堂蜀本無學士文翁遣相如東受七經還教吏民於是蜀學比於齊魯故地里志曰文翁倡其教相如為之師漢家得士盛於其世仲舒之徒不達封禪相如制其禮夫能制禮造樂移風易俗非禮所秩有益於世者乎雖有王孫之纍猶孔子大齊桓之霸公羊賢叔術之讓僕亦善長卿之化宜立祠堂速定其銘又報李權書李㩲從宓借戰國策宓曰戰國從橫用之何為權曰仲尼嚴平會聚衆書以成春秋指歸之文故海以合流為大君子以博識為𢎞宓報書非史記周圖仲尼不采道非虛無自然嚴平不演海以受淤嵗一蕩清君子博識非禮不視今戰國反覆儀秦之術殺人自生亡人自存經之所疾故孔子發憤作春秋大乎居正復制孝經廣陳德行杜漸防萌預有所抑是以老氏絶禍於未萌豈不信邪成湯大聖覩野魚而有獵逐之失定公賢者見女樂而棄朝事若此輩類焉可勝陳道家法曰不見所欲使心不亂是故天地貞觀日月貞明其直如矢君子所履洪範記災發於言貌何戰國之譎權乎哉馬良與諸葛亮書聞雒城已拔此天祚也尊兄應期贊世配業光國魄兆見矣夫變用雅慮審貴垂明於以簡才宜適其時若乃和光悅逺邁德天壤使時間於聽世服於道齊髙妙之音正鄭衛之聲並利於事無相奪倫此乃管絃之至牙曠之調也雖非鍾期敢不擊節孟達與劉封書魏文帝善達之姿才容觀以為散騎常侍建武將軍封平陽亭侯合房陵上庸西城三郡達領新城太守遣征南將軍夏侯尚右將軍徐晃與達共襲封達與封書曰古人有言疏不間親新不加舊此謂上明下直讒慝不行也若乃權君譎主賢父慈親猶有忠臣蹈功以罹禍孝子抱仁以陷難種商白起孝已伯竒皆其類也其所以然非骨肉好離親親樂患也或有恩移愛易亦有讒間其間雖忠臣不能移之於君孝子不能變之於父者也勢利所加改親為讎况非親親乎故申生衛伋禦冦楚建稟受形之氣當嗣立之正而猶如此今足下與漢中王道路之人耳親非骨月而據勢權義非君臣而處上位征則有偏任之威居則有副軍之號逺近所聞也自立阿斗為太子已來有識之人相為寒心如使申生從子輿之言必為太伯衛伋聽其弟之謀無彰父之譏也且小白出奔入而為霸重耳踰垣卒以克復自古有之非獨今也夫智貴免禍明尚夙達僕揆漢中王慮定於內疑生于外矣慮定則心固疑生則心懼亂禍之興作未有不由廢立之間也私怨人情不能不見恐左右必有以間於漢中王矣然則疑成怨聞其發若踐機耳今足下在逺尚可假息一時若大軍遂進足下失據而還竊相為危之昔微子去殷智果别族違難避禍猶皆如斯今足下棄父母而為人後非禮也知禍將至而留之非智也見正不從而疑之非義也自號為丈夫為此三者何所貴乎以足下之才棄身來東繼嗣羅侯不為背親也北面事君以正綱紀不為棄舊也怒不致亂以免危亡不為徒行也加陛下新受禪命虛心側席以德懷逺若足下翻然內向非但與僕為倫受三百户封計統羅國而已當更剖符大邦為始封之君陛下大軍金鼓以震當轉都宛鄧若二敵不平軍無還期足下宜因此時早定良計易有利見大人詩有自求多福行矣今足下勉之無使狐突閉門不出封不從達言彭羕獄中與諸葛亮書時左遷私情不悅詣馬超超問羕曰卿才具秀拔主公相待至重謂卿當與孔明孝直諸人齊立並驅宜當外授小郡失人本望乎羕曰老革荒悖可復道邪又謂超曰卿為其外我為其內天下不足定矣羕退具表羕辭於是收付獄僕昔有事於諸侯以為曹操暴虐孫權無道振威暗弱其惟主公有霸王之器可與興業致治故乃翻然有輕舉之志會公來西僕因法孝直自衒鬻龎統斟酌其間遂得詣公於葭萌抵掌而談論治世之務講霸王之義建取益州之策公亦宿慮明定即相然贊遂舉事焉僕於故州不免凡庸憂於罪罔得遭風雲激矢之中求君得君志行名顯從布衣之中擢為國士盜竊茂才分子之厚誰復過此羕一朝狂悖自求葅醢為不忠不義之鬼乎先民有言左手據天下之圖右手刎咽喉愚夫不為也况僕頗别菽麥者哉所以有怨望意者不自度量苟以為首興事業而有投江陽之論不解主人之意意卒感激頗以被酒侻失老語此僕之下愚薄慮所致主公實未老且夫立業豈在老少西伯九十寧有衰志負我慈父罪有百死至於內外之言欲使孟起立功北州戮力主公共討曹操耳寧敢有他志耶孟起説之是也但不分别其間痛人心耳昔每與龎統共相誓約庶託足下末蹤盡心於主公之業追名古人載勳竹帛統不幸而死僕敗以取禍自我惰之將復誰怨足下當世伊吕也宜善與主公計事濟其大猷天明地察神祗有靈復何言哉貴使足下明僕本心耳行矣努力自愛張嶷與諸葛瞻書吳太傅諸葛恪以初破魏軍大興兵衆以圖攻取侍中諸葛瞻丞相亮之子而恪從弟也嶷與書曰東主初崩帝實幼弱太傅受寄託之重亦何容易親以周公之才猶有管蔡流言之變霍光受任亦有燕蓋上官逆亂之謀賴成昭之明以免斯難耳昔每聞東主殺生賞罰不牟下人又今以垂沒之命卒召太傅屬以後事誠實可慮加吳楚剽急乃昔所記而太傅離少主履敵庭恐非良計長算之術也雖云東家紀綱肅然上下輯睦百有一失非明者之慮取古則今今則古也自非郎君進忠言於太傅誰復有盡言者也旋軍廣農務行德惠數年之中東西並舉實為不晚願深採察三國志文類卷四十七
