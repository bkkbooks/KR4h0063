body:
  text: 三國志文類巻三十一勸說魏荀彧勸太祖定兖州彧字文若初去袁紹從太祖太祖大悅曰吾之子房也以為司馬太祖征陶謙任彧留事㑹張邈以兖州反潛迎吕布兖州諸城皆應布太祖自徐州還擊布布東走太祖軍乘氏大飢人相食陶謙死太祖欲遂取徐州還乃定布彧勸太祖曰晋高祖保關中光武據河内皆深根固本以制天下進足以勝敵退足以堅守故雖有困敗而終濟大業將軍本以兖州首事平山東之難百姓無不歸心悅服且河濟天下之要地也今雖殘壞猶易以自保是亦將軍之關中河内也不可以不先定今巳破李封薛蘭若分兵東擊陳宫宫必不敢西顧以其間勒兵收熟麥約食畜穀一舉而布可破也破布然後南結揚州共討袁術以臨淮泗若舍布而東多留兵則不足用少留兵則民皆保城不得樵採布乘虚冦暴民心益危唯鄄城范衛可全其餘非己之有是無兖州也若徐州不定將軍當安所歸乎且陶謙雖死徐州未易亡也彼懲往年之敗將懼而結親相為表裏今東方皆以收麥必堅壁清野以待將軍將軍攻之不拔略之無獲不出十日則十萬之衆未戰而自困耳前討徐州威罰實行其子弟念父兄之恥必人自為守無降心就能破之尚不可有也夫事固有棄此取彼者以大易小可也以安易危可也權一時之勢不患本之不固可也今三者莫利願將軍熟慮之太祖乃止大收麥復與布戰分兵平諸縣布敗走兖州遂平又勸太祖迎漢帝建安元年太祖擊破黄巾漢獻帝自河東還洛陽太祖議奉迎都許彧以山東未平韓暹楊奉新将天子到洛陽北連張楊未可卒制彧勸太祖辭曰昔高祖東伐為義帝縞素而天下歸心自天子播越將軍首唱義兵徒以山東擾亂未能逺赴關右然猶分遣將帥䝉險通使雖禦難於外乃心無不在王室是將軍匡天下之素志也今車駕旋軫義士有存本之思百姓感舊而增哀誠因此時奉主上以從民望大順也秉至公以服雄傑大略也扶宏義以致英雋大德也天下雖有逆節必不能為累明矣韓暹楊奉其敢為害若不時定四方生心後雖慮之無及太祖遂至洛陽奉迎天子都許荀攸等勸太祖進魏公授九錫建安十八年天子策命曹公為魏公加九錫令曰夫授九錫廣開土宇周公其人也漢之異姓八王者與高祖俱起布衣剏定王業其功至大吾何可比之前後三讓於是謝亭侯荀攸等勸進自古三代胙臣以土受命中興封秩輔佐皆所以褒功賞德為國藩衛也往者天下崩亂羣凶豪起顛越跋扈之險不可忍言明公奮身出命以徇其難誅二袁簒盜之逆滅黄巾賊亂之類殄夷首逆芟撥荒穢沐浴霜露二十餘年書契巳來未有若此功者昔周公承文武之迹受巳成之業高枕墨筆拱揖羣后商奄之勤不過二年吕望因三分有二之形據八百諸侯之勢暫把旄鉞一時指麾然皆大啓土宇跨州兼國周公八子並為侯伯白牡騂剛郊祀天地典䇿備物擬則王室榮章寵盛如此之𢎞也迨至漢興佐命之臣張耳吳芮其功至薄亦連城開地南面稱孤此皆明君達主行之於上賢臣聖宰受之於下三代令典漢帝明制今比勞則周吕逸計功則張吳微論制則齊魯重言地則長沙多然則魏國之封九錫之榮況於舊賞猶懷玉而被褐也且列侯諸將幸攀龍驥得竊微勞佩紫懷黄葢以百數亦將因此傳之萬世而明公獨辭賞於上將使其下懷不自安上違聖朝歡心下失冠帶至望忘輔弼之大業信匹夫之細行攸等所大懼也於是公勅外為章但受魏郡攸等復曰伏見魏國初封聖朝發慮稽謀羣寮然後䇿命而明公久違上指不即大禮今旣䖍奉詔命副順衆望又欲辭多當少讓九受一是猶漢朝之賞不行而攸等之請未許也昔齊魯之封奄有東海疆域井賦四百萬家基隆業廣易以立功故能成翼戴之勲立一匡之績今魏國雖有十郡之名猶減於曲阜計其戸數不能參半以藩衛王室立垣樹屏猶未足也且聖上覽亡秦無補之禍懲曩日震蕩之艱託建忠賢廢墜是為願明公恭承帝命無或拒違公乃受命田豐說袁紹紹與曹公相持於官渡豐說曰曹公善用兵變化無方衆雖少未可輕也不如以久持之將軍據山河之固擁四州之衆外結英雄内修農戰然後簡其精銳分為竒兵乘虛迭出以擾河南救右則擊其左救左則擊其右使敵疲於奔命民不得安業我未勞而彼巳困不及二年可坐克也今釋廟勝之䇿而決成敗於一戰若不是志悔無及也紹不從傅巽説劉琮歸太祖越嵩及東曹掾傅巽等說琮歸太祖琮曰今與諸君據全楚之地守先君之業以觀天下何為不可乎巽對曰逆順有大體强弱有定勢以人臣而拒人主逆也以新造之楚而禦國家其勢弗當也以劉備而敵曹公又弗當也三者皆短欲以抗王兵之鋒必亡之道也將軍自料何與劉備琮曰吾不若也巽曰誠以劉備不足禦曹公乎則雖保楚地不足以自存也誠以劉備足禦曹公乎則備不為將軍下也願將軍勿疑閻忠説皇甫嵩中平元年車騎將軍皇甫嵩旣破黄巾威震天下閻忠時罷信都令而說嵩曰夫難得而易失者時也時至而不旋踵者機也故聖人常順時而動智者必因機以發今將軍遭難得之運蹈易解之機而殘運不撫臨機不發將何以享大名乎嵩曰何為也忠曰天道無親百姓與能故有高人之功者不受庸主之賞今將軍授鉞於初春收功於末冬兵動若神謀不再計旬月之間神兵電掃攻堅易於折枯摧敵甚於湯雪九州席捲屠三十六萬方夷黄巾之師除邪害之患或封戸刻石南向以報德威震本朝風馳海外是以羣雄囘首百姓企踵雖湯武之舉未有高於將軍者身建高人之功北面以事庸主將何以圖安嵩曰心不忘忠何為不安忠曰不然昔韓信不忍一飱之遇而棄二分之利拒蒯通之忠忽鼎跱之勢利劍巳揣其喉乃歎息而悔所以見烹於兒女也今主勢弱於劉項將軍權重於淮隂指麾可以振風雲叱咤足以興雷電赫然奮發因危抵頺崇恩以綏前附振武以臨後服徴冀方之士動七州之衆羽檄先馳於前大軍震響於後蹈蹟漳河飲馬孟津舉天網以網羅京都誅閹官之罪除羣怨之積忿解久危之倒懸如此則攻守無堅城不招必影從雖兒童可使奮空拳以致力女子可使其褰裳以用命況勵智能之士因迅風之勢則大功不足合八方不足同也功業巳就天下以順乃燎於上帝告以天命混濟六合南面以制移神器於己家推亡漢以定祚實神機之至決風發之良時也夫木朽不雕世衰難佐將軍雖欲委忠難佐之朝雕畫朽敗之木猶逆坂而走丸必不可也方今權官羣居同惡如市主上不自由詔命出左右如有至聰不察機事不先必嬰後悔亦無及矣嵩不從忠乃亡去三國志文類巻三十一
