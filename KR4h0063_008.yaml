body:
  text: 三國志文類巻八教令魏文帝問張既令問雍州刺史張既曰試守金城太守蘇則既有綏民平夷之功聞又出軍西定湟中為河西作聲勢吾甚嘉之則之功効為可加爵邑未耶封爵重事故以問卿密白意且勿宣露也既答曰金城郡昔為韓遂所見屠剥死喪流亡或竄戎狄或陷寇亂戸不滿五百則到官内撫凋殘外鳩離散今見戸千餘又梁燒雜種羌昔與遂同惡遂斃之後越出障塞則前後招懐歸就郡者三千餘落皆䘏以威恩為官効用西平麴演等唱造邪謀則尋出軍臨其項領演即歸命送質破絶賊糧則既有䘏民之效又能和夷狄盡忠效節遭遇聖明有功必録若則加爵邑誠足以勸忠臣勵風俗也鄭稱為武德侯傅令龍淵太阿出昆吾之金和氏之璧由井里之田礱之以砥礪錯之以他山故能致連城之價為命世之寳學亦人之砥礪也稱篤學大儒勉以經學輔侯宜旦夕入侍曜明其志因孫權獻蜀將孟達等手筆令吾前遣使宣國威靈而達即來吾惟春秋褒儀父即封拜達使還領新城太守近復有扶老攜幼首向王化者吾聞夙沙之民自縛其君以歸神農豳國之衆襁負其子而入酆鎬斯豈驅略迫脅之所致哉乃風化動其情而仁義感其衷歡心内發使之然也以此而推西南將萬里無外權備將與誰守死乎答司馬懿等言許芝所上符命令世之所不足者道義也所有餘者苟妄也常人之性賤所不足貴所有餘故曰不患無位患所以立孤雖寡徳庶自免於常人之貴夫石可破而不可奪堅丹可磨而不可奪赤丹石微物尚保斯質况吾託士人之末列曾受教於君子哉且於陵子仲以仁為富栢城子髙以義為貴鮑焦感子貢之言棄其蔬而槁死薪者譏季札失辭皆委重而弗視吾獨何人昔周武大聖也使叔旦盟膠鬲於四内使召公約微子於共頭故伯夷叔齊相與笑之曰昔神農氏之有天下不以人之壊自成不以人之卑自髙以為周之伐殷以恭也吾德非周武而義慙夷齊庶欲逺苟妄之失道立丹石之不奪邁於陵之所富蹈栢城之所貴執鮑焦之貞至遵薪者之清節故曰三軍可奪帥匹夫不可奪志吾之所志豈可奪哉答輔國將軍劉若等以下一百二十人令太古聖王之治也至徳合乾坤惠澤均造化禮教優乎昆蟲仁恩洽乎草木日月所照戴天履地含氣有生之類靡不被服清風沐浴𤣥德是以金革不起苛慝不作風雨應節禎祥觸類而見今百姓寒者未暖饑者未飽鰥者未室寡者未嫁權備尚存未可舞以干戚方將整以齊斧戎役未息於外士民未安於内耳未聞康哉之歌目未覩擊壤之戲嬰兒未可託於髙巢餘糧未可宿於田畆人事未備至如此也夜未曜景星治未通真人河未出龍馬山未出象車蓂莢未植階塗萐莆未生庖厨王母未獻白環渠搜未見珍裘靈瑞未效又如彼也昔東戸季子容成大庭軒轅赫胥之君咸得以此就功勒石今諸卿獨不可少假孤精心竭慮以和天人以格至理使彼衆事備羣瑞效然後安乃議此乎何遽相愧相迫之如是也速為讓章上還璽綬無重吾不徳也蜀諸葛亮與李豐教時豐為江州都督諸葛亮既廢平為民又與豐教教曰吾與君父子戮力以奬漢室此神明所聞非但人知之也表都䕶典漢中委君於東闗者不與人議也謂至心感動終始可保何圖中乖乎昔楚卿屢絀亦乃克復思道則福應自然之數也願寛慰都䕶勤追前闕今雖解任形業失故奴婢賓客百數十人君以中郎叅軍居府方之氣類猶為上家若都䕶思負一意君與公琰推心從事者否可復通逝可復還也詳思斯戒明吾用心臨書長嘆涕泣而已吳大帝幽張温令昔令召張温虚已待之既至顯授有過舊臣何圖凶醜專挾異心昔暨豔父兄附於惡逆寡人無忌故進而任之欲觀豔何如察其中間形態果見而温與之結連死生豔所進退皆温所為頭角更相表裏共為腹背非温之黨即就疵瑕為之生論又前任温董督三郡指撝吏客及殘餘兵時恐有事欲令速歸故授棨㦸奬以威柄乃便到豫章表討宿惡寡人信受其言特以繞帳帳下解煩兵五千人付之後聞曹丕自出淮泗故豫勑温有急便出而温悉内諸將布於深山被命不至賴丕自退不然已徃豈可深計又殷禮者本占候召而温先後乞將到蜀扇揚異國為之譚論又禮之還當親本職而令守尚書户曹郎如此署置在温而已又温語賈原當薦卿作御史語蔣康當用卿代賈原專衒賈國恩為已形勢揆其姦心無所不為不忍暴於市朝今斥還本郡以給厮吏嗚呼温也免罪為幸尋虞翻令權遣將士至遼束於海中遭風多所沒失權悔之乃令曰昔趙簡子稱諸君之唯唯不如周舍之諤諤虞翻亮直善於盡言國之周舍也前使翻在此此役不成促下問交州翻若尚存者給其人船發遣還都若已亡者送喪還本郡使兒子仕宦㑹翻已終三國志文類巻八
