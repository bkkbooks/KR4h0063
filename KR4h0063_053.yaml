body:
  text: 三國志文類卷五十三評吳陳壽評孫堅孫策評曰孫堅勇摯剛毅孤微發迹導溫戮卓山陵杜塞有忠壯之烈䇿英氣傑濟猛鋭冠世覽奇取異志陵中夏然皆輕佻果躁隕身致敗且割據江柬策之基兆也而權尊崇未至子止侯爵於義儉矣又評吳主評曰孫權屈身忍辱任才尚計有勾踐之奇英人之傑矣故能自擅江表成鼎峙之業然性多嫌忌果於殺戮暨臻末年彌以滋甚至于讒説殄行胤嗣廢斃豈所謂貽厥孫謀以燕翼子者哉其後葉陵遲遂致覆國未必不由此也又評三嗣主評曰孫亮童孺而無賢輔其替位不終必然之勢也休以舊愛宿恩任用興布不能拔進良才改絃易張雖志善好學何益救亂乎又使既廢之亮不得其死友于之義薄矣晧之淫刑所濫隕斃流黜者蓋不可勝數是以羣下人人惴恐皆日月以冀朝不謀夕其熒惑巫祝交致祥瑞以為至急昔舜禹躬稼至聖之德猶或矢誓衆臣豫違女弼或拜昌言常若不及况皓凶頑肆行殘暴忠諫者誅讒諛者進虐用其民窮淫極侈宜腰首分離以謝百姓既蒙不死之詔復加歸命之寵豈非曠蕩之恩過厚之澤也哉孫盛評孫堅孫䇿孫氏兄弟皆明略絶羣創基立事䇿之由也且臨終之日顧命委權夫意氣之間猶有刎頸况天倫之篤愛豪達之英鑒豈吝名號於既往違本情之至實哉抑將逺思虛盈之數而慎其名器者乎夫正本定名為國之大防杜絶疑二消釁之良謨是故魯隱矜義終致羽父之禍宋宣懷仁卒有殤公之哀皆心存小善而不達經綸之圖求譽當年而不思貽厥之謀可謂輕千乘之國蹈道則未也孫氏因擾攘之際得奮其從橫之志業非積德之基邦無磐石之固勢一則祿祚可終情乖則禍亂塵起安可不防微於未兆慮難於將來壯哉䇿為首事之君有吳開國之主將相在列皆其舊也而嗣子弱劣析薪弗荷奉之則魯桓田氏之難作崇之則與夷子馮之禍興是以正名定本使貴賤殊邈然後國無陵肆之責後嗣罔猜忌之嫌羣情絶異端之論不逞杜覬覦之心於情雖違於事雖儉至於括囊逺圖永保維城可謂為之于其未有治之于其未亂者也陳氏之評其未達乎又評三嗣主夫古之立君所以司牧羣黎故必仰協乾坤覆燾萬物若乃淫虐是縱酷被羣生則天人殛之勦絶其祚奪其南面之尊加其獨夫之戮是故湯武抗鉞不犯不順之譏漢高奮劒而無失節之議何者誠四海之酷讎而人神之所擯故也况晧罪為逋冦虐過辛癸梟首素旗猶不足以謝寃魂汙室荐社未足以紀暴迹而乃優以顯命寵錫仍加豈龔行天罰伐罪弔民之義乎是以知僭逆之不懲而凶酷之莫戒詩云取彼譖人投畀豺虎聊譖猶然矧譖虐乎且神旗電掃兵臨偽窟理窮勢迫然後請命不赦之罪既彰三驅之義又塞極之權道亦無取焉陳壽評劉繇太史慈士燮評曰劉繇藻厲名行好尚臧否至於擾攘之時據萬里之土非其長也太史慈信義篤烈有古人之分士燮作守南越優遊終世至子不慎自貽凶咎蓋庸才玩富貴而恃阻險使之然也又評張昭顧雍諸葛瑾步隲評曰張昭受遺輔佐功勳克舉忠謇方直動不為已而以嚴見憚以高見外既不處宰相又不登師保從容閭巷養老而已以此明權之不及䇿也顧雍依仗素業而將之智局故能究極榮位諸葛墐步隲並以德度規檢見器當世張承顧邵虛心長者好尚人物周昭之論稱之甚美故詳録焉談獻納在公有忠貞之節休承修志咸庶為善愛惡相攻流播南裔哀哉又評張紘嚴畯程秉闞澤薛綜評曰張紘文理意正為世令器孫策待之亞於張昭誠有以也嚴程闞生一時儒林也至畯辭榮濟舊不亦長者乎薛綜學識規納為吳良臣及瑩纂蹈允有先風然於暴酷之朝屢登顯列君子殆諸又評周瑜魯肅吕蒙評曰曹公乘漢相之資挾天子而掃羣桀新蕩荆城仗威東夏于時議者莫不疑二周瑜魯肅建獨斷之明出衆人之表實奇才也吕蒙勇而有謀斷識軍計譎郝普禽關羽最其妙者初雖輕果妄殺終於克已有國士之量豈徒武將而已乎孫權之論優劣允當故載録焉又評程普凌統潘璋等評曰凡此諸將皆江表之虎臣孫氏之所厚待也以潘璋之不修權能忘過記功其保據東南宜哉陳表將家支庶而與胄子名人比翼齊衡拔萃出類不亦美乎又評朱治朱然吕範朱桓評曰朱治吕範以舊臣任用朱然朱桓以勇烈著聞吕據朱異施績咸有將領之才克紹堂構若範桓之越隘得以吉終至於據異無此之尤而反罹殃者所遇之時殊也又評虞翻陸繢張溫駱統陸瑁吾粲朱據評曰虞翻古之狂直固難免乎末世然權不能容非曠宇也陸績之於揚玄是仲尼之左丘明老𣆀之嚴周矣以瑚璉之器而作守南越不亦賊夫人歟張溫才藻俊茂而智防未備用致艱患駱統抗明大義辭切理至值權方閉不開陸瑁篤義規諫君子有稱焉吾粲朱據遭罹屯蹇以正喪身悲夫又評陸遜評曰劉備天下稱雄一世所憚陸遜春秋方壯威名未著摧而克之罔不如志豫既奇遜之謀略又歎權之識才所以濟大事也及遜忠誠懇至憂國亡身庶幾社稷之臣矣抗貞亮籌幹咸有父風奕世載美具體而微可謂克構者哉又評吳主五子評曰孫登居心所存足為茂美之德慮和並有好善之姿規自砥礪或短命早終或不得其死哀哉霸以庶干適奮不遵軌度固取危亡之道也然奮之誅夷橫遇飛禍矣又評吕岱周魴鍾離牧全綜評曰山越好為叛亂難安易動是以孫權不遑外禦卑辭魏氏凡此諸臣皆克寧內難綏靜邦域者也吕岱清恪在公周魴譎略多奇鍾離牧蹈長者之規全琮有當世之才貴重於時然不檢姧子獲譏毁名云又評潘濬陸凱陸胤評曰潘濬公清割斷陸凱忠壯質直皆節概梗梗有大丈夫格業胤身潔事濟著稱南土可謂良牧矣又評是儀徐詳胡綜評曰是儀徐詳胡綜皆孫權之時幹興事業者也儀清恪貞素詳數通使命綜文采才用各見信任譬之廣厦其榱椽之佐乎又評諸葛滕二孫濮陽評曰諸葛恪才氣幹略邦人所稱然驕且吝周公無觀况在於恪矜已陵人能無敗乎若躬行所與陸遜及弟融之書則悔吝不至何尤禍之有哉滕胤厲修士操遵蹈規矩而孫峻之時猶保其貴必危之理也峻綝凶豎盈溢固無足論者濮陽興身居宰輔慮不經國協張布之邪納萬彧之説誅夷其宜矣又評王樓賀韋華評曰薛瑩稱王蕃器量綽異宏博多通樓玄清白節操才理條暢賀邵厲志高潔機理清要韋曜篤學好古博見羣籍有記述之才胡沖以為玄邵蕃一時清妙略無優劣必不得已玄宜在先邵當次之華核文賦之才有過於曜而典誥不及也豫觀核數獻良規期於自盡庶幾忠臣矣然此數子處無妄之世而有名位強死其理得免為幸耳三國志文類卷五十三
