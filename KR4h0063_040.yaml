body:
  text: 三國志文類卷四十論蜀譙周仇國論因餘之國小而肇建之國大並爭於世而為讎敵因餘之國有高賢卿者問於伏愚子曰今國事未定上下勞心往古之事能以弱勝強者其術何如伏愚子曰吾聞之處大無患者多慢處小有憂者思善多慢則生亂思善則生治理之常也故周人養民以少取多句踐恤衆以弱斃強此其術也賢卿曰曩者項強漢弱相與戰爭無日寧息然項羽與漢約分鴻溝為界各欲歸息民張良以為民志既定則難動尋帥追羽終斃項氏豈必由文王之事乎肇建之國方有疾疢我因其隙陷其邊陲覬增其疢而斃之也伏愚子曰當殷周之際王侯世尊君臣久固民習所專深根者艱拔據固者難遷當此之時雖漢祖安能杖劍鞭馬而取天下乎當秦罷侯置守之後民疲秦役天下土崩或歲改主或月易公鳥驚獸駭莫知所從於是豪強並爭虎裂狼分疾搏者獲多遲後者見吞今我與肇建皆傳國易世矣既非秦末鼎沸之時實有六國並據之勢故可為文王難為漢祖夫民疲勞則騷擾之兆生上慢下暴則瓦解之形起諺曰射幸數跌不如審發是故智者不為小利移目不為意似改步時可而後動數合而後舉故湯武之師不再戰而克誠重民勞而度時審也如遂極武黷征土崩勢生不幸遇難雖有智者將不能謀之矣若乃竒變縱橫出入無間衝波截轍超谷越山不由舟楫而濟盟津者我愚子也實所不及費禕甲乙論司馬懿誅曹爽禕設甲乙論平其是非甲以為曹爽兄弟凡品庸人苟以宗子枝屬得蒙顧命之任而驕奢僭逸交非其人私樹朋黨謀以亂國懿奮誅討一朝殄盡此所以稱其任副士民之望也乙以為懿感曹仲附已不一豈爽與相干事勢不專以此隂成疵瑕初無忠告侃爾之訓一朝屠戮讒其不意豈大人經國篤本之事乎若爽信有謀主之心大逆已搆而發兵之日更以芳委爽兄弟懿父子從後閉門舉兵蹙而向芳必無悉寧忠臣為君深慮之謂乎以此推之爽無大惡明矣若懿以爽奢僭廢之刑之可也滅其尺口被以不義絶子丹血食及何晏子魏之親甥亦與同戮為僭濫不當矣袁子論諸葛亮袁子曰或問諸葛亮何如人也袁子曰張飛關羽與劉備俱起爪牙腹心之臣而武人也晚得諸葛亮因以為佐相而羣臣悅服劉備足信亮足重故也及其受六尺之孤攝一國之政事凡庸之君專權而不失禮行君事而國人不疑如此則以為君臣百姓之心欣戴之矣行法嚴而國人悅服用民盡其力而下不怨及其兵出入如賓行不寇芻蕘者不獵如在國中其用兵也止如山進退如風兵出之日天下震動而人心不憂亮死至今數十年國人歌思如周人之思召公也孔子曰雍也可使南面諸葛亮有焉又問諸葛亮始出隴右南安天水安定三郡人反應之若亮速進則三郡非中國之有也而亮徐行不進既而官兵上隴三郡復亡亮無尺寸之功失此機何也袁子曰蜀兵輕鋭良將少亮始出未知中國強弱是以疑而嘗之且大會者不求近功所以不進也曰何以知其疑也袁子曰初出遲重屯營重復後轉降未進兵欲戰亮勇而能鬬三郡反而不速應此其疑徴也曰何以知其勇而能鬭也袁子曰亮之在街亭也前軍大破亮屯去數里不救官兵相接又徐行此其勇也亮之行軍安靜而堅重安靜則易動堅重則可以進退亮法令明賞罰信士卒用命赴險而不顧此所以能鬬也曰亮帥數萬之衆其所興造若數十萬之功是其竒者也所至營壘井竈圊溷籓籬障塞皆應繩墨一月之行去之如始至勞費而徒為飾好何也袁子曰蜀人輕脫亮故堅用之曰何以明其然也袁子曰亮治實而不治名志大而所欲遠非求近速者也曰亮好治官府次舍橋梁道路此非急務何也袁子曰小國賢才少故欲其尊嚴也亮之治蜀田疇辟倉廩實器械利蓄積饒朝會不譁路無醉人夫本立故末治有餘力而後及小事此所以勸其功也曰子之論諸葛亮則有證也以亮之才而少其功何也袁子曰亮持本者也其於應變則非所長也故不敢用其短曰然則吾子美之何也袁子曰此固賢者之遠矣安可以備體責也夫能知所短而不用此賢者之大也知所短則知所長矣夫前識與言而不中亮之所不用也此吾之所謂可也又論諸葛亮司馬宣王吳大鴻臚張儼作默記其述佐篇論亮與司馬宣王書曰漢朝傾覆天下崩壞豪傑之士競希神器魏氏跨中土劉氏據益州並稱兵海內為世霸王諸葛司馬二相遭值際會託身盟主或收功於蜀漢或册名於伊洛丕備既沒後嗣繼統各受保阿之任輔翼幼主不負然諾之誠亦一國之宗臣霸王之賢佐也厯前世以觀近事二相優劣可得而詳也孔明起巴蜀之地蹈一州之土方之大國其戰士人民蓋有九分之一也而以貢贄大吳抗對北敵至使耕戰有伍刑法整齊提步卒數萬長驅祁山慨然有飲馬河洛之志仲達據天下十倍之地仗兼并之衆據牢城擁精鋭無禽敵之意務自保全而已使彼孔明自來自去若此人不亡終其志意連年運思刻日興謀則涼雍不解甲中國不釋鞍勝負之勢亦已決矣昔子産治鄭諸侯不敢加兵蜀相其近之矣方之司馬不亦優乎或曰兵者凶器戰者危事也有國者不務保安境內綏靜百姓而好開闢土地征伐天下未為得計也諸葛丞相誠有匡佐之才然處孤絶之地戰士不滿五萬自可閉關守險君臣無事空勞師旅無歲不征未能進咫尺之地開帝王之基而使國內受其荒殘西土苦其役調魏司馬懿才用兵衆未易可輕量敵而進兵家所慎若丞相必有以䇿之則未見坦然之勳若無䇿以裁之則非明哲之謂海內歸向之意也余竊疑焉請聞其説答曰蓋聞湯以七十里文王以百里之地而有天下皆用征伐而定之揖讓而登王位者惟舜禹而已今蜀魏為敵戰之國勢不俱王自操備時強弱懸殊而備猶出兵陽平禽夏侯淵羽圍襄陽將降曹仁生獲于禁當時北邊大小憂懼孟德身出南陽樂進徐晃等為救圍不即解故蔣子通言彼時有徙許渡河之計會國家襲取南郡羽乃解軍玄德與操智力多少士衆衆寡用兵行軍之道不可同年而語猶能暫以取勝是時又無大吳犄角之勢也今仲達之才減於孔明當時之勢異於曩日玄德尚與抗衡孔明何以不可出軍而圖敵邪昔樂毅以弱燕之衆兼從五國之兵長驅強齊下七十餘城今蜀漢之卒不少燕軍君臣之接信於樂毅加以國家為唇齒之援東西相應首尾如蛇形勢重大不比於五國之兵也何憚於彼而不可哉夫兵以竒勝制敵以智土地廣狹人馬多少未可偏恃也余觀彼治國之體當時整肅遺教在後及其辭意懇切陳進取之圖忠謀謇謇義形於主雖古之管晏何以加之乎三國志文類卷四十
