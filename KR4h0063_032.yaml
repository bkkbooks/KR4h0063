body:
  text: 三國志文類巻三十二勸說魏王朗勸文帝育民省刑兵起已來三十餘年四海盪覆萬國殄瘁賴先王芟除冦賊扶育孤弱遂令華夏復有綱紀鳩集兆民於兹魏土使封鄙之内雞鳴犬吠達於四境蒸庶欣欣喜遇升平今遠方之冠未賓兵戎之役未息誠令復除足以懷遠人良宰足以宣德澤阡陌咸修四民殷熾必復過於曩時而富於平日矣易稱勅法書著祥刑一人有慶兆民賴之慎法獄之謂也昔曹相國以獄市為寄路温舒疾治獄之吏夫治獄者得其情則無寃死之囚丁壯者得盡地力則無饑饉之民窮老者得仰食倉廩則無餒餓之殍嫁娶以時則男女無怨曠之恨胎養必全則孕者無自傷之哀新生必復則孩者無不自育之累壯而後役則幼者無離家之思二毛不戎則老者無頓伏之患醫藥以療其疾寛繇以樂其業威罰以抑其强恩仁以濟其弱賑貸以贍其乏十年之後旣笄者必盈巷二十年之後勝兵者必滿野矣程昱説太祖無居鄴字仲德太祖與吕布戰於濮陽數不利乃各引去於是袁紹使人說太祖連和欲使太祖遣家居鄴太祖新失兖州軍食盡將許之時昱引見言曰昔田横齊之世族兄弟三人更王據千里之齊擁百萬之衆與諸侯並南面稱孤旣而高祖得天下而横顧為降虜當此之時横豈可為心哉太祖曰然此誠丈夫之至辱也昱曰昱愚不識大㫖以為將軍之志不如田横田横齊一壯士耳猶羞為高祖臣今聞將軍欲遣家往鄴將北面而事袁紹夫以將軍之聰明神武而反不羞為袁紹之下竊為將軍恥之又料孫權不殺劉備太祖征荆州劉備奔吳論者以為孫權必殺備昱料之曰孫權新在位未為海内所憚曹公無敵於天下初舉荆州威震江表權雖有謀不能獨當也劉備有英名關羽張飛皆萬人之敵也權必資之以禦我難解勢分備資以成又不可得而殺也權果多與備兵以禦太祖郭嘉料孫䇿必死於匹夫之手孫策轉鬬千里盡有江東聞太祖與袁紹相持於官渡將渡江北襲許衆聞皆懼嘉料之曰䇿新并江東所誅皆英豪雄傑能得人死力者也然䇿輕而無備雖有百萬之衆無異於獨行中原也若刺客伏起一人之敵耳以吾觀之必死於匹夫之手䇿臨江未濟果為許貢客所殺劉曄勸曹操伐蜀時太祖征張魯漢中平曄進曰明公以歩卒五千將誅董卓北破袁紹南征劉表九州百郡十并其八威震天下勢慴海外今舉漢中蜀人望風破膽失守推此而前蜀可傳檄而定劉備人傑也有度而遲得蜀日淺蜀人未恃也今舉漢中蜀人震恐其勢自傾以公之神明因其傾而壓之無不克也若小緩之諸葛亮明於治而為相關羽張飛勇冠三軍而為將蜀民旣定據險守要則不可犯矣今不取必為後憂太祖不從劉放說王松歸太祖字子棄遭世大亂時漁陽王松據其土放徃依之太祖克冀州放説松曰往者董卓作逆英雄並起阻兵擅命人自封殖惟曹公能拔拯危亂翼戴天子奉辭伐罪所向必克以二袁之彊守則淮南冰消戰則官渡大敗乘勝席巻將清河朔威刑旣合大勢巳見速至者漸福後服者先亡此乃不俟終日馳騖之時也昔黥布棄南面之尊仗劍歸漢誠識廢興之理審去就之分也將軍宜投身委命厚自結納松然之賈逵勸孫資應命字梁道時太祖辟資會兄為鄉人所害資手刄報仇乃將家屬辟地河東故遂不應命尋復為本郡所命以疾辭友人河東賈逵謂資曰足下抱逸羣之才值舊邦傾覆主將殷勤千里延頸且崇古賢桑梓之義而久盤桓拒違君命斯由曜和璧於秦王之庭而塞以連城之價耳竊為足下不取也資感其言遂往應之蜀諸葛亮説孫權時亮與徐庶並為曹公所追破獲庶母庶辭先主而遂詣曹公亮曰事急矣請奉命求救於孫將軍時權擁兵在柴桑觀望成敗亮說曰海内大亂將軍起兵據有江東劉豫州亦收衆漢南與曹操並爭天下今操芟夷大難略巳平矣遂破荆州威震四海英雄無所用武故豫州遁逃至此將軍量力而處之若能以吳越之衆與中國抗衡不如早與之絶若不能當何不案兵束甲北面而事之今將軍外託服從之名而内懷猶豫之計事急而不斷禍至無日矣權曰苟如君言劉豫州何不遂事之乎亮曰田横齊之壯士耳猶守義不辱況劉豫州王室之胄英才葢世衆士慕仰若水之歸海若事之不濟此乃天也安能復為之下乎權勃然曰吾不能舉全吳之地十萬之衆受制於人吾計決矣非劉豫州莫可以當曹操者然豫州新敗之後安能抗此難乎亮曰豫州軍雖敗於長阪今戰士還者及關羽水軍精甲萬人劉琦合江夏戰士亦不下萬人曹操之衆遠來疲弊聞追豫州輕騎一日一夜行三百餘里此所謂彊弩之末勢不能穿魯縞者也故兵法忌之曰必蹶上將軍且北方之人不習水戰又荆州之民附操者偪兵勢耳非心服也今將軍誠能命猛將統兵數萬與豫州恊規同力破操軍必矣操軍破必北還如此則荆吳之勢彊鼎足之形成矣成敗之機在於今日權大悅即遣周瑜程普魯肅等水軍三萬隨亮詣先主并力拒曹公龎統說劉備字士元先主器之親待亞之諸葛亮與亮並為軍師中郎將統説備曰荆州荒殘人物殫盡東有吳孫北有曹氏鼎足之計難以得志今益州國富民彊户口百萬四部兵馬所出必具寶貨無求於外今可權借以定大事備曰今之與吾為水火者曹操也操以急吾以寛操以暴吾以仁操以譎吾以忠每與操反事乃可成耳今以小故而失信義於天下者吾所不取也統曰權變之時固非一道所能定也兼弱攻昧五伯之事逆取順守報之以義事定之後封以大國何負於信今日不取終為人利耳備遂行姜維說鍾㑹時㑹隂懷異圖維見而知其心謂㑹曰可搆成擾亂以圖克復也乃詭説聞君自淮南己來算無遺䇿晉道克昌皆君之力今復定蜀威德振世民高其功主畏其謀欲以此安歸乎夫韓信不背漢於擾攘以見疑於旣平大夫種不從范蠡於五湖卒伏劍而妄死彼豈闇主愚臣哉利害使之然也今君大功旣立大德巳著何不法陶朱公泛舟絶迹全功保身登峨嵋之嶺而從赤松逰乎會曰君言遠矣我不能行且為今之道或未盡於此也維曰其他則君智力之所能無煩於老夫矣由是情好歡甚吳魯肅說吳主弔劉表二子夫荆楚與國鄰接水流順北外帶江漢内阻山陵有金城之固沃野萬里士民殷富若據而有之此帝王之資也今表新亡二子素不輯睦軍中諸將各有彼此加劉備天下梟雄與操有隙寄寓於表表惡其能而不能用也若備與彼恊心上下齊同則宜撫安與結盟好如有離違宜别圖之以濟大事肅請得奉命弔表二子并慰勞其軍中用事者及說備使撫表衆同心一意共治曹操備必喜而從命如其克諧天下可定也今不速徃恐為操所先權即遣肅行朱治說孫賁陳安危字君理時權從兄豫章太守賁女為曹公子婦及曹公破荆州威震南土賁畏懼欲遣子入質治聞之求徃見賁為陳安危治說賁曰破虜將軍昔率義兵入討董卓聲冠中夏義士壯之討逆繼世廓定六郡特以君侯骨肉至親器為時生故表漢朝剖符大郡兼建將校仍關綜兩府榮冠宗室為遠近所瞻加討虜聰明神武繼承洪業攬結英雄周濟世務軍衆日盛事業日隆雖昔蕭王之在河北無以加也必克成王基應運東南故劉𤣥德遠佈腹心求見拯救此天下所共知也前在東聞道路之言云將軍有異趣艮用憮然今曹公阻兵傾覆漢室幼帝流離百姓元元未知所歸而中國蕭條或百里無煙城邑空虛道殣相望士嘆於外婦怨乎室加之以師旅因之以饑饉以此料之豈能越長江與我爭利哉將軍當斯時也而欲背骨肉之親違萬安之計割同氣之膚啖虎狼之口為一女子改慮易圖失機毫釐差以千里豈不惜哉三國志文類巻三十二
