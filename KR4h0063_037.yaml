body:
  text: 三國志文類卷三十七議魏太祖拒王芬等謀廢立議冀州刺史王芬南陽許攸沛國周旌等連結豪傑謀廢靈帝立合肥侯以告太祖太祖拒之芬等遂敗魏書載太祖拒芬辭曰夫廢立之事天下之至不祥也古人有權成敗計輕重而行之者伊尹霍光是也伊尹懷至忠之誠據宰臣之勢處官司之上故進退廢置計從事立及至霍光受托國之任籍宗臣之位內因太后秉政之重外有羣卿同欲之勢昌邑即位日淺未有貴寵朝乏讜臣議出密近故計行如轉圜事成如摧朽今諸君徒見曩者之易未覩當今之難諸君自度結衆連黨何若七國合肥之貴孰若吳楚而造作非常欲望必克不亦危乎曹髦帝王優劣議帝宴羣臣於太極東堂與侍中荀顗尚書崔贊袁亮鍾育給事中中書令虞松等並講述禮典遂言帝王優劣之差帝慕夏少康因問荀顗等曰有夏既衰后相殆滅少康收集夏衆復禹之績高祖拔起隴畝驅帥豪雋芟夷秦項包舉㝢內斯二王可謂殊才異略命世大賢者也考其功德誰宜為先顗等對曰夫天下重器王者天授聖德應期然後能受命創業至於階緣前緒興復舊績造之與因難易不同少康功德雖美猶為中興之君與世祖同流可也至如高祖臣等以為優帝曰自古帝王功德言行互有高下未必創業者皆優紹繼者咸劣也湯武高祖雖俱受命賢聖之分所覽懸殊少康殷宗中興之美夏啓周成守文之盛論德校實方諸漢祖吾見其優未聞其劣顧所遇之時殊故所名之功異耳少康生於滅亡之後降為諸侯之𨽻﨑嶇逃難僅以身免能布其德而兆其謀卒滅過戈克復禹績祀夏配天不失舊物非至德宏仁豈濟斯勳漢祖因土崩之勢仗一時之權專任智力以成功業行事動靜多違聖檢為人子則數危其親為人君則囚繫賢相為人父則不能衛子身沒之後社稷幾傾若與少康易時而處或未能復大禹之績也推此言之宜高夏康而下漢祖矣諸卿且論詳之翌日丁已講業既畢顗亮等議曰三代建國列土而治當其衰弊無土崩之勢可懷以德難屈以力逮至戰國彊弱相兼去道德而任智力故秦之弊可以力爭少康布德仁者之英也高祖任力智者之雋也仁智不同二帝殊矣詩書述殷中宗高宗皆列大雅少康功美過於二宗其為大雅明矣少康為優宜如詔㫖贊育松等議曰少康雖積德纍仁然上承大禹遺澤餘慶內有虞仍之援外有靡艾之助寒浞讒慝不德於民澆􅜦無親外內棄之以此有國蓋有所因至於漢祖起自布衣率烏合之事以成帝者之業論德則少康優課功則高祖多語資則少康易校時則高祖難帝曰諸卿論少康因資高祖創造誠有之矣然未知三代之世任德濟勳如彼之難秦項之際任力成功如此之易且太上立德其次立功漢祖功高未若少康盛德之茂也且夫仁者必有勇誅暴必用武少康武烈之威豈必降於漢祖哉但夏書淪亡舊文殘缺故勳美闕而罔載唯有伍員粗述大略其言復禹之績不失舊物祖述聖業舊章不愆自非大雅兼才孰能與於此向令墳典俱存行事詳備亦豈有異同之論哉於是羣臣咸悅服中書令松進曰少康之事去世久逺其文昧如是以自古及今議論之士莫有言者德美隱而不宣陛下既垂心逺鑒考詳古昔又發德音贊明少康之美使顯於千載之上宜録以成篇永垂於後帝曰吾學不博所聞淺狹懼於所論未獲其宜縱有可采億則屢中又不足貴無乃致笑後賢彰吾暗昧乎於是侍郎鍾會退論次焉荀彧糧盡議太祖保官渡袁紹圍之太祖軍糧方盡書與彧議欲還許以引紹彧有此議今軍食雖少未若楚漢在滎陽成皋間也是時劉項莫肯先退先退者勢屈也公以十分居一之衆畫地而守之扼其喉而不得進已半年矣情見勢竭必將有變此用竒之時不可失也太祖乃住遂以竒兵襲紹别屯斬其將淳于瓊等紹退走又寢復九州議太祖拔鄴領冀州牧或說太祖宜復古置九州則冀州所制者廣大則天下服矣太祖將從之彧有此議若是則冀州當得河東馮翊扶風西河幽并之地所奪者衆前日公破袁尚禽審配海內震駭必人人自恐不得保其土地守其兵衆也今使分屬冀州將皆動心且人多說關右諸將以閉關之計今聞此以為必以次見奪一旦生變雖有善守者轉相脅為非則袁尚得寬其死而袁談懷二劉表遂保江漢之間天下未易圖也願公急引兵先定河北然後修復舊京南臨荆州責貢之不入則天下咸知公意人人自安天下大定乃議古制此社稷長久之利也太祖遂寢九州議賈詡追退軍議太祖征張繡一朝引軍退繡自追之詡謂繡曰不可追也追必敗繡不從奏進兵交戰大敗而還詡謂繡曰促更追之更戰必勝繡謝曰不用公言以至於此今已敗奈何復追詡曰兵勢有變亟往必利繡信之遂收散卒赴追大戰果以勝還問詡曰繡以精兵追退軍而公曰必敗退以敗卒擊勝兵而公曰必剋悉如公言何其反而皆驗也詡曰此易知耳將軍雖善用兵非曹公敵也軍雖新退曹公必自斷後追兵雖精將既不敵彼士亦鋭故知必敗曹公攻將軍無失䇿力未盡而退必國內有故已破將軍必輕軍速進縱留諸將斷後諸將雖勇亦非將軍敵故雖用敗兵而戰必勝也繡乃服夏侯𤣥時事議太傅司馬宣王問以時事𤣥議以為夫官才用人國之柄也故銓衡專於臺閣上之分也孝行存乎閭巷優劣任之鄉人下之叙也夫欲清教審選在明其分叙不使相涉而已何者上過其分則恐所由之不本而干勢馳騖之路開下踰其叙則恐天爵之外通而機權之門多矣夫天爵下通是庶人議柄也機權多門是紛亂之原也自州郡中正品度官才之來有年載矣緬緬紛紛未聞整齊豈非分叙參錯各失其要之所由哉若令中正但考行倫輩倫輩當行均斯可官矣何者夫孝行著於家門豈不忠恪於在官乎仁恕稱於九族豈不達於為政乎義斷行於鄉黨豈不堪於任事乎三者之類取於中正雖不處其官名斯任官可知矣行有大小比有高下則所任之流亦煥然明别矣奚必使中正干銓衡之機於下而執機柄者有所委仗於上上下交侵以生紛錯哉且臺閣臨下考功校否衆職之屬各有官長旦夕相考莫究於此閭閻之議以意裁處而使匠宰失位衆人驅駭欲風俗清靜其可得乎天臺縣逺衆所絶意所得至者更在側近孰不修飾以要所求所求有路則修已家門者已不如自達於鄉黨矣自達鄉黨者已不如自求之於州邦矣苟開之有路而患其飾真離本雖復嚴責中正督以刑罰猶無益也豈若使各帥其分官長則各以其屬能否獻之臺閣臺閣則據官長能否之第參以鄉閭德行之次擬其倫比勿使偏頗中正則唯考其行跡别其高下審定輩類勿使升降臺閣總之如其所簡或有參錯則其責負自在有司官長所第中正輩擬比隨次率而用之如其不稱責負在外然則內外相參得失有所互相形檢孰能相飾斯則人心定而事理得庶可以靜風俗而審官才矣又以為古之建官所以濟育羣生統理民物也故為之君長以司牧之司牧之主欲一而專一則官任定而上下安專則職業修而事不煩夫事簡業修上下相安而不治者未之有也先王建萬國雖其詳未可得而究然分疆畫界各守土境則非重纍羈絆之體也下考殷周五等之叙徒有小大貴賤之差亦無君官臣民而有二統互相牽制者也夫官統不一則職業不修職業不修則事何得而簡事之不簡則民何得而靜民之不靜則邪惡並興而姦僞滋長矣先王達其如此故專其職司而一其統業始自秦世不師聖道私以御職姦以待下懼宰官之不修立監牧以董之畏督監之容曲設司察以糾之宰牧相纍監察相司人懷異心上下殊務漢承其緒莫能匡改魏室之隆日不暇及五等之典雖難卒復可粗立儀準以一治制今之長吏皆君吏民橫重以郡守纍以刺史若郡所攝唯在大較則與州同無為再重宜省郡守但任刺史刺史職存則監察不廢郡吏萬數還親農業以省煩費豐財殖榖一也大縣之才皆堪郡守是非之訟每生異意順從則安直已則爭夫和羮之美在於合異上下之益在能相濟順從乃安此琴瑟一聲也蕩而除之則官省事簡二也又幹郡之吏職監諸縣營護黨親鄉邑舊故如有不副而因公掣頓民之困弊咎生於此若皆并合則亂源自塞三也今承衰弊民人雕落賢才鮮少任事者寡郡縣良吏往往非一郡受縣成其劇在下而吏之上選郡當先足此為親民之吏專得底下吏者民命而常頑鄙今如并之吏多選清良者造職大化宣流民物獲寧四也制使萬户之縣名之郡守五千以上名之都尉千户以下令長如故自長以上考課遷用轉以能升所牧亦增此進才效功之叙也若經制一定則官才有次治功齊明五也若省郡守縣皆徑達事不擁隔官無留滯三代之風雖未可必簡一之化庶幾可致便民省費在於此矣又以為文質之更用猶四時之迭興也王者體天理物必因弊而濟通之時彌質則文之以禮時泰侈則救之以質今承百王之末秦漢餘流世俗彌文宜大改之以易民望今科制自公列侯以下位從大將軍以上皆得服綾錦羅綺紈素金銀飾鏤之物自是以下雜綵之服通於賤人雖上下等級各示有差然朝臣之制已得侔至尊矣𤣥黃之采已得通於下矣欲使市不鬻華麗之色商不通難得之貨工不作雕刻之物不可得也是故宜大理其本準度古法文質之宜取其中則以為禮度車輿服章皆從質朴禁除末俗華麗之事使幹朝之家有位之室不復有錦綺之飾無兼采之服纎巧之物自上以下至於朴素之差示有等級而已勿使過一二之覺若夫功德之賜上恩所特加皆表之有司然後服用之夫上之化下猶風之靡草朴素之教興於本朝則彌侈之心自消於下矣劉劭廢朝却㑹議建安中為計吏詣許太史上言正旦當日蝕劭時在尚書令荀彧所坐者數十人或云當廢朝或云宜却會劭曰梓慎禆竈古之良史猶占水火錯失天時禮記曰諸侯旅見天子及門不得終禮者四日蝕在一然則聖人垂制不為變豫廢朝禮者或災銷異伏或推術謬誤也彧善其言勑朝會如舊日亦不蝕三國志文類卷三十七
