body:
  text: 三國志文類卷十表奏魏公孫瓚上袁紹罪狀表臣聞皇義以來始有君臣上下之事張化以導民刑罰以禁暴今行車騎將軍袁紹託其先軌冦竊人爵既性暴亂厥行淫穢昔為司𨽻校尉㑹值國家喪禍之際太后承攝何氏輔政紹專為邪媚不能舉直至令丁原焚燒孟津招來董卓造為亂根紹罪一也卓既入雒而主見質紹不能權譎以濟君父而棄置節傳迸竄逃亡忝辱爵命背上不忠紹罪二也紹為渤海太守默選戎馬當攻董卓不告父兄至使大傅門户太僕母子一旦而斃不仁不孝紹罪三也紹既興兵涉歷二年不恤國難廣自封殖乃多以資糧專為不急割剝富室收考責錢百姓嗟吁莫不痛怨紹罪四也韓馥之迫竊其虛位矯命詔恩刻金印玉璽每下文書皂囊施檢文曰詔書一封邟口浪反鄉侯印昔新室之亂漸以即真今紹所施擬而方之紹罪五也紹令崔巨業候視星日貨賄賂遺與共飲食克期㑹合攻鈔郡縣此豈大臣所當宜為紹罪六也紹與故虎牙都尉劉勳首共造兵勳仍有效又降服張揚而以小忿枉害於勳信用讒慝殺害有功紹罪七也紹又上故上谷太守髙焉故甘陵相姚貢橫責其錢錢不備畢二人并命紹罪八也春秋之義子以母貴紹母親為婢使紹實微賤不可以為人後以義不宜乃據豐隆之重任忝汚王爵損辱袁宗紹罪九也又長沙太守孫堅前領豫州刺史驅走董卓掃除陵廟其功莫大紹令周昻盜居其位斷絶堅糧令不得入使卓不被誅紹罪十也臣又每得後將軍袁術書云紹非術類也紹之罪戾雖南山之竹不能載昔姬周政弱王道陵遲天子遷都諸侯背叛於是齊桓立柯亭之盟晉文為踐土之㑹伐荆楚以致菁茅誅曹衛以彰無禮臣雖闒茸名非先賢䝉被朝恩當此重任職在鈇鉞奉辭伐罪輒與諸將州郡兵討紹等若事克捷罪人斯得庶續桓文忠誠之效攻戰形狀前後續上遂舉兵與紹對戰紹不勝王朗請太祖節省奏詔問所宜損益必謂東京之事也若夫西京雲陽汾隂之大祭千有五百之羣祀通天之臺入阿房之宫齊必百日養犧五載牛則三千其重玉則七千其器文綺以飾重席童女以蹈舞綴釀酎必貫三時而後成樂人必三千四百而後備內宫美人數至近千學官博士七千餘人中廏則騑騄駙馬六萬餘匹外牧則扈養三萬而馬十之執金吾從騎六百走卒倍焉太常行陵幸車千乘太官賜官奴婢六千長安城內治民為政者三千中二千石蔽罪斷刑者二十有五獄政充事猥威儀繁富隆於三代近過禮中夫所以極奢者大抵多受之於秦餘既違繭栗慤誠之本掃地簡易之指又失替質而損文避泰而從約之趣豈夫當今隆興盛明之時祖述堯舜之際割奢務儉之政除繁崇省之令詳刑慎罰之教所宜希慕哉及夫寢廟日一太牢之祀郡國並立宗廟之法丞相御史大夫官屬吏從之數若此之輩既已屢改於哀平之前不行光武之後矣謹按圖牒所改奏在天地及五帝六宗宗廟社稷既已因前代之兆域矣夫天地則掃地而祭其餘則皆壇而埒之矣明堂所以祀上帝靈臺所以觀天文辟雍所以修禮樂大學所以集儒林髙禖所以祈休祥又所以察時務揚教化稽古先民開誕慶祚舊時皆在國之陽並髙棟夏屋足以肆饗射望雲物七郊雖尊祀尚質猶皆有門宇便坐足以避風雨可須軍罷年豐以漸修治舊時虎賁羽林五營兵及衛士并合雖且萬人或商賈惰游子弟或農野謹鈍之人雖有乘制之處不講戎陳既不簡練又希更寇雖名實不副難以備急有警而後募兵軍行而後運糧或乃兵既久屯而不務營佃不修器械無有貯聚一隅馳羽檄則三面並荒擾此亦漢氏近世之失而不可式者也當今諸夏巳安而巴蜀在畫外雖未得偃武而韜甲放馬而戢兵宜因年之大豐遂寄軍政於農事吏士小大並勤稼穡止則成井里於廣野動則成校隊於六軍省其暴繇贍其衣食易稱恱以使民民忘其勞恱以犯難民忘其死今之謂矣糧畜於食勇畜於勢雖坐曜烈威而衆未動畫外之蠻必復稽顙以求改往而效用矣若畏威效用不戰而定則賢於交兵而後威立接刃而後功成逺矣若姦凶不革遂迷不反猶欲以其所虐用之民待大魏投命報養之士然後徐以前歌後舞樂征之衆臨彼倒㦸折矢樂服之羣伐腐摧枯未足以為喻太祖乞追贈郭嘉户邑表嘉疾篤太祖問疾者交錯及薨臨其喪哀甚謂荀攸等曰諸君年皆孤輩也惟奉孝最少天下事竟欲以後事屬之而中年夭折命也夫乃表曰軍祭酒郭嘉自從征伐十有一年每有大議臨敵制變臣策未決嘉輒成之平定天下謀功為髙不幸短命事業未終追思嘉勳實不可忘可增邑八百户并前千户臣聞褒忠寵賢未必當身念功惟績恩隆後嗣是以楚宗孫叔顯封厥子岑彭既沒爵及支庶故軍祭酒郭嘉忠良淵淑體通性達每有大議發言盈廷執中處理動無遺策自在軍旅十有餘年行同騎乘坐共幄席東禽吕布西取眭固斬袁談之首平朔土之衆踰越險塞蕩定烏丸震威遼東以梟袁尚雖假天威易為指麾至於臨敵發揚誓命凶逆克殄勳實由嘉方將表揚短命早終上為朝廷悼惜良臣下自毒恨喪失竒佐宜追增嘉封并前千户褒亡為存厚往勸來也又論田疇功表田疇字子泰舉茂才拜為蓨令不之官隨軍次無終方夏水雨而濱海汙下濘滯不通虜亦遮守蹊要車不得進太祖患之以問疇疇曰此道秋夏每常有水淺不通車馬深不載舟船為難久矣舊北平郡治在平岡道出盧龍達于栁城自建武以來陷壞斷絶垂二百載而尚有微徑可從今虜將以大軍當由無終不得進而退懈弛無備若默回軍從盧龍口越白檀之險出空虛之地路近而便掩其不備踏頓之首可不戰而禽也太祖曰善乃引軍還而署大木表於水側路傍曰方今夏暑道路不通且俟秋冬乃復進軍虜候騎見之誠以為大軍去也太祖令疇將其衆為鄉導上徐無山出盧龍歷平岡登白狼堆去栁城二百餘里虜乃驚覺單于身自臨陳太祖與交戰遂大斬獲追奔逐北至栁城軍還入塞論功行封封疇亭侯太祖表論疇功曰文雅優備忠武又著和於撫下慎於事上量時度理進退合義幽州始擾胡漢交萃蕩析離居靡所依懷疇率宗人避難於無終山北拒盧龍南守要害清靜隱約耕而後食人民化從咸共資奉及袁紹父子威力加於朔野逺結烏丸與為首尾前後召疇終不陷撓後臣奉命軍次易縣疇長驅自到陳討胡之勢猶廣武之建燕策薛公之度淮南又使部曲持臣露布出誘胡衆漢民或因亡來烏丸聞之震蕩王旅出塞塗由山中九百餘里疇帥兵五百啓導山谷遂滅烏丸蕩平塞表疇文武有效節義可嘉誠應寵賞以旌其美疇自以始為居難率衆遁逃志義不立反以為利非本意也固讓太祖知其至心許而不奪衛覬請置律博士奏明帝時九章之律自古所傳斷定刑罪其意微妙百里長吏皆宜知律刑法者國家之所貴重而私議之所輕賤獄吏者百姓之所縣命而選用者之所卑下王政之弊未必不由此也請置律博士轉相教授事遂施行劉廙論治道表昔者周有亂臣十人有婦人焉九人而已孔子稱才難不其然乎明賢者難得也况亂弊之後百姓凋盡士之存者蓋亦無幾股肱大職及州郡督司邉方重任雖備其官亦未得人也此非選者之不用意蓋才匱使之然耳况於長吏以下羣職小任能皆簡練備得其人也其計莫如督之以法不爾而數轉易往來不巳送迎之煩不可勝計轉易之間輒有奸巧既於其事不省而為政者亦以其不得久安之故知惠益不得成於已而苟且之可免於患皆將不念盡心於恤民而夢想於聲譽此非所以為政之本意也今之所以為黜陟者近頗以州郡之毁譽聽往來之浮言耳亦皆得其事實而課其能否也長吏之所以為佳者奉法也憂公也恤民也此三事者或州郡有所不便往來者有所不安而長吏執之不巳於治雖得計其聲譽未為美闕而從人於治雖失計其聲譽必集也長吏皆知黜陟之在於此也亦何能不去本而就末哉以為長吏皆宜使小久足使自展嵗課之能三年總計乃加黜陟課之皆當以事不得依名事者皆以户口率以墾田之多少及盜賊發興民之亡叛者為得負之計如此行之則無能之吏修名無益有能之人無名無損法之一行雖無部司之監姦譽妄毁可得而盡事上太祖甚善之盧育駮棄市奏字子家崔琰舉為冀州主簿時天下草創多逋逃故重士亡法罪及妻子亡士妻白等始適夫家三日未與夫相見大理奏棄市育駮之曰夫女子之情以接見而恩生成婦而義重故詩云未見君子我心傷悲亦既見止我心則夷又禮未廟見之婦而死歸葬女氏之黨以未成婦也今白等生有未見之悲死有非婦之痛而吏議欲肆之大辟則若同牢合卺之後罪何所加且記曰附從輕言附人之罪以輕者為比也又書云與其殺不辜寧失不經恐過重也苟以白等皆受聘禮巳入門庭刑之為可殺之為重太祖曰育執之是也又引經典有意使孤嘆息王昶陳治略五事司馬宣王既誅曹爽乃奏博問大臣得失昶陳治略五事其一欲崇道篤學抑絶浮華使國子入太學而修庠序其二欲用考試考試猶準繩也未有捨準繩而意正曲直廢黜陟而空論能否也其三欲令居官者久於其職有治績則就增位賜爵其四欲約官實祿勵士亷恥不使與百姓爭利其五欲絶侈靡務崇節儉令衣服有章上下有叙儲榖蓄帛反民於朴詔書褒讚三國志文類卷十
